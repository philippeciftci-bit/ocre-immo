<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — OCRE immo</title>
<meta name="theme-color" content="#8B5E3C">
<meta name="description" content="Page introuvable sur OCRE immo.">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=18.40.1">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=18.40.1">
<link rel="shortcut icon" href="/favicon.ico?v=18.40.1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:#F0E8D8;color:#2A2018;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{background:#fff;border:1px solid #E0CDAE;border-radius:16px;padding:32px 28px;max-width:420px;width:100%;text-align:center;box-shadow:0 2px 8px rgba(139,94,60,.12)}
.brand{display:flex;align-items:baseline;justify-content:center;gap:10px;margin-bottom:20px}
.logo{width:44px;height:44px;border-radius:8px;border:2px solid #8B5E3C;background:linear-gradient(to bottom,#FFFFFF 0%,#F5E8D1 40%,#8B5E3C 100%);display:flex;align-items:center;justify-content:center;gap:2px;flex-shrink:0}
.logo .o{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:22px;color:#8B5E3C;line-height:1}
.logo .i{font-family:'Caveat',cursive;font-weight:500;font-size:28px;color:#0D0A08;line-height:1;margin-top:2px}
.title{display:flex;align-items:baseline;gap:3px}
.title .ocre{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:22px;letter-spacing:1.8px;color:#8B5E3C}
.title .immo{font-family:'Caveat',cursive;font-weight:400;font-size:26px;color:#2A2018;margin-left:2px}
h1{font-family:'Cormorant Garamond',serif;font-size:34px;color:#8B5E3C;margin:18px 0 8px;font-weight:700;letter-spacing:.5px}
p{font-size:14px;color:#5A4E3D;line-height:1.55;margin-bottom:20px}
.btn{display:inline-block;padding:12px 22px;background:linear-gradient(135deg,#8B5E3C,#A06B45);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:13.5px;font-family:inherit;box-shadow:0 2px 6px rgba(60,40,20,.2)}
.btn:active{opacity:.9}
.code{font-family:monospace;font-size:12px;color:#8B7F6E;margin-top:20px;letter-spacing:1.5px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo"><span class="o">O</span><span class="i">i</span></div>
    <div class="title"><span class="ocre">OCRE</span><span class="immo">immo</span></div>
  </div>
  <h1>Page introuvable</h1>
  <p>La page demandée n'existe pas ou a été déplacée.</p>
  <a href="/" class="btn">← Retour à l'accueil</a>
  <div class="code">404</div>
</div>
</body>
</html>
