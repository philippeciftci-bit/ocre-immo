<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Activation de votre compte — Ocre Immo</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=20260507">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=20260507">
<link rel="manifest" href="/icons/manifest.json">
<meta name="theme-color" content="#8B5E3C">
<meta name="apple-mobile-web-app-title" content="Ocre Immo">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #FAF6EC; color: #2A2018; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { max-width: 440px; width: 100%; background: #fff; border-radius: 16px; padding: 36px 28px; box-shadow: 0 2px 12px rgba(60,40,20,0.08); text-align: center; }
  .brand { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px; font-weight: 600; color: #8B5E3C; margin-bottom: 4px; }
  .brand small { display: block; font-family: 'DM Sans', sans-serif; font-style: normal; font-size: 11px; letter-spacing: 3px; color: #B8895A; text-transform: uppercase; font-weight: 600; margin-top: 6px; }
  h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 28px; font-weight: 500; color: #2A1F15; margin: 22px 0 10px; }
  p { font-size: 14px; line-height: 1.55; color: #5C3B1E; }
  .spinner { width: 38px; height: 38px; border-radius: 50%; border: 3px solid #E8DDC9; border-top-color: #8B5E3C; animation: spin 0.9s linear infinite; margin: 24px auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .check-circle { width: 70px; height: 70px; border-radius: 50%; background: #2D7A3E; display: flex; align-items: center; justify-content: center; margin: 18px auto 14px; box-shadow: 0 4px 16px rgba(45,122,62,0.25); }
  .check-circle svg { width: 34px; height: 34px; stroke: #fff; stroke-width: 4; fill: none; }
  .err-circle { width: 70px; height: 70px; border-radius: 50%; background: #C0392B; display: flex; align-items: center; justify-content: center; margin: 18px auto 14px; color: #fff; font-size: 36px; font-weight: 700; }
  .small { font-size: 12px; color: #8B7F6E; margin-top: 16px; }
  .btn { display: inline-block; margin-top: 18px; padding: 12px 28px; background: #8B5E3C; color: #fff; text-decoration: none; border-radius: 10px; font-weight: 700; font-size: 13px; }
  .btn-success { background: #2D7A3E; }
  .footer { margin-top: 24px; font-size: 11px; color: #8B7F6E; }
  .footer a { color: #8B5E3C; text-decoration: none; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="brand">Ocre Immo<small>Activation</small></div>
  <div id="state-loading">
    <div class="spinner"></div>
    <h1>Activation en cours</h1>
    <p>Nous préparons votre espace personnel. Cela prend quelques secondes.</p>
  </div>
  <div id="state-success" style="display:none">
    <div class="check-circle"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>
    <h1>Compte activé</h1>
    <p>Bienvenue sur Ocre Immo. Redirection vers votre espace personnel…</p>
    <p class="small" id="redirect-info"></p>
  </div>
  <div id="state-error" style="display:none">
    <div class="err-circle">!</div>
    <h1>Activation impossible</h1>
    <p id="err-msg">Une erreur est survenue.</p>
    <a href="mailto:contact@ocre.immo?subject=Probleme%20activation%20compte" class="btn">Contacter le support</a>
  </div>
  <div class="footer">Ocre Immo · <a href="https://ocre.immo/">ocre.immo</a></div>
</div>
<script>
(function(){
  function show(state) {
    ['loading','success','error'].forEach(function(s){
      var el = document.getElementById('state-' + s);
      if (el) el.style.display = s === state ? '' : 'none';
    });
  }
  function fail(msg) { show('error'); document.getElementById('err-msg').textContent = msg || 'Erreur inconnue'; }

  var qs = new URLSearchParams(window.location.search);
  var token = qs.get('token') || qs.get('activation_token') || '';
  if (!token || !/^[a-f0-9]{64}$/i.test(token)) {
    fail('Le lien d\'activation est invalide ou incomplet. Vérifiez votre email.');
    return;
  }

  fetch('/api/activate.php?action=activate&activation_token=' + encodeURIComponent(token), {
    method: 'GET',
    headers: { 'Accept': 'application/json' },
  })
    .then(function(r){ return r.json().then(function(j){ return {status: r.status, body: j}; }); })
    .then(function(o){
      var j = o.body;
      if (j && j.ok && j.redirect) {
        show('success');
        document.getElementById('redirect-info').textContent = 'Espace : ' + (j.slug || '');
        setTimeout(function(){ window.location = j.redirect; }, 1500);
        return;
      }
      var err = (j && j.error) || 'ERREUR_INCONNUE';
      var msg;
      switch (err) {
        case 'TOKEN_EXPIRED':
          msg = 'Ce lien a expiré (validité 7 jours). Demandez un nouveau lien d\'activation en relançant l\'inscription.';
          break;
        case 'token introuvable':
        case 'activation_token invalide':
          msg = 'Lien d\'activation invalide. Vérifiez votre email ou contactez le support.';
          break;
        case 'compte non activable':
          msg = 'Ce compte ne peut plus être activé via ce lien. Contactez le support.';
          break;
        case 'PROVISIONING_FAILED':
          msg = 'Erreur technique lors de la préparation de votre espace. L\'équipe a été alertée — réessayez dans quelques minutes ou contactez-nous.';
          break;
        default:
          msg = 'Erreur : ' + err;
      }
      fail(msg);
    })
    .catch(function(){ fail('Erreur réseau. Vérifiez votre connexion et réessayez.'); });
})();
</script>
</body>
</html>
