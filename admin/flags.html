<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feature Flags — Ocre Immo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F4EEE6;color:#2A2018;min-height:100vh;padding:24px}
.wrap{max-width:960px;margin:0 auto}
h1{font-family:'Cormorant Garamond',serif;font-size:32px;color:#8B5E3C;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:#8B7F6E;margin-bottom:20px}
.gate{background:#fff;padding:24px;border-radius:12px;border:1px solid #EDE6DC;max-width:420px;margin:60px auto}
.gate input{width:100%;padding:10px 12px;border:1px solid #D6C7AC;border-radius:6px;font-size:14px;font-family:inherit;margin-bottom:10px}
.gate button{width:100%;padding:12px;background:#8B5E3C;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit}
.gate .err{color:#C73E3E;font-size:12px;margin-top:8px;text-align:center;min-height:18px}
.flag-card{background:#fff;border:1px solid #EDE6DC;border-radius:12px;padding:16px;margin-bottom:12px}
.flag-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.flag-key{font-family:'DM Sans',monospace;font-size:14px;font-weight:700;color:#2A2018;letter-spacing:.3px}
.flag-desc{font-size:12px;color:#8B7F6E;margin-bottom:10px;line-height:1.5}
.toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:600}
.toggle input{appearance:none;width:42px;height:24px;background:#D6C7AC;border-radius:12px;position:relative;cursor:pointer;transition:background 200ms}
.toggle input:checked{background:#8B5E3C}
.toggle input::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:10px;transition:transform 200ms}
.toggle input:checked::after{transform:translateX(18px)}
.emails-row{margin-top:8px}
.emails-row label{display:block;font-size:11px;color:#8B7F6E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.emails-row textarea{width:100%;min-height:48px;padding:8px 10px;border:1px solid #D6C7AC;border-radius:6px;font-size:12px;font-family:'DM Sans',monospace;resize:vertical}
.emails-row .hint{font-size:10px;color:#A89884;margin-top:4px;font-style:italic}
.btn-row{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.btn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn.save{background:#8B5E3C;color:#fff}
.btn.save:hover{background:#6B4429}
.status{font-size:11px;color:#3D7A3D;margin-right:auto;align-self:center;font-style:italic}
.status.error{color:#C73E3E}
.loader{text-align:center;padding:60px;color:#8B7F6E}
</style>
</head>
<body>
<div class="wrap">
  <h1>Feature Flags</h1>
  <div class="sub">Trunk-based development · toggle global + whitelist par email · super-admin only</div>
  <div id="gate" class="gate" style="display:none">
    <div style="font-weight:600;margin-bottom:8px">Authentification super-admin</div>
    <input id="login_email" type="email" placeholder="email" autocomplete="email">
    <input id="login_pwd" type="password" placeholder="code agent">
    <button id="login_btn">Se connecter</button>
    <div id="login_err" class="err"></div>
  </div>
  <div id="root" style="display:none"></div>
  <div id="loading" class="loader">Chargement…</div>
</div>
<script>
const API = '';
let token = localStorage.getItem('ocre_token') || '';

async function req(url, opts) {
  const headers = {'Content-Type': 'application/json'};
  if (token) headers['X-Session-Token'] = token;
  const res = await fetch(url, Object.assign({}, opts, {headers: Object.assign(headers, (opts && opts.headers) || {})}));
  return res.json();
}

async function ensureAuth() {
  if (!token) return showGate();
  const me = await req('/api/auth_v20.php?action=me').catch(() => ({ok:false}));
  if (!me.ok) return showGate();
  if (!me.user || me.user.role !== 'super_admin') {
    document.getElementById('loading').textContent = 'Acces refuse : super_admin requis.';
    return;
  }
  loadFlags();
}

function showGate() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('gate').style.display = 'block';
  document.getElementById('login_btn').onclick = async () => {
    const email = document.getElementById('login_email').value.trim();
    const password = document.getElementById('login_pwd').value;
    const r = await req('/api/auth_v20.php?action=login', {method:'POST', body: JSON.stringify({email, password, accept_cgu: true})});
    if (r.ok && r.token) {
      token = r.token; localStorage.setItem('ocre_token', token);
      document.getElementById('gate').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      ensureAuth();
    } else {
      document.getElementById('login_err').textContent = r.error || 'Echec login';
    }
  };
}

async function loadFlags() {
  const r = await req('/admin/api/flags_set_overrides.php?action=list');
  if (!r.ok) {
    document.getElementById('loading').textContent = 'Erreur: ' + (r.error || 'inconnue');
    return;
  }
  document.getElementById('loading').style.display = 'none';
  const root = document.getElementById('root');
  root.style.display = 'block';
  root.innerHTML = '';
  r.flags.forEach(f => root.appendChild(renderFlag(f)));
}

function renderFlag(f) {
  const card = document.createElement('div'); card.className = 'flag-card';
  card.innerHTML = `
    <div class="flag-head">
      <div class="flag-key">${esc(f.flag_key)}</div>
      <label class="toggle">
        <span>Default global</span>
        <input type="checkbox" ${+f.default_value ? 'checked' : ''} data-default>
      </label>
    </div>
    ${f.description ? `<div class="flag-desc">${esc(f.description)}</div>` : ''}
    <div class="emails-row">
      <label>Whitelist emails (CSV) — visible meme si default OFF</label>
      <textarea data-emails placeholder="philippe.ciftci@gmail.com, autre@example.com">${(f.emails_whitelist || []).join(', ')}</textarea>
      <div class="hint">Emails inconnus seront ignores. Vider la zone supprime tous les overrides email pour ce flag.</div>
    </div>
    <div class="btn-row">
      <span class="status" data-status></span>
      <button class="btn save" data-save>Enregistrer</button>
    </div>
  `;
  card.querySelector('[data-save]').onclick = async () => {
    const def = card.querySelector('[data-default]').checked ? 1 : 0;
    const emails = card.querySelector('[data-emails]').value;
    const status = card.querySelector('[data-status]');
    status.textContent = 'Enregistrement…'; status.classList.remove('error');
    const r = await req('/admin/api/flags_set_overrides.php', {method:'POST', body: JSON.stringify({action:'sync', flag_key: f.flag_key, default_value: def, emails_csv: emails})});
    if (r.ok) {
      status.textContent = `OK (${r.sync.added} ajoute(s), ${r.sync.removed} retire(s)${r.sync.unknown_emails.length ? ', ' + r.sync.unknown_emails.length + ' email(s) inconnu(s)' : ''})`;
      setTimeout(() => { status.textContent = ''; }, 5000);
    } else {
      status.textContent = 'Erreur: ' + (r.error || 'inconnue'); status.classList.add('error');
    }
  };
  return card;
}

function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

ensureAuth();
</script>
</body>
</html>
