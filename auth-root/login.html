<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#3D2818">
<meta name="robots" content="noindex,nofollow">
<title>Connexion · Ocre Immo</title>
<link rel="icon" href="/favicon/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --cream:#FAF6F1; --brown:#3D2818; --brown-soft:#6B5642; --brown-mute:#998877; --ocre-dark:#8B5E3C; --gold:#D4A256; --gold-bright:#E8B95E; --line:#E5DAC6; }
*,*::before,*::after { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.card { width: 100%; max-width: 420px; background: #fff; border-radius: 18px; padding: 36px 30px 30px; box-shadow: 0 4px 28px rgba(139, 111, 58, 0.10); border: 1px solid var(--line); }
.brand { text-align: center; margin-bottom: 22px; }
.brand-mark { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 600; font-size: 38px; color: var(--ocre-dark); letter-spacing: -0.02em; }
.brand-mark span { color: var(--gold); }
h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 600; font-size: 28px; text-align: center; margin: 0 0 6px; color: var(--brown); letter-spacing: -0.01em; }
.sub { text-align: center; font-size: 13.5px; color: var(--brown-soft); margin-bottom: 28px; }
.sso { display: flex; flex-direction: column; gap: 11px; }
.btn-sso { display: flex; align-items: center; justify-content: center; gap: 10px; height: 48px; border-radius: 10px; font-size: 14.5px; font-weight: 600; cursor: pointer; border: 1px solid transparent; font-family: inherit; transition: all .15s; text-decoration: none; }
.btn-sso:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
.btn-google { background: #fff; color: #1F1F1F; border-color: #DADCE0; }
.btn-apple { background: #000; color: #fff; }
.btn-facebook { background: #1877F2; color: #fff; }
.sep { display: flex; align-items: center; gap: 14px; margin: 22px 0 18px; color: var(--brown-mute); font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; }
.sep::before, .sep::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.btn-email { display: block; text-align: center; padding: 12px; background: none; border: none; color: var(--ocre-dark); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; }
.btn-email:hover { color: var(--brown); }
.foot-link { text-align: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 12.5px; color: var(--brown-mute); }
.foot-link a { color: var(--ocre-dark); text-decoration: none; font-weight: 600; }
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.field label { font-size: 11.5px; color: var(--brown-soft); font-weight: 500; letter-spacing: 0.04em; }
.field input { padding: 12px 13px; border: 1px solid var(--line); border-radius: 9px; font-size: 14px; font-family: inherit; color: var(--brown); background: #FCFAF7; }
.field input:focus { outline: none; border-color: var(--ocre-dark); background: #fff; }
.btn-submit { width: 100%; padding: 15px; background: var(--ocre-dark); color: #fff; border: none; border-radius: 10px; font-size: 14.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-submit:hover { background: var(--brown); }
.btn-back { display: block; text-align: center; padding: 10px; background: none; border: none; color: var(--brown-mute); font-size: 12.5px; cursor: pointer; font-family: inherit; }
.feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
.feedback.show { display: block; }
.feedback.error { background: #FDECEA; color: #C62828; }
.feedback.success { background: #E8F5E9; color: #2E7D32; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="card">
  <div class="brand"><div class="brand-mark">Oc<span>re</span></div></div>

  <div id="screen-1">
    <h1>Bon retour 👋</h1>
    <div class="sub">Connecte-toi à Oi Agent</div>
    <div class="sso">
      <a href="/api/oauth/google/init.php" class="btn-sso btn-google"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg> Continuer avec Google</a>
      <a href="/api/oauth/apple/init.php" class="btn-sso btn-apple"><svg width="18" height="18" viewBox="0 0 384 512" fill="#fff"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg> Continuer avec Apple</a>
      <a href="/api/oauth/facebook/init.php" class="btn-sso btn-facebook"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692V11.25h3.128V8.564c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.464.099 2.795.143v3.24h-1.918c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.456h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg> Continuer avec Facebook</a>
    </div>
    <div class="sep">ou</div>
    <button type="button" class="btn-email" onclick="showScreen(2)">✉ Continuer avec mon email</button>
    <div class="foot-link">Pas encore de compte ? <a href="/signup.html">Créer un compte →</a></div>
  </div>

  <div id="screen-2" class="hidden">
    <h1>Connexion par email</h1>
    <div class="sub">Saisis ton email · on t'envoie un lien magique</div>
    <form onsubmit="return submitLogin(event)">
      <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required autocomplete="email"></div>
      <button type="submit" class="btn-submit" id="btn-submit">M'envoyer le lien →</button>
      <button type="button" class="btn-back" onclick="showScreen(1)">← Retour aux options</button>
      <div id="form-feedback" class="feedback"></div>
    </form>
  </div>
</div>

<script>
function $(id) { return document.getElementById(id); }
function showScreen(n) {
  $('screen-1').classList.toggle('hidden', n!==1);
  $('screen-2').classList.toggle('hidden', n!==2);
}
async function submitLogin(e) {
  e.preventDefault();
  var btn = $('btn-submit'); btn.disabled = true; btn.textContent = '⏳ Envoi…';
  var fb = $('form-feedback'); fb.className = 'feedback';
  try {
    var r = await fetch('/api/magic-link/request.php', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: $('email').value.trim()}),
    });
    var d = await r.json();
    if (d.ok) {
      fb.textContent = '✅ Lien envoyé à ' + $('email').value + ' · vérifie ta boîte mail.';
      fb.classList.add('show', 'success');
    } else {
      fb.textContent = 'Erreur : ' + (d.error || 'inconnue');
      fb.classList.add('show', 'error');
    }
  } catch (err) {
    fb.textContent = 'Erreur réseau : ' + err.message;
    fb.classList.add('show', 'error');
  } finally {
    btn.disabled = false; btn.textContent = "M'envoyer le lien →";
  }
  return false;
}
</script>
</body>
</html>
