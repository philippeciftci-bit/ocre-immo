<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#3D2818">
<meta name="robots" content="noindex,nofollow">
<title>Réinitialiser mot de passe · Ocre Immo</title>
<link rel="icon" href="/icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
<link rel="manifest" href="/icons/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --cream:#FAF6F1; --brown:#3D2818; --brown-soft:#6B5642; --brown-mute:#998877; --ocre-dark:#8B5A3C; --gold:#D4A256; --line:#E5DAC6; }
*,*::before,*::after { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
.card { width: 100%; max-width: 420px; background: #fff; border-radius: 18px; padding: 36px 30px 30px; box-shadow: 0 4px 28px rgba(139, 111, 58, 0.10); border: 1px solid var(--line); }
.brand { text-align: center; margin-bottom: 18px; }
.brand-mark { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 600; font-size: 38px; color: var(--ocre-dark); letter-spacing: -0.02em; }
.brand-mark span { color: var(--gold); }
h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 600; font-size: 26px; text-align: center; margin: 0 0 6px; color: var(--brown); letter-spacing: -0.01em; }
.sub { text-align: center; font-size: 13.5px; color: var(--brown-soft); margin-bottom: 22px; }
.intro { font-size: 13.5px; color: var(--brown-soft); margin-bottom: 18px; line-height: 1.55; }
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.field label { font-size: 11.5px; color: var(--brown-soft); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.field input { padding: 13px 14px; border: 1px solid var(--line); border-radius: 9px; font-size: 15px; font-family: inherit; color: var(--brown); background: #FCFAF7; }
.field input:focus { outline: none; border-color: var(--ocre-dark); background: #fff; }
.hint { font-size: 11.5px; color: var(--brown-mute); margin-top: 4px; }
.btn-submit { width: 100%; padding: 14px 24px; background: #8B5A3C; color: #ffffff; border: none; border-radius: 10px; font-family: 'DM Sans',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif; font-size: 15px; font-weight: 700; line-height: 1.2; cursor: pointer; transition: all .2s; margin-top: 8px; }
.btn-submit:hover:not(:disabled) { background: #6B3F26; }
.btn-submit:disabled { opacity: 0.5; cursor: wait; }
.feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
.feedback.show { display: block; }
.feedback.error { background: #FDECEA; color: #C62828; }
.feedback.success { background: #E8F5E9; color: #2E7D32; }
.foot-link { text-align: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 12.5px; color: var(--brown-mute); }
.foot-link a { color: var(--ocre-dark); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<!-- M/2026/05/14/72 Phase C : reset password (2 etapes : request email -> complete avec token). -->
<div class="card">
  <div class="brand"><div class="brand-mark">Oc<span>re</span></div></div>

  <!-- Step 1 : request reset email -->
  <div id="step-request">
    <h1>Mot de passe oublié</h1>
    <div class="sub">Saisis ton email, nous t'enverrons un lien.</div>
    <form id="request-form" autocomplete="on" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="username" placeholder="ton@email.com" autofocus>
      </div>
      <button type="submit" class="btn-submit" id="request-submit">Envoyer le lien</button>
      <div id="request-feedback" class="feedback"></div>
    </form>
    <div class="foot-link"><a href="/login.html">Retour à la connexion</a></div>
  </div>

  <!-- Step 2 : reset complete avec token URL -->
  <div id="step-complete" style="display:none">
    <h1>Nouveau mot de passe</h1>
    <div class="sub">Choisis ton nouveau mot de passe</div>
    <p class="intro">Ton iPhone te proposera un mot de passe fort et le sauvegardera dans Keychain.</p>
    <form id="complete-form" autocomplete="on" novalidate>
      <input id="reset-token" type="hidden">
      <input type="email" id="email-hidden" name="username" autocomplete="username" style="display:none">
      <div class="field">
        <label for="new-password">Nouveau mot de passe</label>
        <input id="new-password" name="new-password" type="password" required autocomplete="new-password" minlength="12" placeholder="Au moins 12 caractères">
        <div class="hint">12 caractères minimum. Mots de passe communs refusés.</div>
      </div>
      <div class="field">
        <label for="new-confirmation">Confirmer</label>
        <input id="new-confirmation" name="confirm-password" type="password" required autocomplete="new-password" minlength="12">
      </div>
      <button type="submit" class="btn-submit" id="complete-submit">Choisir ce mot de passe</button>
      <div id="complete-feedback" class="feedback"></div>
    </form>
  </div>
</div>

<script>
function $(id) { return document.getElementById(id); }
var qs = new URLSearchParams(location.search);
var token = qs.get('token') || '';

if (token) {
  // Phase 2 : reset complete
  $('step-request').style.display = 'none';
  $('step-complete').style.display = 'block';
  $('reset-token').value = token;
  $('complete-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = $('complete-submit'), fb = $('complete-feedback');
    fb.className = 'feedback';
    btn.disabled = true; btn.textContent = 'Enregistrement…';
    try {
      var r = await fetch('/api/auth/reset_complete.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ token: $('reset-token').value, password: $('new-password').value, confirmation: $('new-confirmation').value })
      });
      var d = await r.json();
      if (!d.ok) throw new Error(d.error || 'Reset echec');
      try { if (d.session_token) localStorage.setItem('ocre_token', d.session_token); } catch (_) {}
      location.replace(d.redirect || '/');
    } catch (ex) {
      fb.textContent = ex.message || 'Erreur reseau';
      fb.classList.add('show', 'error');
      btn.disabled = false; btn.textContent = 'Choisir ce mot de passe';
    }
  });
} else {
  // Phase 1 : request email
  $('request-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = $('request-submit'), fb = $('request-feedback');
    fb.className = 'feedback';
    btn.disabled = true; btn.textContent = 'Envoi…';
    try {
      var r = await fetch('/api/auth/reset_request.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: $('email').value.trim().toLowerCase() })
      });
      var d = await r.json();
      fb.textContent = d.message || 'Si ce compte existe, un email a ete envoye.';
      fb.classList.add('show', 'success');
      btn.disabled = false; btn.textContent = 'Envoyer le lien';
    } catch (ex) {
      fb.textContent = 'Erreur reseau';
      fb.classList.add('show', 'error');
      btn.disabled = false; btn.textContent = 'Envoyer le lien';
    }
  });
}
</script>
</body>
</html>
