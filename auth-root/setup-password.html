<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#3D2818">
<meta name="robots" content="noindex,nofollow">
<title>Active ton accès · Ocre Immo</title>
<link rel="icon" href="/icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
<link rel="manifest" href="/icons/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --cream:#FAF6F1; --brown:#3D2818; --brown-soft:#6B5642; --brown-mute:#998877; --ocre-dark:#8B5A3C; --gold:#D4A256; --line:#E5DAC6; }
*,*::before,*::after { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
.card { width: 100%; max-width: 460px; background: #fff; border-radius: 18px; padding: 36px 30px 30px; box-shadow: 0 4px 28px rgba(139, 111, 58, 0.10); border: 1px solid var(--line); }
.brand { text-align: center; margin-bottom: 18px; }
.brand-mark { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 600; font-size: 38px; color: var(--ocre-dark); letter-spacing: -0.02em; }
.brand-mark span { color: var(--gold); }
h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 600; font-size: 26px; text-align: center; margin: 0 0 6px; color: var(--brown); letter-spacing: -0.01em; }
.sub { text-align: center; font-size: 13.5px; color: var(--brown-soft); margin-bottom: 22px; }
.intro { font-size: 13.5px; color: var(--brown-soft); margin-bottom: 18px; line-height: 1.55; }
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.field label { font-size: 11.5px; color: var(--brown-soft); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.field input { padding: 13px 14px; border: 1px solid var(--line); border-radius: 9px; font-size: 15px; font-family: inherit; color: var(--brown); background: #FCFAF7; }
.field input:focus { outline: none; border-color: var(--ocre-dark); background: #fff; }
.hint { font-size: 11.5px; color: var(--brown-mute); margin-top: 4px; }
.btn-submit { width: 100%; padding: 14px 24px; background: #8B5A3C; color: #ffffff; border: none; border-radius: 10px; font-family: 'DM Sans',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif; font-size: 15px; font-weight: 700; line-height: 1.2; cursor: pointer; transition: all .2s; margin-top: 8px; }
.btn-submit:hover:not(:disabled) { background: #6B3F26; }
.btn-submit:disabled { opacity: 0.5; cursor: wait; }
.feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
.feedback.show { display: block; }
.feedback.error { background: #FDECEA; color: #C62828; }
</style>
</head>
<body>
<!-- M/2026/05/14/72 Phase C : setup password apres magic-link invitation. iOS Keychain autofill new-password. -->
<div class="card">
  <div class="brand"><div class="brand-mark">Oc<span>re</span></div></div>
  <h1>Active ton accès</h1>
  <div class="sub">Crée ton mot de passe pour Oi Agent</div>

  <p class="intro">Choisis un mot de passe permanent. Ton iPhone te proposera un mot de passe fort et le sauvegardera automatiquement dans Keychain.</p>

  <form id="setup-form" autocomplete="on" novalidate>
    <input id="token" type="hidden" name="token">
    <!-- Hidden username pour iOS Keychain (associer credentials a un email) -->
    <input type="email" id="email-hidden" name="username" autocomplete="username" style="display:none">
    <div class="field">
      <label for="password">Mot de passe</label>
      <input id="password" name="new-password" type="password" required autocomplete="new-password" minlength="12" placeholder="Au moins 12 caractères">
      <div class="hint">12 caractères minimum. Mots de passe communs refusés.</div>
    </div>
    <div class="field">
      <label for="confirmation">Confirmer</label>
      <input id="confirmation" name="confirm-password" type="password" required autocomplete="new-password" minlength="12">
    </div>
    <button type="submit" class="btn-submit" id="submit">Activer mon accès</button>
    <div id="feedback" class="feedback"></div>
  </form>
</div>

<script>
function $(id) { return document.getElementById(id); }
var qs = new URLSearchParams(location.search);
var token = qs.get('token') || qs.get('activation_token') || '';
$('token').value = token;
if (!token) {
  $('feedback').textContent = 'Lien invalide. Demande un nouveau lien.';
  $('feedback').classList.add('show', 'error');
  $('submit').disabled = true;
}
$('setup-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = $('submit'), fb = $('feedback');
  fb.className = 'feedback';
  btn.disabled = true; btn.textContent = 'Activation…';
  try {
    var r = await fetch('/api/auth/setup_password.php', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token: $('token').value, password: $('password').value, confirmation: $('confirmation').value })
    });
    var d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Activation echec');
    try { if (d.session_token) localStorage.setItem('ocre_token', d.session_token); } catch (_) {}
    location.replace(d.redirect || '/');
  } catch (ex) {
    fb.textContent = ex.message || 'Erreur reseau';
    fb.classList.add('show', 'error');
    btn.disabled = false; btn.textContent = 'Activer mon accès';
  }
});
</script>
</body>
</html>
