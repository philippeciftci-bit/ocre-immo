<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#8b6f3a">
<title>Lien invalide · Ocre Immo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#f5f1eb; font-family:-apple-system,sans-serif; color:#2a2017; padding:24px; }
  .card { background:#fff; border-radius:16px; padding:40px 32px; max-width:380px; width:100%;
          text-align:center; box-shadow:0 4px 24px rgba(139,111,58,.08); border:1px solid #e5dac6; }
  .ic { width:64px; height:64px; border-radius:50%; background:#fdecea; color:#c62828;
        display:inline-flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:16px; }
  h1 { font-family:"Cormorant Garamond",serif; font-style:italic; font-weight:600; font-size:26px; margin:0 0 12px; }
  p { color:#6b5d4a; font-size:14px; line-height:1.5; }
  .btn { display:inline-block; margin-top:18px; background:#8b6f3a; color:#fff; padding:12px 24px;
         border-radius:10px; text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="ic" aria-hidden="true">!</div>
  <h1>Lien invalide</h1>
  <p>Ce lien a expiré, a déjà été utilisé, ou n'est pas valide.<br>Demande un nouveau lien magique.</p>
  <a class="btn" href="/">Recevoir un nouveau lien</a>
</div>
</body>
</html>
