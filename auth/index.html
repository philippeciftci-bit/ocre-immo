<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#8b6f3a">
<meta name="robots" content="noindex,nofollow">
<title>Connexion · Ocre Immo</title>
<link rel="icon" href="/favicon/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f1eb;
    color: #2a2017;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 16px;
    padding: 40px 32px 32px;
    box-shadow: 0 4px 24px rgba(139, 111, 58, 0.08);
    border: 1px solid #e5dac6;
  }
  .logo {
    text-align: center;
    margin-bottom: 24px;
  }
  .logo-mark {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, #c9a96e 0%, #8b6f3a 100%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 28px;
    font-weight: 600;
  }
  h1 {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 600;
    font-size: 28px;
    line-height: 1.2;
    margin: 0 0 6px;
    text-align: center;
    color: #2a2017;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #6b5d4a;
    margin: 0 0 28px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #2a2017;
    margin-bottom: 6px;
  }
  input[type="email"] {
    width: 100%;
    padding: 14px 14px;
    border: 1px solid #d6c4a3;
    border-radius: 10px;
    font-size: 16px;
    background: #fdfbf7;
    color: #2a2017;
    transition: border-color .15s, box-shadow .15s;
    -webkit-appearance: none;
  }
  input[type="email"]:focus {
    outline: none;
    border-color: #8b6f3a;
    box-shadow: 0 0 0 3px rgba(139,111,58,0.15);
    background: #fff;
  }
  button {
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    background: #8b6f3a;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .05s;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover { background: #7a5f2d; }
  button:active { transform: scale(.98); }
  button:disabled { background: #c9b990; cursor: wait; }
  .modules {
    margin-top: 22px;
    padding: 14px;
    background: #faf5e8;
    border: 1px solid #e8dcc0;
    border-radius: 10px;
    font-size: 13px;
    color: #6b5d4a;
    text-align: center;
    line-height: 1.5;
  }
  .modules strong { color: #8b6f3a; font-weight: 600; }
  .feedback {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.success {
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
  }
  .feedback.error {
    background: #fdecea;
    color: #c62828;
    border: 1px solid #f5c6c1;
  }
  footer {
    margin-top: 24px;
    font-size: 12px;
    color: #998877;
    text-align: center;
  }
  footer a {
    color: #8b6f3a;
    text-decoration: none;
    margin: 0 6px;
  }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main class="card" role="main">
  <div class="logo">
    <span class="logo-mark" aria-label="Ocre Immo">O</span>
  </div>
  <h1>Connexion à Ocre</h1>
  <p class="subtitle">Reçois un lien magique par email — pas de mot de passe.</p>

  <form id="loginForm" novalidate>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="ton@email.com" required autocomplete="email" autofocus inputmode="email">
    <button type="submit" id="submitBtn">Recevoir un lien magique</button>
  </form>

  <div id="feedback" class="feedback" role="status" aria-live="polite"></div>

  <div class="modules">
    Un seul compte pour <strong>Oi Agent</strong>, <strong>Oi Scan</strong>, <strong>Oi Book</strong> et <strong>Oi Demande</strong>.
  </div>

  <footer>
    <a href="https://ocre.immo/cgu" target="_blank" rel="noopener">CGU</a>·
    <a href="https://ocre.immo/confidentialite" target="_blank" rel="noopener">Confidentialité</a>
  </footer>
</main>

<script>
(function() {
  const form = document.getElementById('loginForm');
  const emailEl = document.getElementById('email');
  const btn = document.getElementById('submitBtn');
  const fb = document.getElementById('feedback');

  function show(kind, msg) {
    fb.className = 'feedback show ' + kind;
    fb.textContent = msg;
  }
  function hide() { fb.className = 'feedback'; fb.textContent = ''; }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    hide();
    const email = emailEl.value.trim().toLowerCase();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      show('error', 'Email invalide.');
      emailEl.focus();
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Envoi…';
    try {
      const r = await fetch('/api/login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok && data.ok) {
        show('success', 'Lien envoyé à ' + email + '. Vérifie ta boîte mail (15 min de validité).');
        form.style.display = 'none';
      } else if (r.status === 429) {
        show('error', 'Trop de tentatives. Réessaie dans une heure.');
      } else {
        show('error', 'Email invalide.');
      }
    } catch (err) {
      show('error', 'Erreur réseau. Réessaie.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Recevoir un lien magique';
    }
  });
})();
</script>
</body>
</html>
