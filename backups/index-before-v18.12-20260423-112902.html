    const body = {client_id: clientId, title: title.trim(), due_at: w, priority};
    const r = ed.id
      ? await suiviApi('update_todo', {body: {...body, id: ed.id}})
      : await suiviApi('add_todo', {body});
    if (r && r.ok) { onSaved && onSaved(); onClose(); }
    else showToast(r && r.error ? r.error : 'Erreur');
  }
  return (
    <div style={{position:'fixed', inset:0, background:'rgba(42,32,24,.5)', zIndex:300, display:'flex', alignItems:'flex-end', justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#fff', borderRadius:'16px 16px 0 0', width:'100%', maxWidth:560, padding:'14px 16px 24px', animation:'slideUp .25s'}} onClick={e => e.stopPropagation()}>
        <div style={{width:40, height:4, background:'#E2D8CC', borderRadius:2, margin:'0 auto 10px'}}/>
        <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:18, fontWeight:700, color:'#8B5E3C', textAlign:'center', marginBottom:12}}>{ed.id ? 'Modifier la tâche' : 'Nouvelle tâche'}</div>
        <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Rappeler Marc, envoyer documents…"
          style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', border:'1.5px solid #E8DDD0', background:'#FDFAF7', marginBottom:10}}/>
        <div style={{display:'flex', gap:8, marginBottom:10}}>
          <div style={{flex:2}}>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>Échéance (optionnel)</label>
            <input value={whenStr} onChange={e => setWhenStr(e.target.value)} placeholder="JJ/MM/AAAA HH:MM"
              style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', border:'1.5px solid #E8DDD0', background:'#FDFAF7'}}/>
          </div>
          <div style={{flex:1}}>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>Priorité</label>
            <select value={priority} onChange={e => setPriority(e.target.value)}
              style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', border:'1.5px solid #E8DDD0', background:'#FDFAF7'}}>
              <option value="low">🟢 Basse</option>
              <option value="medium">🟠 Moyenne</option>
              <option value="high">🔴 Haute</option>
            </select>
          </div>
        </div>
        <div style={{display:'flex', gap:8}}>
          <button type="button" onClick={onClose} style={{flex:1, padding:'12px', background:'#FDFAF7', color:'#8B5E3C', border:'1.5px solid #E8DDD0', borderRadius:10, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>Annuler</button>
          <button type="button" onClick={save} style={{flex:2, padding:'12px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'inherit'}}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

function SuiviPanel({clientId, defaultLocation, showToast}) {
  const [todos, setTodos] = React.useState([]);
  const [events, setEvents] = React.useState([]);
  const [journal, setJournal] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [eventModal, setEventModal] = React.useState(null);
  const [todoModal, setTodoModal] = React.useState(null);
  const [journalNote, setJournalNote] = React.useState('');

  async function reload() {
    if (!clientId) { setLoading(false); return; }
    const [t, e, j] = await Promise.all([
      suiviApi('list_todos', {query: 'client_id=' + clientId}),
      suiviApi('list_events', {query: 'client_id=' + clientId}),
      suiviApi('list_journal', {query: 'client_id=' + clientId}),
    ]);
    if (t.ok) setTodos(t.todos || []);
    if (e.ok) setEvents(e.events || []);
    if (j.ok) setJournal(j.journal || []);
    setLoading(false);
  }
  React.useEffect(() => { reload(); }, [clientId]);

  if (!clientId) {
    return <div style={{padding:'14px 12px', background:'#FBF1E4', borderRadius:10, color:'#8B7F6E', fontSize:13, textAlign:'center', marginBottom:12}}>Enregistrez d'abord le dossier pour activer le suivi.</div>;
  }
  if (loading) return <div style={{padding:'14px 12px', color:'#8B7F6E', fontSize:13}}>Chargement…</div>;

  const now = new Date();
  const futureEvents = events.filter(e => e.status === 'planned' && new Date(e.when_at.replace(' ','T')) >= now).sort((a,b) => a.when_at.localeCompare(b.when_at));
  const nextEvent = futureEvents[0] || null;
  const past7d = new Date(now.getTime() - 7*24*3600*1000);
  const visibleEvents = events.filter(e => {
    const t = new Date(e.when_at.replace(' ','T'));
    return t >= past7d;
  }).sort((a,b) => a.when_at.localeCompare(b.when_at));
  const openTodos = todos.filter(t => !t.done);

  async function toggleTodo(id, currentDone) {
    const r = await suiviApi('toggle_todo', {body: {id, done: !currentDone ? 1 : 0}});
    if (r.ok) reload();
  }
  async function deleteTodo(id) {
    if (!confirm('Supprimer la tâche ?')) return;
    const r = await suiviApi('delete_todo', {body: {id}});
    if (r.ok) reload();
  }
  async function completeEvent(id) {
    const r = await suiviApi('complete_event', {body: {id}});
    if (r.ok) { showToast('RDV terminé'); reload(); }
  }
  async function addJournalEntry(kind, content) {
    if (!content.trim()) return;
    const r = await suiviApi('add_journal_entry', {body: {client_id: clientId, kind, content: content.trim()}});
    if (r.ok) { setJournalNote(''); reload(); }
  }
  async function deleteJournalEntry(id) {
    if (!confirm('Supprimer ?')) return;
    const r = await suiviApi('delete_journal_entry', {body: {id}});
    if (r.ok) reload();
  }

  const cardStyle = {background:'#fff', borderRadius:10, padding:'12px 14px', marginBottom:10, border:'1px solid #EDE6DC'};
  const cardTitle = {fontSize:11, fontWeight:700, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:.6, marginBottom:8};
  const btnAdd = {width:'100%', padding:'10px', background:'#FBF1E4', color:'#8B5E3C', border:'1.5px dashed #B26D3A', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'};
  const btnSecondary = {padding:'7px 10px', background:'#FDFAF7', color:'#8B5E3C', border:'1px solid #E8DDD0', borderRadius:7, fontWeight:700, fontSize:11, cursor:'pointer', fontFamily:'inherit'};

  return (
    <div>
      {/* A — Prochain RDV */}
      <div style={{...cardStyle, background: nextEvent ? '#FBF1E4' : '#fff', border: nextEvent ? '1.5px solid #B26D3A' : '1px solid #EDE6DC'}}>
        <div style={cardTitle}>📌 Prochain rendez-vous</div>
        {nextEvent ? (
          <div>
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
              <span style={{fontSize:18}}>{EVENT_TYPE_ICON[nextEvent.type]}</span>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:700, fontSize:14, color:'#2A2018', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{nextEvent.title}</div>
                <div style={{fontSize:12, color:'#8B5E3C', fontWeight:600}}>{relTimeFr(nextEvent.when_at)} · {fmtFrDate(nextEvent.when_at)}</div>
              </div>
            </div>
            <div style={{display:'flex', gap:6, marginTop:6}}>
              <button type="button" onClick={() => completeEvent(nextEvent.id)} style={{...btnSecondary, flex:1}}>✓ Terminé</button>
              <button type="button" onClick={() => setEventModal({...nextEvent})} style={{...btnSecondary, flex:1}}>⏰ Modifier</button>
            </div>
          </div>
        ) : (
          <button type="button" onClick={() => setEventModal({})} style={btnAdd}>+ Programmer un RDV</button>
        )}
      </div>

      {/* B — À faire */}
      <div style={cardStyle}>
        <div style={cardTitle}>✅ À faire ({openTodos.length})</div>
        {openTodos.length === 0 && <div style={{color:'#B5A78F', fontSize:12, fontStyle:'italic', marginBottom:8}}>Aucune tâche en cours.</div>}
        {openTodos.map(t => {
          const prioBadge = t.priority === 'high' ? '🔴' : (t.priority === 'medium' ? '🟠' : '');
          return (
            <div key={t.id} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 0', borderBottom:'1px solid #F4EEE6'}}>
              <button type="button" onClick={() => toggleTodo(t.id, t.done)}
                style={{width:22, height:22, borderRadius:4, border:'2px solid #B26D3A', background:'#fff', cursor:'pointer', flexShrink:0, padding:0}} title="Marquer comme fait"/>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:13, color:'#2A2018', fontWeight:600}}>{prioBadge} {t.title}</div>
                {t.due_at && <div style={{fontSize:11, color:'#8B7F6E'}}>📅 {relTimeFr(t.due_at)}</div>}
              </div>
              <button type="button" onClick={() => setTodoModal(t)} style={{background:'none', border:'none', color:'#8B5E3C', fontSize:14, cursor:'pointer', padding:4}} title="Modifier">✎</button>
              <button type="button" onClick={() => deleteTodo(t.id)} style={{background:'none', border:'none', color:'#C04B20', fontSize:16, cursor:'pointer', padding:4}} title="Supprimer">×</button>
            </div>
          );
        })}
        <button type="button" onClick={() => setTodoModal({})} style={{...btnAdd, marginTop:8}}>+ Ajouter une tâche</button>
      </div>

      {/* C — Agenda */}
      <div style={cardStyle}>
        <div style={cardTitle}>🗓 Agenda (7j passés + futurs)</div>
        {visibleEvents.length === 0 && <div style={{color:'#B5A78F', fontSize:12, fontStyle:'italic', marginBottom:8}}>Aucun événement.</div>}
        {visibleEvents.map(e => {
          const t = new Date(e.when_at.replace(' ','T'));
          const isPast = t < now;
          return (
            <div key={e.id} onClick={() => setEventModal(e)}
              style={{display:'flex', alignItems:'center', gap:8, padding:'8px 0', borderBottom:'1px solid #F4EEE6', cursor:'pointer', opacity: isPast ? .55 : 1}}>
              <span style={{fontSize:16, flexShrink:0}}>{EVENT_TYPE_ICON[e.type]}</span>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:13, color:'#2A2018', fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{e.title}</div>
                <div style={{fontSize:11, color:'#8B7F6E'}}>{fmtFrDate(e.when_at)} · {relTimeFr(e.when_at)}{e.location ? ' · ' + e.location : ''}{e.status === 'done' ? ' · ✓' : ''}</div>
              </div>
            </div>
          );
        })}
        <button type="button" onClick={() => setEventModal({})} style={{...btnAdd, marginTop:8}}>+ Nouveau RDV</button>
      </div>

      {/* D — Historique interactions */}
      <div style={cardStyle}>
        <div style={cardTitle}>💬 Historique interactions ({journal.length})</div>
        <div style={{display:'flex', gap:5, marginBottom:10, flexWrap:'wrap'}}>
          {[
            ['note','+ Note'],
            ['appel_entrant','📞⬇'],
            ['appel_sortant','📞⬆'],
            ['email_envoye','✉️⬆'],
            ['visite','🏠'],
          ].map(([k, lbl]) => (
            <button key={k} type="button" onClick={() => {
              const c = prompt(JOURNAL_KIND_LABEL[k] + ' — contenu :', '');
              if (c) addJournalEntry(k, c);
            }} style={btnSecondary}>{lbl}</button>
          ))}
        </div>
        {journal.length === 0 && <div style={{color:'#B5A78F', fontSize:12, fontStyle:'italic'}}>Aucune interaction.</div>}
        {journal.map(j => (
          <div key={j.id} style={{padding:'8px 0', borderBottom:'1px solid #F4EEE6'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:6}}>
              <div style={{fontSize:11, color:'#8B5E3C', fontWeight:700}}>{JOURNAL_KIND_ICON[j.kind] || '📝'} {JOURNAL_KIND_LABEL[j.kind] || j.kind} · {relTimeFr(j.ts)}</div>
              <button type="button" onClick={() => deleteJournalEntry(j.id)} style={{background:'none', border:'none', color:'#C04B20', fontSize:13, cursor:'pointer', padding:0}} title="Supprimer">×</button>
            </div>
            <div style={{fontSize:13, color:'#2A2018', marginTop:2, whiteSpace:'pre-wrap'}}>{j.content}</div>
          </div>
        ))}
      </div>

      {eventModal && <EventModal clientId={clientId} defaultLocation={defaultLocation} initial={eventModal}
        onClose={() => setEventModal(null)} onSaved={() => reload()} showToast={showToast}/>}
      {todoModal && <TodoModal clientId={clientId} initial={todoModal}
        onClose={() => setTodoModal(null)} onSaved={() => reload()} showToast={showToast}/>}
    </div>
  );
}

function FormView(props) {
  const {editing, activeProfil, setActiveProfil, isInvestisseur, setIsInvestisseur,
         handleSaveLocal, handleDelete, backToList, toast, showToast,
         clients, openExistingDossier, initialExpandedSection} = props;
  const init = editing || {};
  const [d, setD] = useState(init);
  const [profilType, setProfilType] = useState(init.profil_type || 'Particulier');
  // V18.7 — accordéon strict : un seul ouvert à la fois.
  // Mount : (1) initialExpandedSection v18.2 → cette section ; (2) nouveau dossier → Section I ; (3) existant → tout fermé.
  const [expanded, setExpanded] = useState(() => {
    const arr = [false, false, false, false];
    if (initialExpandedSection != null) {
      arr[initialExpandedSection] = true;
      return arr;
    }
    const isNew = !editing || !editing.id || String(editing.id || '').startsWith('tmp-');
    if (isNew) arr[0] = true;
    return arr;
  });
  // V18.2 — scroll auto vers section initiale (200ms après render).
  useEffect(() => {
    if (initialExpandedSection == null) return;
    const t = setTimeout(() => {
      const stages = document.querySelectorAll('[data-stage-anchor]');
      const target = stages[initialExpandedSection];
      if (target && target.scrollIntoView) target.scrollIntoView({behavior:'smooth', block:'start'});
    }, 250);
    return () => clearTimeout(t);
  }, [initialExpandedSection]);

  function set(k, v) {
    setD(prev => ({...prev, [k]: v}));
  }
  // V17.4 UX v3 : Investisseur est désormais un profil à part entière — on sync le bool legacy.
  useEffect(() => {
    const wantInvest = activeProfil === 'Investisseur';
    if (wantInvest !== isInvestisseur) setIsInvestisseur(wantInvest);
  }, [activeProfil]);
  function commit(k, v) {
    const next = {...d, [k]: v, profil_type: profilType, projet: activeProfil, is_investisseur: activeProfil === 'Investisseur'};
    setD(next);
    handleSaveLocal(next);
  }

  // V17.7 fix-B1 — AUTO-SAVE BROUILLON : debounce 1.5s + onBlur flush + sendBeacon unload/pagehide + flush navigation retour.
  const saveTimerRef = useRef(null);
  const latestRef = useRef(d);
  useEffect(() => { latestRef.current = d; }, [d]);
  // V17.7 migration auto : d.tel/d.email legacy → d.tels[]/d.emails[] multi.
  useEffect(() => {
    if (!Array.isArray(d.tels) && d.tel) set('tels', [{label:'Perso', valeur: d.tel, primary: true}]);
    if (!Array.isArray(d.emails) && d.email) set('emails', [{label:'Perso', valeur: d.email, primary: true}]);
    // V17.9 migration auto : bien.type (string) → bien.types[] multi
    const b = d.bien || {};
    if (!Array.isArray(b.types) && b.type) {
      set('bien', {...b, types: [b.type]});
    }
  }, []);
  // V17.7 : sync d.tel/d.email = primary de d.tels/d.emails (pour compat Sheet + ClientRow legacy).
  useEffect(() => {
    if (Array.isArray(d.tels)) {
      const p = d.tels.find(x => x.primary) || d.tels[0];
      const legacy = p ? p.valeur : '';
      if ((d.tel || '') !== legacy) set('tel', legacy);
    }
  }, [d.tels]);
  useEffect(() => {
    if (Array.isArray(d.emails)) {
      const p = d.emails.find(x => x.primary) || d.emails[0];
      const legacy = p ? p.valeur : '';
      if ((d.email || '') !== legacy) set('email', legacy);
    }
  }, [d.emails]);

  function pushNow() {
    if (saveTimerRef.current) { clearTimeout(saveTimerRef.current); saveTimerRef.current = null; }
    const payload = {...latestRef.current, profil_type: profilType, projet: activeProfil, is_investisseur: activeProfil === 'Investisseur'};
    handleSaveLocal(payload);
  }
  function beaconSave() {
    try {
      const token = localStorage.getItem('ocre_token') || '';
      const payload = {client: {...latestRef.current, profil_type: profilType, projet: activeProfil, is_investisseur: activeProfil === 'Investisseur'}};
      const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
      navigator.sendBeacon(API + '/clients.php?action=save&token=' + encodeURIComponent(token), blob);
    } catch (e) {}
  }
  // Debounce 1.5s sur les changements de d/profilType/activeProfil.
  useEffect(() => {
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      const payload = {...latestRef.current, profil_type: profilType, projet: activeProfil, is_investisseur: activeProfil === 'Investisseur'};
      handleSaveLocal(payload);
      saveTimerRef.current = null;
    }, 1500);
    return () => { if (saveTimerRef.current) { clearTimeout(saveTimerRef.current); saveTimerRef.current = null; } };
  }, [d, profilType, activeProfil]);
  // Flush immédiat au blur d'un input (focusout bubbles).
  useEffect(() => {
    function onFocusOut(e) {
      if (!(e.target instanceof HTMLInputElement || e.target instanceof HTMLTextAreaElement || e.target instanceof HTMLSelectElement)) return;
      if (saveTimerRef.current) { pushNow(); }
    }
    document.addEventListener('focusout', onFocusOut);
    return () => document.removeEventListener('focusout', onFocusOut);
  }, [profilType, activeProfil]);
  // sendBeacon au déchargement (PWA swipe-back, onglet fermé, pagehide iOS).
  useEffect(() => {
    window.addEventListener('beforeunload', beaconSave);
    window.addEventListener('pagehide', beaconSave);
    return () => {
      window.removeEventListener('beforeunload', beaconSave);
      window.removeEventListener('pagehide', beaconSave);
    };
  }, [profilType, activeProfil]);
  // Flush avant navigation retour (flèche ←).
  function backToListFlushed() {
    pushNow();
    backToList();
  }
  // V18.7 — accordéon strict : ouvre i et ferme tous les autres.
  function toggleStage(i) {
    setExpanded(prev => prev.map((v, idx) => idx === i ? !v : false));
  }
  function openOnly(i) {
    setExpanded(prev => prev.map((v, idx) => idx === i));
    // Scroll doux vers le header de la nouvelle section.
    setTimeout(() => {
      const stages = document.querySelectorAll('[data-stage-anchor]');
      const target = stages[i];
      if (target && target.scrollIntoView) target.scrollIntoView({behavior:'smooth', block:'start'});
    }, 80);
  }
  function commitAndNext(i) {
    // V18.7 — flush save + ferme i + ouvre i+1 (ou reste sur i si dernière).
    commit('_touch', Date.now());
    if (i < 3) openOnly(i + 1);
    else setExpanded(prev => prev.map(() => false));
  }
  // V18.7 — calcul status + summary par section.
  function computeStatus() {
    const b = d.bien || {};
    const types = Array.isArray(b.types) && b.types.length ? b.types : (b.type ? [b.type] : []);
    // I — Identité
    const hasContact = !!(d.tel || d.email || (Array.isArray(d.tels) && d.tels.length) || (Array.isArray(d.emails) && d.emails.length));
    const hasIdentity = (profilType === 'Société') ? !!d.societe_nom : !!(d.prenom || d.nom);
    const sec1Complete = hasContact && hasIdentity;
    const sec1Partial = hasContact || hasIdentity;
    const sec1Status = sec1Complete ? 'complete' : (sec1Partial ? 'partial' : 'empty');
    const tels = Array.isArray(d.tels) && d.tels.length > 0 ? d.tels : (d.tel ? [{valeur: d.tel}] : []);
    const sec1Name = (profilType === 'Société' && d.societe_nom)
      ? d.societe_nom
      : ((d.prenom || '') + ' ' + (d.nom || '')).trim();
    const sec1Summary = [sec1Name || '', tels[0] && tels[0].valeur ? formatTelPretty(tels[0].valeur) : (d.email || '')].filter(Boolean).join(' · ');
    // II — Bien
    const sec2Complete = !!(b.pays && types.length && b.ville);
    const sec2Partial = !!(b.pays || types.length || b.ville);
    const sec2Status = sec2Complete ? 'complete' : (sec2Partial ? 'partial' : 'empty');
    const sec2Summary = [types.join(' · '), b.ville || '', b.quartier || ''].filter(Boolean).join(' · ');
    // III — Budget / financier
    const fin = (d.financement && typeof d.financement === 'object') ? d.financement : {};
    const sec3HasBudget = !!(fin.budget_total || fin.budget_max || d.budget_max || d.budget_min || d.prix_affiche || d.loyer_max || d.loyer_demande || d.rendement_cible);
    const sec3Status = sec3HasBudget ? 'complete' : 'empty';
    const currency = b.pays === 'MA' ? 'MAD' : '€';
    const fmtN = n => { const x = Number(n); if (!x) return ''; return x.toLocaleString('fr-FR'); };
    let sec3Summary = '';
    const bv = fin.budget_total || fin.budget_max || d.budget_max || d.budget_min;
    if (bv) sec3Summary = 'Budget ' + fmtN(bv) + ' ' + currency;
    else if (d.prix_affiche) sec3Summary = 'Prix ' + fmtN(d.prix_affiche) + ' ' + currency;
    else if (d.loyer_max) sec3Summary = '≤ ' + fmtN(d.loyer_max) + ' ' + currency + '/mois';
    else if (d.loyer_demande) sec3Summary = fmtN(d.loyer_demande) + ' ' + currency + '/mois';
    // IV — Suivi (counts via d.suivi si chargé via clients.list, sinon notes)
    const su = d.suivi || {};
    const hasSuivi = !!(su.next_event || su.next_todo || su.last_interaction);
    const sec4HasNotes = !!(d.notes || d.langue || d.canal || d.origine);
    const sec4Status = (hasSuivi || sec4HasNotes) ? (hasSuivi ? 'complete' : 'partial') : 'empty';
    let sec4Summary = '';
    if (su.next_event) sec4Summary = 'RDV à venir';
    else if (su.next_todo) sec4Summary = 'Tâche en cours';
    else if (su.last_interaction) sec4Summary = 'Suivi actif';
    else if (d.notes) sec4Summary = String(d.notes).slice(0, 60);
    return [
      {status: sec1Status, summary: sec1Summary},
      {status: sec2Status, summary: sec2Summary},
      {status: sec3Status, summary: sec3Summary},
      {status: sec4Status, summary: sec4Summary},
    ];
  }
  const stageStatus = computeStatus();
  const [shareOpen, setShareOpen] = useState(false);
  function openShare() {
    if (!editing || !editing.id || String(editing.id).startsWith('tmp-')) {
      showToast && showToast('Enregistrez d\'abord le dossier');
      return;
    }
    setShareOpen(true);
  }
  const dossierName = (profilType === 'Société' && d.societe_nom)
    ? d.societe_nom
    : ((d.prenom || '') + ' ' + (d.nom || '')).trim();

  // V17.4 UX v3 / V17.15 fix-I1 : bascule profil avec check anti-doublon.
  // Retourne la liste des dossiers déjà liés existant (par id), filtrée au profil donné si fourni.
  function linkedExisting(forProfil) {
    const list = Array.isArray(d.linked_dossiers) ? d.linked_dossiers : [];
    const lookup = (clients || []);
    const found = list.map(id => lookup.find(c => c.id === id)).filter(Boolean);
    if (!forProfil) return found;
    return found.filter(c => (c.projet || 'Acheteur') === forProfil);
  }
  const visibleBascules = (BASCULES[activeProfil] || []).filter(p => linkedExisting(p).length === 0);

  async function createLinkedDossier(newProfil) {
    // Check anti-doublon : si déjà lié pour ce profil → redirige au lieu de créer.
    const already = linkedExisting(newProfil);
    if (already.length > 0) {
      showToast && showToast('Dossier ' + newProfil + ' déjà lié — ouverture');
      if (openExistingDossier) openExistingDossier(already[0]);
      return;
    }
    // Le dossier source doit être sauvé (id réel) avant de créer un lié.
    if (!editing || !editing.id || String(editing.id).startsWith('tmp-')) {
      showToast && showToast('Enregistrez d\'abord le dossier');
      return;
    }
    const base = {
      profil_type: profilType,
      prenom: d.prenom, nom: d.nom, societe_nom: d.societe_nom, forme_juridique: d.forme_juridique,
      representant: d.representant, siret: d.siret,
      tel: d.tel, email: d.email, tels: d.tels, emails: d.emails,
      adresse: d.adresse, ville: d.ville, pays_residence: d.pays_residence,
      nationalite: d.nationalite, date_naissance: d.date_naissance,
      projet: newProfil,
      is_investisseur: newProfil === 'Investisseur',
      linked_dossiers: [editing.id],
    };
    const token = localStorage.getItem('ocre_token');
    try {
      const r = await fetch(API + '/clients.php?action=save', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token':token},
        body: JSON.stringify({client: base}),
      });
      const j = await r.json();
      if (j && j.ok && j.client) {
        // Retrolink : ajouter le nouvel id au dossier courant (dédup).
        const mine = Array.isArray(d.linked_dossiers) ? d.linked_dossiers : [];
        if (!mine.includes(j.client.id)) {
          const next = Array.from(new Set([...mine, j.client.id]));
          commit('linked_dossiers', next);
        }
        showToast && showToast('Dossier ' + newProfil + ' créé');
        // Ouvre le nouveau dossier dans le formulaire (plus de reload hard).
        if (openExistingDossier) setTimeout(() => openExistingDossier(j.client), 500);
      } else {
        showToast && showToast(j && j.error ? j.error : 'Échec création');
      }
    } catch (e) { showToast && showToast('Erreur réseau'); }
  }

  const stageTitle = editing && (d.prenom || d.nom || d.societe_nom)
    ? ((profilType === 'Société' && d.societe_nom) ? d.societe_nom : ((d.prenom || '') + ' ' + (d.nom || '')).trim())
    : ('Nouveau ' + activeProfil);

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:'#F4EEE6'}}>
      <div style={{background:'#fff', borderBottom:'1px solid #EDE6DC', padding:'10px 14px', position:'sticky', top:0, zIndex:10, display:'flex', alignItems:'center', gap:10}}>
        <button onClick={backToListFlushed} style={{background:'none', border:'none', fontSize:20, color:'#8B5E3C', cursor:'pointer', fontFamily:'inherit'}}>←</button>
        <div style={{flex:1, textAlign:'center', fontFamily:'Cormorant Garamond,serif', fontSize:18, fontWeight:700, color:'#1A1208'}}>{stageTitle}</div>
        <button onClick={openShare} style={{background:'none', border:'none', cursor:'pointer', padding:4}} title="Partager"><ShareIcon/></button>
      </div>

      <div style={{padding:'10px 14px', background:'#fff', borderBottom:'1px solid #EDE6DC'}}>
        <div className="profils-row">
          {PROFILS_ORDER.map(p => {
            const active = p === activeProfil;
            return (
              <button key={p} onClick={() => setActiveProfil(p)}
                className={'profil-chip ' + (active ? 'state-selected' : 'state-default')}>{p}</button>
            );
          })}
        </div>
        {/* V17.15 fix-I1 : banner bascule profil filtre les profils déjà liés. */}
        {visibleBascules.length > 0 && (
          <div className="bascule-banner">
            <span>🔄 Aussi… Cette personne veut peut-être aussi</span>
            {visibleBascules.map(p => (
              <button key={p} type="button" className="bascule-btn" onClick={() => createLinkedDossier(p)}>
                {p}
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{flex:1, overflowY:'auto', padding:12}}>
        <div data-stage-anchor="0">
        <Stage title={STAGES[activeProfil][0]} expanded={expanded[0]} onToggle={() => toggleStage(0)}
               status={stageStatus[0].status} summary={stageStatus[0].summary}>
          <div style={{display:'flex', gap:6, marginBottom:12}}>
            {['Particulier', 'Société'].map(t => (
              <button key={t} onClick={() => { setProfilType(t); commit('profil_type', t); }}
                style={{flex:1, padding:'7px 10px', borderRadius:8, border:'1.5px solid ' + (profilType === t ? '#8B5E3C' : '#E8DDD0'),
                        background: profilType === t ? '#FFF3EC' : '#FDFAF7', color: profilType === t ? '#8B5E3C' : '#8B7F6E',
                        fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>{t}</button>
            ))}
          </div>
          {/* V17.1 fix-ux-4 : grille 5 lignes strictes, unique pour tous profils. */}
          {profilType === 'Particulier' ? (
            <>
              {/* L1 Prénom / Nom */}
              <div className="row-pair">
                <Field label="Prénom" value={d.prenom} onChange={v => set('prenom', v)} style={{flex:1}}/>
                <Field label="Nom" value={d.nom} onChange={v => set('nom', v)} style={{flex:1}}/>
              </div>
              {/* L2 Tel / Email multi */}
              <TelephoneMulti value={d.tels} onChange={v => set('tels', v)} residenceCountry={d.pays_residence || d.nationalite || ''}/>
              <EmailMulti value={d.emails} onChange={v => set('emails', v)}/>
              {/* L3 Adresse full width */}
              <CitySuggestField label="Adresse" value={d.adresse} onChange={v => set('adresse', v)} suggestAction="suggest_address"/>
              {/* L4 Ville / Pays résidence */}
              <div className="row-pair">
                <CitySuggestField label="Ville" value={d.ville} onChange={v => set('ville', v)} suggestAction="suggest_city" style={{flex:1}}/>
                <CountryAutocomplete label="Pays résidence" value={d.pays_residence} onChange={v => set('pays_residence', v)} style={{flex:1}}/>
              </div>
              {/* L5 Date naissance / Nationalité */}
              <div className="row-pair">
                <DateMaskField label="Date de naissance" value={d.date_naissance} onChange={v => set('date_naissance', v)} style={{flex:1}}/>
                <CountryAutocomplete label="Nationalité" value={d.nationalite} onChange={v => set('nationalite', v)} style={{flex:1}}/>
              </div>
            </>
          ) : (
            <>
              {/* Société : L1 Raison sociale / Forme juridique */}
              <div className="row-pair">
                <Field label="Raison sociale" value={d.societe_nom} onChange={v => set('societe_nom', v)} style={{flex:2}}/>
                <Select label="Forme juridique" value={d.forme_juridique} onChange={v => set('forme_juridique', v)} options={FORMES_JURIDIQUES} style={{flex:1}}/>
              </div>
              {/* L2 SIRET/ICE / Représentant */}
              <div className="row-pair">
                <Field label="SIRET / ICE" value={d.siret} onChange={v => set('siret', v)} style={{flex:1}}/>
                <Field label="Représentant" value={d.representant} onChange={v => set('representant', v)} style={{flex:1}}/>
              </div>
              {/* L3 Tel / Email multi */}
              <TelephoneMulti value={d.tels} onChange={v => set('tels', v)} residenceCountry={d.pays_residence || d.nationalite || ''}/>
              <EmailMulti value={d.emails} onChange={v => set('emails', v)}/>
              {/* L4 Adresse full */}
              <CitySuggestField label="Adresse" value={d.adresse} onChange={v => set('adresse', v)} suggestAction="suggest_address"/>
              {/* L5 Ville / Pays résidence */}
              <div className="row-pair">
                <CitySuggestField label="Ville" value={d.ville} onChange={v => set('ville', v)} suggestAction="suggest_city" style={{flex:1}}/>
                <CountryAutocomplete label="Pays résidence" value={d.pays_residence} onChange={v => set('pays_residence', v)} style={{flex:1}}/>
              </div>
            </>
          )}
          <CustomFieldList sectionKey="client" d={d} set={set}/>
          <button onClick={() => commitAndNext(0)} style={{marginTop:4, padding:'9px 14px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Enregistrer · Section II →</button>
        </Stage>

        </div>
        <div data-stage-anchor="1">
        {activeProfil !== 'Curieux' && <Stage title={STAGES[activeProfil][1]} expanded={expanded[1]} onToggle={() => toggleStage(1)}
               status={stageStatus[1].status} summary={stageStatus[1].summary}>
          <BienForm activeProfil={activeProfil} isInvestisseur={isInvestisseur}
            d={d} set={set} dossierId={editing && editing.id && !String(editing.id).startsWith('tmp-') ? editing.id : null}
            showToast={showToast}/>
          <button onClick={() => commitAndNext(1)} style={{marginTop:4, padding:'9px 14px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Enregistrer · Section III →</button>
        </Stage>}

        {/* V17.6 Section III : FinancementForm pour Acheteur/Investisseur, fields legacy pour Vendeur/Bailleur/Locataire, masqué pour Curieux. */}
        </div>
        <div data-stage-anchor="2">
        {activeProfil !== 'Curieux' && <Stage title={STAGES[activeProfil][2]} expanded={expanded[2]} onToggle={() => toggleStage(2)}
               status={stageStatus[2].status} summary={stageStatus[2].summary}>
          {(activeProfil === 'Acheteur' || activeProfil === 'Investisseur') ? (
            <FinancementForm activeProfil={activeProfil} d={d} set={set}
              dossierId={editing && editing.id && !String(editing.id).startsWith('tmp-') ? editing.id : null}
              showToast={showToast}/>
          ) : (
            <>
              {activeProfil === 'Vendeur' && (
                <>
                  <Field label="Prix affiché" type="number" value={d.prix_affiche} onChange={v => set('prix_affiche', v)}/>
                  <Field label="Prix plancher (confidentiel)" type="number" value={d.prix_plancher} onChange={v => set('prix_plancher', v)}/>
                </>
              )}
              {activeProfil === 'Locataire' && (
                <>
                  <Field label="Loyer max" type="number" value={d.loyer_max} onChange={v => set('loyer_max', v)}/>
                  <Field label="Garants" value={d.garants} onChange={v => set('garants', v)}/>
                </>
              )}
              {activeProfil === 'Bailleur' && (
                <>
                  <Field label="Loyer demandé" type="number" value={d.loyer_demande} onChange={v => set('loyer_demande', v)}/>
                  <Field label="Loyer plancher (confidentiel)" type="number" value={d.loyer_plancher} onChange={v => set('loyer_plancher', v)}/>
                  <Field label="Charges" type="number" value={d.charges} onChange={v => set('charges', v)}/>
                  <Field label="Dépôt de garantie" type="number" value={d.depot} onChange={v => set('depot', v)}/>
                </>
              )}
            </>
          )}
          <CustomFieldList sectionKey="financement" d={d} set={set}/>
          <button onClick={() => commitAndNext(2)} style={{marginTop:4, padding:'9px 14px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Enregistrer · Section IV →</button>
        </Stage>}

        </div>
        <div data-stage-anchor="3">
        <Stage title={STAGES[activeProfil][3] || 'IV. Remarques'} expanded={expanded[3]} onToggle={() => toggleStage(3)}
               status={stageStatus[3].status} summary={stageStatus[3].summary}>
          {/* V18.1 — Module Suivi (4 cards : prochain RDV, todos, agenda, journal). */}
          <SuiviPanel
            clientId={editing && editing.id && !String(editing.id).startsWith('tmp-') ? editing.id : null}
            defaultLocation={[(d.bien && d.bien.quartier) || '', (d.bien && d.bien.ville) || d.ville || ''].filter(Boolean).join(', ')}
            showToast={showToast}/>
          <div style={{height:1, background:'#EDE6DC', margin:'14px 0 12px'}}/>
          <div style={{fontSize:11, fontWeight:700, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:.6, marginBottom:8}}>📝 Préférences contact (legacy)</div>
          <div style={{marginBottom:10}}>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>Notes</label>
            <textarea value={d.notes || ''} onChange={e => set('notes', e.target.value)}
              style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018',
                      minHeight:80, border:'1.5px solid ' + (d.notes ? '#BBA88B' : '#E8DDD0'), background: d.notes ? '#FFFCF5' : '#FDFAF7', resize:'vertical'}}/>
          </div>
          <Select label="Langue préférée" value={d.langue} onChange={v => set('langue', v)} options={['FR','EN','AR','ES','IT','PT','DE']}/>
          <div style={{fontSize:11, color:'#8B7F6E', textTransform:'uppercase', fontWeight:700, marginTop:6, marginBottom:4}}>Canal privilégié</div>
          <div style={{display:'flex', gap:6, marginBottom:10}}>
            {['WhatsApp','Email','Téléphone'].map(canal => (
              <button key={canal} onClick={() => set('canal', canal)}
                style={{flex:1, padding:'7px 10px', borderRadius:8, border:'1.5px solid ' + (d.canal === canal ? '#8B5E3C' : '#E8DDD0'),
                        background: d.canal === canal ? '#FFF3EC' : '#FDFAF7', color: d.canal === canal ? '#8B5E3C' : '#8B7F6E',
                        fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>{canal}</button>
            ))}
          </div>
          <Field label="Origine contact" value={d.origine} onChange={v => set('origine', v)}/>
          <Field label="Options" value={d.options} onChange={v => set('options', v)}/>
          <CustomFieldList sectionKey="remarques" d={d} set={set}/>
          <button onClick={() => commitAndNext(3)} style={{marginTop:4, padding:'9px 14px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Enregistrer · Fermer ✓</button>
        </Stage>
        </div>

        <div style={{display:'flex', gap:8, alignItems:'center', marginTop:12, marginBottom:24}}>
          <button onClick={() => commit('archived', !d.archived)}
            title={d.archived ? 'Désarchiver' : 'Archiver'}
            style={{padding:'10px 12px', background:'#FDFAF7', color:'#8B5E3C', border:'1.5px solid #E8DDD0', borderRadius:10, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:6, fontSize:12, fontWeight:700}}>
            <ArchiveIcon size={18}/> {d.archived ? 'Désarchiver' : 'Archiver'}
          </button>
          {editing && editing.id && (
            <button onClick={() => handleDelete(editing.id)}
              style={{padding:'10px 14px', background:'#C04B20', color:'#fff', border:'none', borderRadius:10, cursor:'pointer', fontWeight:700, fontSize:12, fontFamily:'inherit'}}>Supprimer</button>
          )}
          <button onClick={() => { commit('_touch', Date.now()); showToast && showToast('Enregistré'); }}
            style={{flex:1, padding:'13px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'inherit'}}>
            Enregistrer
          </button>
        </div>
      </div>

      {toast && <Toast msg={toast}/>}
      {shareOpen && <ShareMenu dossierId={editing && editing.id} dossierName={dossierName} onClose={() => setShareOpen(false)} showToast={showToast}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
