  const [search, setSearch] = React.useState('');
  const pinned = PINNED_DISTRICTS[(ville || '').toLowerCase() + '|' + pays] || [];

  async function loadList() {
    if (!ville) return;
    setLoading(true);
    let r = await fetchDistrictsOverpass(ville, pays);
    if (!r || r.length === 0) r = fallbackList || [];
    // Dédup avec pinned
    const all = Array.from(new Set([...pinned, ...r]));
    setList(all);
    setLoading(false);
  }
  React.useEffect(() => { if (open && !list) loadList(); }, [open]);

  const filtered = list
    ? list.filter(d => !search || d.toLowerCase().includes(search.toLowerCase()))
    : [];

  return (
    <div style={{flex:1}}>
      <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>Quartier</label>
      <div onClick={() => ville && setOpen(true)}
        style={{padding:'9px 11px', borderRadius:8, border:'1.5px solid ' + (value ? '#BBA88B' : '#E8DDD0'),
                background: !ville ? '#F4EEE6' : (value ? '#FFFCF5' : '#FDFAF7'),
                fontSize:14, cursor: ville ? 'pointer' : 'not-allowed', color: value ? '#2A2018' : '#B5A78F',
                fontFamily:'inherit', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span>{value || (ville ? 'Choisir un quartier…' : 'Saisir d\'abord la ville')}</span>
        <span style={{color:'#8B7F6E'}}>▾</span>
      </div>
      {open && (
        <div className="bsheet-overlay" onClick={() => setOpen(false)}>
          <div className="bsheet" onClick={e => e.stopPropagation()}>
            <div className="bsheet-handle"/>
            <div className="bsheet-head">
              <div className="bsheet-title">Quartiers de {ville}</div>
              <button type="button" className="bsheet-close" onClick={() => setOpen(false)}>×</button>
            </div>
            <div className="bsheet-search">
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder={loading ? 'Chargement quartiers…' : 'Rechercher (ex: Gueliz, Maarif)'}/>
            </div>
            <div className="bsheet-list">
              {loading && <div className="bsheet-empty">Chargement (Overpass OpenStreetMap)…</div>}
              {!loading && pinned.length > 0 && !search && <div className="bsheet-group-hdr">Populaires</div>}
              {!loading && !search && pinned.map(d => (
                <div key={'p-'+d} className={'bsheet-item ' + (value === d ? 'selected' : '')}
                  onClick={() => { onChange(d); setOpen(false); setSearch(''); }}>
                  <span className="check">{value === d ? '✓' : ''}</span>
                  <span>{d}</span>
                </div>
              ))}
              {!loading && filtered.length > 0 && (search || pinned.length === 0) && <div className="bsheet-group-hdr">Tous ({filtered.length})</div>}
              {!loading && filtered.filter(d => !pinned.includes(d) || search).map(d => (
                <div key={d} className={'bsheet-item ' + (value === d ? 'selected' : '')}
                  onClick={() => { onChange(d); setOpen(false); setSearch(''); }}>
                  <span className="check">{value === d ? '✓' : ''}</span>
                  <span>{d}</span>
                </div>
              ))}
              {!loading && list && filtered.length === 0 && (
                <div className="bsheet-empty">
                  Aucun résultat.
                  <div style={{marginTop:10}}>
                    <button type="button" onClick={() => { onChange(search); setOpen(false); }}
                      style={{padding:'8px 14px', background:'#FBF1E4', color:'#8B5E3C', border:'1.5px solid #B26D3A', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>
                      Saisir « {search} »
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// V18.8 — LocationAutocomplete : Nominatim search debounce 500ms biaisé sur viewbox ville/quartier.
const LOC_TYPE_ICON = {road:'🛣️', highway:'🛣️', shop:'🏪', amenity:'🏪', restaurant:'🍽️', tourism:'🏨', hotel:'🏨', historic:'🏛️', place:'📍'};

function LocationAutocomplete({label, value, onChange, onPick, ville, pays, quartier}) {
  const [q, setQ] = React.useState(value || '');
  const [results, setResults] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [open, setOpen] = React.useState(false);
  const tRef = React.useRef(null);
  React.useEffect(() => { setQ(value || ''); }, [value]);

  async function search(query) {
    if (!query || query.length < 3) { setResults([]); return; }
    setLoading(true);
    try {
      const paysName = PAYS_NOM[pays] || pays || '';
      const ctx = [quartier, ville, paysName].filter(Boolean).join(', ');
      const fullQ = ctx ? (query + ', ' + ctx) : query;
      const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=10&addressdetails=1&extratags=1&accept-language=fr&q=' + encodeURIComponent(fullQ);
      const r = await fetch(url, {headers:{'Accept':'application/json'}});
      if (r.ok) {
        const j = await r.json();
        setResults(Array.isArray(j) ? j : []);
      }
    } catch (e) {}
    setLoading(false);
  }
  function onInput(v) {
    setQ(v); onChange && onChange(v); setOpen(true);
    if (tRef.current) clearTimeout(tRef.current);
    tRef.current = setTimeout(() => search(v), 500);
  }
  function pickResult(r) {
    const addr = r.address || {};
    const road = [addr.house_number, addr.road].filter(Boolean).join(' ');
    const display = road || r.display_name || r.name;
    setQ(display);
    setOpen(false);
    setResults([]);
    onPick && onPick({
      lat: parseFloat(r.lat), lng: parseFloat(r.lon),
      adresse: display,
      ville: addr.city || addr.town || addr.village || addr.municipality,
      quartier: addr.suburb || addr.neighbourhood || addr.quarter,
      code_postal: addr.postcode,
      pays: addr.country_code ? addr.country_code.toUpperCase() : null,
      raw: r,
    });
  }
  function iconFor(r) {
    const c = (r.class || '').toLowerCase();
    if (LOC_TYPE_ICON[c]) return LOC_TYPE_ICON[c];
    if (c === 'shop' || c === 'amenity') {
      const t = (r.type || '').toLowerCase();
      if (t === 'restaurant' || t === 'cafe' || t === 'fast_food') return '🍽️';
      if (t === 'hotel' || t === 'motel') return '🏨';
      return '🏪';
    }
    return LOC_TYPE_ICON[c] || '📍';
  }

  return (
    <div style={{position:'relative', marginBottom:10}}>
      <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label || 'Adresse, rue, lieu-dit ou commerce'}</label>
      <input value={q} onChange={e => onInput(e.target.value)} onFocus={() => setOpen(true)} onBlur={() => setTimeout(() => setOpen(false), 200)}
        placeholder={ville ? 'Avenue Mohammed V, Café Argana…' : 'Saisis d\'abord la ville'}
        style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018',
                border:'1.5px solid ' + (q ? '#BBA88B' : '#E8DDD0'), background: q ? '#FFFCF5' : '#FDFAF7'}}/>
      {open && (loading || results.length > 0) && (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:300, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:60, marginTop:2}}>
          {loading && <div style={{padding:12, fontSize:12, color:'#8B7F6E'}}>Recherche…</div>}
          {!loading && results.map((r, i) => (
            <div key={i} onMouseDown={e => e.preventDefault()} onClick={() => pickResult(r)}
              style={{padding:'10px 12px', cursor:'pointer', borderBottom: i < results.length - 1 ? '1px solid #F4EEE6' : 'none', fontSize:13, display:'flex', alignItems:'center', gap:8}}>
              <span style={{fontSize:16, flexShrink:0}}>{iconFor(r)}</span>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:600, color:'#2A2018', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{r.display_name}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// V18.8 — reverse geocoding Nominatim : lat/lon → adresse complète.
async function reverseGeocodeNominatim(lat, lng) {
  try {
    const url = 'https://nominatim.openstreetmap.org/reverse?format=json&accept-language=fr&addressdetails=1&zoom=18&lat=' + lat + '&lon=' + lng;
    const r = await fetch(url, {headers:{'Accept':'application/json'}});
    if (!r.ok) return null;
    const j = await r.json();
    if (!j || !j.address) return null;
    const a = j.address;
    return {
      adresse: [a.house_number, a.road].filter(Boolean).join(' ') || j.display_name,
      ville: a.city || a.town || a.village || a.municipality || null,
      quartier: a.suburb || a.neighbourhood || a.quarter || null,
      code_postal: a.postcode || null,
      pays: a.country_code ? a.country_code.toUpperCase() : null,
      display_name: j.display_name,
    };
  } catch (e) { return null; }
}

// V17.3 Phase 2b — MapPicker Leaflet + OpenStreetMap. Mode précis (marker) ou zone (cercle).
// V18.0 — Auto-centrage carte sur ville+quartier du bien via Nominatim, cache localStorage,
// fallback hardcodé MA/FR. Respecte position manuelle (drag/clic/GPS) via gps_source.
// V18.8 — Cascade flyTo (pays z6 → ville z12 → quartier z14 → adresse z17), rayon slider live (50-5000m), reverse-geocoding Ma position.
function MapPicker({bien, setB, showToast}) {
  const mapRef = React.useRef(null);
  // V17.8 : refs stables pour marker + circle, setRadius live sans recreate.
  const leafletRef = React.useRef({map:null, marker:null, circle:null});
  const modeRef = React.useRef(bien.gps_mode || 'precis');
  const radiusRef = React.useRef(bien.gps_radius ? Number(bien.gps_radius) : 1000);
  const [mode, setMode] = React.useState(modeRef.current);
  const [radius, setRadius] = React.useState(radiusRef.current);
  const [ready, setReady] = React.useState(typeof window !== 'undefined' && !!window.L);

  const CIRCLE_STYLE = {color:'#B26D3A', fillColor:'#FBF1E4', fillOpacity:.25, weight:2};

  function ensureMarker(L, lat, lng) {
    const lr = leafletRef.current;
    if (!lr.marker) {
      lr.marker = L.marker([lat, lng], {draggable: true}).addTo(lr.map);
      lr.marker.on('dragend', () => {
        const p = lr.marker.getLatLng();
        setB('gps_lat', p.lat.toFixed(6));
        setB('gps_lng', p.lng.toFixed(6));
        setB('gps_source', 'manual'); // V18.0 : drag = manuel, n'est plus écrasable par geocode.
        if (lr.circle) lr.circle.setLatLng(p);
      });
    } else {
      lr.marker.setLatLng([lat, lng]);
    }
  }
  function ensureCircle(L, lat, lng, r) {
    const lr = leafletRef.current;
    if (!lr.circle) {
      lr.circle = L.circle([lat, lng], {radius: r, ...CIRCLE_STYLE}).addTo(lr.map);
    } else {
      lr.circle.setLatLng([lat, lng]);
      lr.circle.setRadius(r);
    }
  }
  function removeCircle() {
    const lr = leafletRef.current;
    if (lr.circle) { lr.map.removeLayer(lr.circle); lr.circle = null; }
  }
  function place(lat, lng) {
    const L = window.L;
    const lr = leafletRef.current;
    if (!L || !lr.map) return;
    ensureMarker(L, lat, lng);
    if (modeRef.current === 'zone') ensureCircle(L, lat, lng, radiusRef.current);
    else removeCircle();
  }

  React.useEffect(() => {
    let cancelled = false;
    function tryInit() {
      if (cancelled) return;
      if (!window.L) { setTimeout(tryInit, 200); return; }
      setReady(true);
      if (!mapRef.current || leafletRef.current.map) return;
      const L = window.L;
      // V18.0 — Init centre : (1) gps_lat manuel, (2) cache localStorage ville+pays, (3) fallback hardcodé, (4) Casablanca.
      let lat = Number(bien.gps_lat);
      let lng = Number(bien.gps_lng);
      let initZoom = bien.gps_lat ? 14 : 10;
      if (!bien.gps_lat && bien.ville && bien.pays) {
        const paysName = PAYS_NOM[bien.pays] || bien.pays;
        const cacheKey = ((bien.quartier ? bien.quartier + ', ' : '') + bien.ville + ', ' + paysName).toLowerCase().replace(/\s+/g,' ').trim();
        const cached = geocodeCacheGet(cacheKey);
        const fb = cached || geocodeFallback(bien.ville, bien.pays);
        if (fb) { lat = fb.lat; lng = fb.lng; initZoom = bien.quartier ? 15 : 13; }
      }
      if (!lat || !lng) { lat = 33.5731; lng = -7.5898; }
      const map = L.map(mapRef.current).setView([lat, lng], initZoom);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 19,
      }).addTo(map);
      leafletRef.current.map = map;
      map.on('click', e => {
        const {lat, lng} = e.latlng;
        setB('gps_lat', lat.toFixed(6));
        setB('gps_lng', lng.toFixed(6));
        setB('gps_source', 'manual'); // V18.0 : clic = manuel.
        place(lat, lng);
      });
      if (bien.gps_lat && bien.gps_lng) place(lat, lng);
    }
    tryInit();
    return () => { cancelled = true; };
  }, []);

  // V17.8 : bascule mode (add/removeLayer circle) + setRadius live au changement slider.
  React.useEffect(() => {
    modeRef.current = mode;
    radiusRef.current = radius;
    setB('gps_mode', mode);
    setB('gps_radius', mode === 'zone' ? radius : '');
    const L = window.L;
    const lr = leafletRef.current;
    if (!L || !lr.map) return;
    const lat = Number(bien.gps_lat), lng = Number(bien.gps_lng);
    if (!lat || !lng) return;
    if (mode === 'zone') {
      ensureCircle(L, lat, lng, radius);
      ensureMarker(L, lat, lng);
    } else {
      removeCircle();
      ensureMarker(L, lat, lng);
    }
  }, [mode, radius]);

  // V18.0 + V18.8 — Auto-centrage cascade : pays z6 → ville z12 → quartier z14 → adresse z17 (flyTo 1s).
  // N'écrase JAMAIS gps_source='manual' ou 'gps' (drag, clic, géoloc utilisateur).
  React.useEffect(() => {
    const pays = (bien.pays || '').trim();
    const ville = (bien.ville || '').trim();
    const quartier = (bien.quartier || '').trim();
    if (!pays) return;
    if (bien.gps_source === 'manual' || bien.gps_source === 'gps') return;
    let cancelled = false;
    const t = setTimeout(async () => {
      const lr = leafletRef.current;
      if (!lr || !lr.map) return;
      // Cascade : si quartier → précis ; sinon ville → ville ; sinon pays → centre pays.
      if (quartier && ville) {
        const r = await geocodeNominatim(ville, pays, quartier);
        if (cancelled) return;
        if (r) {
          const lat = Number(r.lat.toFixed(6)), lng = Number(r.lng.toFixed(6));
          if (!bien.gps_source || bien.gps_source === 'geocode') {
            setB('gps_lat', lat.toFixed(6)); setB('gps_lng', lng.toFixed(6)); setB('gps_source', 'geocode');
          }
          lr.map.flyTo([lat, lng], 14, {duration: 1.0});
          if (window.L) place(lat, lng);
          return;
        }
      }
      if (ville) {
        const r = await geocodeNominatim(ville, pays, '');
        if (cancelled) return;
        if (r) {
          const lat = Number(r.lat.toFixed(6)), lng = Number(r.lng.toFixed(6));
          if (!bien.gps_source || bien.gps_source === 'geocode') {
            setB('gps_lat', lat.toFixed(6)); setB('gps_lng', lng.toFixed(6)); setB('gps_source', 'geocode');
          }
          lr.map.flyTo([lat, lng], 12, {duration: 1.0});
          if (window.L) place(lat, lng);
          return;
        }
      }
      // Pays seul → centre pays z6.
      const c = PAYS_CENTERS[pays];
      if (c) {
        lr.map.flyTo(c, 6, {duration: 1.0});
      }
    }, 600);
    return () => { cancelled = true; clearTimeout(t); };
  }, [bien.ville, bien.pays, bien.quartier]);

  // V18.8 — Ma position + reverse geocoding Nominatim → pré-remplit adresse/ville/quartier/CP/pays.
  async function useMyLocation() {
    if (!navigator.geolocation) { showToast && showToast('Géolocalisation non supportée'); return; }
    showToast && showToast('📍 Localisation…');
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const {latitude, longitude} = pos.coords;
        setB('gps_lat', latitude.toFixed(6));
        setB('gps_lng', longitude.toFixed(6));
        setB('gps_source', 'gps');
        // Mode auto : Précis avec rayon 50m (on est sur place).
        setMode('precis');
        if (leafletRef.current.map) {
          leafletRef.current.map.flyTo([latitude, longitude], 17, {duration: 0.8});
          place(latitude, longitude);
        }
        // Reverse geocoding pour pré-remplir.
        const rev = await reverseGeocodeNominatim(latitude, longitude);
        if (rev) {
          if (rev.adresse) setB('adresse', rev.adresse);
          if (rev.ville) setB('ville', rev.ville);
          if (rev.quartier) setB('quartier', rev.quartier);
          if (rev.code_postal) setB('code_postal', rev.code_postal);
          if (rev.pays && !bien.pays) setB('pays', rev.pays);
          showToast && showToast('📍 Position : ' + (rev.adresse || rev.display_name || 'enregistrée'));
        } else {
          showToast && showToast('📍 Position GPS enregistrée');
        }
      },
      err => showToast && showToast('Position refusée : ' + (err.message || 'erreur')),
      {enableHighAccuracy:true, timeout:10000, maximumAge:0}
    );
  }
  // V18.8 — pick depuis LocationAutocomplete : set GPS + adresse + flyTo z17.
  function applyLocationPick(pick) {
    if (!pick) return;
    setB('gps_lat', pick.lat.toFixed(6));
    setB('gps_lng', pick.lng.toFixed(6));
    setB('gps_source', 'manual');
    if (pick.adresse) setB('adresse', pick.adresse);
    if (pick.code_postal) setB('code_postal', pick.code_postal);
    if (leafletRef.current.map) {
      leafletRef.current.map.flyTo([pick.lat, pick.lng], 17, {duration: 0.8});
      place(pick.lat, pick.lng);
    }
    showToast && showToast('📍 ' + (pick.adresse || 'Position enregistrée'));
  }

  if (!ready && typeof window !== 'undefined' && !window.L) {
    return <div style={{fontSize:12, color:'#8B7F6E', fontStyle:'italic', padding:'10px 0'}}>Carte indisponible — utilisez le champ GPS texte ci-dessus.</div>;
  }

  // V18.8 — breadcrumb "Pays › Ville › Quartier › Adresse" sticky au-dessus carte.
  const paysFlag = (PAYS_BIEN.find(p => p.c === bien.pays) || {}).f || '';
  const crumbs = [paysFlag + (paysFlag ? ' ' : '') + (bien.pays || ''), bien.ville, bien.quartier, bien.adresse].filter(Boolean);

  return (
    <div style={{marginTop:6, marginBottom:10}}>
      {/* V18.8 — Autocomplete adresse/rue/lieu/commerce (Nominatim biaisé sur ville). */}
      {bien.ville && (
        <LocationAutocomplete value={bien.adresse} onChange={v => setB('adresse', v)} onPick={applyLocationPick}
          ville={bien.ville} pays={bien.pays} quartier={bien.quartier}
          label="Adresse, rue, lieu-dit ou commerce"/>
      )}
      {/* V18.8 — breadcrumb cascade sticky */}
      {crumbs.length > 0 && (
        <div style={{display:'flex', alignItems:'center', gap:6, padding:'8px 10px', background:'#FBF1E4', border:'1px solid #E8DDD0', borderRadius:8, marginBottom:6, fontSize:12, color:'#5C4A3A', fontWeight:600, overflow:'hidden'}}>
          <span style={{flex:1, minWidth:0, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
            {crumbs.map((c, i) => <span key={i}>{i > 0 && <span style={{color:'#B5A78F', margin:'0 4px'}}>›</span>}{c}</span>)}
          </span>
        </div>
      )}
      <div style={{display:'flex', gap:6, marginBottom:6}}>
        <button type="button" onClick={() => setMode('precis')}
          style={{flex:1, padding:'7px 8px', borderRadius:8, border:'1.5px solid ' + (mode === 'precis' ? '#8B5E3C' : '#E8DDD0'),
                  background: mode === 'precis' ? '#FFF3EC' : '#FDFAF7', color: mode === 'precis' ? '#8B5E3C' : '#8B7F6E',
                  fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>📍 Précis</button>
        <button type="button" onClick={() => setMode('zone')}
          style={{flex:1, padding:'7px 8px', borderRadius:8, border:'1.5px solid ' + (mode === 'zone' ? '#8B5E3C' : '#E8DDD0'),
                  background: mode === 'zone' ? '#FFF3EC' : '#FDFAF7', color: mode === 'zone' ? '#8B5E3C' : '#8B7F6E',
                  fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>⭕ Zone</button>
        <button type="button" onClick={useMyLocation}
          style={{padding:'7px 10px', borderRadius:8, border:'1.5px solid #BBA88B', background:'#FFFCF5', color:'#8B5E3C', fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>📱 Ma position</button>
      </div>
      {mode === 'zone' && (
        <div style={{marginBottom:6, display:'flex', alignItems:'center', gap:8}}>
          <label style={{fontSize:11, color:'#8B7F6E', fontWeight:600, textTransform:'uppercase'}}>Rayon</label>
          {/* V18.8 — slider 50-5000m, oninput live (chaque pixel) → setRadius immédiat → useEffect met à jour L.circle.setRadius(). */}
          <input type="range" min="50" max="5000" step="50" value={radius}
            onChange={e => setRadius(Number(e.target.value))}
            onInput={e => setRadius(Number(e.target.value))}
            style={{flex:1}}/>
          <span style={{fontSize:12, color:'#2A2018', fontWeight:700, minWidth:70, textAlign:'right'}}>{radius >= 1000 ? (radius/1000).toFixed(radius % 1000 === 0 ? 0 : 1) + ' km' : radius + ' m'}</span>
        </div>
      )}
      <div ref={mapRef} style={{height:300, width:'100%', borderRadius:10, border:'1px solid #EDE6DC', overflow:'hidden'}}/>
      {bien.gps_lat && bien.gps_lng && (
        <div style={{fontSize:11, color:'#8B7F6E', marginTop:4, fontFamily:'monospace'}}>{bien.gps_lat}, {bien.gps_lng}</div>
      )}
    </div>
  );
}

// V17.6 Section III — BanqueSelect : picker avec search + groupes (MA participatives vs classiques).
function BanqueSelect({label, value, onChange, pays}) {
  let groups = [];
  if (pays === 'MA') {
    groups = [
      {g:'Banques participatives', items: BANQUES.MA_participatives},
      {g:'Banques classiques',     items: BANQUES.MA_classiques},
    ];
  } else if (pays === 'FR') {
    groups = [{g:'Banques FR', items: BANQUES.FR}];
  } else if (pays === 'ES') {
    groups = [{g:'Banques ES', items: BANQUES.ES}];
  }
  const flat = groups.flatMap(g => g.items.map(b => ({k:b, l:b, group:g.g})));
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState('');
  const ref = React.useRef(null);
  const isMobile = useIsMobile();
  React.useEffect(() => {
    if (isMobile) return;
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setQuery(''); } }
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [isMobile]);
  const filtered = query.trim()
    ? flat.filter(o => normalizeAccent(o.l).includes(normalizeAccent(query)))
    : flat;
  const byGroup = {};
  filtered.forEach(o => { (byGroup[o.group] ||= []).push(o); });
  function pick(k) { onChange(k); setOpen(false); setQuery(''); }
  function close() { setOpen(false); setQuery(''); }
  return (
    <div ref={ref} style={{position:'relative', marginBottom:10}}>
      {label && <label className="ocre-lbl">{label}</label>}
      <button type="button" onClick={() => setOpen(!open)}
        className={'ocre-tile ' + (value ? 'state-selected' : 'state-default')}
        style={{width:'100%', justifyContent:'space-between', padding:'10px 12px'}}>
        <span>{value || 'Choisir une banque…'}</span>
        <span style={{fontSize:10, opacity:.6}}>▾</span>
      </button>
      {open && (isMobile ? (
        <BottomSheet title={label || 'Banque'} onClose={close}>
          <div className="bsheet-search">
            <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="Rechercher…" autoCapitalize="off" autoCorrect="off"/>
          </div>
          <div className="bsheet-list">
            {Object.keys(byGroup).length === 0
              ? <div className="bsheet-empty">Aucune banque trouvée</div>
              : Object.entries(byGroup).map(([g, items]) => (
                <div key={g}>
                  <div className="bsheet-group-hdr">{g}</div>
                  {items.map(o => (
                    <div key={o.k} className={'bsheet-item ' + (o.k === value ? 'selected' : '')} onClick={() => pick(o.k)}>
                      <span style={{flex:1}}>{o.l}</span>
                      {o.k === value && <span style={{color:'#B26D3A', fontWeight:700}}>✓</span>}
                    </div>
                  ))}
                </div>
              ))}
          </div>
        </BottomSheet>
      ) : (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:300, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:50, marginTop:2}}>
          <input type="text" value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Rechercher…" autoFocus autoCapitalize="off" autoCorrect="off"
            style={{width:'100%', padding:'8px 11px', border:'none', borderBottom:'1px solid #F4EEE6', outline:'none', fontSize:13, fontFamily:'inherit'}}/>
          {Object.keys(byGroup).length === 0 ? (
            <div style={{padding:'10px 12px', fontSize:13, color:'#8B7F6E'}}>Aucune banque trouvée</div>
          ) : Object.entries(byGroup).map(([g, items]) => (
            <div key={g}>
              <div style={{padding:'6px 12px', background:'#F4EEE6', fontSize:10, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:1.2, fontWeight:700}}>{g}</div>
              {items.map(o => (
                <div key={o.k} onMouseDown={() => pick(o.k)}
                  style={{padding:'10px 12px', fontSize:13, cursor:'pointer', borderBottom:'1px solid #F4EEE6', background: o.k === value ? '#FBF1E4' : '#fff'}}>
                  {o.l}
                </div>
              ))}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// V17.6 Section III — DossierTimeline : étapes pays-spécifique, cliquables, dates auto.
function DossierTimeline({steps, value, onChange}) {
  const state = value || {};  // {stepLabel: ISODate} si done
  const doneSet = new Set(Object.keys(state));
  // Current = première étape non-done
  const currentIdx = steps.findIndex(s => !doneSet.has(s));
  return (
    <div style={{marginTop:10, marginBottom:10}}>
      <div className="ocre-lbl" style={{display:'block'}}>Timeline du dossier</div>
      <div style={{display:'flex', flexDirection:'column', gap:4}}>
        {steps.map((s, i) => {
          const isDone = doneSet.has(s);
          const isCurrent = i === currentIdx;
          const color = isDone ? '#3E8B5E' : (isCurrent ? '#B26D3A' : '#C4B5A0');
          const bg = isDone ? '#E8F5EC' : (isCurrent ? '#FBF1E4' : '#FFF');
          const border = isDone ? '1.5px solid #B8DEC4' : (isCurrent ? '2px solid #B26D3A' : '1.5px solid #EDE1CC');
          const icon = isDone ? '✓' : (isCurrent ? '●' : '○');
          const date = isDone && state[s] ? new Date(state[s]).toLocaleDateString('fr-FR') : null;
          function toggle() {
            const next = {...state};
            if (isDone) delete next[s];
            else next[s] = new Date().toISOString();
            onChange(next);
          }
          return (
            <button key={s} type="button" onClick={toggle}
              style={{display:'flex', alignItems:'center', gap:10, padding:'9px 11px', background:bg, border, borderRadius:8, cursor:'pointer', fontFamily:'inherit', textAlign:'left', color:'#2A2018'}}>
              <span style={{width:22, height:22, borderRadius:11, background: isDone ? '#3E8B5E' : (isCurrent ? '#B26D3A' : '#FDFAF7'), color: isDone || isCurrent ? '#FFF' : '#8B7F6E', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, flexShrink:0, border: !isDone && !isCurrent ? '1.5px solid #EDE1CC' : 'none'}}>{icon}</span>
              <span style={{flex:1, fontSize:13, fontWeight: isCurrent ? 700 : 500, color}}>{s}</span>
              {date && <span style={{fontSize:11, color:'#8B7F6E'}}>{date}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// V17.6 Section III — DocumentsChecklist : check-rows + upload par document.
function DocumentsChecklist({docs, value, onChange, dossierId, showToast}) {
  const state = Array.isArray(value) ? value : [];  // [{label, uploaded, file_url, file_name}]
  const inputRefs = React.useRef({});
  const [uploading, setUploading] = React.useState('');
  const findDoc = (label) => state.find(d => d.label === label);

  function upsert(label, patch) {
    const idx = state.findIndex(d => d.label === label);
    let next;
    if (idx >= 0) next = state.map((d, i) => i === idx ? {...d, ...patch} : d);
    else next = [...state, {label, uploaded:false, ...patch}];
    onChange(next);
  }
  function remove(label) {
    onChange(state.filter(d => d.label !== label));
  }

  async function doUpload(label, file) {
    if (!dossierId) { showToast && showToast('Enregistre d\'abord le dossier'); return; }
    const fd = new FormData();
    fd.append('action', 'upload');
    fd.append('dossier_id', dossierId);
    fd.append('document_type', label);
    fd.append('file', file);
    setUploading(label);
    try {
      const r = await fetch(API + '/upload.php?action=upload', {
        method:'POST', headers:{'X-Session-Token': localStorage.getItem('ocre_token') || ''}, body: fd,
      });
      const d = await r.json();
      if (d && d.ok && d.photo) {
        upsert(label, {uploaded:true, file_url:d.photo.url, file_name:d.photo.name});
        showToast && showToast('Document ajouté');
      } else {
        showToast && showToast((d && d.error) || 'Échec upload');
      }
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setUploading('');
  }

  return (
    <div style={{marginTop:10}}>
      <div className="ocre-lbl" style={{display:'block'}}>Documents requis</div>
      <div style={{display:'flex', flexDirection:'column', gap:4}}>
        {docs.map(label => {
          const item = findDoc(label);
          const done = !!(item && item.uploaded);
          return (
            <div key={label} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 11px', background: done ? '#E8F5EC' : '#FFF', border:'1.5px solid ' + (done ? '#B8DEC4' : '#EDE1CC'), borderRadius:8}}>
              <span style={{width:18, height:18, borderRadius:4, background: done ? '#3E8B5E' : '#FDFAF7', color: done ? '#FFF' : '#8B7F6E', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, flexShrink:0, border: done ? 'none' : '1.5px solid #EDE1CC'}}>{done ? '✓' : ''}</span>
              <span style={{flex:1, fontSize:12, color:'#2A2018', fontWeight: done ? 600 : 500}}>{label}</span>
              {done && item.file_url && (
                <a href={item.file_url} target="_blank" rel="noopener" style={{fontSize:11, color:'#8B5E3C', textDecoration:'none', fontWeight:700}}>Voir</a>
              )}
              <button type="button" onClick={() => inputRefs.current[label] && inputRefs.current[label].click()}
                disabled={uploading === label}
                style={{padding:'4px 10px', borderRadius:999, border:'1.5px solid ' + (done ? '#B8DEC4' : '#BBA88B'), background: done ? '#FFF' : '#FFF3EC', color:'#8B5E3C', fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>
                {uploading === label ? '…' : (done ? 'Remplacer' : '+ Fichier')}
              </button>
              {done && (
                <button type="button" onClick={() => remove(label)} title="Retirer"
                  style={{width:22, height:22, borderRadius:11, border:'1px solid #E8DDD0', background:'#fff', color:'#8B7F6E', cursor:'pointer', fontSize:12, padding:0, lineHeight:'20px'}}>×</button>
              )}
              <input type="file" accept="image/*,application/pdf"
                ref={el => { inputRefs.current[label] = el; }}
                onChange={e => { const f = (e.target.files || [])[0]; if (f) doUpload(label, f); e.target.value=''; }}
                style={{display:'none'}}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// V17.6 Section III — FinancementForm : mode + budget + banque + timeline + docs.
function FinancementForm({activeProfil, d, set, dossierId, showToast}) {
  const bien = d.bien || {};
  // V17.6 : compat — ancien d.financement était un string (cash/crédit/mixte). On convertit en objet.
  const f = (d.financement && typeof d.financement === 'object' && !Array.isArray(d.financement)) ? d.financement : {};
  function setF(patch) { set('financement', {...f, ...patch}); }

  const pays = bien.pays || 'MA';
  const modes = FINANCE_MODES[pays] || FINANCE_MODES.MA;
  const mode = f.mode || '';
  const isComptant = mode === 'comptant';
  const isMourabaha = mode === 'mourabaha';
  const isParticipatif = MODES_PARTICIPATIFS.includes(mode);

  // Auto-calc finance = budget - apport
  const budget = Number(f.budget_total) || 0;
  const apport = Number(f.apport) || 0;
  const finance = Math.max(0, budget - apport);

  const duree = Number(f.duree_annees) || 0;
  const taux = Number(f.taux_ou_marge) || 0;
  const nMois = duree * 12;

  // Mensualité
  let mensualite = 0, coutTotal = 0;
  if (!isComptant && finance > 0 && nMois > 0 && taux > 0) {
    if (isMourabaha) {
      const total = finance * (1 + taux / 100);
      mensualite = total / nMois;
      coutTotal = total;
    } else {
      const tm = taux / 100 / 12;
      mensualite = finance * tm / (1 - Math.pow(1 + tm, -nMois));
      coutTotal = mensualite * nMois;
    }
  } else if (!isComptant && finance > 0 && nMois > 0) {
    mensualite = finance / nMois;
    coutTotal = finance;
  }
  const fraisAcq = budget * (fraisAcquisitionPct(pays) / 100);
  const takaful = isMourabaha ? 350 : 0;
  const fmt = n => n ? Math.round(n).toLocaleString('fr-FR') : '';
  const currency = pays === 'MA' ? 'MAD' : (pays === 'ES' ? '€' : '€');

  const aides = AIDES_BY_PAYS[pays] || [];
  const timelineSteps = pickTimeline(pays, mode);
  const docsList = pickDocs(pays, mode);

  return (
    <>
      {/* 1. Mode de financement (tuiles pays-spécifique) */}
      <div style={{marginBottom:10}}>
        <label className="ocre-lbl">Mode de financement</label>
        <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6}}>
          {modes.map(m => {
            const active = mode === m.k;
            return (
              <button key={m.k} type="button" onClick={() => setF({mode: m.k})}
                className={'ocre-tile ' + (active ? 'state-selected' : 'state-default')}>
                {m.l}
              </button>
            );
          })}
        </div>
      </div>

      {/* 2. Budget / Apport / Finance */}
      <div className="row-pair">
        <Field label={'Budget total (' + currency + ')'} type="number" value={f.budget_total} onChange={v => setF({budget_total: v})} style={{flex:1}}/>
        <Field label={'Apport (' + currency + ')'} type="number" value={f.apport} onChange={v => setF({apport: v})} style={{flex:1}}/>
      </div>
      {!isComptant && (
        <div style={{marginBottom:10}}>
          <label className="ocre-lbl">Montant à financer ({currency})</label>
          <div style={{padding:'9px 11px', borderRadius:8, fontSize:14, background:'#F7F0E6', border:'1.5px solid #E2D8CC', color:'#2A2018', fontWeight:700}}>
            {fmt(finance) || '—'}
          </div>
        </div>
      )}

      {/* 3. Si crédit : durée + taux/marge + assurance FR */}
      {!isComptant && (
        <>
          <div className="row-pair">
            <Field label="Durée (années)" type="number" value={f.duree_annees} onChange={v => setF({duree_annees: v})} style={{flex:1}}/>
            <Field label={isParticipatif ? 'Marge (%)' : 'Taux (%)'} type="number" value={f.taux_ou_marge} onChange={v => setF({taux_ou_marge: v})} style={{flex:1}}/>
          </div>
          {pays === 'FR' && (
            <Field label="Taux assurance (%)" type="number" value={f.assurance_taux} onChange={v => setF({assurance_taux: v})}/>
          )}

          {/* 4. Card summary mensualité */}
          {finance > 0 && nMois > 0 && taux > 0 && (
            <div style={{marginTop:6, marginBottom:12, padding:'12px 14px', background:'linear-gradient(135deg,#FFF9F0,#FBF1E4)', border:'1.5px solid #B26D3A', borderRadius:10}}>
              <div style={{fontSize:11, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:1.2, fontWeight:700, marginBottom:6}}>Synthèse</div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, fontSize:12}}>
                <div>
                  <div style={{color:'#8B7F6E', fontSize:10, textTransform:'uppercase', letterSpacing:.4}}>Mensualité</div>
                  <div style={{fontSize:18, fontWeight:700, color:'#8B4E22'}}>{fmt(mensualite)} {currency}</div>
                </div>
                <div>
                  <div style={{color:'#8B7F6E', fontSize:10, textTransform:'uppercase', letterSpacing:.4}}>Coût total crédit</div>
                  <div style={{fontSize:14, fontWeight:700, color:'#2A2018'}}>{fmt(coutTotal)} {currency}</div>
                </div>
                <div>
                  <div style={{color:'#8B7F6E', fontSize:10, textTransform:'uppercase', letterSpacing:.4}}>Frais acquisition (~{fraisAcquisitionPct(pays)}%)</div>
                  <div style={{fontSize:14, fontWeight:700, color:'#2A2018'}}>{fmt(fraisAcq)} {currency}</div>
                </div>
                {isMourabaha && (
                  <div>
                    <div style={{color:'#8B7F6E', fontSize:10, textTransform:'uppercase', letterSpacing:.4}}>Takaful estimé</div>
                    <div style={{fontSize:14, fontWeight:700, color:'#2A2018'}}>{takaful} MAD/mois</div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* 5. Banque */}
          <BanqueSelect label="Banque" value={(f.banque && f.banque.nom) || ''} onChange={v => setF({banque: {...(f.banque || {}), nom: v}})} pays={pays}/>
          {f.banque && f.banque.nom && (
            <>
              <div className="row-pair">
                <Field label="Agence" value={f.banque.agence} onChange={v => setF({banque: {...f.banque, agence: v}})} style={{flex:1}}/>
                <PhoneField label="Tél agence" value={f.banque.tel} onChange={v => setF({banque: {...f.banque, tel: v}})} style={{flex:1}}/>
              </div>
              <EmailField label="Email contact banque" value={f.banque.email} onChange={v => setF({banque: {...f.banque, email: v}})}/>
            </>
          )}

          {/* 6. Courtier (optionnel) */}
          <div style={{marginTop:6, marginBottom:6}}>
            <BoolChip label="Passage par un courtier" value={!!f.courtier} onChange={v => setF({courtier: v ? (f.courtier && typeof f.courtier === 'object' ? f.courtier : {}) : null})}/>
          </div>
          {f.courtier && typeof f.courtier === 'object' && (
            <>
              <div className="row-pair">
                <Field label="Nom courtier" value={f.courtier.nom} onChange={v => setF({courtier: {...f.courtier, nom: v}})} style={{flex:1}}/>
                <PhoneField label="Tél courtier" value={f.courtier.tel} onChange={v => setF({courtier: {...f.courtier, tel: v}})} style={{flex:1}}/>
              </div>
            </>
          )}

          {/* 7. Garantie */}
          <Select label="Garantie" value={f.garantie} onChange={v => setF({garantie: v})} options={GARANTIES}/>

          {/* 8. Aides */}
          {aides.length > 0 && (
            <MultiSelectChips label="Aides possibles" value={f.aides} options={aides} onChange={v => setF({aides: v})}/>
          )}

          {/* 9. Statut dossier */}
          <Select label="Statut du dossier" value={f.statut_dossier} onChange={v => setF({statut_dossier: v})} options={STATUTS_DOSSIER}/>

          {/* 10. Timeline + docs si banque choisie */}
          {f.banque && f.banque.nom && timelineSteps && (
            <DossierTimeline steps={timelineSteps} value={f.timeline} onChange={v => setF({timeline: v})}/>
          )}
          {f.banque && f.banque.nom && docsList && (
            <DocumentsChecklist docs={docsList} value={f.documents} onChange={v => setF({documents: v})} dossierId={dossierId} showToast={showToast}/>
          )}
        </>
      )}

      {/* Notes (toujours visible) */}
      <div style={{marginTop:10}}>
        <label className="ocre-lbl">Notes financement</label>
        <textarea value={f.notes_financement || ''} onChange={e => setF({notes_financement: e.target.value})}
          style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:13, outline:'none', fontFamily:'inherit', color:'#2A2018',
                  minHeight:60, border:'1.5px solid ' + (f.notes_financement ? '#BBA88B' : '#E8DDD0'),
                  background: f.notes_financement ? '#FFFCF5' : '#FDFAF7', resize:'vertical'}}/>
      </div>
    </>
  );
}

// V18.7 — Stage accordéon strict + status badge + ligne stats compacte fermé.

  const badge = status === 'complete'
    ? {char:'✓', color:'#3E8B5E', bg:'#E8F5EC'}
    : status === 'partial'

    <div style={{background:'#fff', borderRadius:12, padding:'12px 14px', marginBottom:10, border:'1px solid #EDE6DC'}}>
      <div onClick={onToggle} style={{cursor:'pointer', display:'flex', alignItems:'center', gap:10, padding:'2px 0'}}>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span style={{fontFamily:'Cormorant Garamond,serif', fontSize:18, fontWeight:700, color:'#8B5E3C', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{title}</span>

              style={{display:'inline-flex', alignItems:'center', justifyContent:'center', width:18, height:18, borderRadius:9, background: badge.bg, color: badge.color, fontSize:11, fontWeight:800, flexShrink:0}}>{badge.char}</span>
          </div>
          {!expanded && summary && (
            <div style={{fontSize:11, color:'#8B7F6E', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginTop:2}}>{summary}</div>
          )}
        </div>

        maxHeight: expanded ? '99999px' : '0',

      }}>{children}</div>
    </div>
  );
}

// V18.3 — Web Push : enregistre SW, demande permission, subscribe au backend.
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
async function setupWebPush() {
  try {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return {ok: false, reason: 'unsupported'};
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    if (Notification.permission === 'denied') return {ok: false, reason: 'denied'};
    if (Notification.permission === 'default') {
      const p = await Notification.requestPermission();
      if (p !== 'granted') return {ok: false, reason: p};
    }
    const token = localStorage.getItem('ocre_token') || '';
    const r = await fetch(API + '/vapid_public.php', {headers: {'X-Session-Token': token}}).then(r => r.json());
    if (!r || !r.public_key) return {ok: false, reason: 'no_vapid'};
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(r.public_key),
      });
    }
    const json = sub.toJSON();
    await fetch(API + '/push_subscribe.php?action=subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-Session-Token': token},
      body: JSON.stringify({
        endpoint: json.endpoint,
        p256dh: json.keys.p256dh,
        auth: json.keys.auth,
      }),
    });
    return {ok: true};
  } catch (e) {
    return {ok: false, reason: 'error', error: String(e)};
  }
}
function isStandalonePWA() {
  return (window.navigator.standalone === true)
      || (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
}
function isIOS() {
  return /iP(hone|od|ad)/.test(navigator.platform || '') || /iPad|iPhone|iPod/.test(navigator.userAgent || '');
}

    function onMsg(e) {
      if (e.data && e.data.type === 'notif-click' && e.data.url) {
        const m = e.data.url.match(/#client\/(\d+)(?:\?section=(\d))?/);

  async function handleSaveLocal(data) {

    setClients(prev => {

      return [{...incoming, id: incoming.id || 'tmp-' + Date.now()}, ...prev];

    setEditing(incoming);
    const saved = await apiSaveClient(incoming);

      setClients(prev => prev.map(c => (c === incoming || c.id === incoming.id) ? saved : c));

    setView('list'); setEditing(null);

  // V18.2 — initialExpandedSection : 0=Identité, 1=Bien, 2=Financier, 3=Suivi(Section IV).
  const [initialExpandedSection, setInitialExpandedSection] = useState(null);
  function openClient(c) {

    setInitialExpandedSection(sectionIdx);

  }
  function openNew() {

    setFormKey(k => k + 1);
    setView('form');
  }
  async function logout() {
    const token = localStorage.getItem('ocre_token');
    try { await fetch(API + '/auth.php?action=logout', {method:'POST', headers:{'X-Session-Token':token}}); } catch (e) {}
    localStorage.removeItem('ocre_token');
    localStorage.removeItem('ocre_user');
    window.location = '/login/';
  }

  if (apiLoading) {
    return (
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', background:'#F4EEE6'}}>
        <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:32, color:'#8B5E3C', fontWeight:700, marginBottom:16}}>Ocre Immo</div>
        <div style={{width:40, height:40, border:'3px solid #E8DDD0', borderTopColor:'#8B5E3C', borderRadius:'50%', animation:'spin 0.7s linear infinite'}}/>
      </div>
    );
  }

  if (view === 'prefs') {
    return <PrefsView currentUser={currentUser} onBack={() => setView('list')} showToast={showToast} toast={toast}/>;
  }
  if (view === 'dictation') {
    return <DictationView onBack={() => setView('list')}
      showToast={showToast} toast={toast}
      clients={clients} openClientAtSection={openClientAtSection}
      onCreated={(newClient) => {
        setClients(prev => [newClient, ...prev]);
        setEditing(newClient);
        setActiveProfil(newClient.projet || 'Acheteur');
        setIsInvestisseur(newClient.projet === 'Investisseur' || !!newClient.is_investisseur);
        setView('form');
      }}/>;
  }
  if (view === 'import_url') {
    return <ImportUrlView onBack={() => setView('list')}
      showToast={showToast} toast={toast}
      onCreated={(newClient) => {
        setClients(prev => [newClient, ...prev]);
        setEditing(newClient);

        setIsInvestisseur(newClient.projet === 'Investisseur' || !!newClient.is_investisseur);
        setView('form');
      }}/>;

  const banner = showInstallBanner && <InstallPwaBanner aboveActionBar={view === 'list'} onClose={() => { setShowInstallBanner(false); localStorage.setItem('ocre_install_dismissed_v18','1'); }}/>;
  return (<>{view === 'list' ? (
    <ListView
      clients={clients} country={country} setCountry={setCountry}

      userMenu={userMenu} setUserMenu={setUserMenu}
