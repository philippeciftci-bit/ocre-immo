<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3D2818">
<title>Tableau de bord · Ocre Immo</title>
<link rel="icon" href="/favicon/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
<style>
  :root { --cream:#FAF6F1; --cream-2:#F4ECDF; --brown:#3D2818; --brown-soft:#6B5642; --brown-mute:#998877; --ocre:#B87333; --ocre-dark:#8B5E3C; --gold:#D4A256; --green:#2D7A3E; --green-soft:#E8F2EA; --line:#E5DAC6; }
  *,*::before,*::after { box-sizing:border-box; }
  body { margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--brown); line-height:1.55; padding-top:env(safe-area-inset-top); }
  .container { max-width:1100px; margin:0 auto; padding:16px; }
  header { display:flex; align-items:center; gap:10px; padding:6px 0 14px; border-bottom:1px solid var(--line); margin-bottom:24px; }
  .back { background:none; border:1px solid var(--line); color:var(--brown); width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; }
  h1 { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:28px; margin:0; }
  .meta { color:var(--brown-mute); font-size:12px; margin:2px 0 0; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; margin-bottom:28px; }
  .kpi { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px; cursor:pointer; transition:border-color .15s, transform .1s; }
  .kpi:hover { border-color:var(--ocre-dark); transform:translateY(-2px); }
  .kpi-value { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; color:var(--ocre-dark); font-size:32px; line-height:1; }
  .kpi-label { font-size:12.5px; color:var(--brown-soft); margin-top:6px; font-weight:500; }
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px; }
  @media (max-width: 768px) { .charts-grid { grid-template-columns:1fr; } }
  .chart-card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px; }
  .chart-card h3 { font-size:13px; color:var(--brown-soft); margin:0 0 12px; text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
  .lists-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width: 768px) { .lists-grid { grid-template-columns:1fr; } }
  .list-card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px; }
  .list-card h3 { font-size:13px; color:var(--brown-soft); margin:0 0 12px; text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
  .list-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; gap:8px; }
  .list-row:last-child { border-bottom:none; }
  .list-row .l { color:var(--brown); font-weight:500; }
  .list-row .r { color:var(--brown-mute); font-size:11.5px; white-space:nowrap; }
  .badge-mini { font-size:10px; font-weight:600; padding:2px 6px; border-radius:5px; background:var(--cream-2); color:var(--ocre-dark); margin-left:4px; }
  .loader { text-align:center; padding:40px; color:var(--brown-mute); }
  .spinner { width:24px; height:24px; border-radius:50%; border:3px solid var(--cream-2); border-top-color:var(--ocre-dark); animation:spin .8s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <button class="back" onclick="history.length>1?history.back():(location.href='/')" aria-label="Retour">←</button>
    <div><h1>Tableau de bord</h1><p class="meta" id="meta">Chargement…</p></div>
  </header>
  <div id="loader" class="loader"><span class="spinner"></span> Chargement de votre activité…</div>
  <div id="content" hidden>
    <div class="kpis" id="kpis"></div>
    <div class="charts-grid">
      <div class="chart-card"><h3>Activité 30 jours · dossiers créés/jour</h3><canvas id="chart-activity" height="180" data-testid="chart-activity"></canvas></div>
      <div class="chart-card"><h3>Top 5 villes</h3><canvas id="chart-villes" height="180" data-testid="chart-villes"></canvas></div>
      <div class="chart-card"><h3>Répartition par profil</h3><canvas id="chart-profils" height="180" data-testid="chart-profils"></canvas></div>
      <div class="chart-card"><h3>Heatmap usage par heure (90j)</h3><canvas id="chart-heatmap" height="80" data-testid="chart-heatmap"></canvas></div>
    </div>
    <div class="lists-grid">
      <div class="list-card"><h3>5 derniers dossiers modifiés</h3><div id="list-modified" data-testid="list-modified"></div></div>
      <div class="list-card"><h3>5 dernières notifications</h3><div id="list-notifs" data-testid="list-notifs"></div></div>
    </div>
  </div>
</div>
<script>
(function() {
  const $ = id => document.getElementById(id);
  function fmtDate(s) { if (!s) return ''; const d = new Date(s.replace(' ','T')+'Z'); return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit' }); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  async function load() {
    try {
      const r = await fetch('/api/dashboard/agent.php', { credentials: 'include' });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || 'load failed');
      render(d);
      $('loader').hidden = true;
      $('content').hidden = false;
      $('meta').textContent = 'Tenant : ' + d.tenant;
    } catch (e) { $('loader').textContent = 'Erreur : ' + e.message; }
  }
  function render(d) {
    const k = d.kpis;
    const kpiCards = [
      { v: k.dossiers_actifs, l: 'Dossiers actifs', f: 'enregistre' },
      { v: k.matchings_30j, l: 'Matchings 30j', f: 'matchings' },
      { v: k.pacts_signes, l: 'Pacts signés', f: 'pacts' },
      { v: k.taux_conversion_pct + '%', l: 'Conversion brouillon→actif', f: '' },
      { v: k.photos_30j, l: 'Photos 30j', f: 'photos' },
      { v: k.vendus_loues_30j, l: 'Vendus/loués 30j', f: 'archive' },
    ];
    $('kpis').innerHTML = kpiCards.map(c => `
      <div class="kpi" data-filter="${esc(c.f)}" onclick="window.location.href='/?filter=${esc(c.f)}'">
        <div class="kpi-value">${esc(c.v)}</div>
        <div class="kpi-label">${esc(c.l)}</div>
      </div>
    `).join('');
    if (typeof Chart === 'undefined') { setTimeout(() => render(d), 200); return; }
    new Chart($('chart-activity'), { type: 'line', data: { labels: d.charts.activity_30d.labels.map(s => s.slice(5)), datasets: [{ label: 'Créés', data: d.charts.activity_30d.data, borderColor: '#8B5E3C', backgroundColor: 'rgba(212,162,86,.18)', fill: true, tension: .3 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, precision: 0 } } } });
    new Chart($('chart-villes'), { type: 'bar', data: { labels: d.charts.top_villes.map(v => v.ville), datasets: [{ label: 'Dossiers', data: d.charts.top_villes.map(v => v.n), backgroundColor: '#C9A961' }] }, options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } } } });
    new Chart($('chart-profils'), { type: 'doughnut', data: { labels: d.charts.profils.map(p => p.projet), datasets: [{ data: d.charts.profils.map(p => p.n), backgroundColor: ['#8B5E3C', '#C9A961', '#2D7A3E', '#1565C0', '#5e35b1', '#b15a00', '#6B5642', '#998877'] }] }, options: { responsive: true } });
    new Chart($('chart-heatmap'), { type: 'bar', data: { labels: Array.from({length: 24}, (_, i) => i + 'h'), datasets: [{ label: 'Activité', data: d.charts.heatmap_by_hour, backgroundColor: '#D4A574' }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, precision: 0 } } } });
    $('list-modified').innerHTML = d.lists.last_modified.length ? d.lists.last_modified.map(r => `<div class="list-row"><span class="l">${esc((r.prenom||'') + ' ' + (r.nom||'') + ' #' + r.id)}<span class="badge-mini">${esc(r.projet||'?')}</span></span><span class="r">${esc(fmtDate(r.updated_at))}</span></div>`).join('') : '<p style="color:var(--brown-mute);font-size:13px">Aucun dossier récent</p>';
    $('list-notifs').innerHTML = d.lists.last_notifs.length ? d.lists.last_notifs.map(n => `<div class="list-row"><span class="l">${esc(n.title||n.type)}</span><span class="r">${esc(fmtDate(n.created_at))}</span></div>`).join('') : '<p style="color:var(--brown-mute);font-size:13px">Aucune notification récente</p>';
  }
  load();
})();
</script>
</body>
</html>
