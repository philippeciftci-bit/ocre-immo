<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3D2818">
<title>Diffusion · Ocre Immo</title>
<link rel="icon" href="/favicon/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FAF6F1; --cream-2:#F4ECDF; --brown:#3D2818; --brown-soft:#6B5642; --brown-mute:#998877;
    --ocre:#B87333; --ocre-dark:#8B5E3C; --gold:#D4A256;
    --green:#2D7A3E; --green-soft:#E8F2EA;
    --orange:#B15A00; --orange-soft:#FFEFD9;
    --red:#C62828; --red-soft:#FDECEA;
    --grey:#6B5642; --grey-soft:#F0EBE3;
    --line:#E5DAC6;
  }
  *,*::before,*::after { box-sizing:border-box; }
  body { margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--brown);
         padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
         line-height:1.55; -webkit-font-smoothing:antialiased; }
  .container { max-width:560px; margin:0 auto; padding:16px; }

  header { display:flex; align-items:center; gap:10px; padding:6px 0 14px; border-bottom:1px solid var(--line); margin-bottom:18px; }
  .back { background:none; border:1px solid var(--line); color:var(--brown); width:36px; height:36px; border-radius:50%; cursor:pointer;
          display:flex; align-items:center; justify-content:center; font-size:18px; }
  .back:hover { border-color:var(--ocre-dark); color:var(--ocre-dark); }
  h1 { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:24px; margin:0; }
  .header-meta { color:var(--brown-mute); font-size:12px; margin:0; }

  .stub-banner {
    background:var(--orange-soft); color:var(--orange); padding:10px 14px; border-radius:10px;
    font-size:12.5px; margin-bottom:18px; line-height:1.45; border-left:3px solid var(--orange);
  }
  .stub-banner b { color:#8a4500; }

  .counter {
    background:linear-gradient(135deg,var(--cream-2),#fff);
    border:1px solid var(--line); border-radius:12px; padding:14px 16px;
    display:flex; align-items:center; gap:14px; margin-bottom:18px;
  }
  .counter-num { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600;
                 font-size:32px; color:var(--ocre-dark); line-height:1; }
  .counter-num span { font-size:18px; color:var(--brown-mute); }
  .counter-text { font-size:13px; color:var(--brown-soft); flex:1; }
  .counter-text b { color:var(--brown); }
  .progress { height:4px; background:var(--cream-2); border-radius:2px; margin-top:6px; overflow:hidden; }
  .progress-bar { height:100%; background:linear-gradient(90deg,var(--gold),var(--ocre)); transition:width .3s; }

  .portals { display:flex; flex-direction:column; gap:10px; }
  .portal {
    background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px;
    display:flex; align-items:center; gap:12px; transition:border-color .15s;
  }
  .portal:hover { border-color:var(--ocre-dark); }
  .portal.locked { opacity:.55; }
  .portal-logo { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center;
                 font-size:14px; font-weight:700; color:#fff; flex-shrink:0; }
  .portal-info { flex:1; min-width:0; }
  .portal-name { font-size:14px; font-weight:600; color:var(--brown); }
  .portal-meta { font-size:11px; color:var(--brown-mute); margin-top:2px; }
  .portal-status { display:inline-flex; align-items:center; font-size:10px; font-weight:600; padding:3px 8px;
                   border-radius:6px; text-transform:uppercase; letter-spacing:.03em; flex-shrink:0; margin-left:auto;
                   white-space:nowrap; }
  .portal-status.published { background:var(--green-soft); color:var(--green); }
  .portal-status.pending,.portal-status.syncing { background:var(--orange-soft); color:var(--orange); }
  .portal-status.refused { background:var(--red-soft); color:var(--red); }
  .portal-status.off,.portal-status.deleted { background:var(--grey-soft); color:var(--grey); }
  .portal-status.locked { background:#ECE3F4; color:#5e35b1; }

  .toggle { width:36px; height:20px; border-radius:10px; background:var(--cream-2); position:relative;
            cursor:pointer; flex-shrink:0; transition:background .2s; border:1px solid var(--line); margin-left:8px; }
  .toggle::after { content:''; position:absolute; top:1px; left:1px; width:16px; height:16px; border-radius:50%;
                   background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.18); transition:transform .2s; }
  .toggle.on { background:var(--ocre-dark); border-color:var(--ocre-dark); }
  .toggle.on::after { transform:translateX(16px); }
  .toggle.locked { opacity:.4; cursor:not-allowed; }

  .cta-row { margin-top:22px; display:flex; flex-direction:column; gap:10px; }
  .btn { padding:13px 20px; border-radius:10px; font-size:14px; font-weight:600; border:none; cursor:pointer;
         text-align:center; font-family:inherit; transition:background .15s; }
  .btn-primary { background:var(--ocre-dark); color:#fff; }
  .btn-primary:hover { background:var(--brown); }
  .btn-primary:disabled { background:var(--brown-mute); cursor:not-allowed; }
  .btn-link { background:transparent; color:var(--ocre-dark); padding:8px 0; font-size:13px; text-decoration:underline; }

  .feedback { margin-top:14px; padding:10px 14px; border-radius:8px; font-size:13px; display:none; line-height:1.5; }
  .feedback.show { display:block; }
  .feedback.error { background:var(--red-soft); color:var(--red); }
  .feedback.success { background:var(--green-soft); color:var(--green); }

  .loader { text-align:center; padding:40px 20px; color:var(--brown-mute); font-size:14px; }
  .spinner { width:24px; height:24px; border-radius:50%; border:3px solid var(--cream-2); border-top-color:var(--ocre-dark);
             animation:spin .8s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  details.error-detail { margin-top:6px; }
  details.error-detail summary { cursor:pointer; font-size:11px; color:var(--red); list-style:none; }
  details.error-detail summary::-webkit-details-marker { display:none; }
  details.error-detail summary::before { content:'▸ '; }
  details.error-detail[open] summary::before { content:'▾ '; }
  details.error-detail .err-text { font-size:11px; color:var(--brown-soft); padding:6px 0; line-height:1.5; }
  .portal-flag { display:inline-block; margin-right:2px; font-size:13px; }
  .portal-currency { color:var(--brown-mute); font-size:11px; font-weight:500; margin-left:4px; }
  .portal-warn { font-size:10.5px; color:var(--orange); margin-top:3px; line-height:1.3; }
</style>
</head>
<body>

<div class="container">
  <header>
    <button class="back" onclick="history.length>1?history.back():(location.href='/')" aria-label="Retour">←</button>
    <div>
      <h1>Diffusion</h1>
      <p class="header-meta" id="dossier-meta">Chargement…</p>
    </div>
  </header>

  <div class="stub-banner" id="stub-banner" hidden>
    <b>Mode test</b> — les portails ne sont pas encore connectés en production. Les publications sont simulées via mock server local. Quand les vrais credentials API portails seront en place, plug & play sans refacto.
  </div>

  <div id="loader" class="loader"><span class="spinner"></span> Chargement des portails…</div>

  <div id="hub" hidden>
    <div class="counter" data-testid="counter">
      <div class="counter-num" id="count-num">0<span>/0</span></div>
      <div style="flex:1;">
        <div class="counter-text" id="count-text">Aucun portail diffusé.</div>
        <div class="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="portals" id="portals-list"></div>

    <div id="feedback" class="feedback" role="status" aria-live="polite"></div>

    <div class="cta-row">
      <button class="btn btn-primary" id="publish-btn" type="button">Publier les portails sélectionnés</button>
      <button class="btn btn-link" id="check-btn" type="button">Vérifier la complétude du dossier</button>
    </div>
  </div>
</div>

<script>
(function() {
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const dossierId = parseInt(params.get('dossier_id') || '0', 10);
  if (!dossierId) {
    document.body.innerHTML = '<div class="container"><h1 style="font-family:Inter,sans-serif;">Dossier requis</h1><p>URL attendue : ?dossier_id=XXX</p></div>';
    return;
  }
  $('dossier-meta').textContent = 'Dossier #' + dossierId;

  let portals = [];
  let mappings = {};
  let pollTimer = null;

  async function loadAll() {
    try {
      const [pr, sr] = await Promise.all([
        fetch('/api/channel/portals.php', {credentials:'include'}).then(r => r.json()),
        fetch('/api/channel/status.php?dossier_id=' + dossierId, {credentials:'include'}).then(r => r.json()),
      ]);
      if (!pr.ok || !sr.ok) {
        if (sr && sr.error === 'Non authentifie' || pr && pr.error === 'Non authentifie') {
          showFeedback('error', 'Session expiree. Reconnectez-vous.');
          return;
        }
        throw new Error('API ko');
      }
      portals = pr.portals || [];
      mappings = {};
      (sr.mappings || []).forEach(m => { mappings[m.channel_name] = m; });
      if (pr.mock_mode_global) $('stub-banner').hidden = false;
      $('loader').hidden = true;
      $('hub').hidden = false;
      render();
      schedulePoll();
    } catch (e) {
      $('loader').textContent = 'Erreur de chargement : ' + e.message;
    }
  }

  function statusLabel(s) {
    return ({
      published: '● Publié',
      syncing: '● En cours',
      pending: '● En attente',
      refused: '● Refusé',
      expired: '● Expiré',
      deleted: '● OFF',
      off: '● OFF',
      locked: '● BIENTÔT',
    })[s] || '● —';
  }

  function render() {
    const list = $('portals-list');
    list.innerHTML = '';
    let activeCount = 0;
    const totalAvailable = portals.filter(p => p.status_v === 'active').length;
    portals.forEach(p => {
      const m = mappings[p.name] || {};
      const isActiveSub = p.status_v === 'active';
      const status = isActiveSub ? (m.status || 'off') : 'locked';
      if (status === 'published' || status === 'syncing' || status === 'pending') activeCount++;

      const row = document.createElement('div');
      row.className = 'portal' + (isActiveSub ? '' : ' locked');
      row.setAttribute('data-channel', p.name);
      // M105 : warning traduction si dossier non-locale du portail
      const localeWarn = (p.name === 'idealista') ? '⚠ Traduction auto-FR→ES partielle' :
                         (p.name === 'apartments_com') ? '⚠ Auto-translation FR→EN + USD conversion' : '';
      row.innerHTML = `
        <div class="portal-logo" style="background:${p.logo_color}; color:${p.logo_color === '#fab50a' ? '#2a2017' : '#fff'};">${p.display.charAt(0)}</div>
        <div class="portal-info">
          <div class="portal-name">${p.flag ? `<span class="portal-flag">${p.flag}</span> ` : ''}${esc(p.display)} <span class="portal-currency">· ${esc(p.currency || '')}</span></div>
          <div class="portal-meta">${esc(metaLine(p, m))}</div>
          ${isActiveSub && localeWarn && status !== 'published' ? `<div class="portal-warn">${esc(localeWarn)}</div>` : ''}
          ${m.error_message ? `<details class="error-detail"><summary>Voir l'erreur</summary><div class="err-text">${esc(m.error_message)}</div></details>` : ''}
        </div>
        <span class="portal-status ${status}">${statusLabel(status)}</span>
        <div class="toggle${isToggleOn(p, m) ? ' on' : ''}${isActiveSub ? '' : ' locked'}" data-channel="${p.name}" role="switch" aria-checked="${isToggleOn(p, m)}" title="${esc(p.region || '')} · ${esc(p.currency || '')}"></div>
      `;
      list.appendChild(row);
    });

    $('count-num').innerHTML = `${activeCount}<span>/${portals.length}</span>`;
    $('count-text').innerHTML = activeCount > 0
      ? `Diffusé sur <b>${activeCount} portail${activeCount > 1 ? 's' : ''}</b> sur ${totalAvailable} disponibles.`
      : `Aucun portail diffusé. ${totalAvailable} portails disponibles.`;
    $('progress-bar').style.width = totalAvailable > 0 ? Math.round(activeCount / totalAvailable * 100) + '%' : '0%';

    list.querySelectorAll('.toggle:not(.locked)').forEach(t => {
      t.addEventListener('click', () => { t.classList.toggle('on'); });
    });
  }

  function isToggleOn(p, m) {
    if (p.status_v !== 'active') return false;
    const s = m.status || 'off';
    return s === 'published' || s === 'syncing' || s === 'pending';
  }

  function metaLine(p, m) {
    if (p.status_v !== 'active') return p.region + ' · ' + p.sub_mission;
    if (!m.status) return p.region + ' · jamais publié';
    if (m.status === 'published' && m.last_synced_at) return 'Publié · ' + relativeTime(m.last_synced_at) + (m.views ? ' · ' + m.views + ' vues' : '');
    if (m.status === 'syncing') return 'Synchronisation en cours…';
    if (m.status === 'pending') return 'Mis en file d\'attente';
    if (m.status === 'refused') return 'Refusé · ' + (m.error_message ? 'voir détail' : 'raison inconnue');
    if (m.status === 'deleted') return 'Retiré';
    return m.status;
  }

  function relativeTime(iso) {
    const d = new Date(iso.replace(' ', 'T') + 'Z');
    const diff = Math.floor((Date.now() - d.getTime()) / 1000);
    if (diff < 60) return 'à l\'instant';
    if (diff < 3600) return 'il y a ' + Math.floor(diff / 60) + ' min';
    if (diff < 86400) return 'il y a ' + Math.floor(diff / 3600) + ' h';
    return 'le ' + iso.slice(0, 10);
  }

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function showFeedback(kind, msg) {
    const fb = $('feedback');
    fb.className = 'feedback show ' + kind;
    fb.textContent = msg;
  }
  function hideFeedback() { $('feedback').className = 'feedback'; $('feedback').textContent = ''; }

  function selectedChannels() {
    return Array.from(document.querySelectorAll('.toggle.on:not(.locked)')).map(t => t.dataset.channel);
  }

  $('publish-btn').addEventListener('click', async () => {
    const chans = selectedChannels();
    if (chans.length === 0) {
      showFeedback('error', 'Sélectionnez au moins un portail.');
      return;
    }
    hideFeedback();
    $('publish-btn').disabled = true;
    $('publish-btn').textContent = 'Publication en cours…';
    try {
      const r = await fetch('/api/channel/publish.php', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({dossier_id: dossierId, channels: chans}),
      });
      const data = await r.json();
      if (data.ok) {
        const queued = (data.queued || []).length;
        const fails = (data.validation_fails || []).length;
        if (queued > 0 && fails === 0) {
          showFeedback('success', queued + ' portail(s) en cours de publication. Statuts mis à jour automatiquement.');
        } else if (queued > 0 && fails > 0) {
          showFeedback('error', queued + ' en cours, ' + fails + ' refusé(s) pour champs manquants.');
        } else {
          showFeedback('error', 'Publication refusée pour ' + fails + ' portail(s). Vérifiez la complétude.');
        }
        await loadAll();
      } else {
        showFeedback('error', 'Erreur : ' + (data.error || 'inconnue'));
      }
    } catch (e) {
      showFeedback('error', 'Erreur réseau : ' + e.message);
    } finally {
      $('publish-btn').disabled = false;
      $('publish-btn').textContent = 'Publier les portails sélectionnés';
    }
  });

  $('check-btn').addEventListener('click', () => {
    alert('Vérification de complétude — disponible dans M104.1 (modal détaillée par portail). Pour l\'instant, tap "Publier" : les champs manquants apparaissent dans le feedback.');
  });

  function schedulePoll() {
    clearTimeout(pollTimer);
    const hasSyncing = Object.values(mappings).some(m => m.status === 'syncing' || m.status === 'pending');
    if (hasSyncing) {
      pollTimer = setTimeout(() => loadAll(), 5000);
    }
  }

  loadAll();
})();
</script>
</body>
</html>
