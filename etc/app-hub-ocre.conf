# M/2026/05/11/35 — M_SIGNUP_DIRECT : app.ocre.immo hub supprime.
# Tous les chemins redirigent 301 vers https://ocre.immo (preserve liens externes).
# Ancien vhost archive en app-hub-ocre.conf.ARCHIVED-M_SIGNUP_DIRECT-<TS>.
# Code archive en /opt/ocre-app-hub.ARCHIVED-M_SIGNUP_DIRECT-<TS>.

server {
    listen 80;
    listen [::]:80;
    server_name app.ocre.immo;
    return 301 https://ocre.immo$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.ocre.immo;

    ssl_certificate     /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/ocre-app-hub-access.log;
    error_log  /var/log/nginx/ocre-app-hub-error.log;

    # Tout redirige vers ocre.immo (hub supprime M/2026/05/11/35).
    # /oi-agent, /oi-scan etc. retombent ici aussi → home vitrine.
    location / {
        return 301 https://ocre.immo/;
    }
}
