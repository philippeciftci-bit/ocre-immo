# M/2026/05/11/21 — admin.ocre.immo super-dashboard.
# Cert wildcard *.ocre.immo réutilisé.

server {
    listen 80;
    listen [::]:80;
    server_name admin.ocre.immo;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.ocre.immo;

    ssl_certificate     /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP : connect-src self pour tous les /api/*.
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://auth.ocre.immo; img-src 'self' data: https://app.ocre.immo; frame-ancestors 'none'; base-uri 'self'" always;

    root /opt/ocre-superadmin;
    index index.html;

    access_log /var/log/nginx/admin-ocre-access.log;
    error_log  /var/log/nginx/admin-ocre-error.log;

    client_max_body_size 1M;

    # No-cache strict pour SPA shell.
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }
    location = /app.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }
    location = /styles.css {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    # API PHP-FPM (pool ocre, cohérent avec /opt/ocre-auth qui tourne en www-ocre)
    location ^~ /api/ {
        try_files $uri =404;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        }
    }

    # Sécurité dot-files
    location ~ /\.(env|secrets|git|ht) { deny all; return 404; }

    # Catch-all -> SPA shell (hash routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
