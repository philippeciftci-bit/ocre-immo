# V20 etape 0bis — Ocre Immo direct serve depuis VPS (plus de proxy_pass cluster121).
# Wildcard *.ocre.immo + app.ocre.immo gerees ici. Tenant slug extrait du sous-domaine
# et propage en HTTP_X_TENANT_SLUG via fastcgi pour le routeur PHP v20.

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ~^([a-z0-9][a-z0-9-]*)\.ocre\.immo$ app.ocre.immo;
    return 301 https://$host$request_uri;
}

# HTTPS direct serve
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<tenant_raw>[a-z0-9][a-z0-9-]*)\.ocre\.immo$ app.ocre.immo;

    ssl_certificate /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    root /opt/ocre-app;
    index index.html index.php;

    access_log /var/log/nginx/ocre-app-access.log;
    error_log  /var/log/nginx/ocre-app-error.log;

    client_max_body_size 25M;

    # Tenant slug : extrait du sous-domaine. Fallback ozkan pour app.ocre.immo (transition).
    set $slug "";
    if ($host ~ "^([a-z0-9][a-z0-9-]*)\.ocre\.immo$") { set $slug $1; }
    if ($host = "app.ocre.immo") { set $slug "ozkan"; }

    # V20 Mission B — page publique partage : /share/<token>
    location ~ "^/share/(?<share_token>[a-f0-9]+)$" {
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        include fastcgi.conf;
        fastcgi_param HTTP_X_TENANT_SLUG $slug;
        fastcgi_param SCRIPT_FILENAME /opt/ocre-app/share/index.php;
        fastcgi_param SCRIPT_NAME /share/index.php;
        fastcgi_param QUERY_STRING token=$share_token;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # M/2026/04/29/13 — cache long pour assets static + uploads (immutable hashed-name preferable, mais SW killswitch invalide en bump version).
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|woff2|woff|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param HTTP_X_TENANT_SLUG $slug;
        fastcgi_read_timeout 60;
    }

    # Securite : hide dot-files / git / env
    location ~ /\.(env|secrets|git|ht) { deny all; return 404; }
    # Empeche execution PHP dans uploads
    location ~ ^/uploads/.*\.php$ { deny all; return 404; }
}
