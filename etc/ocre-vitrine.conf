# V20 — Vitrine WordPress ocre.immo (apex + www).
server {
    listen 80;
    listen [::]:80;
    server_name ocre.immo www.ocre.immo;
    return 301 https://ocre.immo$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ocre.immo;

    ssl_certificate /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    return 301 https://ocre.immo$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ocre.immo;

    ssl_certificate /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/ocre-vitrine;
    index index.html index.php;

    access_log /var/log/nginx/ocre-vitrine-access.log;
    error_log  /var/log/nginx/ocre-vitrine-error.log;

    client_max_body_size 16M;

    # WP standard
    location / { try_files $uri $uri/ /index.php?$args; }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_read_timeout 60;
    }

    # Hide sensitive WP files
    location = /wp-config.php { deny all; return 404; }
    location ~ /\.(env|secrets|git|ht) { deny all; return 404; }
    location ~* /(?:uploads|files)/.*\.php$ { deny all; return 404; }
    location = /xmlrpc.php { deny all; return 404; }
    location ~* /(wp-config|wp-config-sample)\.php$ { deny all; return 404; }

    # Static cache headers
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|css|js|woff2|woff|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block sensitive HTTP methods
    if ($request_method !~ ^(GET|HEAD|POST)$) { return 405; }
}
