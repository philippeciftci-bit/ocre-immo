# M_GLITCHTIP_INSTALL — vhost nginx pour GlitchTip dashboard + webhook bridge
# Déploiement : copier dans /etc/nginx/sites-available/ + ln -s /etc/nginx/sites-enabled/
# Prérequis SSL : certbot ou cert wildcard sslip.io

server {
    listen 80;
    server_name glitchtip.46-225-215-148.sslip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name glitchtip.46-225-215-148.sslip.io;

    # Cert sslip.io (à provisionner par Philippe certbot OR copier wildcard existant)
    ssl_certificate /etc/letsencrypt/live/46-225-215-148.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/46-225-215-148.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Bridge webhook GlitchTip → Telegram (M_GLITCHTIP_INSTALL Phase 4)
    location = /glitchtip-webhook {
        root /opt/glitchtip-webhook;
        try_files /handler.php =404;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /opt/glitchtip-webhook/handler.php;
        include fastcgi_params;
    }

    # Proxy principal vers Docker GlitchTip web service port 8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s;
        proxy_buffering off;
    }
}
