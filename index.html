    if (formSearchQuery && formMatches.totalMatches === 0 && !noMatchToasted) {
      setNoMatchToasted(true);
      showToast && showToast('Aucun résultat dans ce dossier');
    }
    if (formMatches.totalMatches > 0 || !formSearchQuery) setNoMatchToasted(false);
  }, [formSearchQuery, formMatches.totalMatches]);

  // V18.27 — helper : la section est-elle dans les matches (override auto-open + highlight).
  function isMatched(i) { return formSearchQuery && formMatches.matchedSections.has(i); }
  const [shareOpen, setShareOpen] = useState(false);
  function openShare() {
    if (!editing || !editing.id || String(editing.id).startsWith('tmp-')) {
      showToast && showToast('Enregistrez d\'abord le dossier');
      return;
    }
    setShareOpen(true);
  }
  const dossierName = (profilType === 'Société' && d.societe_nom)
    ? d.societe_nom
    : ((d.prenom || '') + ' ' + (d.nom || '')).trim();

  // V17.4 UX v3 / V17.15 fix-I1 : bascule profil avec check anti-doublon.
  // Retourne la liste des dossiers déjà liés existant (par id), filtrée au profil donné si fourni.
  function linkedExisting(forProfil) {
    const list = Array.isArray(d.linked_dossiers) ? d.linked_dossiers : [];
    const lookup = (clients || []);
    const found = list.map(id => lookup.find(c => c.id === id)).filter(Boolean);
    if (!forProfil) return found;
    return found.filter(c => (c.projet || 'Acheteur') === forProfil);
  }
  const visibleBascules = (BASCULES[activeProfil] || []).filter(p => linkedExisting(p).length === 0);

  async function createLinkedDossier(newProfil) {
    // Check anti-doublon : si déjà lié pour ce profil → redirige au lieu de créer.
    const already = linkedExisting(newProfil);
    if (already.length > 0) {
      showToast && showToast('Dossier ' + newProfil + ' déjà lié — ouverture');
      if (openExistingDossier) openExistingDossier(already[0]);
      return;
    }
    // Le dossier source doit être sauvé (id réel) avant de créer un lié.
    if (!editing || !editing.id || String(editing.id).startsWith('tmp-')) {
      showToast && showToast('Enregistrez d\'abord le dossier');
      return;
    }
    const base = {
      profil_type: profilType,
      prenom: d.prenom, nom: d.nom, societe_nom: d.societe_nom, forme_juridique: d.forme_juridique,
      representant: d.representant, siret: d.siret,
      tel: d.tel, email: d.email, tels: d.tels, emails: d.emails,
      adresse: d.adresse, ville: d.ville, pays_residence: d.pays_residence,
      nationalite: d.nationalite, date_naissance: d.date_naissance,
      projet: newProfil,
      is_investisseur: newProfil === 'Investisseur',
      linked_dossiers: [editing.id],
    };
    const token = localStorage.getItem('ocre_token');
    try {
      const r = await fetch(API + '/clients.php?action=save', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token':token},
        body: JSON.stringify({client: base}),
      });
      const j = await r.json();
      if (j && j.ok && j.client) {
        // Retrolink : ajouter le nouvel id au dossier courant (dédup).
        const mine = Array.isArray(d.linked_dossiers) ? d.linked_dossiers : [];
        if (!mine.includes(j.client.id)) {
          const next = Array.from(new Set([...mine, j.client.id]));
          commit('linked_dossiers', next);
        }
        showToast && showToast('Dossier ' + newProfil + ' créé');
        // Ouvre le nouveau dossier dans le formulaire (plus de reload hard).
        if (openExistingDossier) setTimeout(() => openExistingDossier(j.client), 500);
      } else {
        showToast && showToast(j && j.error ? j.error : 'Échec création');
      }
    } catch (e) { showToast && showToast('Erreur réseau'); }
  }

  // V18.27 — header dossier : Prénom NOM centré, société en sous-ligne si pro.
  // Plus de "Nouveau {Profil}" → "Sans nom" gris italique si aucun identifiant saisi.
  const hasHeadName = !!(d.prenom || d.nom || d.societe_nom);
  const headMainName = hasHeadName
    ? ((profilType === 'Société' && d.societe_nom)
        ? d.societe_nom
        : (((d.prenom || '') + ' ' + (d.nom || '').toUpperCase()).trim() || d.societe_nom || ''))
    : '';
  const headSubSociety = (profilType === 'Société' && d.societe_nom && (d.prenom || d.nom)) ? d.societe_nom : '';

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:'#F0E8D8'}}>
      <div style={{background:'#fff', borderBottom:'1px solid #EDE6DC', padding:'10px 14px', position:'sticky', top:0, zIndex:10, display:'flex', alignItems:'center', gap:8}}>
        <button onClick={backToListFlushed} style={{background:'none', border:'none', fontSize:20, color:'#8B5E3C', cursor:'pointer', fontFamily:'inherit', flexShrink:0}}>←</button>
        {/* V18.27 — nom Cormorant italic bold centré. "Sans nom" si vide. Société sous-ligne si pro. */}
        <div style={{flex:1, textAlign:'center', minWidth:0, overflow:'hidden'}}>
          {headMainName ? (
            <div style={{fontFamily:'"Cormorant Garamond", serif', fontSize:22, fontWeight:600, fontStyle:'italic', color:'#2A2018', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', lineHeight:1.1}}>
              {headMainName}
            </div>
          ) : (
            <div style={{fontFamily:'"Cormorant Garamond", serif', fontSize:22, fontStyle:'italic', color:'#8B7355', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', lineHeight:1.1}}>
              Sans nom
            </div>
          )}
          {headSubSociety && (
            <div style={{fontSize:12, color:'#8B7355', fontStyle:'italic', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginTop:1}}>
              {headSubSociety}
            </div>
          )}
        </div>
        {/* V18.36 — PillIconButton cohérent (loupe dossier + partager dossier). */}
        <div style={{display:'flex', alignItems:'center', gap:8, flexShrink:0}}>
          <PillIconButton icon={
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          } title={formSearchOpen ? 'Fermer la recherche' : 'Rechercher dans le dossier'}
            active={formSearchOpen || !!formSearchQuery}
            onClick={toggleFormSearch}/>
          <PillIconButton icon={<ShareIcon size={18}/>} title="Partager" onClick={openShare}/>
        </div>
      </div>
      {/* V18.27 — Barre de recherche dossier avec compteur. */}
      <div className={'search-bar-wrap ' + (formSearchOpen ? 'open' : 'closed')}>
        <div className="search-bar-input-wrap">
          <input type="text" autoFocus={formSearchOpen}
            className="search-bar-input"
            placeholder="Rechercher dans ce dossier…"
            value={formSearchInput}
            onChange={e => setFormSearchInput(e.target.value)}
            autoCapitalize="off" autoCorrect="off" spellCheck="false"/>
          {formSearchQuery && (
            <div style={{fontSize:11, color:'#8B7F6E', fontWeight:700, whiteSpace:'nowrap', flexShrink:0, padding:'0 8px'}}>
              {formMatches.totalMatches} résultat{formMatches.totalMatches > 1 ? 's' : ''}
            </div>
          )}
          {formSearchInput && (
            <button className="search-bar-clear" onClick={() => { setFormSearchInput(''); setFormSearchQuery(''); }} title="Effacer">✕</button>
          )}
        </div>
      </div>

      {/* V18.17/V18.18 — banner mode staging. URL → lien origine. Image → thumbnail + contexte. */}
      {isStaged && (
        <div style={{background:'#FFF3EC', border:'1px solid #BBA88B', borderLeft:'4px solid #8B5E3C', padding:'10px 14px', display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          {stagedType === 'image' && stagedImageUrl && (
            <button type="button" onClick={() => setImageOverlay(true)}
              style={{flexShrink:0, width:56, height:56, borderRadius:8, overflow:'hidden', border:'1px solid #BBA88B', padding:0, cursor:'zoom-in', background:'#000'}}>
              <img src={stagedImageUrl} alt="" style={{width:'100%', height:'100%', objectFit:'cover', display:'block'}}
                onError={e => { e.target.style.display='none'; }}/>
            </button>
          )}
          <div style={{flex:1, minWidth:200, fontSize:12, color:'#2A2018', lineHeight:1.4}}>
            <b>{stagedType === 'image' ? '📸 Document importé' : '📥 Annonce téléchargée'}{stagedSource ? ' depuis ' + stagedSource : ''}.</b><br/>
            {stagedContext ? <span style={{color:'#8B7F6E'}}>Contexte : <i>« {stagedContext} »</i></span>
                           : <span style={{color:'#8B7F6E'}}>Modifie librement puis <b>enregistre</b> pour l'ajouter à tes dossiers.</span>}
          </div>
          {stagedUrl && (
            <a href={stagedUrl} target="_blank" rel="noopener"
              style={{background:'none', border:'1px solid #BBA88B', borderRadius:8, padding:'5px 9px', fontSize:11, color:'#8B5E3C', fontWeight:700, textDecoration:'none', whiteSpace:'nowrap'}}>🔗 Voir l'annonce originale</a>
          )}
          {stagedType === 'image' && stagedImageUrl && !stagedUrl && (
            <a href={stagedImageUrl} target="_blank" rel="noopener"
              style={{background:'none', border:'1px solid #BBA88B', borderRadius:8, padding:'5px 9px', fontSize:11, color:'#8B5E3C', fontWeight:700, textDecoration:'none', whiteSpace:'nowrap'}}>🔗 Image originale</a>
          )}
        </div>
      )}
      {/* V18.18 — overlay fullscreen image staging. */}
      {isStaged && imageOverlay && stagedImageUrl && (
        <div onClick={() => setImageOverlay(false)}
          style={{position:'fixed', inset:0, background:'rgba(0,0,0,.92)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', cursor:'zoom-out', padding:20}}>
          <img src={stagedImageUrl} alt="" style={{maxWidth:'100%', maxHeight:'100%', objectFit:'contain'}}/>
          <button onClick={() => setImageOverlay(false)}
            style={{position:'absolute', top:16, right:16, background:'rgba(255,255,255,.15)', color:'#fff', border:'1px solid rgba(255,255,255,.3)', borderRadius:20, padding:'6px 12px', fontSize:13, cursor:'pointer', fontFamily:'inherit', fontWeight:700}}>
            ✕ Fermer
          </button>
        </div>
      )}

      <div style={{padding:'10px 14px', background:'#fff', borderBottom:'1px solid #EDE6DC'}}>
        <div className="profils-row">
          {PROFILS_ORDER.map(p => {
            const active = p === activeProfil;
            return (
              <button key={p} onClick={() => setActiveProfil(p)}
                className={'profil-chip ' + (active ? 'state-selected' : 'state-default')}>{p}</button>
            );
          })}
        </div>
        {/* V17.15 fix-I1 : banner bascule profil filtre les profils déjà liés. */}
        {visibleBascules.length > 0 && (
          <div className="bascule-banner">
            <span>🔄 Aussi… Cette personne veut peut-être aussi</span>
            {visibleBascules.map(p => (
              <button key={p} type="button" className="bascule-btn" onClick={() => createLinkedDossier(p)}>
                {p}
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{flex:1, overflowY:'auto', padding:12}}>
        <div data-stage-anchor="0">
        <Stage title={STAGES[activeProfil][0]} expanded={expanded[0] || isMatched(0)} onToggle={() => toggleStage(0)} highlighted={isMatched(0)}
               status={stageStatus[0].status} summary={stageStatus[0].summary}>
          <div style={{display:'flex', gap:6, marginBottom:12}}>
            {['Particulier', 'Société'].map(t => (
              <button key={t} onClick={() => { setProfilType(t); commit('profil_type', t); }}
                style={{flex:1, padding:'7px 10px', borderRadius:8, border:'1.5px solid ' + (profilType === t ? '#8B5E3C' : '#E8DDD0'),
                        background: profilType === t ? '#FFF3EC' : '#FDFAF7', color: profilType === t ? '#8B5E3C' : '#8B7F6E',
                        fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>{t}</button>
            ))}
          </div>
          {/* V17.1 fix-ux-4 : grille 5 lignes strictes, unique pour tous profils. */}
          {profilType === 'Particulier' ? (
            <>
              {/* L1 Prénom / Nom */}
              <div className="row-pair">
                <Field label="Prénom" value={d.prenom} onChange={v => set('prenom', v)} style={{flex:1}}/>
                <Field label="Nom" value={d.nom} onChange={v => set('nom', v)} style={{flex:1}}/>
              </div>
              {/* L2 Tel / Email multi */}
              <TelephoneMulti value={d.tels} onChange={v => set('tels', v)} residenceCountry={d.pays_residence || d.nationalite || ''}/>
              <EmailMulti value={d.emails} onChange={v => set('emails', v)}/>
              {/* L3 Adresse full width */}
              <CitySuggestField label="Adresse" value={d.adresse} onChange={v => set('adresse', v)} suggestAction="suggest_address"/>
              {/* L4 Ville / Pays résidence */}
              <div className="row-pair">
                <CitySuggestField label="Ville" value={d.ville} onChange={v => set('ville', v)} suggestAction="suggest_city" style={{flex:1}}/>
                <CountryAutocomplete label="Pays résidence" value={d.pays_residence} onChange={v => set('pays_residence', v)} style={{flex:1}}/>
              </div>
              {/* L5 Date naissance / Nationalité */}
              <div className="row-pair">
                <DateMaskField label="Date de naissance" value={d.date_naissance} onChange={v => set('date_naissance', v)} style={{flex:1}}/>
                <CountryAutocomplete label="Nationalité" value={d.nationalite} onChange={v => set('nationalite', v)} style={{flex:1}}/>
              </div>
            </>
          ) : (
            <>
              {/* Société : L1 Raison sociale / Forme juridique */}
              <div className="row-pair">
                <Field label="Raison sociale" value={d.societe_nom} onChange={v => set('societe_nom', v)} style={{flex:2}}/>
                <Select label="Forme juridique" value={d.forme_juridique} onChange={v => set('forme_juridique', v)} options={FORMES_JURIDIQUES} style={{flex:1}}/>
              </div>
              {/* L2 SIRET/ICE / Représentant */}
              <div className="row-pair">
                <Field label="SIRET / ICE" value={d.siret} onChange={v => set('siret', v)} style={{flex:1}}/>
                <Field label="Représentant" value={d.representant} onChange={v => set('representant', v)} style={{flex:1}}/>
              </div>
              {/* L3 Tel / Email multi */}
              <TelephoneMulti value={d.tels} onChange={v => set('tels', v)} residenceCountry={d.pays_residence || d.nationalite || ''}/>
              <EmailMulti value={d.emails} onChange={v => set('emails', v)}/>
              {/* L4 Adresse full */}
              <CitySuggestField label="Adresse" value={d.adresse} onChange={v => set('adresse', v)} suggestAction="suggest_address"/>
              {/* L5 Ville / Pays résidence */}
              <div className="row-pair">
                <CitySuggestField label="Ville" value={d.ville} onChange={v => set('ville', v)} suggestAction="suggest_city" style={{flex:1}}/>
                <CountryAutocomplete label="Pays résidence" value={d.pays_residence} onChange={v => set('pays_residence', v)} style={{flex:1}}/>
              </div>
            </>
          )}
          <CustomFieldList sectionKey="client" d={d} set={set}/>
          <button onClick={() => commitAndNext(0)} style={{marginTop:4, padding:'9px 14px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Enregistrer · Section II →</button>

          {/* V18.37 — bouton "Ajouter une casquette" : crée un nouveau dossier avec les mêmes
              coordonnées et un autre profil. Bascule v17.15 en haut Section I conservée. */}
          {editing && editing.id && !String(editing.id).startsWith('tmp-') && (
            <>
              <button type="button" onClick={() => setAddCasquetteOpen(true)}
                style={{width:'100%', padding:'12px 16px', marginTop:16, background:'#FDF8F0', border:'1.5px dashed #8B5E3C', borderRadius:10, color:'#5C3B1E', fontSize:14, fontWeight:600, fontFamily:'inherit', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8}}>
                <IconPlus size={16}/>
                <span>Ajouter une casquette à {d.prenom || d.societe_nom || 'ce client'}</span>
              </button>
              <div style={{fontSize:11.5, color:'#8B7F6E', textAlign:'center', marginTop:6, lineHeight:1.45, fontStyle:'italic'}}>
                Crée un nouveau dossier avec ces mêmes coordonnées et un autre profil (Acheteur, Vendeur, Investisseur…).
              </div>
            </>
          )}
        </Stage>

        </div>
        <div data-stage-anchor="1">
        {activeProfil !== 'Curieux' && <Stage title={STAGES[activeProfil][1]} expanded={expanded[1] || isMatched(1)} onToggle={() => toggleStage(1)} highlighted={isMatched(1)}
               status={stageStatus[1].status} summary={stageStatus[1].summary}>
          <BienForm activeProfil={activeProfil} isInvestisseur={isInvestisseur}
            d={d} set={set} dossierId={editing && editing.id && !String(editing.id).startsWith('tmp-') ? editing.id : null}
            showToast={showToast}/>
          <button onClick={() => commitAndNext(1)} style={{marginTop:4, padding:'9px 14px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Enregistrer · Section III →</button>
        </Stage>}

        {/* V18.36 — Cross-referencing Option A (amorce) : panel manuel sous Section II. */}
        {activeProfil !== 'Curieux' && editing && editing.id && !String(editing.id).startsWith('tmp-') && (
          <CrossRefPanel d={d} dossierId={editing.id}
            showToast={showToast}
            onMatchesUpdate={(matches, searchedAt) => {
              // Update local state d + persiste via commit (auto-save debounce).
              const next = {...d, cross_matches: matches, cross_search_last_at: searchedAt};
              setD(next);
              handleSaveLocal(next);
            }}/>
        )}

        {/* V17.6 Section III : FinancementForm pour Acheteur/Investisseur, fields legacy pour Vendeur/Bailleur/Locataire, masqué pour Curieux. */}
        </div>
        <div data-stage-anchor="2">
        {activeProfil !== 'Curieux' && <Stage title={STAGES[activeProfil][2]} expanded={expanded[2] || isMatched(2)} onToggle={() => toggleStage(2)} highlighted={isMatched(2)}
               status={stageStatus[2].status} summary={stageStatus[2].summary}>
          {(activeProfil === 'Acheteur' || activeProfil === 'Investisseur') ? (
            <FinancementForm activeProfil={activeProfil} d={d} set={set}
              dossierId={editing && editing.id && !String(editing.id).startsWith('tmp-') ? editing.id : null}
              showToast={showToast}/>
          ) : (
            <>
              {activeProfil === 'Vendeur' && (
                <>
                  <Field label="Prix affiché" type="number" value={d.prix_affiche} onChange={v => set('prix_affiche', v)}/>
                  <Field label="Prix plancher (confidentiel)" type="number" value={d.prix_plancher} onChange={v => set('prix_plancher', v)}/>
                </>
              )}
              {activeProfil === 'Locataire' && (
                <>
                  <Field label="Loyer max" type="number" value={d.loyer_max} onChange={v => set('loyer_max', v)}/>
                  <Field label="Garants" value={d.garants} onChange={v => set('garants', v)}/>
                </>
              )}
              {activeProfil === 'Bailleur' && (
                <>
                  <Field label="Loyer demandé" type="number" value={d.loyer_demande} onChange={v => set('loyer_demande', v)}/>
                  <Field label="Loyer plancher (confidentiel)" type="number" value={d.loyer_plancher} onChange={v => set('loyer_plancher', v)}/>
                  <Field label="Charges" type="number" value={d.charges} onChange={v => set('charges', v)}/>
                  <Field label="Dépôt de garantie" type="number" value={d.depot} onChange={v => set('depot', v)}/>
                </>
              )}
            </>
          )}
          <CustomFieldList sectionKey="financement" d={d} set={set}/>
          <button onClick={() => commitAndNext(2)} style={{marginTop:4, padding:'9px 14px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Enregistrer · Section IV →</button>
        </Stage>}

        </div>
        <div data-stage-anchor="3">
        <Stage title={STAGES[activeProfil][3] || 'IV. Suivi & notes'} expanded={expanded[3] || isMatched(3)} onToggle={() => toggleStage(3)} highlighted={isMatched(3)}
               status={stageStatus[3].status} summary={stageStatus[3].summary}>
          {/* V18.1 — Module Suivi (4 cards : prochain RDV, todos, agenda, journal). */}
          <SuiviPanel
            clientId={editing && editing.id && !String(editing.id).startsWith('tmp-') ? editing.id : null}
            defaultLocation={[(d.bien && d.bien.quartier) || '', (d.bien && d.bien.ville) || d.ville || ''].filter(Boolean).join(', ')}
            showToast={showToast}/>
          <div style={{height:1, background:'#EDE6DC', margin:'14px 0 12px'}}/>
          <div style={{fontSize:11, fontWeight:700, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:.6, marginBottom:8}}>📝 Préférences contact (legacy)</div>
          <div style={{marginBottom:10}}>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>Notes</label>
            <textarea value={d.notes || ''} onChange={e => set('notes', e.target.value)}
              style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018',
                      minHeight:80, border:'1.5px solid ' + (d.notes ? '#BBA88B' : '#E8DDD0'), background: d.notes ? '#FFFCF5' : '#FDFAF7', resize:'vertical'}}/>
          </div>
          <Select label="Langue préférée" value={d.langue} onChange={v => set('langue', v)} options={['FR','EN','AR','ES','IT','PT','DE']}/>
          <div style={{fontSize:11, color:'#8B7F6E', textTransform:'uppercase', fontWeight:700, marginTop:6, marginBottom:4}}>Canal privilégié</div>
          <div style={{display:'flex', gap:6, marginBottom:10}}>
            {['WhatsApp','Email','Téléphone'].map(canal => (
              <button key={canal} onClick={() => set('canal', canal)}
                style={{flex:1, padding:'7px 10px', borderRadius:8, border:'1.5px solid ' + (d.canal === canal ? '#8B5E3C' : '#E8DDD0'),
                        background: d.canal === canal ? '#FFF3EC' : '#FDFAF7', color: d.canal === canal ? '#8B5E3C' : '#8B7F6E',

        </Stage>
        </div>

        {/* V18.17 — boutons dédiés pour staged : Enregistrer dans mes dossiers + Supprimer téléchargement. */}
        {isStaged ? (
          <div style={{display:'flex', flexDirection:'column', gap:8, marginTop:12, marginBottom:24}}>
            <button onClick={async () => {
              // Commit pending (s'assure que tout est persisté) puis promote.
              await Promise.resolve(commit('_touch', Date.now()));
              await new Promise(r => setTimeout(r, 200));
              promoteStaged && promoteStaged(editing.id);
            }}
              style={{width:'100%', padding:'14px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'inherit'}}>
              ✓ Enregistrer dans mes dossiers
            </button>
            <button onClick={() => deleteStaged && deleteStaged(editing.id)}
              style={{width:'100%', padding:'10px', background:'#FDFAF7', color:'#C04B20', border:'1.5px solid #E8DDD0', borderRadius:10, fontWeight:600, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>
              🗑 Supprimer ce téléchargement
            </button>
          </div>
        ) : (
          /* V18.47 — Bouton "Publier sur ocre.immo" uniquement pour Vendeur/Bailleur, avant
             le footer Enregistrer/Archiver/Supprimer. */
          <>
          {['Vendeur','Bailleur'].includes(activeProfil) && editing && editing.id && (
            <PublishButton dossier={d} dossierId={editing.id} disabled={!!d.is_draft}
              onOpen={() => setPublishOpen(true)} showToast={showToast}/>
          )}
          <div style={{position:'sticky', bottom:0, left:0, right:0, zIndex:5, display:'flex', gap:8, alignItems:'center', padding:'12px 4px', background:'#fff', borderTop:'1px solid #E0CDAE', marginTop:12, marginBottom:8}}>
            <button onClick={() => { commit('_touch', Date.now()); showToast && showToast('Enregistré'); }}
              style={{flex:1, padding:'14px', background:'#8B5E3C', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:15, cursor:'pointer', fontFamily:'inherit'}}>
              Enregistrer
            </button>
            <button onClick={() => commit('archived', !d.archived)}
              title={d.archived ? 'Désarchiver' : 'Archiver'}
              style={{flexShrink:0, width: smallScreen ? 44 : 'auto', height: smallScreen ? 44 : 'auto', padding: smallScreen ? 0 : '10px 14px', background:'#fff', color:'#8B5E3C', border:'1.5px solid #C9B79A', borderRadius:10, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap: smallScreen ? 0 : 6, fontSize:13, fontWeight:600}}>
              <span style={{fontSize:16, lineHeight:1}}>📦</span>
              {!smallScreen && <span>{d.archived ? 'Désarchiver' : 'Archiver'}</span>}
            </button>
            {editing && editing.id && (
              <button onClick={() => handleDelete(editing.id)}
                title="Supprimer ce dossier"
                style={{flexShrink:0, width: smallScreen ? 44 : 'auto', height: smallScreen ? 44 : 'auto', padding: smallScreen ? 0 : '10px 14px', background:'#fff', color:'#D64545', border:'1.5px solid #D64545', borderRadius:10, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap: smallScreen ? 0 : 6, fontSize:13, fontWeight:600}}>
                <span style={{fontSize:16, lineHeight:1}}>🗑</span>
                {!smallScreen && <span>Supprimer</span>}
              </button>
            )}
          </div>
          {publishOpen && (
            <PublishPreviewModal dossierId={editing && editing.id}
              onClose={() => setPublishOpen(false)}
              onPublished={(res) => { setPublishOpen(false); setPublishSuccess(res); commit('_touch', Date.now()); }}
              showToast={showToast}/>
          )}
          {publishSuccess && (
            <PublishSuccessModal result={publishSuccess} onClose={() => setPublishSuccess(null)}/>
          )}
          </>
        )}
      </div>

      {toast && <Toast msg={toast}/>}
      {shareOpen && <ShareMenu dossierId={editing && editing.id} dossierName={dossierName} onClose={() => setShareOpen(false)} showToast={showToast}/>}
      {addCasquetteOpen && (
        <AddCasquetteModal
          sourceDossier={d} sourceId={editing && editing.id}
          clients={clients} currentProfil={activeProfil}
          onClose={() => setAddCasquetteOpen(false)}
          onCreated={(newClient) => {
            setAddCasquetteOpen(false);
            showToast && showToast('✓ Casquette ' + newClient.projet + ' créée');
            // Navigate vers le nouveau dossier.
            if (openExistingDossier) openExistingDossier(newClient);
          }}/>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
