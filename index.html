#root{height:100%}
::-webkit-scrollbar{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* V17.4 UX v3 : densité mobile — labels, cartes, tuiles, chips. */
label.ocre-lbl{display:block;font-size:11px;font-weight:600;color:#8B7F6E;margin-bottom:4px;text-transform:uppercase;letter-spacing:1.2px}
input, select, textarea, button { font-size:13px }

/* V17.4 UX v3 : style sélection unifié — .state-selected partout (chips profil, tuiles pays/type/équipements, check-rows). */
.state-default{background:#FFF;border:1.5px solid #EDE1CC;color:#2A2018;font-weight:500;transition:all .15s}
.state-selected{background:#FBF1E4 !important;border:2px solid #B26D3A !important;color:#8B4E22 !important;font-weight:600 !important;padding-top:calc(var(--ocre-pad-y,7px) - 1px) !important;padding-bottom:calc(var(--ocre-pad-y,7px) - 1px) !important;padding-left:calc(var(--ocre-pad-x,10px) - 1px) !important;padding-right:calc(var(--ocre-pad-x,10px) - 1px) !important}

/* V17.1 fix-ux-5 : paires 50/50 stackent en mobile portrait < 500px. */
.row-pair{display:flex;gap:6px}
@media (max-width: 499px){
  .row-pair{flex-direction:column;gap:0}
  .row-pair > *{flex:1 1 auto !important;width:100%}
}

/* V17.4 UX v3 : chips profil wrap 2 lignes, jamais de scroll horizontal. */

.profil-chip{padding:6px 11px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:12px;min-height:32px;display:inline-flex;align-items:center;justify-content:center;--ocre-pad-y:6px;--ocre-pad-x:11px}

/* V17.4 UX v3 : tuiles pays / type — grille 1fr 1fr gap 6px. */
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tile-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ocre-tile{padding:8px 10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;min-height:42px;display:flex;align-items:center;justify-content:center;gap:6px;text-align:center;--ocre-pad-y:8px;--ocre-pad-x:10px}

/* V17.4 UX v3 : check-row binaire (Piscine, Ascenseur). */

.check-row input[type=checkbox]{display:none}
.check-row .mark{width:16px;height:16px;border-radius:4px;border:1.5px solid #EDE1CC;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:transparent;background:#FFF;flex-shrink:0}
.check-row.state-selected .mark{background:#B26D3A;border-color:#B26D3A;color:#FFF}

function Field({label, value, onChange, type='text', placeholder='', style={}}) {
  const filled = (value !== undefined && value !== null && String(value).trim() !== '');
  // V17.1 fix-ux-1 : ajout box-sizing:border-box → plus d'overflow iOS sur inputs avec padding.
  const base = {width:'100%', boxSizing:'border-box', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018'};

// V17.1 — DateMaskField : saisie masquée JJ/MM/AAAA avec auto-advance.
// Stockage back ISO YYYY-MM-DD, affichage front DD/MM/YYYY.
function DateMaskField({label, value, onChange, style={}}) {
  // value en ISO YYYY-MM-DD → display DD/MM/YYYY
  const toDisplay = (iso) => {
    if (!iso) return '';
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
    if (m) return `${m[3]}/${m[2]}/${m[1]}`;
    return iso;
  };
  const [display, setDisplay] = React.useState(toDisplay(value));
  React.useEffect(() => { setDisplay(toDisplay(value)); }, [value]);

  const filled = display && display.length >= 10;
  const base = {width:'100%', boxSizing:'border-box', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018', letterSpacing:'1px'};

  function handle(e) {
    const digits = e.target.value.replace(/\D/g, '').slice(0, 8);
    let out = '';
    if (digits.length <= 2) out = digits;
    else if (digits.length <= 4) out = digits.slice(0,2) + '/' + digits.slice(2);
    else out = digits.slice(0,2) + '/' + digits.slice(2,4) + '/' + digits.slice(4);
    setDisplay(out);
    // Si 8 chiffres saisis → valider + pousser ISO au parent.
    if (digits.length === 8) {
      const dd = digits.slice(0,2), mm = digits.slice(2,4), yyyy = digits.slice(4,8);
      const iso = `${yyyy}-${mm}-${dd}`;
      onChange(iso);
    } else if (digits.length === 0) {
      onChange('');
    }
  }

  return (
    <div style={{marginBottom:10, minWidth:0, ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <input type="text" value={display} onChange={handle}
        placeholder="JJ/MM/AAAA" inputMode="numeric" pattern="[0-9/]*" maxLength={10}
        autoComplete="off" autoCapitalize="off" autoCorrect="off" spellCheck="false"
        style={{...base, ...(filled ? FIELD_FILLED : FIELD_EMPTY)}}/>
    </div>
  );
}
// V17.1 — CountryAutocomplete : input text + suggestions filtrées accent-insensitive.
function normalizeAccent(s) {
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}
function CountryAutocomplete({label, value, onChange, style={}, placeholder='Tape un pays…'}) {
  const allOpts = PAYS.map(p => ({code: p.c, flag: p.f, name: p.n}));
  const selected = allOpts.find(o => o.code === value);
  const [display, setDisplay] = React.useState(selected ? (selected.flag + ' ' + selected.name) : '');
  const [open, setOpen] = React.useState(false);
  const [filtered, setFiltered] = React.useState(allOpts);
  React.useEffect(() => {
    const s = allOpts.find(o => o.code === value);
    setDisplay(s ? (s.flag + ' ' + s.name) : '');
  }, [value]);

  const filled = !!selected;
  const base = {width:'100%', boxSizing:'border-box', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018'};

  function handleChange(e) {
    const raw = e.target.value;
    setDisplay(raw);
    setOpen(true);
    const n = normalizeAccent(raw);
    const f = n ? allOpts.filter(o => normalizeAccent(o.name).includes(n) || o.code.toLowerCase().startsWith(n)) : allOpts;
    setFiltered(f);
    // Si texte vidé complètement → reset value
    if (!raw.trim()) onChange('');
  }
  function pick(o) {
    onChange(o.code);
    setDisplay(o.flag + ' ' + o.name);
    setOpen(false);
  }
  function handleBlur() {
    // Validation sortie de champ : si display ne matche pas un pays, restore selected ou vide.
    setTimeout(() => {
      setOpen(false);
      const match = allOpts.find(o => normalizeAccent(o.name) === normalizeAccent(display.replace(/^[^A-Za-zÀ-ÿ]+/, '').trim()));
      if (match) { onChange(match.code); setDisplay(match.flag + ' ' + match.name); }
      else if (!value) setDisplay('');
      else { const s = allOpts.find(o => o.code === value); setDisplay(s ? (s.flag + ' ' + s.name) : ''); }
    }, 150);
  }

  return (
    <div style={{marginBottom:10, minWidth:0, position:'relative', ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <input type="text" value={display} onChange={handleChange} onFocus={() => setOpen(true)} onBlur={handleBlur}
        placeholder={placeholder} autoComplete="off" autoCapitalize="off" autoCorrect="off" spellCheck="false"
        style={{...base, ...(filled ? FIELD_FILLED : FIELD_EMPTY)}}/>
      {open && (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:240, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:100, marginTop:2}}>
          {filtered.length === 0 ? (
            <div style={{padding:'10px 12px', fontSize:13, color:'#8B7F6E'}}>Aucun pays trouvé</div>
          ) : filtered.map(o => (
            <div key={o.code} onMouseDown={() => pick(o)}
              style={{padding:'10px 12px', fontSize:14, cursor:'pointer', borderBottom:'1px solid #F4EEE6'}}>
              {o.flag} {o.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// V17.1 fix-ux-2 — PhoneField : indicatif pays + masque local + stockage E.164.
const DIAL_CODES = [
  {c:'FR', f:'🇫🇷', d:'33'},{c:'MA', f:'🇲🇦', d:'212'},{c:'BE', f:'🇧🇪', d:'32'},
  {c:'CH', f:'🇨🇭', d:'41'},{c:'LU', f:'🇱🇺', d:'352'},{c:'ES', f:'🇪🇸', d:'34'},
  {c:'IT', f:'🇮🇹', d:'39'},{c:'PT', f:'🇵🇹', d:'351'},{c:'DE', f:'🇩🇪', d:'49'},
  {c:'GB', f:'🇬🇧', d:'44'},{c:'US', f:'🇺🇸', d:'1'},{c:'CA', f:'🇨🇦', d:'1'},
  {c:'AE', f:'🇦🇪', d:'971'},{c:'SA', f:'🇸🇦', d:'966'},{c:'QA', f:'🇶🇦', d:'974'},
  {c:'SG', f:'🇸🇬', d:'65'},{c:'HK', f:'🇭🇰', d:'852'},{c:'JP', f:'🇯🇵', d:'81'},
  {c:'TH', f:'🇹🇭', d:'66'},
];
function formatLocal(digits, dial) {
  // FR / dial 33 : "6 12 34 56 78"
  if (dial === '33' && digits.length > 0) {
    return digits.replace(/(\d)(\d{2})?(\d{2})?(\d{2})?(\d{2})?/, (_,a,b,c,d,e) => [a,b,c,d,e].filter(Boolean).join(' '));
  }
  // US/CA dial 1 : "(555) 123-4567"
  if (dial === '1' && digits.length > 0) {
    if (digits.length <= 3) return '(' + digits;
    if (digits.length <= 6) return '(' + digits.slice(0,3) + ') ' + digits.slice(3);
    return '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6,10);
  }
  // Default : groupes de 2
  return digits.replace(/(\d{2})/g, '$1 ').trim();
}
function PhoneField({label, value, onChange, residenceCountry='', style={}}) {
  // value en E.164 "+33612345678" → split dial/local
  const parseE164 = (v) => {
    if (!v) return {dial:'', local:''};
    const m = /^\+(\d{1,3})(\d+)$/.exec(v.replace(/\s/g,''));
    if (!m) return {dial:'', local: v.replace(/\D/g,'')};
    // Guess dial from DIAL_CODES — prefer longest match
    for (const len of [3,2,1]) {
      const candidate = m[1] + m[2].slice(0, Math.max(0, 3 - len));
      // simpler: match exact against table
    }
    // Match greediest dial prefix
    const full = m[1] + m[2];
    const sorted = [...DIAL_CODES].sort((a,b) => b.d.length - a.d.length);
    const hit = sorted.find(dc => full.startsWith(dc.d));
    if (hit) return {dial: hit.d, local: full.slice(hit.d.length)};
    return {dial: m[1], local: m[2]};
  };
  const initial = parseE164(value);
  const defaultDial = initial.dial
    || (DIAL_CODES.find(dc => dc.c === residenceCountry) || {}).d
    || '33';
  const [dial, setDial] = React.useState(defaultDial);
  const [localDigits, setLocalDigits] = React.useState(initial.local);
  React.useEffect(() => {
    const p = parseE164(value);
    if (p.dial) setDial(p.dial);
    setLocalDigits(p.local);
  }, [value]);

  const warn = localDigits.length > 0 && localDigits.length < 8;
  const filled = localDigits.length >= 8;
  const [focused, setFocused] = React.useState(false);
  const [pickerOpen, setPickerOpen] = React.useState(false);

  function pushE164(d, l) {
    const clean = l.replace(/\D/g, '').replace(/^0+/, '');
    if (!clean) onChange('');
    else onChange('+' + d + clean);
  }
  function pickDial(newDial) {
    setDial(newDial);
    setPickerOpen(false);
    pushE164(newDial, localDigits);
  }
  function handleLocal(e) {
    const raw = e.target.value.replace(/\D/g, '').slice(0, 15);
    setLocalDigits(raw);
    pushE164(dial, raw);
  }
  const displayLocal = formatLocal(localDigits, dial);
  const dc = DIAL_CODES.find(x => x.d === dial) || DIAL_CODES[0];

  // V17.1 fix-ux-5 : cadre unifié unique (drapeau + numéro), bordure bascule au focus.
  let stateClass = 'is-empty';
  if (filled) stateClass = 'is-filled';
  else if (warn) stateClass = 'is-warn';
  if (focused) stateClass += ' is-focus';

  return (
    <div style={{marginBottom:10, minWidth:0, position:'relative', ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <div className={'phone-unified ' + stateClass}>
        <button type="button" className="dial-btn" onClick={() => setPickerOpen(o => !o)}
          aria-label="Choisir le pays">
          <span>{dc.f}</span>
          <span>+{dial}</span>
          <span style={{fontSize:9, opacity:.6}}>▾</span>
        </button>
        <div className="divider"/>
        <input type="tel" inputMode="tel" autoComplete="tel" value={displayLocal} onChange={handleLocal}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          placeholder={dial === '33' ? '6 12 34 56 78' : (dial === '1' ? '(555) 123-4567' : '…')}/>
      </div>
      {pickerOpen && (
        <div className="phone-popover" onMouseDown={e => e.preventDefault()}>
          {DIAL_CODES.map(c => (
            <div key={c.c + c.d} className="item" onClick={() => pickDial(c.d)}>
              <span>{c.f}</span><span style={{fontWeight:600}}>+{c.d}</span>
            </div>
          ))}
        </div>
      )}
      {warn && !focused && <div style={{fontSize:11, color:'#D4A437', marginTop:2}}>Numéro trop court</div>}
    </div>
  );
}

// V17.1 fix-ux-2 — EmailField : validation visuelle temps réel + icône.
function EmailField({label, value, onChange, style={}}) {

// V17.1 fix-ux-3 — CitySuggestField : autocomplete basé sur saisies antérieures de l'utilisateur.
function CitySuggestField({label, value, onChange, suggestAction, style={}, placeholder=''}) {
  const [open, setOpen] = React.useState(false);
  const [items, setItems] = React.useState([]);
  const cacheRef = React.useRef({ts:0, data:[], q:''});

  async function fetchSuggestions(q) {
    const now = Date.now();
    if (cacheRef.current.q === q && now - cacheRef.current.ts < 60000) {
      setItems(cacheRef.current.data);
      return;
    }
    try {
      const token = localStorage.getItem('ocre_token');
      const r = await fetch(API + '/clients.php?action=' + suggestAction + '&q=' + encodeURIComponent(q) + '&limit=8',
        {headers: {'X-Session-Token': token || ''}});
      const d = await r.json();
      const arr = (d && d.ok && Array.isArray(d.items)) ? d.items : [];
      cacheRef.current = {ts: now, data: arr, q};
      setItems(arr);
    } catch (e) { setItems([]); }
  }

  function handleChange(e) {
    onChange(e.target.value);
    setOpen(true);
    fetchSuggestions(e.target.value.trim());
  }
  function handleFocus() {
    setOpen(true);
    fetchSuggestions(''); // derniers 5-8 saisis
  }
  function pick(v) { onChange(v); setOpen(false); }

  const filled = (value || '').trim() !== '';
  const base = {width:'100%', boxSizing:'border-box', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018'};

  return (
    <div style={{marginBottom:10, minWidth:0, position:'relative', ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <input type="text" value={value || ''} onChange={handleChange} onFocus={handleFocus} onBlur={() => setTimeout(() => setOpen(false), 150)}
        placeholder={placeholder} autoComplete="off"
        style={{...base, ...(filled ? FIELD_FILLED : FIELD_EMPTY)}}/>
      {open && items.length > 0 && (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:200, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:100, marginTop:2}}>
          {items.map((it, i) => (
            <div key={i} onMouseDown={() => pick(it)} style={{padding:'8px 12px', fontSize:14, cursor:'pointer', borderBottom:'1px solid #F4EEE6'}}>{it}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// V17.7 — format tel E.164 → display lisible pour ClientRow.
function formatTelPretty(e164) {
  if (!e164) return '';
  const m = /^\+(\d{1,3})(\d+)$/.exec(String(e164).replace(/\s/g, ''));
  if (!m) return e164;
  const sorted = [...DIAL_CODES].sort((a, b) => b.d.length - a.d.length);
  const full = m[1] + m[2];
  const hit = sorted.find(dc => full.startsWith(dc.d));
  if (!hit) return '+' + m[1] + ' ' + m[2];
  const local = full.slice(hit.d.length);
  return '+' + hit.d + ' ' + formatLocal(local, hit.d);
}

          <button type="button" onClick={() => removeItem(i)}

            style={{flex:'0 0 auto', width:28, height:28, borderRadius:14, border:'1px solid #E8DDD0', background:'#fff', color:'#8B7F6E', cursor:'pointer', fontSize:14, lineHeight:'26px', padding:0}}>×</button>
        </div>
      ))}
      <div style={{display:'flex', justifyContent:'flex-end', marginTop:6}}>
        <button type="button" onClick={addField}
          title="Ajouter un champ libre"
          style={{width:32, height:32, borderRadius:16, border:'1.5px solid #8B5E3C', background:'#FFF3EC', color:'#8B5E3C', cursor:'pointer', fontSize:18, fontWeight:700, lineHeight:'28px', padding:0, boxShadow:'0 1px 3px rgba(139,94,60,.12)'}}>+</button>
      </div>
    </div>
  );
}

// V17.2 Phase 2a — RangeField : fourchette min / max, max vide = "illimité".
function RangeField({label, unit='', minValue, maxValue, onMin, onMax}) {
  const filled = (v) => v !== undefined && v !== null && String(v).trim() !== '';
  const base = {width:'100%', boxSizing:'border-box', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018'};
  return (
    <div style={{marginBottom:10}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}{unit ? ' (' + unit + ')' : ''}</label>}
      <div style={{display:'flex', gap:8, alignItems:'stretch'}}>
        <input type="number" inputMode="decimal" value={minValue ?? ''} placeholder="min"
          onChange={e => onMin(e.target.value)}
          style={{...base, flex:1, ...(filled(minValue) ? FIELD_FILLED : FIELD_EMPTY)}}/>
        <div style={{display:'flex', alignItems:'center', color:'#8B7F6E', fontSize:13, padding:'0 2px'}}>→</div>
        <input type="number" inputMode="decimal" value={maxValue ?? ''} placeholder="max (vide = illimité)"
          onChange={e => onMax(e.target.value)}
          style={{...base, flex:1, ...(filled(maxValue) ? FIELD_FILLED : FIELD_EMPTY)}}/>
      </div>
    </div>
  );
}

// V17.2 Phase 2a — PriorityBoolField : 4 priorités colorées (Acheteur/Locataire).
function PriorityBoolField({label, value, onChange}) {
  return (
    <div style={{marginBottom:10}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
        {PRIORITES.map(p => {
          const active = (value === p.k) || (!value && p.k === 'indifferent');
          return (
            <button key={p.k} type="button" onClick={() => onChange(p.k)}
              style={{flex:'1 1 90px', padding:'7px 8px', borderRadius:8,
                      border:'1.5px solid ' + (active ? p.c : '#E8DDD0'),
                      background: active ? p.bg : '#FDFAF7',
                      color: active ? p.c : '#8B7F6E',
                      fontWeight: active ? 700 : 500, fontSize:11, cursor:'pointer', fontFamily:'inherit'}}>{p.l}</button>
          );
        })}

    </div>

}

// V17.4 UX v3 — MultiSelectChips : tuiles multi utilisant .state-selected unifié.
function MultiSelectChips({label, value, options, onChange}) {
  const v = Array.isArray(value) ? value : [];
  function toggle(o) {
    const next = v.includes(o) ? v.filter(x => x !== o) : [...v, o];
    onChange(next);
  }
  return (
    <div style={{marginBottom:10}}>
      {label && <label className="ocre-lbl">{label}</label>}
      <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
        {options.map(o => {
          const on = v.includes(o);
          return (
            <button key={o} type="button" onClick={() => toggle(o)}
              className={on ? 'state-selected' : 'state-default'}
              style={{padding:'7px 11px', borderRadius:999, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>{o}</button>
          );
        })}
      </div>
    </div>
  );
}

// V17.4 UX v3 — BoolChip check-row avec ✓ (Piscine, Ascenseur…).
function BoolChip({label, value, onChange}) {
  return (
    <label className={'check-row ' + (value ? 'state-selected' : 'state-default')}>
      <input type="checkbox" checked={!!value} onChange={e => onChange(e.target.checked)}/>
      <span className="mark">✓</span>
      {label}
    </label>
  );
}

// V17.2 Phase 2a — PhotoUpload : galerie + upload /api/upload.php, max 30, JPEG/PNG/WebP.
function PhotoUpload({dossierId, showToast}) {
  const [photos, setPhotos] = React.useState([]);
  const [uploading, setUploading] = React.useState(false);
  const inputRef = React.useRef(null);

  const token = () => localStorage.getItem('ocre_token') || '';

  React.useEffect(() => {
    if (!dossierId) return;
    fetch(API + '/upload.php?action=list&dossier_id=' + dossierId, {headers:{'X-Session-Token': token()}})
      .then(r => r.json()).then(d => { if (d && d.ok) setPhotos(d.photos || []); })
      .catch(() => {});
  }, [dossierId]);

  async function uploadFile(f) {
    if (!dossierId) { showToast && showToast('Enregistrez d\'abord le dossier'); return; }
    if (photos.length >= 30) { showToast && showToast('Limite 30 photos'); return; }
    const fd = new FormData();
    fd.append('action', 'upload');
    fd.append('dossier_id', dossierId);
    fd.append('file', f);
    setUploading(true);
    try {
      const r = await fetch(API + '/upload.php?action=upload', {
        method:'POST', headers:{'X-Session-Token': token()}, body: fd,
      });
      const d = await r.json();
      if (d && d.ok && d.photo) setPhotos(prev => [d.photo, ...prev]);
      else showToast && showToast(d && d.error ? d.error : 'Échec upload');
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setUploading(false);
  }
  async function handleFiles(fl) {
    for (const f of fl) await uploadFile(f);
    if (inputRef.current) inputRef.current.value = '';
  }
  async function removePhoto(name) {
    if (!confirm('Supprimer cette photo ?')) return;
    try {
      const r = await fetch(API + '/upload.php?action=delete', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token()},
        body: JSON.stringify({dossier_id: dossierId, name}),
      });
      const d = await r.json();
      if (d && d.ok) setPhotos(prev => prev.filter(p => p.name !== name));
    } catch (e) {}
  }

  return (
    <div style={{marginBottom:10}}>
      <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:6, textTransform:'uppercase', letterSpacing:.4}}>
        Photos {photos.length > 0 && <span style={{color:'#8B5E3C'}}>· {photos.length}/30</span>}
      </label>
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(90px, 1fr))', gap:6, marginBottom:8}}>
        {photos.map(p => (
          <div key={p.name} style={{position:'relative', aspectRatio:'1/1', borderRadius:8, overflow:'hidden', border:'1px solid #E8DDD0'}}>
            <img src={p.url} alt="" style={{width:'100%', height:'100%', objectFit:'cover', display:'block'}}/>
            <button type="button" onClick={() => removePhoto(p.name)}
              style={{position:'absolute', top:4, right:4, width:22, height:22, borderRadius:11, border:'none', background:'rgba(42,32,24,.75)', color:'#fff', fontSize:12, cursor:'pointer', lineHeight:'20px', padding:0}}>×</button>
          </div>
        ))}
        {photos.length < 30 && (
          <button type="button" onClick={() => inputRef.current && inputRef.current.click()} disabled={uploading || !dossierId}
            title={!dossierId ? 'Enregistrez d\'abord le dossier' : ''}
            style={{aspectRatio:'1/1', border:'1.5px dashed #BBA88B', borderRadius:8, background:'#FDFAF7', color:'#8B5E3C', cursor: dossierId ? 'pointer' : 'not-allowed', opacity: dossierId ? 1 : .5, fontSize:24, fontWeight:700}}>
            {uploading ? '…' : '+'}
          </button>
        )}
      </div>
      <input ref={inputRef} type="file" accept="image/jpeg,image/png,image/webp" multiple
        onChange={e => handleFiles(Array.from(e.target.files || []))} style={{display:'none'}}/>
      {!dossierId && <div style={{fontSize:11, color:'#8B7F6E', fontStyle:'italic'}}>Enregistrez le dossier une fois pour activer les photos.</div>}
    </div>
  );
}

// V17.2 Phase 2a — ShareMenu : création lien public, copie, partage natif, révocation.
function ShareMenu({dossierId, dossierName, onClose, showToast}) {
  const [link, setLink] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [expiresDays, setExpiresDays] = React.useState(7);
  const token = () => localStorage.getItem('ocre_token') || '';

  async function createLink() {
    if (!dossierId) { showToast && showToast('Enregistrez d\'abord le dossier'); return; }
    setLoading(true);
    try {
      const r = await fetch(API + '/share.php?action=create_link', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token()},
        body: JSON.stringify({dossier_id: dossierId, expires_days: expiresDays}),
      });
      const d = await r.json();
      if (d && d.ok) setLink(d);
      else showToast && showToast(d && d.error ? d.error : 'Échec');
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setLoading(false);
  }
  async function copy() {
    if (!link) return;
    try { await navigator.clipboard.writeText(link.url); showToast && showToast('Lien copié'); } catch (e) {}
  }
  async function share() {
    if (!link) return;
    if (navigator.share) {
      try { await navigator.share({title:'Ocre Immo · ' + (dossierName || 'Dossier'), text:'Accès lecture seule ' + expiresDays + 'j', url: link.url}); } catch (e) {}
    } else { copy(); }
  }
  async function revoke() {
    if (!link || !confirm('Révoquer ce lien ?')) return;
    try {
      await fetch(API + '/share.php?action=revoke', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token()},
        body: JSON.stringify({token: link.token}),
      });
      setLink(null); showToast && showToast('Lien révoqué');
    } catch (e) {}
  }

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(42,32,24,.45)', zIndex:200, display:'flex', alignItems:'flex-end', justifyContent:'center'}} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{background:'#fff', width:'100%', maxWidth:460, borderRadius:'16px 16px 0 0', padding:20, paddingBottom:30}}>
        <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:20, fontWeight:700, color:'#8B5E3C', marginBottom:12}}>Partager le dossier</div>
        <div style={{fontSize:12, color:'#8B7F6E', marginBottom:14}}>Lien public en <b>lecture seule</b>, expire après {expiresDays} jour{expiresDays > 1 ? 's' : ''}, révocable à tout moment.</div>
        {!link ? (
          <>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase'}}>Durée</label>
            <div style={{display:'flex', gap:6, marginBottom:14}}>
              {[1, 7, 30, 90].map(n => (
                <button key={n} type="button" onClick={() => setExpiresDays(n)}
                  style={{flex:1, padding:'8px', borderRadius:8, border:'1.5px solid ' + (expiresDays === n ? '#8B5E3C' : '#E8DDD0'),
                          background: expiresDays === n ? '#FFF3EC' : '#FDFAF7', color: expiresDays === n ? '#8B5E3C' : '#8B7F6E',
                          fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>{n}j</button>
              ))}
            </div>
            <button type="button" onClick={createLink} disabled={loading || !dossierId}
              style={{width:'100%', padding:'13px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor: dossierId ? 'pointer' : 'not-allowed', opacity: dossierId ? 1 : .5, fontFamily:'inherit'}}>
              {loading ? 'Création…' : 'Générer le lien'}
            </button>
            {/* V17.3 Phase 2b : export PDF (print-to-PDF navigateur) */}
            <button type="button" onClick={() => {
                const t = localStorage.getItem('ocre_token') || '';
                window.open(API + '/export.php?action=pdf&dossier_id=' + dossierId + '&token=' + encodeURIComponent(t), '_blank');
              }} disabled={!dossierId}
              style={{width:'100%', padding:'11px', marginTop:8, background:'#FFF3EC', color:'#8B5E3C', border:'1.5px solid #BBA88B', borderRadius:10, fontWeight:700, fontSize:13, cursor: dossierId ? 'pointer' : 'not-allowed', opacity: dossierId ? 1 : .5, fontFamily:'inherit'}}>
              📄 Exporter en PDF
            </button>
          </>
        ) : (
          <>
            <div style={{background:'#FDFAF7', border:'1.5px solid #BBA88B', borderRadius:8, padding:10, fontSize:12, wordBreak:'break-all', marginBottom:10, color:'#2A2018'}}>{link.url}</div>
            <div style={{display:'flex', gap:6, marginBottom:10}}>
              <button type="button" onClick={copy} style={{flex:1, padding:'11px', background:'#FFF3EC', color:'#8B5E3C', border:'1.5px solid #BBA88B', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>Copier</button>
              <button type="button" onClick={share} style={{flex:1, padding:'11px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>Partager…</button>
            </div>
            <button type="button" onClick={revoke} style={{width:'100%', padding:'9px', background:'#fff', color:'#C04B20', border:'1.5px solid #E8DDD0', borderRadius:8, fontWeight:600, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>Révoquer ce lien</button>
          </>
        )}
        <button type="button" onClick={onClose} style={{width:'100%', padding:'9px', marginTop:10, background:'transparent', color:'#8B7F6E', border:'none', fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>Fermer</button>
      </div>
    </div>
  );
}

// V17.4 UX v3 — PickerDropdown : sélecteur custom avec recherche (pattern CountryAutocomplete).
function PickerDropdown({label, value, displayValue, options, onChange, placeholder='Choisir…', disabled=false}) {
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState('');
  const ref = React.useRef(null);
  React.useEffect(() => {
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setQuery(''); } }
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  const filtered = query.trim()
    ? options.filter(o => normalizeAccent(o.l).includes(normalizeAccent(query)))
    : options;
  return (
    <div ref={ref} style={{position:'relative'}}>
      {label && <label className="ocre-lbl">{label}</label>}
      <button type="button" onClick={() => !disabled && setOpen(!open)} disabled={disabled}
        className={'ocre-tile ' + (value ? 'state-selected' : 'state-default')}
        style={{width:'100%', justifyContent:'space-between', padding:'10px 12px', opacity: disabled ? .5 : 1, cursor: disabled ? 'not-allowed' : 'pointer'}}>
        <span>{displayValue || placeholder}</span>
        <span style={{fontSize:10, opacity:.6}}>▾</span>
      </button>
      {open && !disabled && (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:260, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:50, marginTop:2}}>
          {options.length > 5 && (
            <input type="text" value={query} onChange={e => setQuery(e.target.value)}
              placeholder="Rechercher…" autoFocus autoCapitalize="off" autoCorrect="off"
              style={{width:'100%', padding:'8px 11px', border:'none', borderBottom:'1px solid #F4EEE6', outline:'none', fontSize:13, fontFamily:'inherit'}}/>
          )}
          {filtered.length === 0 ? (
            <div style={{padding:'10px 12px', fontSize:13, color:'#8B7F6E'}}>Aucun résultat</div>
          ) : filtered.map(o => (
            <div key={o.k} onMouseDown={() => { onChange(o.k); setOpen(false); setQuery(''); }}
              style={{padding:'10px 12px', fontSize:13, cursor:'pointer', borderBottom:'1px solid #F4EEE6', background: o.k === value ? '#FBF1E4' : '#fff'}}>
              {o.l}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// V17.2 Phase 2a — BienForm : Section II "Le bien", country-first × type-driven.
function BienForm({activeProfil, isInvestisseur, d, set, dossierId, showToast}) {
  const bien = d.bien || {};
  function setB(k, v) { set('bien', {...bien, [k]: v}); }
  // V17.4 UX v3 : Acheteur/Locataire/Investisseur → mode "recherche" (fourchettes + priorités).
  //               Vendeur/Bailleur → mode "description" (valeurs précises + bools).
  const askingMode = ['Acheteur','Locataire','Investisseur'].includes(activeProfil);
  const paysDef = PAYS_BIEN.find(p => p.c === bien.pays);
  const typesDispo = paysDef ? paysDef.types : [];

  return (
    <>
      {/* V17.4 UX v3 : ligne 1 — Pays + Type en grid 2-col avec dropdowns custom. */}
      <div className="tile-grid" style={{marginBottom:10}}>
        <PickerDropdown label="Pays du bien"
          value={bien.pays}
          displayValue={bien.pays ? ((PAYS_BIEN.find(p => p.c === bien.pays) || {}).f + ' ' + (PAYS_BIEN.find(p => p.c === bien.pays) || {}).n) : ''}
          options={PAYS_BIEN.map(p => ({k: p.c, l: p.f + ' ' + p.n}))}
          onChange={v => setB('pays', v)} placeholder="Choisir…"/>
        <PickerDropdown label="Type de bien"
          value={bien.type}
          displayValue={bien.type || ''}
          options={typesDispo.map(t => ({k: t, l: t}))}
          onChange={v => setB('type', v)} placeholder={bien.pays ? 'Choisir…' : 'Choisir un pays'}
          disabled={!bien.pays}/>
      </div>
      {!bien.pays && <div style={{fontSize:12, color:'#8B7F6E', fontStyle:'italic', padding:'2px 0 6px'}}>Choisissez un pays pour voir les types disponibles.</div>}

      {/* 3. Adresse + GPS + Ville (une fois pays+type choisis) */}
      {bien.pays && bien.type && (
        <>
          <CitySuggestField label="Adresse" value={bien.adresse} onChange={v => setB('adresse', v)} suggestAction="suggest_address"/>
          <div className="row-pair">
            <CitySuggestField label="Ville" value={bien.ville} onChange={v => setB('ville', v)} suggestAction="suggest_city" style={{flex:1}}/>
            {bien.pays === 'MA' ? (
              <StaticSuggestField label="Quartier" value={bien.quartier} onChange={v => setB('quartier', v)} suggestions={QUARTIERS_MARRAKECH} placeholder="Palmeraie, Gueliz…" style={{flex:1}}/>
            ) : (
              <Field label="GPS (texte, facultatif)" value={bien.gps} onChange={v => setB('gps', v)} placeholder="ex: -7.623, 33.589" style={{flex:1}}/>
            )}
          </div>
          {bien.pays === 'MA' && <Field label="GPS (texte, facultatif)" value={bien.gps} onChange={v => setB('gps', v)} placeholder="ex: -7.623, 33.589"/>}
          {/* V17.3 Phase 2b : carte interactive (fallback sur champ texte ci-dessus) */}
          <MapPicker bien={bien} setB={setB} showToast={showToast}/>

          {/* 4. Champs spécifiques type */}
          {bien.type === 'Villa' && <VillaFields bien={bien} setB={setB} askingMode={askingMode}/>}
          {bien.type === 'Appartement' && <AppartFields bien={bien} setB={setB} askingMode={askingMode}/>}
          {bien.type === 'Riad' && <RiadFields bien={bien} setB={setB} askingMode={askingMode}/>}
          {bien.type === 'Maison' && <MaisonFields bien={bien} setB={setB} askingMode={askingMode}/>}
          {bien.type === 'Terrain' && <TerrainFields bien={bien} setB={setB} askingMode={askingMode}/>}

          {bien.type === 'Ferme' && <FermeFields bien={bien} setB={setB} askingMode={askingMode}/>}
          {bien.type === 'Bureau / plateau' && <BureauFields bien={bien} setB={setB} askingMode={askingMode}/>}

          {/* 5. Tronc commun (chambres / sdb / parking / extérieur / énergie) — seulement habitable */}

          <div style={{fontSize:11, color:'#8B7F6E', textTransform:'uppercase', fontWeight:700, marginTop:10, marginBottom:6}}>Extérieur</div>
          {askingMode ? (
            <>

              <PriorityBoolField label="Jardin" value={bien.jardin_prio} onChange={v => setB('jardin_prio', v)}/>
              <PriorityBoolField label="Piscine" value={bien.piscine_prio} onChange={v => setB('piscine_prio', v)}/>
              <PriorityBoolField label="Parking / garage" value={bien.parking_prio} onChange={v => setB('parking_prio', v)}/>
            </>
          ) : (

// V17.3 Phase 2b — MapPicker Leaflet + OpenStreetMap. Mode précis (marker) ou zone (cercle).
function MapPicker({bien, setB, showToast}) {
  const mapRef = React.useRef(null);
  const leafletRef = React.useRef({map:null, marker:null, circle:null});
  const [mode, setMode] = React.useState(bien.gps_mode || 'precis');
  const [radius, setRadius] = React.useState(bien.gps_radius ? Number(bien.gps_radius) : 1000);
  const [ready, setReady] = React.useState(typeof window !== 'undefined' && !!window.L);

  React.useEffect(() => {
    let cancelled = false;
    function tryInit() {
      if (cancelled) return;
      if (!window.L) { setTimeout(tryInit, 200); return; }
      setReady(true);
      if (!mapRef.current || leafletRef.current.map) return;
      const L = window.L;
      const lat = Number(bien.gps_lat) || 33.5731;  // Casablanca fallback
      const lng = Number(bien.gps_lng) || -7.5898;
      const map = L.map(mapRef.current).setView([lat, lng], bien.gps_lat ? 14 : 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 19,
      }).addTo(map);
      leafletRef.current.map = map;

      function place(latlng) {
        const {lat, lng} = latlng;
        setB('gps_lat', lat.toFixed(6));
        setB('gps_lng', lng.toFixed(6));
        redraw(lat, lng);
      }
      map.on('click', e => place(e.latlng));

      if (bien.gps_lat && bien.gps_lng) redraw(lat, lng);
    }
    function redraw(lat, lng) {
      const L = window.L;
      const lr = leafletRef.current;
      if (!lr.map) return;
      if (lr.marker) { lr.map.removeLayer(lr.marker); lr.marker = null; }
      if (lr.circle) { lr.map.removeLayer(lr.circle); lr.circle = null; }
      if (mode === 'precis') {
        lr.marker = L.marker([lat, lng]).addTo(lr.map);
      } else {
        lr.circle = L.circle([lat, lng], {radius: radius, color:'#8B5E3C', fillColor:'#8B5E3C', fillOpacity:.2}).addTo(lr.map);
      }
    }
    leafletRef.current._redraw = redraw;
    tryInit();
    return () => { cancelled = true; };
  }, []);

  React.useEffect(() => {
    if (!leafletRef.current._redraw) return;
    const lat = Number(bien.gps_lat), lng = Number(bien.gps_lng);
    if (lat && lng) leafletRef.current._redraw(lat, lng);
    setB('gps_mode', mode);
    setB('gps_radius', mode === 'zone' ? radius : '');
  }, [mode, radius]);

  function useMyLocation() {
    if (!navigator.geolocation) { showToast && showToast('Géolocalisation non supportée'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const {latitude, longitude} = pos.coords;
        setB('gps_lat', latitude.toFixed(6));
        setB('gps_lng', longitude.toFixed(6));
        if (leafletRef.current.map) {
          leafletRef.current.map.setView([latitude, longitude], 15);
          leafletRef.current._redraw(latitude, longitude);
        }
      },
      err => showToast && showToast('Position refusée : ' + (err.message || 'erreur')),
      {enableHighAccuracy:true, timeout:10000}
    );
  }

  if (!ready && typeof window !== 'undefined' && !window.L) {
    return <div style={{fontSize:12, color:'#8B7F6E', fontStyle:'italic', padding:'10px 0'}}>Carte indisponible — utilisez le champ GPS texte ci-dessus.</div>;
  }

  return (
    <div style={{marginTop:6, marginBottom:10}}>
      <div style={{display:'flex', gap:6, marginBottom:6}}>
        <button type="button" onClick={() => setMode('precis')}
          style={{flex:1, padding:'7px 8px', borderRadius:8, border:'1.5px solid ' + (mode === 'precis' ? '#8B5E3C' : '#E8DDD0'),
                  background: mode === 'precis' ? '#FFF3EC' : '#FDFAF7', color: mode === 'precis' ? '#8B5E3C' : '#8B7F6E',
                  fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>📍 Précis</button>
        <button type="button" onClick={() => setMode('zone')}
          style={{flex:1, padding:'7px 8px', borderRadius:8, border:'1.5px solid ' + (mode === 'zone' ? '#8B5E3C' : '#E8DDD0'),
                  background: mode === 'zone' ? '#FFF3EC' : '#FDFAF7', color: mode === 'zone' ? '#8B5E3C' : '#8B7F6E',
                  fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>⭕ Zone</button>
        <button type="button" onClick={useMyLocation}
          style={{padding:'7px 10px', borderRadius:8, border:'1.5px solid #BBA88B', background:'#FFFCF5', color:'#8B5E3C', fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>📱 Ma position</button>
      </div>
      {mode === 'zone' && (
        <div style={{marginBottom:6, display:'flex', alignItems:'center', gap:8}}>
          <label style={{fontSize:11, color:'#8B7F6E', fontWeight:600, textTransform:'uppercase'}}>Rayon</label>
          <input type="range" min="500" max="2000" step="100" value={radius} onChange={e => setRadius(Number(e.target.value))} style={{flex:1}}/>
          <span style={{fontSize:12, color:'#2A2018', fontWeight:700, minWidth:60, textAlign:'right'}}>{radius} m</span>
        </div>
      )}
      <div ref={mapRef} style={{height:260, width:'100%', borderRadius:10, border:'1px solid #EDE6DC', overflow:'hidden'}}/>
      {bien.gps_lat && bien.gps_lng && (
        <div style={{fontSize:11, color:'#8B7F6E', marginTop:4, fontFamily:'monospace'}}>{bien.gps_lat}, {bien.gps_lng}</div>
      )}
    </div>
  );
}

// V17.6 Section III — BanqueSelect : picker avec search + groupes (MA participatives vs classiques).
function BanqueSelect({label, value, onChange, pays}) {
  let groups = [];
  if (pays === 'MA') {
    groups = [
      {g:'Banques participatives', items: BANQUES.MA_participatives},
      {g:'Banques classiques',     items: BANQUES.MA_classiques},
    ];
  } else if (pays === 'FR') {
    groups = [{g:'Banques FR', items: BANQUES.FR}];
  } else if (pays === 'ES') {
    groups = [{g:'Banques ES', items: BANQUES.ES}];
  }
  const flat = groups.flatMap(g => g.items.map(b => ({k:b, l:b, group:g.g})));
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState('');
  const ref = React.useRef(null);
  React.useEffect(() => {
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setQuery(''); } }
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  const filtered = query.trim()
    ? flat.filter(o => normalizeAccent(o.l).includes(normalizeAccent(query)))
    : flat;
  const byGroup = {};
  filtered.forEach(o => { (byGroup[o.group] ||= []).push(o); });
  return (
    <div ref={ref} style={{position:'relative', marginBottom:10}}>
      {label && <label className="ocre-lbl">{label}</label>}
      <button type="button" onClick={() => setOpen(!open)}
        className={'ocre-tile ' + (value ? 'state-selected' : 'state-default')}
        style={{width:'100%', justifyContent:'space-between', padding:'10px 12px'}}>
        <span>{value || 'Choisir une banque…'}</span>
        <span style={{fontSize:10, opacity:.6}}>▾</span>
      </button>
      {open && (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:300, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:50, marginTop:2}}>
          <input type="text" value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Rechercher…" autoFocus autoCapitalize="off" autoCorrect="off"
            style={{width:'100%', padding:'8px 11px', border:'none', borderBottom:'1px solid #F4EEE6', outline:'none', fontSize:13, fontFamily:'inherit'}}/>
          {Object.keys(byGroup).length === 0 ? (
            <div style={{padding:'10px 12px', fontSize:13, color:'#8B7F6E'}}>Aucune banque trouvée</div>
          ) : Object.entries(byGroup).map(([g, items]) => (
            <div key={g}>
              <div style={{padding:'6px 12px', background:'#F4EEE6', fontSize:10, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:1.2, fontWeight:700}}>{g}</div>
              {items.map(o => (
                <div key={o.k} onMouseDown={() => { onChange(o.k); setOpen(false); setQuery(''); }}
                  style={{padding:'10px 12px', fontSize:13, cursor:'pointer', borderBottom:'1px solid #F4EEE6', background: o.k === value ? '#FBF1E4' : '#fff'}}>
                  {o.l}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// V17.6 Section III — DossierTimeline : étapes pays-spécifique, cliquables, dates auto.
function DossierTimeline({steps, value, onChange}) {
  const state = value || {};  // {stepLabel: ISODate} si done
  const doneSet = new Set(Object.keys(state));
  // Current = première étape non-done
  const currentIdx = steps.findIndex(s => !doneSet.has(s));
  return (
    <div style={{marginTop:10, marginBottom:10}}>
      <div className="ocre-lbl" style={{display:'block'}}>Timeline du dossier</div>
      <div style={{display:'flex', flexDirection:'column', gap:4}}>
        {steps.map((s, i) => {
          const isDone = doneSet.has(s);
          const isCurrent = i === currentIdx;
          const color = isDone ? '#3E8B5E' : (isCurrent ? '#B26D3A' : '#C4B5A0');
          const bg = isDone ? '#E8F5EC' : (isCurrent ? '#FBF1E4' : '#FFF');
          const border = isDone ? '1.5px solid #B8DEC4' : (isCurrent ? '2px solid #B26D3A' : '1.5px solid #EDE1CC');
          const icon = isDone ? '✓' : (isCurrent ? '●' : '○');
          const date = isDone && state[s] ? new Date(state[s]).toLocaleDateString('fr-FR') : null;
          function toggle() {
            const next = {...state};
            if (isDone) delete next[s];
            else next[s] = new Date().toISOString();
            onChange(next);
          }
          return (
            <button key={s} type="button" onClick={toggle}
              style={{display:'flex', alignItems:'center', gap:10, padding:'9px 11px', background:bg, border, borderRadius:8, cursor:'pointer', fontFamily:'inherit', textAlign:'left', color:'#2A2018'}}>
              <span style={{width:22, height:22, borderRadius:11, background: isDone ? '#3E8B5E' : (isCurrent ? '#B26D3A' : '#FDFAF7'), color: isDone || isCurrent ? '#FFF' : '#8B7F6E', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, flexShrink:0, border: !isDone && !isCurrent ? '1.5px solid #EDE1CC' : 'none'}}>{icon}</span>
              <span style={{flex:1, fontSize:13, fontWeight: isCurrent ? 700 : 500, color}}>{s}</span>
              {date && <span style={{fontSize:11, color:'#8B7F6E'}}>{date}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// V17.6 Section III — DocumentsChecklist : check-rows + upload par document.
function DocumentsChecklist({docs, value, onChange, dossierId, showToast}) {
  const state = Array.isArray(value) ? value : [];  // [{label, uploaded, file_url, file_name}]
  const inputRefs = React.useRef({});
  const [uploading, setUploading] = React.useState('');
  const findDoc = (label) => state.find(d => d.label === label);

  function upsert(label, patch) {
    const idx = state.findIndex(d => d.label === label);
    let next;
    if (idx >= 0) next = state.map((d, i) => i === idx ? {...d, ...patch} : d);
    else next = [...state, {label, uploaded:false, ...patch}];
    onChange(next);
  }
  function remove(label) {
    onChange(state.filter(d => d.label !== label));
  }

  async function doUpload(label, file) {
    if (!dossierId) { showToast && showToast('Enregistre d\'abord le dossier'); return; }
    const fd = new FormData();
    fd.append('action', 'upload');
    fd.append('dossier_id', dossierId);
    fd.append('document_type', label);
    fd.append('file', file);
    setUploading(label);
    try {
      const r = await fetch(API + '/upload.php?action=upload', {
        method:'POST', headers:{'X-Session-Token': localStorage.getItem('ocre_token') || ''}, body: fd,
      });
      const d = await r.json();
      if (d && d.ok && d.photo) {
        upsert(label, {uploaded:true, file_url:d.photo.url, file_name:d.photo.name});
        showToast && showToast('Document ajouté');
      } else {
        showToast && showToast((d && d.error) || 'Échec upload');
      }
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setUploading('');
  }

  return (
    <div style={{marginTop:10}}>
      <div className="ocre-lbl" style={{display:'block'}}>Documents requis</div>
      <div style={{display:'flex', flexDirection:'column', gap:4}}>
        {docs.map(label => {
          const item = findDoc(label);
          const done = !!(item && item.uploaded);
          return (
            <div key={label} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 11px', background: done ? '#E8F5EC' : '#FFF', border:'1.5px solid ' + (done ? '#B8DEC4' : '#EDE1CC'), borderRadius:8}}>
              <span style={{width:18, height:18, borderRadius:4, background: done ? '#3E8B5E' : '#FDFAF7', color: done ? '#FFF' : '#8B7F6E', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, flexShrink:0, border: done ? 'none' : '1.5px solid #EDE1CC'}}>{done ? '✓' : ''}</span>
              <span style={{flex:1, fontSize:12, color:'#2A2018', fontWeight: done ? 600 : 500}}>{label}</span>
              {done && item.file_url && (
                <a href={item.file_url} target="_blank" rel="noopener" style={{fontSize:11, color:'#8B5E3C', textDecoration:'none', fontWeight:700}}>Voir</a>
              )}
              <button type="button" onClick={() => inputRefs.current[label] && inputRefs.current[label].click()}
                disabled={uploading === label}
                style={{padding:'4px 10px', borderRadius:999, border:'1.5px solid ' + (done ? '#B8DEC4' : '#BBA88B'), background: done ? '#FFF' : '#FFF3EC', color:'#8B5E3C', fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>
                {uploading === label ? '…' : (done ? 'Remplacer' : '+ Fichier')}
              </button>
              {done && (
                <button type="button" onClick={() => remove(label)} title="Retirer"
                  style={{width:22, height:22, borderRadius:11, border:'1px solid #E8DDD0', background:'#fff', color:'#8B7F6E', cursor:'pointer', fontSize:12, padding:0, lineHeight:'20px'}}>×</button>
              )}
              <input type="file" accept="image/*,application/pdf"
                ref={el => { inputRefs.current[label] = el; }}
                onChange={e => { const f = (e.target.files || [])[0]; if (f) doUpload(label, f); e.target.value=''; }}
                style={{display:'none'}}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// V17.6 Section III — FinancementForm : mode + budget + banque + timeline + docs.
function FinancementForm({activeProfil, d, set, dossierId, showToast}) {
  const bien = d.bien || {};
  // V17.6 : compat — ancien d.financement était un string (cash/crédit/mixte). On convertit en objet.
  const f = (d.financement && typeof d.financement === 'object' && !Array.isArray(d.financement)) ? d.financement : {};
  function setF(patch) { set('financement', {...f, ...patch}); }

  const pays = bien.pays || 'MA';
  const modes = FINANCE_MODES[pays] || FINANCE_MODES.MA;
  const mode = f.mode || '';
  const isComptant = mode === 'comptant';
  const isMourabaha = mode === 'mourabaha';
  const isParticipatif = MODES_PARTICIPATIFS.includes(mode);

  // Auto-calc finance = budget - apport
  const budget = Number(f.budget_total) || 0;
  const apport = Number(f.apport) || 0;
  const finance = Math.max(0, budget - apport);

  const duree = Number(f.duree_annees) || 0;
  const taux = Number(f.taux_ou_marge) || 0;
  const nMois = duree * 12;

  // Mensualité
  let mensualite = 0, coutTotal = 0;
  if (!isComptant && finance > 0 && nMois > 0 && taux > 0) {
    if (isMourabaha) {
      const total = finance * (1 + taux / 100);
      mensualite = total / nMois;
      coutTotal = total;
    } else {
      const tm = taux / 100 / 12;
      mensualite = finance * tm / (1 - Math.pow(1 + tm, -nMois));
      coutTotal = mensualite * nMois;
    }
  } else if (!isComptant && finance > 0 && nMois > 0) {
    mensualite = finance / nMois;
    coutTotal = finance;
  }
  const fraisAcq = budget * (fraisAcquisitionPct(pays) / 100);
  const takaful = isMourabaha ? 350 : 0;
  const fmt = n => n ? Math.round(n).toLocaleString('fr-FR') : '';
  const currency = pays === 'MA' ? 'MAD' : (pays === 'ES' ? '€' : '€');

  const aides = AIDES_BY_PAYS[pays] || [];
  const timelineSteps = pickTimeline(pays, mode);
  const docsList = pickDocs(pays, mode);

  return (
    <>
      {/* 1. Mode de financement (tuiles pays-spécifique) */}
      <div style={{marginBottom:10}}>
        <label className="ocre-lbl">Mode de financement</label>
        <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6}}>
          {modes.map(m => {
            const active = mode === m.k;
            return (
              <button key={m.k} type="button" onClick={() => setF({mode: m.k})}
                className={'ocre-tile ' + (active ? 'state-selected' : 'state-default')}>
                {m.l}
              </button>
            );
          })}
        </div>
      </div>

      {/* 2. Budget / Apport / Finance */}
      <div className="row-pair">
        <Field label={'Budget total (' + currency + ')'} type="number" value={f.budget_total} onChange={v => setF({budget_total: v})} style={{flex:1}}/>
        <Field label={'Apport (' + currency + ')'} type="number" value={f.apport} onChange={v => setF({apport: v})} style={{flex:1}}/>
      </div>
      {!isComptant && (
        <div style={{marginBottom:10}}>
          <label className="ocre-lbl">Montant à financer ({currency})</label>
          <div style={{padding:'9px 11px', borderRadius:8, fontSize:14, background:'#F7F0E6', border:'1.5px solid #E2D8CC', color:'#2A2018', fontWeight:700}}>
            {fmt(finance) || '—'}
          </div>
        </div>
      )}

      {/* 3. Si crédit : durée + taux/marge + assurance FR */}
      {!isComptant && (
        <>
          <div className="row-pair">
            <Field label="Durée (années)" type="number" value={f.duree_annees} onChange={v => setF({duree_annees: v})} style={{flex:1}}/>
            <Field label={isParticipatif ? 'Marge (%)' : 'Taux (%)'} type="number" value={f.taux_ou_marge} onChange={v => setF({taux_ou_marge: v})} style={{flex:1}}/>
          </div>
          {pays === 'FR' && (
            <Field label="Taux assurance (%)" type="number" value={f.assurance_taux} onChange={v => setF({assurance_taux: v})}/>
          )}

          {/* 4. Card summary mensualité */}
          {finance > 0 && nMois > 0 && taux > 0 && (
            <div style={{marginTop:6, marginBottom:12, padding:'12px 14px', background:'linear-gradient(135deg,#FFF9F0,#FBF1E4)', border:'1.5px solid #B26D3A', borderRadius:10}}>
              <div style={{fontSize:11, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:1.2, fontWeight:700, marginBottom:6}}>Synthèse</div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, fontSize:12}}>
                <div>
                  <div style={{color:'#8B7F6E', fontSize:10, textTransform:'uppercase', letterSpacing:.4}}>Mensualité</div>
                  <div style={{fontSize:18, fontWeight:700, color:'#8B4E22'}}>{fmt(mensualite)} {currency}</div>
                </div>
                <div>
                  <div style={{color:'#8B7F6E', fontSize:10, textTransform:'uppercase', letterSpacing:.4}}>Coût total crédit</div>
                  <div style={{fontSize:14, fontWeight:700, color:'#2A2018'}}>{fmt(coutTotal)} {currency}</div>
                </div>
                <div>
                  <div style={{color:'#8B7F6E', fontSize:10, textTransform:'uppercase', letterSpacing:.4}}>Frais acquisition (~{fraisAcquisitionPct(pays)}%)</div>
                  <div style={{fontSize:14, fontWeight:700, color:'#2A2018'}}>{fmt(fraisAcq)} {currency}</div>
                </div>
                {isMourabaha && (
                  <div>
                    <div style={{color:'#8B7F6E', fontSize:10, textTransform:'uppercase', letterSpacing:.4}}>Takaful estimé</div>
                    <div style={{fontSize:14, fontWeight:700, color:'#2A2018'}}>{takaful} MAD/mois</div>

            </div>

              </div>
              <EmailField label="Email contact banque" value={f.banque.email} onChange={v => setF({banque: {...f.banque, email: v}})}/>
            </>
          )}

          {/* 6. Courtier (optionnel) */}
          <div style={{marginTop:6, marginBottom:6}}>
            <BoolChip label="Passage par un courtier" value={!!f.courtier} onChange={v => setF({courtier: v ? (f.courtier && typeof f.courtier === 'object' ? f.courtier : {}) : null})}/>
          </div>
          {f.courtier && typeof f.courtier === 'object' && (
            <>
              <div className="row-pair">
                <Field label="Nom courtier" value={f.courtier.nom} onChange={v => setF({courtier: {...f.courtier, nom: v}})} style={{flex:1}}/>
                <PhoneField label="Tél courtier" value={f.courtier.tel} onChange={v => setF({courtier: {...f.courtier, tel: v}})} style={{flex:1}}/>
              </div>
            </>
          )}

          {/* 7. Garantie */}
          <Select label="Garantie" value={f.garantie} onChange={v => setF({garantie: v})} options={GARANTIES}/>

          {/* 8. Aides */}
          {aides.length > 0 && (
            <MultiSelectChips label="Aides possibles" value={f.aides} options={aides} onChange={v => setF({aides: v})}/>
          )}

          {/* 9. Statut dossier */}
          <Select label="Statut du dossier" value={f.statut_dossier} onChange={v => setF({statut_dossier: v})} options={STATUTS_DOSSIER}/>

          {/* 10. Timeline + docs si banque choisie */}
          {f.banque && f.banque.nom && timelineSteps && (
            <DossierTimeline steps={timelineSteps} value={f.timeline} onChange={v => setF({timeline: v})}/>
          )}
          {f.banque && f.banque.nom && docsList && (
            <DocumentsChecklist docs={docsList} value={f.documents} onChange={v => setF({documents: v})} dossierId={dossierId} showToast={showToast}/>
          )}
        </>
      )}

      {/* Notes (toujours visible) */}
      <div style={{marginTop:10}}>
        <label className="ocre-lbl">Notes financement</label>
        <textarea value={f.notes_financement || ''} onChange={e => setF({notes_financement: e.target.value})}
          style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:13, outline:'none', fontFamily:'inherit', color:'#2A2018',
                  minHeight:60, border:'1.5px solid ' + (f.notes_financement ? '#BBA88B' : '#E8DDD0'),
                  background: f.notes_financement ? '#FFFCF5' : '#FDFAF7', resize:'vertical'}}/>
      </div>
    </>
  );
}

function App() {
  const [apiLoading, setApiLoading] = useState(true);
  const [currentUser, setCurrentUser] = useState(null);
  const [appSettings, setAppSettings] = useState({});
  const [clients, setClients] = useState([]);
  const [country, setCountry] = useState('MA');
  const [showArchives, setShowArchives] = useState(false);
  const [userMenu, setUserMenu] = useState(false);
  const [view, setView] = useState('list');
  const [editing, setEditing] = useState(null);
  const [toast, setToast] = useState('');
  const [formKey, setFormKey] = useState(0);
  const [activeProfil, setActiveProfil] = useState('Acheteur');
  const [isInvestisseur, setIsInvestisseur] = useState(false);

  useEffect(() => {
    const token = localStorage.getItem('ocre_token');
    if (!token) { window.location = '/login/'; return; }
    (async () => {
      try {
        const me = await fetch(API + '/auth.php?action=me', {headers: {'X-Session-Token': token}}).then(r => r.json());
        if (!me || !me.ok) { localStorage.removeItem('ocre_token'); window.location = '/login/'; return; }
        setCurrentUser(me.user);
        const st = await fetch(API + '/auth.php?action=status').then(r => r.json()).catch(() => null);
        if (st && st.ok) setAppSettings(st);
        const cl = await fetch(API + '/clients.php?action=list', {headers: {'X-Session-Token': token}}).then(r => r.json());
        if (cl && cl.ok) {
          // V17.4 UX v3 : migration douce — is_investisseur true devient profil "Investisseur".
          const migrated = (cl.clients || []).map(c =>
            c.is_investisseur && c.projet !== 'Investisseur' ? {...c, projet: 'Investisseur'} : c
          );
          setClients(migrated);
        }
      } catch (e) { /* silent */ }
      setApiLoading(false);
    })();
  }, []);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(''), 2000); }

  async function apiSaveClient(data) {
    const token = localStorage.getItem('ocre_token');
    try {
      const r = await fetch(API + '/clients.php?action=save', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token':token},
        body: JSON.stringify({client: data}),
      });
      const d = await r.json();
      return (d && d.ok) ? d.client : null;
    } catch (e) { return null; }
  }
  async function apiDeleteClient(id) {
    const token = localStorage.getItem('ocre_token');
    try {
      await fetch(API + '/clients.php?action=delete', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token':token},
        body: JSON.stringify({id}),
      });
    } catch (e) {}
  }

  async function handleSaveLocal(data) {
    const incoming = {...(editing || {}), ...data, projet: activeProfil, is_investisseur: isInvestisseur};
    setClients(prev => {
      const exists = prev.find(c => c.id === incoming.id && incoming.id);
      if (exists) return prev.map(c => c.id === incoming.id ? {...c, ...incoming} : c);
      return [{...incoming, id: incoming.id || 'tmp-' + Date.now()}, ...prev];
    });
    setEditing(incoming);
    const saved = await apiSaveClient(incoming);
    if (saved) {
      setClients(prev => prev.map(c => (c === incoming || c.id === incoming.id) ? saved : c));
      setEditing(saved);
    }
  }
  async function handleDelete(id) {
    if (!id) { setView('list'); setEditing(null); return; }
    if (!confirm('Supprimer définitivement ce contact ?')) return;
    setClients(prev => prev.filter(c => c.id !== id));
    setView('list'); setEditing(null);
    await apiDeleteClient(id);
    showToast('Supprimé');
  }
  function openClient(c) {
    setEditing(c);
    const profil = c.projet || 'Acheteur';
    setActiveProfil(profil);
    setIsInvestisseur(profil === 'Investisseur' || !!c.is_investisseur);
    setView('form');
  }
  function openNew() {
    setEditing(null);
    setFormKey(k => k + 1);
    setView('form');
  }
  async function logout() {
    const token = localStorage.getItem('ocre_token');
    try { await fetch(API + '/auth.php?action=logout', {method:'POST', headers:{'X-Session-Token':token}}); } catch (e) {}
    localStorage.removeItem('ocre_token');
    localStorage.removeItem('ocre_user');
    window.location = '/login/';
  }

  if (apiLoading) {
    return (
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', background:'#F4EEE6'}}>
        <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:32, color:'#8B5E3C', fontWeight:700, marginBottom:16}}>Ocre Immo</div>
        <div style={{width:40, height:40, border:'3px solid #E8DDD0', borderTopColor:'#8B5E3C', borderRadius:'50%', animation:'spin 0.7s linear infinite'}}/>
      </div>
    );
  }

  if (view === 'prefs') {
    return <PrefsView currentUser={currentUser} onBack={() => setView('list')} showToast={showToast} toast={toast}/>;
  }
  return view === 'list' ? (
    <ListView
      clients={clients} country={country} setCountry={setCountry}
      showArchives={showArchives} setShowArchives={setShowArchives}
      userMenu={userMenu} setUserMenu={setUserMenu}
      currentUser={currentUser} logout={logout}
      activeProfil={activeProfil} setActiveProfil={setActiveProfil}
      isInvestisseur={isInvestisseur} setIsInvestisseur={setIsInvestisseur}
      openClient={openClient} openNew={openNew} toast={toast}
      openPrefs={() => { setUserMenu(false); setView('prefs'); }}
    />
  ) : (
    <FormView
      key={'f-' + formKey + '-' + (editing ? editing.id : 'new')}
      editing={editing} setEditing={setEditing}
      activeProfil={activeProfil} setActiveProfil={setActiveProfil}
      isInvestisseur={isInvestisseur} setIsInvestisseur={setIsInvestisseur}
      handleSaveLocal={handleSaveLocal} handleDelete={handleDelete}
      backToList={() => { setView('list'); setEditing(null); }}
      toast={toast} showToast={showToast}
    />
  );
}

// V17.5 Phase 2c — écran Préférences : sync Google Sheet.
function PrefsView({currentUser, onBack, showToast, toast}) {
  const [prefs, setPrefs] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const token = () => localStorage.getItem('ocre_token') || '';

  useEffect(() => {
    (async () => {
      try {
        const r = await fetch(API + '/clients.php?action=sync_prefs_get', {headers:{'X-Session-Token': token()}});
        const d = await r.json();
        if (d && d.ok) setPrefs(d);
        else setPrefs({sync_enabled:false, sync_email:'', sheet_id:'', sheet_url:null});
      } catch (e) { setPrefs({sync_enabled:false, sync_email:'', sheet_id:'', sheet_url:null}); }
      setLoading(false);
    })();
  }, []);

  async function save() {
    if (prefs.sync_enabled && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(prefs.sync_email || '')) {
      showToast && showToast('Email Google invalide');
      return;
    }
    setSaving(true);
    try {
      const r = await fetch(API + '/clients.php?action=update_sync_prefs', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token()},
        body: JSON.stringify({
          sync_enabled: prefs.sync_enabled ? 1 : 0,
          sync_email: prefs.sync_email,
          sheet_url: prefs.sheet_url_input || '',
        }),
      });
      const d = await r.json();
      if (d && d.ok) {
        showToast && showToast(prefs.sync_enabled ? 'Sync activée' : 'Sync désactivée');
        // Reload prefs pour refléter sheet_id persisté
        const fresh = await fetch(API + '/clients.php?action=sync_prefs_get', {headers:{'X-Session-Token': token()}}).then(r => r.json());
        if (fresh && fresh.ok) setPrefs({...fresh, sheet_url_input: ''});
      }
      else showToast && showToast((d && d.error) || 'Échec');
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setSaving(false);
  }
  async function syncNow() {
    setSyncing(true);
    try {
      const r = await fetch(API + '/clients.php?action=sync_now', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token()},
        body: JSON.stringify({}),
      });
      const d = await r.json();
      if (d && d.ok) showToast && showToast('Sync en cours (vérifie Google Sheets dans ~15 s)');
      else showToast && showToast((d && d.error) || 'Sync impossible');
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setSyncing(false);
  }

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:'#F4EEE6'}}>
      <div style={{background:'#fff', borderBottom:'1px solid #EDE6DC', padding:'10px 14px', position:'sticky', top:0, zIndex:10, display:'flex', alignItems:'center', gap:10}}>
        <button onClick={onBack} style={{background:'none', border:'none', fontSize:20, color:'#8B5E3C', cursor:'pointer', fontFamily:'inherit'}}>←</button>
        <div style={{flex:1, textAlign:'center', fontFamily:'Cormorant Garamond,serif', fontSize:18, fontWeight:700, color:'#1A1208'}}>Préférences</div>
        <div style={{width:32}}/>
      </div>
      <div style={{flex:1, overflowY:'auto', padding:14}}>
        {loading ? (
          <div style={{textAlign:'center', color:'#8B7F6E', padding:40}}>Chargement…</div>
        ) : (
          <div className="ocre-card">
            <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:20, color:'#8B5E3C', fontWeight:700, marginBottom:6}}>Sync Google Sheet</div>
            <div style={{fontSize:12, color:'#8B7F6E', marginBottom:14, lineHeight:1.5}}>
              Ocre peut maintenir un Google Sheet à jour avec tous tes dossiers.
              Le Sheet est partagé en Éditeur avec ton compte Google ; seul toi y as accès.
              Les brouillons sont colorés en orange.
            </div>
            <label className="ocre-lbl">Activer la sync</label>
            <div style={{display:'flex', gap:6, marginBottom:12}}>
              {[{v:true, l:'Activée'}, {v:false, l:'Désactivée'}].map(o => {
                const active = !!prefs.sync_enabled === o.v;
                return (
                  <button key={String(o.v)} type="button" onClick={() => setPrefs({...prefs, sync_enabled: o.v})}
                    className={'ocre-tile ' + (active ? 'state-selected' : 'state-default')}
                    style={{flex:1}}>{o.l}</button>
                );
              })}
            </div>
            <EmailField label="Email Google (compte qui recevra le partage)"
              value={prefs.sync_email}
              onChange={v => setPrefs({...prefs, sync_email: v})}/>

            {prefs.sync_enabled && !prefs.sheet_id && prefs.service_account_email && (
              <div style={{marginTop:6, marginBottom:10, padding:'10px 12px', background:'#FFF9F0', border:'1px solid #F0E3CB', borderRadius:10, fontSize:12, color:'#2A2018', lineHeight:1.55}}>
                <div style={{fontWeight:700, marginBottom:6, color:'#8B5E3C'}}>Créer ton Sheet en 3 étapes</div>
                <ol style={{margin:0, paddingLeft:18}}>
                  <li>Sur Google Drive → <b>Nouveau → Google Sheets vide</b></li>
                  <li>Partage → <b>Ajouter des personnes</b> → colle :
                    <div style={{background:'#FFF', padding:'6px 8px', borderRadius:6, margin:'4px 0', fontFamily:'monospace', fontSize:11, wordBreak:'break-all', border:'1px solid #EDE1CC'}}>{prefs.service_account_email}</div>
                    avec rôle <b>Éditeur</b>.
                  </li>
                  <li>Copie l'URL du Sheet (barre d'adresse) et colle ci-dessous :</li>
                </ol>
              </div>
            )}
            <Field label="URL du Google Sheet (coller ici la 1ère fois)"
              value={prefs.sheet_url_input || ''} placeholder="https://docs.google.com/spreadsheets/d/..."
              onChange={v => setPrefs({...prefs, sheet_url_input: v})}/>

            <button type="button" onClick={save} disabled={saving}
              style={{width:'100%', padding:'13px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'inherit', marginTop:6}}>
              {saving ? 'Enregistrement…' : 'Enregistrer'}
            </button>
            {prefs.sheet_url && (
              <div style={{marginTop:14, padding:'10px 12px', background:'#FDFAF7', border:'1.5px solid #BBA88B', borderRadius:8, fontSize:12}}>
                <div style={{fontSize:11, color:'#8B7F6E', fontWeight:600, textTransform:'uppercase', letterSpacing:1.2, marginBottom:4}}>Ton Sheet</div>
                <a href={prefs.sheet_url} target="_blank" rel="noopener" style={{color:'#8B5E3C', fontWeight:700, wordBreak:'break-all', textDecoration:'none'}}>{prefs.sheet_url}</a>
                {prefs.sheet_created_at && <div style={{fontSize:11, color:'#8B7F6E', marginTop:4}}>Créé le {new Date(prefs.sheet_created_at).toLocaleDateString('fr-FR')}</div>}
              </div>
            )}
            {prefs.sync_enabled && prefs.sync_email && prefs.sheet_id && (
              <button type="button" onClick={syncNow} disabled={syncing}
                style={{width:'100%', padding:'11px', background:'#FFF3EC', color:'#8B5E3C', border:'1.5px solid #BBA88B', borderRadius:10, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit', marginTop:10}}>
                {syncing ? '⏳ Sync en cours…' : '🔄 Sync maintenant'}
              </button>
            )}
          </div>
        )}
      </div>
      {toast && <Toast msg={toast}/>}
    </div>
  );
}
