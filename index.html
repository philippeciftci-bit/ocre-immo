// V18.8 — LocationAutocomplete : Nominatim search debounce 500ms biaisé sur viewbox ville/quartier.
const LOC_TYPE_ICON = {road:'🛣️', highway:'🛣️', shop:'🏪', amenity:'🏪', restaurant:'🍽️', tourism:'🏨', hotel:'🏨', historic:'🏛️', place:'📍'};

function LocationAutocomplete({label, value, onChange, onPick, ville, pays, quartier}) {
  const [q, setQ] = React.useState(value || '');
  const [results, setResults] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [open, setOpen] = React.useState(false);
  const tRef = React.useRef(null);
  React.useEffect(() => { setQ(value || ''); }, [value]);

  async function search(query) {
    if (!query || query.length < 3) { setResults([]); return; }
    setLoading(true);
    try {
      const paysName = PAYS_NOM[pays] || pays || '';
      const ctx = [quartier, ville, paysName].filter(Boolean).join(', ');
      const fullQ = ctx ? (query + ', ' + ctx) : query;
      const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=10&addressdetails=1&extratags=1&accept-language=fr&q=' + encodeURIComponent(fullQ);
      const r = await fetch(url, {headers:{'Accept':'application/json'}});
      if (r.ok) {
        const j = await r.json();
        setResults(Array.isArray(j) ? j : []);
      }
    } catch (e) {}
    setLoading(false);
  }
  function onInput(v) {
    setQ(v); onChange && onChange(v); setOpen(true);
    if (tRef.current) clearTimeout(tRef.current);
    tRef.current = setTimeout(() => search(v), 500);
  }
  function pickResult(r) {
    const addr = r.address || {};
    const road = [addr.house_number, addr.road].filter(Boolean).join(' ');
    const display = road || r.display_name || r.name;
    setQ(display);
    setOpen(false);
    setResults([]);
    onPick && onPick({
      lat: parseFloat(r.lat), lng: parseFloat(r.lon),
      adresse: display,
      ville: addr.city || addr.town || addr.village || addr.municipality,
      quartier: addr.suburb || addr.neighbourhood || addr.quarter,
      code_postal: addr.postcode,
      pays: addr.country_code ? addr.country_code.toUpperCase() : null,
      raw: r,
    });
  }
  function iconFor(r) {
    const c = (r.class || '').toLowerCase();
    if (LOC_TYPE_ICON[c]) return LOC_TYPE_ICON[c];
    if (c === 'shop' || c === 'amenity') {
      const t = (r.type || '').toLowerCase();
      if (t === 'restaurant' || t === 'cafe' || t === 'fast_food') return '🍽️';
      if (t === 'hotel' || t === 'motel') return '🏨';
      return '🏪';
    }
    return LOC_TYPE_ICON[c] || '📍';
  }

  return (
    <div style={{position:'relative', marginBottom:10}}>
      <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label || 'Adresse, rue, lieu-dit ou commerce'}</label>
      <input value={q} onChange={e => onInput(e.target.value)} onFocus={() => setOpen(true)} onBlur={() => setTimeout(() => setOpen(false), 200)}
        placeholder={ville ? 'Avenue Mohammed V, Café Argana…' : 'Saisis d\'abord la ville'}
        style={{width:'100%', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018',
                border:'1.5px solid ' + (q ? '#BBA88B' : '#E8DDD0'), background: q ? '#FFFCF5' : '#FDFAF7'}}/>
      {open && (loading || results.length > 0) && (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:300, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:60, marginTop:2}}>
          {loading && <div style={{padding:12, fontSize:12, color:'#8B7F6E'}}>Recherche…</div>}
          {!loading && results.map((r, i) => (
            <div key={i} onMouseDown={e => e.preventDefault()} onClick={() => pickResult(r)}
              style={{padding:'10px 12px', cursor:'pointer', borderBottom: i < results.length - 1 ? '1px solid #F4EEE6' : 'none', fontSize:13, display:'flex', alignItems:'center', gap:8}}>
              <span style={{fontSize:16, flexShrink:0}}>{iconFor(r)}</span>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:600, color:'#2A2018', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{r.display_name}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// V18.8 — reverse geocoding Nominatim : lat/lon → adresse complète.
async function reverseGeocodeNominatim(lat, lng) {
  try {
    const url = 'https://nominatim.openstreetmap.org/reverse?format=json&accept-language=fr&addressdetails=1&zoom=18&lat=' + lat + '&lon=' + lng;
    const r = await fetch(url, {headers:{'Accept':'application/json'}});
    if (!r.ok) return null;
    const j = await r.json();
    if (!j || !j.address) return null;
    const a = j.address;
    return {
      adresse: [a.house_number, a.road].filter(Boolean).join(' ') || j.display_name,
      ville: a.city || a.town || a.village || a.municipality || null,
      quartier: a.suburb || a.neighbourhood || a.quarter || null,
      code_postal: a.postcode || null,
      pays: a.country_code ? a.country_code.toUpperCase() : null,
      display_name: j.display_name,
    };
  } catch (e) { return null; }
}

// V17.3 Phase 2b — MapPicker Leaflet + OpenStreetMap. Mode précis (marker) ou zone (cercle).
// V18.0 — Auto-centrage carte sur ville+quartier du bien via Nominatim, cache localStorage,
// fallback hardcodé MA/FR. Respecte position manuelle (drag/clic/GPS) via gps_source.
// V18.8 — Cascade flyTo (pays z6 → ville z12 → quartier z14 → adresse z17), rayon slider live (50-5000m), reverse-geocoding Ma position.
function MapPicker({bien, setB, showToast}) {
  const mapRef = React.useRef(null);
  // V17.8 : refs stables pour marker + circle, setRadius live sans recreate.
  const leafletRef = React.useRef({map:null, marker:null, circle:null});
  const modeRef = React.useRef(bien.gps_mode || 'precis');
  const radiusRef = React.useRef(bien.gps_radius ? Number(bien.gps_radius) : 1000);
  const [mode, setMode] = React.useState(modeRef.current);
  const [radius, setRadius] = React.useState(radiusRef.current);
  const [ready, setReady] = React.useState(typeof window !== 'undefined' && !!window.L);

  const CIRCLE_STYLE = {color:'#B26D3A', fillColor:'#FBF1E4', fillOpacity:.25, weight:2};

  function ensureMarker(L, lat, lng) {
    const lr = leafletRef.current;
    if (!lr.marker) {
      lr.marker = L.marker([lat, lng], {draggable: true}).addTo(lr.map);
      lr.marker.on('dragend', () => {
        const p = lr.marker.getLatLng();
        setB('gps_lat', p.lat.toFixed(6));
        setB('gps_lng', p.lng.toFixed(6));
        setB('gps_source', 'manual'); // V18.0 : drag = manuel, n'est plus écrasable par geocode.
        if (lr.circle) lr.circle.setLatLng(p);
      });
    } else {
      lr.marker.setLatLng([lat, lng]);
    }
  }
  function ensureCircle(L, lat, lng, r) {
    const lr = leafletRef.current;
    if (!lr.circle) {
      lr.circle = L.circle([lat, lng], {radius: r, ...CIRCLE_STYLE}).addTo(lr.map);
    } else {
      lr.circle.setLatLng([lat, lng]);
      lr.circle.setRadius(r);
    }
  }
  function removeCircle() {
    const lr = leafletRef.current;
    if (lr.circle) { lr.map.removeLayer(lr.circle); lr.circle = null; }
  }
  function place(lat, lng) {
    const L = window.L;
    const lr = leafletRef.current;
    if (!L || !lr.map) return;
    ensureMarker(L, lat, lng);
    if (modeRef.current === 'zone') ensureCircle(L, lat, lng, radiusRef.current);
    else removeCircle();
  }

  React.useEffect(() => {
    let cancelled = false;
    function tryInit() {
      if (cancelled) return;
      if (!window.L) { setTimeout(tryInit, 200); return; }
      setReady(true);
      if (!mapRef.current || leafletRef.current.map) return;
      const L = window.L;
      // V18.0 — Init centre : (1) gps_lat manuel, (2) cache localStorage ville+pays, (3) fallback hardcodé, (4) Casablanca.
      let lat = Number(bien.gps_lat);
      let lng = Number(bien.gps_lng);
      let initZoom = bien.gps_lat ? 14 : 10;
      if (!bien.gps_lat && bien.ville && bien.pays) {
        const paysName = PAYS_NOM[bien.pays] || bien.pays;
        const cacheKey = ((bien.quartier ? bien.quartier + ', ' : '') + bien.ville + ', ' + paysName).toLowerCase().replace(/\s+/g,' ').trim();
        const cached = geocodeCacheGet(cacheKey);
        const fb = cached || geocodeFallback(bien.ville, bien.pays);
        if (fb) { lat = fb.lat; lng = fb.lng; initZoom = bien.quartier ? 15 : 13; }
      }
      if (!lat || !lng) { lat = 33.5731; lng = -7.5898; }
      const map = L.map(mapRef.current).setView([lat, lng], initZoom);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 19,
      }).addTo(map);
      leafletRef.current.map = map;
      map.on('click', e => {
        const {lat, lng} = e.latlng;
        setB('gps_lat', lat.toFixed(6));
        setB('gps_lng', lng.toFixed(6));
        setB('gps_source', 'manual'); // V18.0 : clic = manuel.
        place(lat, lng);
      });
      if (bien.gps_lat && bien.gps_lng) place(lat, lng);
    }
    tryInit();
    return () => { cancelled = true; };
  }, []);

  // V17.8 : bascule mode (add/removeLayer circle) + setRadius live au changement slider.
  React.useEffect(() => {
    modeRef.current = mode;
    radiusRef.current = radius;
    setB('gps_mode', mode);
    setB('gps_radius', mode === 'zone' ? radius : '');
    const L = window.L;
    const lr = leafletRef.current;
    if (!L || !lr.map) return;
    const lat = Number(bien.gps_lat), lng = Number(bien.gps_lng);
    if (!lat || !lng) return;
    if (mode === 'zone') {
      ensureCircle(L, lat, lng, radius);
      ensureMarker(L, lat, lng);
    } else {
      removeCircle();
      ensureMarker(L, lat, lng);
    }
  }, [mode, radius]);

  // V18.0 + V18.8 — Auto-centrage cascade : pays z6 → ville z12 → quartier z14 → adresse z17 (flyTo 1s).
  // N'écrase JAMAIS gps_source='manual' ou 'gps' (drag, clic, géoloc utilisateur).
  React.useEffect(() => {
    const pays = (bien.pays || '').trim();
    const ville = (bien.ville || '').trim();
    const quartier = (bien.quartier || '').trim();
    if (!pays) return;
    if (bien.gps_source === 'manual' || bien.gps_source === 'gps') return;
    let cancelled = false;
    const t = setTimeout(async () => {
      const lr = leafletRef.current;
      if (!lr || !lr.map) return;
      // Cascade : si quartier → précis ; sinon ville → ville ; sinon pays → centre pays.
      if (quartier && ville) {
        const r = await geocodeNominatim(ville, pays, quartier);
        if (cancelled) return;
        if (r) {
          const lat = Number(r.lat.toFixed(6)), lng = Number(r.lng.toFixed(6));
          if (!bien.gps_source || bien.gps_source === 'geocode') {
            setB('gps_lat', lat.toFixed(6)); setB('gps_lng', lng.toFixed(6)); setB('gps_source', 'geocode');
          }
          lr.map.flyTo([lat, lng], 14, {duration: 1.0});
          if (window.L) place(lat, lng);
          return;
        }
      }
      if (ville) {
        const r = await geocodeNominatim(ville, pays, '');
        if (cancelled) return;
        if (r) {
          const lat = Number(r.lat.toFixed(6)), lng = Number(r.lng.toFixed(6));
          if (!bien.gps_source || bien.gps_source === 'geocode') {
            setB('gps_lat', lat.toFixed(6)); setB('gps_lng', lng.toFixed(6)); setB('gps_source', 'geocode');
          }
          lr.map.flyTo([lat, lng], 12, {duration: 1.0});
          if (window.L) place(lat, lng);
          return;
        }
      }
      // Pays seul → centre pays z6.
      const c = PAYS_CENTERS[pays];
      if (c) {
        lr.map.flyTo(c, 6, {duration: 1.0});
      }
    }, 600);
    return () => { cancelled = true; clearTimeout(t); };
  }, [bien.ville, bien.pays, bien.quartier]);

  // V18.8 — Ma position + reverse geocoding Nominatim → pré-remplit adresse/ville/quartier/CP/pays.
  async function useMyLocation() {
    if (!navigator.geolocation) { showToast && showToast('Géolocalisation non supportée'); return; }
    showToast && showToast('📍 Localisation…');
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const {latitude, longitude} = pos.coords;
        setB('gps_lat', latitude.toFixed(6));
        setB('gps_lng', longitude.toFixed(6));
        setB('gps_source', 'gps');
        // Mode auto : Précis avec rayon 50m (on est sur place).
        setMode('precis');
        if (leafletRef.current.map) {
          leafletRef.current.map.flyTo([latitude, longitude], 17, {duration: 0.8});
          place(latitude, longitude);
        }
        // Reverse geocoding pour pré-remplir.
        const rev = await reverseGeocodeNominatim(latitude, longitude);
        if (rev) {
          if (rev.adresse) setB('adresse', rev.adresse);
          if (rev.ville) setB('ville', rev.ville);
          if (rev.quartier) setB('quartier', rev.quartier);
          if (rev.code_postal) setB('code_postal', rev.code_postal);
          if (rev.pays && !bien.pays) setB('pays', rev.pays);
          showToast && showToast('📍 Position : ' + (rev.adresse || rev.display_name || 'enregistrée'));
        } else {
          showToast && showToast('📍 Position GPS enregistrée');
        }
      },
      err => showToast && showToast('Position refusée : ' + (err.message || 'erreur')),
      {enableHighAccuracy:true, timeout:10000, maximumAge:0}
    );
  }
  // V18.8 — pick depuis LocationAutocomplete : set GPS + adresse + flyTo z17.
  function applyLocationPick(pick) {
    if (!pick) return;
    setB('gps_lat', pick.lat.toFixed(6));
    setB('gps_lng', pick.lng.toFixed(6));
    setB('gps_source', 'manual');
    if (pick.adresse) setB('adresse', pick.adresse);
    if (pick.code_postal) setB('code_postal', pick.code_postal);
    if (leafletRef.current.map) {
      leafletRef.current.map.flyTo([pick.lat, pick.lng], 17, {duration: 0.8});
      place(pick.lat, pick.lng);
    }
    showToast && showToast('📍 ' + (pick.adresse || 'Position enregistrée'));
  }

  if (!ready && typeof window !== 'undefined' && !window.L) {
    return <div style={{fontSize:12, color:'#8B7F6E', fontStyle:'italic', padding:'10px 0'}}>Carte indisponible — utilisez le champ GPS texte ci-dessus.</div>;
  }

  // V18.8 — breadcrumb "Pays › Ville › Quartier › Adresse" sticky au-dessus carte.
  const paysFlag = (PAYS_BIEN.find(p => p.c === bien.pays) || {}).f || '';
  const crumbs = [paysFlag + (paysFlag ? ' ' : '') + (bien.pays || ''), bien.ville, bien.quartier, bien.adresse].filter(Boolean);

  return (
    <div style={{marginTop:6, marginBottom:10}}>
      {/* V18.8 — Autocomplete adresse/rue/lieu/commerce (Nominatim biaisé sur ville). */}
      {bien.ville && (
        <LocationAutocomplete value={bien.adresse} onChange={v => setB('adresse', v)} onPick={applyLocationPick}
          ville={bien.ville} pays={bien.pays} quartier={bien.quartier}
          label="Adresse, rue, lieu-dit ou commerce"/>
      )}
      {/* V18.8 — breadcrumb cascade sticky */}
      {crumbs.length > 0 && (
        <div style={{display:'flex', alignItems:'center', gap:6, padding:'8px 10px', background:'#FBF1E4', border:'1px solid #E8DDD0', borderRadius:8, marginBottom:6, fontSize:12, color:'#5C4A3A', fontWeight:600, overflow:'hidden'}}>
          <span style={{flex:1, minWidth:0, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
            {crumbs.map((c, i) => <span key={i}>{i > 0 && <span style={{color:'#B5A78F', margin:'0 4px'}}>›</span>}{c}</span>)}
          </span>
        </div>
      )}
      <div style={{display:'flex', gap:6, marginBottom:6}}>
        <button type="button" onClick={() => setMode('precis')}
          style={{flex:1, padding:'7px 8px', borderRadius:8, border:'1.5px solid ' + (mode === 'precis' ? '#8B5E3C' : '#E8DDD0'),
                  background: mode === 'precis' ? '#FFF3EC' : '#FDFAF7', color: mode === 'precis' ? '#8B5E3C' : '#8B7F6E',
                  fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>📍 Précis</button>
        <button type="button" onClick={() => setMode('zone')}
          style={{flex:1, padding:'7px 8px', borderRadius:8, border:'1.5px solid ' + (mode === 'zone' ? '#8B5E3C' : '#E8DDD0'),
                  background: mode === 'zone' ? '#FFF3EC' : '#FDFAF7', color: mode === 'zone' ? '#8B5E3C' : '#8B7F6E',
                  fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>⭕ Zone</button>
        <button type="button" onClick={useMyLocation}
          style={{padding:'7px 10px', borderRadius:8, border:'1.5px solid #BBA88B', background:'#FFFCF5', color:'#8B5E3C', fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>📱 Ma position</button>
      </div>
      {mode === 'zone' && (
        <div style={{marginBottom:6, display:'flex', alignItems:'center', gap:8}}>
          <label style={{fontSize:11, color:'#8B7F6E', fontWeight:600, textTransform:'uppercase'}}>Rayon</label>
          {/* V18.8 — slider 50-5000m, oninput live (chaque pixel) → setRadius immédiat → useEffect met à jour L.circle.setRadius(). */}
          <input type="range" min="50" max="5000" step="50" value={radius}
            onChange={e => setRadius(Number(e.target.value))}
            onInput={e => setRadius(Number(e.target.value))}
            style={{flex:1}}/>
          <span style={{fontSize:12, color:'#2A2018', fontWeight:700, minWidth:70, textAlign:'right'}}>{radius >= 1000 ? (radius/1000).toFixed(radius % 1000 === 0 ? 0 : 1) + ' km' : radius + ' m'}</span>
        </div>
      )}
      <div ref={mapRef} style={{height:300, width:'100%', borderRadius:10, border:'1px solid #EDE6DC', overflow:'hidden'}}/>
      {bien.gps_lat && bien.gps_lng && (
        <div style={{fontSize:11, color:'#8B7F6E', marginTop:4, fontFamily:'monospace'}}>{bien.gps_lat}, {bien.gps_lng}</div>
      )}
    </div>
  );
}

// V17.6 Section III — BanqueSelect : picker avec search + groupes (MA participatives vs classiques).
function BanqueSelect({label, value, onChange, pays}) {
  let groups = [];
  if (pays === 'MA') {
    groups = [
      {g:'Banques participatives', items: BANQUES.MA_participatives},
      {g:'Banques classiques',     items: BANQUES.MA_classiques},
    ];
  } else if (pays === 'FR') {
    groups = [{g:'Banques FR', items: BANQUES.FR}];
  } else if (pays === 'ES') {
    groups = [{g:'Banques ES', items: BANQUES.ES}];
  }
  const flat = groups.flatMap(g => g.items.map(b => ({k:b, l:b, group:g.g})));
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState('');
  const ref = React.useRef(null);
  const isMobile = useIsMobile();
  React.useEffect(() => {
    if (isMobile) return;
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setQuery(''); } }
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [isMobile]);
  const filtered = query.trim()
    ? flat.filter(o => normalizeAccent(o.l).includes(normalizeAccent(query)))
    : flat;
  const byGroup = {};
  filtered.forEach(o => { (byGroup[o.group] ||= []).push(o); });
  function pick(k) { onChange(k); setOpen(false); setQuery(''); }
  function close() { setOpen(false); setQuery(''); }
  return (
    <div ref={ref} style={{position:'relative', marginBottom:10}}>
      {label && <label className="ocre-lbl">{label}</label>}
      <button type="button" onClick={() => setOpen(!open)}
        className={'ocre-tile ' + (value ? 'state-selected' : 'state-default')}
        style={{width:'100%', justifyContent:'space-between', padding:'10px 12px'}}>
        <span>{value || 'Choisir une banque…'}</span>
        <span style={{fontSize:10, opacity:.6}}>▾</span>
      </button>
      {open && (isMobile ? (
        <BottomSheet title={label || 'Banque'} onClose={close}>
          <div className="bsheet-search">
            <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="Rechercher…" autoCapitalize="off" autoCorrect="off"/>
          </div>
          <div className="bsheet-list">
            {Object.keys(byGroup).length === 0
              ? <div className="bsheet-empty">Aucune banque trouvée</div>
              : Object.entries(byGroup).map(([g, items]) => (
                <div key={g}>
                  <div className="bsheet-group-hdr">{g}</div>
                  {items.map(o => (
                    <div key={o.k} className={'bsheet-item ' + (o.k === value ? 'selected' : '')} onClick={() => pick(o.k)}>
                      <span style={{flex:1}}>{o.l}</span>
                      {o.k === value && <span style={{color:'#B26D3A', fontWeight:700}}>✓</span>}
                    </div>
                  ))}
                </div>
              ))}
          </div>
        </BottomSheet>
      ) : (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:300, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:50, marginTop:2}}>
          <input type="text" value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Rechercher…" autoFocus autoCapitalize="off" autoCorrect="off"
            style={{width:'100%', padding:'8px 11px', border:'none', borderBottom:'1px solid #F4EEE6', outline:'none', fontSize:13, fontFamily:'inherit'}}/>
          {Object.keys(byGroup).length === 0 ? (
            <div style={{padding:'10px 12px', fontSize:13, color:'#8B7F6E'}}>Aucune banque trouvée</div>
          ) : Object.entries(byGroup).map(([g, items]) => (
            <div key={g}>
              <div style={{padding:'6px 12px', background:'#F0E8D8', fontSize:10, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:1.2, fontWeight:700}}>{g}</div>
              {items.map(o => (
                <div key={o.k} onMouseDown={() => pick(o.k)}
                  style={{padding:'10px 12px', fontSize:13, cursor:'pointer', borderBottom:'1px solid #F4EEE6', background: o.k === value ? '#FBF1E4' : '#fff'}}>
                  {o.l}
                </div>
              ))}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// V17.6 Section III — DossierTimeline : étapes pays-spécifique, cliquables, dates auto.
function DossierTimeline({steps, value, onChange}) {
  const state = value || {};  // {stepLabel: ISODate} si done
  const doneSet = new Set(Object.keys(state));
  // Current = première étape non-done
  const currentIdx = steps.findIndex(s => !doneSet.has(s));
  return (
    <div style={{marginTop:10, marginBottom:10}}>
      <div className="ocre-lbl" style={{display:'block'}}>Timeline du dossier</div>
      <div style={{display:'flex', flexDirection:'column', gap:4}}>
        {steps.map((s, i) => {
          const isDone = doneSet.has(s);
          const isCurrent = i === currentIdx;
          const color = isDone ? '#3E8B5E' : (isCurrent ? '#B26D3A' : '#C4B5A0');
          const bg = isDone ? '#E8F5EC' : (isCurrent ? '#FBF1E4' : '#FFF');
          const border = isDone ? '1.5px solid #B8DEC4' : (isCurrent ? '2px solid #B26D3A' : '1.5px solid #EDE1CC');
          const icon = isDone ? '✓' : (isCurrent ? '●' : '○');
          const date = isDone && state[s] ? new Date(state[s]).toLocaleDateString('fr-FR') : null;
          function toggle() {
            const next = {...state};
            if (isDone) delete next[s];
            else next[s] = new Date().toISOString();
            onChange(next);
          }
          return (
            <button key={s} type="button" onClick={toggle}
              style={{display:'flex', alignItems:'center', gap:10, padding:'9px 11px', background:bg, border, borderRadius:8, cursor:'pointer', fontFamily:'inherit', textAlign:'left', color:'#2A2018'}}>
              <span style={{width:22, height:22, borderRadius:11, background: isDone ? '#3E8B5E' : (isCurrent ? '#B26D3A' : '#FDFAF7'), color: isDone || isCurrent ? '#FFF' : '#8B7F6E', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, flexShrink:0, border: !isDone && !isCurrent ? '1.5px solid #EDE1CC' : 'none'}}>{icon}</span>
              <span style={{flex:1, fontSize:13, fontWeight: isCurrent ? 700 : 500, color}}>{s}</span>
              {date && <span style={{fontSize:11, color:'#8B7F6E'}}>{date}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// V17.6 Section III — DocumentsChecklist : check-rows + upload par document.
function DocumentsChecklist({docs, value, onChange, dossierId, showToast}) {
  const state = Array.isArray(value) ? value : [];  // [{label, uploaded, file_url, file_name}]
  const inputRefs = React.useRef({});
  const [uploading, setUploading] = React.useState('');
  const findDoc = (label) => state.find(d => d.label === label);

  function upsert(label, patch) {
    const idx = state.findIndex(d => d.label === label);
    let next;
    if (idx >= 0) next = state.map((d, i) => i === idx ? {...d, ...patch} : d);
    else next = [...state, {label, uploaded:false, ...patch}];
    onChange(next);
  }
  function remove(label) {
    onChange(state.filter(d => d.label !== label));
  }

  async function doUpload(label, file) {
    if (!dossierId) { showToast && showToast('Enregistre d\'abord le dossier'); return; }
    const fd = new FormData();
    fd.append('action', 'upload');
    fd.append('dossier_id', dossierId);
    fd.append('document_type', label);
    fd.append('file', file);
    setUploading(label);
    try {
      const r = await fetch(API + '/upload.php?action=upload', {
        method:'POST', headers:{'X-Session-Token': localStorage.getItem('ocre_token') || ''}, body: fd,
      });
      const d = await r.json();
      if (d && d.ok && d.photo) {
        upsert(label, {uploaded:true, file_url:d.photo.url, file_name:d.photo.name});
        showToast && showToast('Document ajouté');
      } else {
        showToast && showToast((d && d.error) || 'Échec upload');
      }
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setUploading('');
  }

  return (
    <div style={{marginTop:10}}>
      <div className="ocre-lbl" style={{display:'block'}}>Documents requis</div>
      <div style={{display:'flex', flexDirection:'column', gap:4}}>
        {docs.map(label => {
          const item = findDoc(label);
          const done = !!(item && item.uploaded);
          return (
            <div key={label} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 11px', background: done ? '#E8F5EC' : '#FFF', border:'1.5px solid ' + (done ? '#B8DEC4' : '#EDE1CC'), borderRadius:8}}>
              <span style={{width:18, height:18, borderRadius:4, background: done ? '#3E8B5E' : '#FDFAF7', color: done ? '#FFF' : '#8B7F6E', display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, flexShrink:0, border: done ? 'none' : '1.5px solid #EDE1CC'}}>{done ? '✓' : ''}</span>
              <span style={{flex:1, fontSize:12, color:'#2A2018', fontWeight: done ? 600 : 500}}>{label}</span>
              {done && item.file_url && (
                <a href={item.file_url} target="_blank" rel="noopener" style={{fontSize:11, color:'#8B5E3C', textDecoration:'none', fontWeight:700}}>Voir</a>
              )}
              <button type="button" onClick={() => inputRefs.current[label] && inputRefs.current[label].click()}
                disabled={uploading === label}
                style={{padding:'4px 10px', borderRadius:999, border:'1.5px solid ' + (done ? '#B8DEC4' : '#BBA88B'), background: done ? '#FFF' : '#FFF3EC', color:'#8B5E3C', fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>
                {uploading === label ? '…' : (done ? 'Remplacer' : '+ Fichier')}
              </button>
              {done && (
                <button type="button" onClick={() => remove(label)} title="Retirer"
                  style={{width:22, height:22, borderRadius:11, border:'1px solid #E8DDD0', background:'#fff', color:'#8B7F6E', cursor:'pointer', fontSize:12, padding:0, lineHeight:'20px'}}>×</button>
              )}
              <input type="file" accept="image/*,application/pdf"
                ref={el => { inputRefs.current[label] = el; }}
                onChange={e => { const f = (e.target.files || [])[0]; if (f) doUpload(label, f); e.target.value=''; }}
                style={{display:'none'}}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// V17.6 Section III — FinancementForm : mode + budget + banque + timeline + docs.
function FinancementForm({activeProfil, d, set, dossierId, showToast}) {
  const bien = d.bien || {};
  // V17.6 : compat — ancien d.financement était un string (cash/crédit/mixte). On convertit en objet.
  const f = (d.financement && typeof d.financement === 'object' && !Array.isArray(d.financement)) ? d.financement : {};
  function setF(patch) { set('financement', {...f, ...patch}); }

  const pays = bien.pays || 'MA';
  const modes = FINANCE_MODES[pays] || FINANCE_MODES.MA;
  const mode = f.mode || '';
  const isComptant = mode === 'comptant';
  const isMourabaha = mode === 'mourabaha';
  const isParticipatif = MODES_PARTICIPATIFS.includes(mode);

  // Auto-calc finance = budget - apport
  const budget = Number(f.budget_total) || 0;
  const apport = Number(f.apport) || 0;
  const finance = Math.max(0, budget - apport);

  const duree = Number(f.duree_annees) || 0;
  const taux = Number(f.taux_ou_marge) || 0;
  const nMois = duree * 12;

  // Mensualité
  let mensualite = 0, coutTotal = 0;
  if (!isComptant && finance > 0 && nMois > 0 && taux > 0) {
    if (isMourabaha) {
      const total = finance * (1 + taux / 100);
      mensualite = total / nMois;
      coutTotal = total;
    } else {
      const tm = taux / 100 / 12;
      mensualite = finance * tm / (1 - Math.pow(1 + tm, -nMois));
      coutTotal = mensualite * nMois;
    }
  } else if (!isComptant && finance > 0 && nMois > 0) {
    mensualite = finance / nMois;
    coutTotal = finance;
  }
  const fraisAcq = budget * (fraisAcquisitionPct(pays) / 100);
  const takaful = isMourabaha ? 350 : 0;
  const fmt = n => n ? Math.round(n).toLocaleString('fr-FR') : '';
  const currency = pays === 'MA' ? 'MAD' : (pays === 'ES' ? '€' : '€');

  const aides = AIDES_BY_PAYS[pays] || [];
  const timelineSteps = pickTimeline(pays, mode);
  const docsList = pickDocs(pays, mode);

  return (
    <>
      {/* 1. Mode de financement (tuiles pays-spécifique) */}
      <div style={{marginBottom:10}}>
        <label className="ocre-lbl">Mode de financement</label>
        <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6}}>
          {modes.map(m => {
            const active = mode === m.k;

            /* V18.26 — summary accepte string (ancien) ou ReactNode riche (nouveau, multiligne
               avec thumb/emojis/couleurs). On laisse le flow normal (pas de nowrap) pour les nodes. */
            typeof summary === 'string'

      </div>
      <div style={{
        maxHeight: expanded ? '99999px' : '0',
        overflow: 'hidden',
        transition: 'max-height .3s ease-out, opacity .25s ease-out, padding .25s',
        opacity: expanded ? 1 : 0,
        padding: expanded ? '16px' : '0 16px',
      }}>{children}</div>
    </div>
  );
}

// V18.3 — Web Push : enregistre SW, demande permission, subscribe au backend.
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
async function setupWebPush() {
  try {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return {ok: false, reason: 'unsupported'};
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    if (Notification.permission === 'denied') return {ok: false, reason: 'denied'};
    if (Notification.permission === 'default') {
      const p = await Notification.requestPermission();
      if (p !== 'granted') return {ok: false, reason: p};
    }
    const token = localStorage.getItem('ocre_token') || '';
    const r = await fetch(API + '/vapid_public.php', {headers: {'X-Session-Token': token}}).then(r => r.json());
    if (!r || !r.public_key) return {ok: false, reason: 'no_vapid'};
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(r.public_key),
      });
    }
    const json = sub.toJSON();
    await fetch(API + '/push_subscribe.php?action=subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-Session-Token': token},
      body: JSON.stringify({
        endpoint: json.endpoint,
        p256dh: json.keys.p256dh,
        auth: json.keys.auth,
      }),
    });
    return {ok: true};
  } catch (e) {
    return {ok: false, reason: 'error', error: String(e)};
  }
}
function isStandalonePWA() {
  return (window.navigator.standalone === true)
      || (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
}
function isIOS() {
  return /iP(hone|od|ad)/.test(navigator.platform || '') || /iPad|iPhone|iPod/.test(navigator.userAgent || '');
}

// V18.37 — AddCasquetteModal : liste 6 profils cliquables pour créer une casquette liée.
// Les profils déjà pris (dossier actuel + linked_dossiers) sont grisés avec badge "actuel" /
// "déjà créé". POST api/dossier_create.php action=add_casquette.
function AddCasquetteModal({sourceDossier, sourceId, clients, currentProfil, onClose, onCreated}) {
  const [busy, setBusy] = React.useState(false);
  const [error, setError] = React.useState('');

  // Profils déjà pris dans le groupe (incluant source).
  const linkedIds = Array.isArray(sourceDossier && sourceDossier.linked_dossiers) ? sourceDossier.linked_dossiers : [];
  const takenMap = React.useMemo(() => {
    const m = {};
    m[currentProfil || 'Acheteur'] = {state: 'current', id: sourceId};
    linkedIds.forEach(id => {
      const c = (clients || []).find(x => x.id === id);
      if (c && c.projet) m[c.projet] = {state: 'linked', id};
    });
    return m;
  }, [linkedIds.join(','), currentProfil, sourceId]);

  async function createCasquette(profil) {
    if (takenMap[profil]) return;
    if (!sourceId || String(sourceId).startsWith('tmp-')) {
      setError('Enregistre d\'abord le dossier');
      return;
    }
    setBusy(true); setError('');
    const token = localStorage.getItem('ocre_token') || '';
    try {
      const r = await fetch(API + '/dossier_create.php?action=add_casquette', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-Session-Token': token},
        body: JSON.stringify({source_dossier_id: sourceId, new_profil: profil}),
      });
      const d = await r.json();
      if (!d || !d.ok) {
        setError((d && d.error) || 'Création échouée');
        setBusy(false);
        return;
      }
      // On reconstruit un objet client minimal pour navigation immédiate. L'app relira depuis API.
      const newClient = Object.assign({}, sourceDossier, {
        id: d.new_id,
        projet: profil,
        is_investisseur: profil === 'Investisseur',
        linked_dossiers: d.linked_ids,
        bien: {}, financement: {}, suivi: {},
        prix_affiche: null, loyer_demande: null, loyer_max: null,
        budget_max: null, budget_min: null,
      });
      onCreated && onCreated(newClient);
    } catch (e) {
      setError('Erreur réseau');
    }
    setBusy(false);
  }

  const PROFIL_LIST = ['Acheteur','Vendeur','Investisseur','Bailleur','Locataire','Curieux'];
  const prenom = (sourceDossier && (sourceDossier.prenom || sourceDossier.societe_nom)) || 'ce client';
  const nom = (sourceDossier && sourceDossier.nom) || '';

  return (
    <div onClick={onClose}
      style={{position:'fixed', inset:0, background:'rgba(20,15,10,.6)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
      <div onClick={e => e.stopPropagation()}
        style={{background:'#fff', border:'1.5px solid #A67F5A', borderRadius:14, padding:20, width:'100%', maxWidth:400, maxHeight:'90vh', overflowY:'auto', boxShadow:'0 20px 50px rgba(0,0,0,.25)'}}>
        <div style={{fontFamily:'"Cormorant Garamond", serif', fontSize:19, fontWeight:700, color:'#8B5E3C', marginBottom:4}}>Ajouter une casquette</div>
        <div style={{fontSize:13, color:'#2A2018', marginBottom:14}}>à <b>{prenom}{nom ? ' ' + nom : ''}</b></div>
        <div style={{fontSize:11.5, color:'#8B7F6E', marginBottom:14, fontStyle:'italic'}}>
          Les coordonnées (tel, email, adresse, résidence) sont copiées. Tu complèteras ensuite Section II/III/IV selon ce nouveau profil.
        </div>

        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {PROFIL_LIST.map(p => {
            const taken = takenMap[p];
            const col = PROFILS[p] || '#8B5E3C';
            const badge = BADGES[p] || p.slice(0, 3).toUpperCase();
            const isTaken = !!taken;
            return (
              <button key={p} type="button" disabled={isTaken || busy}
                onClick={() => createCasquette(p)}
                style={{
                  display:'flex', alignItems:'center', gap:10,
                  padding:'10px 12px', background: isTaken ? '#F4EEE6' : '#fff',
                  border:'1.5px solid ' + (isTaken ? '#D4C3A8' : col),
                  borderRadius:10, cursor: isTaken || busy ? 'not-allowed' : 'pointer',
                  opacity: isTaken ? .65 : 1, fontFamily:'inherit', textAlign:'left',
                  width:'100%',
                }}>
                <div style={{width:30, height:30, borderRadius:7, background: col, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:800, flexShrink:0}}>{badge}</div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:13, fontWeight:700, color:'#2A2018'}}>{p}</div>
                </div>
                {isTaken && (
                  <div style={{fontSize:10, color: taken.state === 'current' ? '#8B5E3C' : '#5A4E3D', fontWeight:700, textTransform:'uppercase', letterSpacing:.5}}>
                    {taken.state === 'current' ? 'Actuel' : 'Déjà créé'}
                  </div>
                )}
              </button>
            );
          })}
        </div>

        {error && (
          <div style={{marginTop:12, padding:'8px 10px', background:'#FEE2E2', color:'#991B1B', borderRadius:7, fontSize:12, borderLeft:'3px solid #DC2626'}}>
            ⚠ {error}
          </div>
        )}

        <button type="button" onClick={onClose} disabled={busy}
          style={{width:'100%', marginTop:14, padding:'9px', background:'#FDFAF7', color:'#8B5E3C', border:'1.5px solid #E0CDAE', borderRadius:9, fontWeight:600, fontSize:13, cursor: busy ? 'wait' : 'pointer', fontFamily:'inherit'}}>
          {busy ? '⏳ Création…' : 'Annuler'}
        </button>
      </div>
    </div>
  );
}

function CrossRefPanel({d, dossierId, onMatchesUpdate, showToast}) {

  const matches = Array.isArray(d && d.cross_matches) ? d.cross_matches : [];
  const lastSearched = d && d.cross_search_last_at;

  function fmtPrice(p, cur) {
    const x = Number(p);
    if (!x) return '—';
    const label = cur === 'EUR' ? '€' : (cur || '');
    if (label === '€') {
      if (x >= 1000000) return (x / 1000000).toFixed(x % 1000000 === 0 ? 0 : 1).replace('.', ',') + ' M€';
      if (x >= 1000) return Math.round(x / 1000) + 'k€';
      return x.toLocaleString('fr-FR') + ' €';
    }
    return x.toLocaleString('fr-FR') + ' ' + label;
  }
  function fmtDelta(pct) {
    if (pct == null) return '';
    const sign = pct > 0 ? '+' : '';
    return sign + pct.toFixed(0) + '%';
  }
  function deltaColor(pct) {
    if (pct == null) return '#8B7F6E';
    if (pct > 0) return '#C04B20';       // plus cher
    if (pct < 0) return '#3E8B5E';       // moins cher (bonne affaire)
    return '#8B7F6E';
  }
  const prices = matches.map(m => Number(m.price_found)).filter(n => !!n);
  const pMin = prices.length ? Math.min(...prices) : null;
  const pMax = prices.length ? Math.max(...prices) : null;
  const pMed = prices.length ? [...prices].sort((a, b) => a - b)[Math.floor(prices.length / 2)] : null;
  const curRef = matches[0] && matches[0].currency_found;

  async function runSearch() {
    if (!dossierId || String(dossierId).startsWith('tmp-')) {
      showToast && showToast('Enregistrez d\'abord le dossier');
      return;
    }
    setLoading(true);
    try {
      const token = localStorage.getItem('ocre_token') || '';
      const r = await fetch(API + '/cross_search.php?action=search&id=' + encodeURIComponent(dossierId), {
        method: 'POST',
        headers: {'X-Session-Token': token},
      });
      const j = await r.json();
      if (j && j.ok) {
        onMatchesUpdate && onMatchesUpdate(j.matches || [], j.searched_at);
        if ((j.matches || []).length === 0) showToast && showToast('Aucune annonce trouvée');
        else showToast && showToast('✓ ' + j.matches.length + ' annonce' + (j.matches.length > 1 ? 's' : '') + ' trouvée' + (j.matches.length > 1 ? 's' : ''));
      } else {
        showToast && showToast((j && j.error) || 'Recherche échouée');
      }
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setLoading(false);
  }

  return (
    <div style={{background:'#fff', border:'1.5px solid #A67F5A', borderRadius:12, marginTop:12, marginBottom:12, overflow:'hidden', boxShadow:'0 1px 3px rgba(139,94,60,.06)'}}>
      <div style={{padding:'12px 14px', background:'#FDFAF4', borderBottom:'1px solid #E0CDAE', display:'flex', alignItems:'center', gap:8}}>
        <span style={{fontSize:16}}>🔍</span>
        <div style={{flex:1, minWidth:0}}>
          <div style={{fontFamily:'Cormorant Garamond, serif', fontSize:15, fontWeight:700, color:'#8B5E3C', lineHeight:1.2}}>Cette annonce ailleurs{matches.length > 0 ? ' (' + matches.length + ')' : ''}</div>
          {lastSearched && (
            <div style={{fontSize:10, color:'#8B7F6E', marginTop:1}}>Dernière recherche : {String(lastSearched).replace('T', ' ').slice(0, 16)}</div>
          )}
        </div>
      </div>
      <div style={{padding:14}}>
        {matches.length === 0 ? (
          <>
            <div style={{fontSize:12.5, color:'#5A4E3D', lineHeight:1.5, marginBottom:10}}>
              Cherche si ce bien apparaît sur d'autres sites (Mubawab, Vaneau, Leboncoin, SeLoger, Facebook…). Utile pour comparer les prix et détecter les republications.
            </div>
            <button type="button" onClick={runSearch} disabled={loading}
              style={{width:'100%', padding:'11px', background: loading ? '#BBA88B' : 'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:9, fontWeight:700, fontSize:13, cursor: loading ? 'wait' : 'pointer', fontFamily:'inherit'}}>
              {loading ? '⏳ Recherche en cours ~15s…' : '🔍 Chercher sur d\'autres sites'}
            </button>
          </>
        ) : (
          <>
            <div style={{display:'flex', flexDirection:'column', gap:6, marginBottom:10}}>
              {matches.map((m, i) => (
                <a key={i} href={m.source_url} target="_blank" rel="noopener noreferrer"
                  style={{display:'flex', alignItems:'center', gap:8, padding:'8px 10px', background:'#FDFAF4', border:'1px solid #E0CDAE', borderRadius:9, textDecoration:'none', color:'inherit', cursor:'pointer'}}>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:12, fontWeight:700, color:'#8B5E3C', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{m.source_domain || 'Lien'}</div>
                    {m.title_found && <div style={{fontSize:11, color:'#5A4E3D', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{m.title_found}</div>}
                  </div>
                  <div style={{textAlign:'right', flexShrink:0}}>
                    <div style={{fontSize:12, fontWeight:700, color:'#2A2018'}}>{fmtPrice(m.price_found, m.currency_found)}</div>
                    {m.price_delta_pct != null && (
                      <div style={{fontSize:10, fontWeight:700, color: deltaColor(m.price_delta_pct)}}>{fmtDelta(m.price_delta_pct)}</div>
                    )}
                  </div>
                  <div style={{color:'#8B7F6E', fontSize:14, flexShrink:0}}>↗</div>
                </a>
              ))}
            </div>
            {prices.length > 1 && (
              <div style={{fontSize:11, color:'#5A4E3D', padding:'6px 8px', background:'#F4EEE6', borderRadius:7, marginBottom:10, display:'flex', justifyContent:'space-between', gap:6}}>
                <span>Écart : <b>{fmtPrice(pMin, curRef)}</b> → <b>{fmtPrice(pMax, curRef)}</b></span>
                <span>médiane <b>{fmtPrice(pMed, curRef)}</b></span>
              </div>
            )}
            <button type="button" onClick={runSearch} disabled={loading}
              style={{width:'100%', padding:'9px', background:'#FDFAF7', color:'#8B5E3C', border:'1.5px solid #E0CDAE', borderRadius:9, fontWeight:600, fontSize:12, cursor: loading ? 'wait' : 'pointer', fontFamily:'inherit'}}>
              {loading ? '⏳ Recherche…' : '🔄 Relancer la recherche'}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// V18.32 — Modal "Partager mes dossiers" : preview + bouton Générer → ZIP autonome.
function ShareDossiersModal({onClose, showToast}) {
  const [preview, setPreview] = React.useState(null);
  const [loadingPreview, setLoadingPreview] = React.useState(true);
  const [generating, setGenerating] = React.useState(false);
  const [status, setStatus] = React.useState('');
  const token = localStorage.getItem('ocre_token');

  React.useEffect(() => {
    fetch(API + '/export_zip.php?action=preview', {headers: {'X-Session-Token': token}})
      .then(r => r.json())
      .then(d => {
        if (d && d.ok) setPreview(d);
        else setStatus((d && d.error) || 'Preview indisponible');
        setLoadingPreview(false);
      })
      .catch(() => { setStatus('Erreur réseau'); setLoadingPreview(false); });
    // eslint-disable-next-line
  }, []);

  function fmtSize(bytes) {
    if (!bytes) return '—';
    const mo = bytes / 1048576;
    if (mo < 1) return (bytes / 1024).toFixed(0) + ' Ko';
    return mo.toFixed(mo < 10 ? 1 : 0).replace('.', ',') + ' Mo';
  }

  async function generate() {
    setGenerating(true);
    setStatus('Préparation du ZIP… téléchargement des photos ~10-30s');
    try {
      const r = await fetch(API + '/export_zip.php?action=generate', {headers: {'X-Session-Token': token}});
      if (!r.ok) {
        const err = await r.json().catch(() => ({error: 'Erreur ' + r.status}));
        throw new Error(err.error || ('HTTP ' + r.status));
      }
      const disp = r.headers.get('Content-Disposition') || '';
      let filename = 'ocre-export.zip';
      const m = disp.match(/filename="?([^";]+)"?/i);
      if (m) filename = m[1];
      const blob = await r.blob();
      const sizeMo = Math.round(blob.size / 1048576);
      if (sizeMo > 50) {
        setStatus('Export volumineux (' + sizeMo + ' Mo) — partage en cours…');
      } else {
        setStatus('ZIP prêt (' + fmtSize(blob.size) + ') — ouverture du partage…');
      }
      const file = new File([blob], filename, {type: 'application/zip'});
      if (navigator.canShare && navigator.canShare({files: [file]})) {
        try {
          await navigator.share({files: [file], title: 'Export Ocre Immo', text: 'Dossiers Ocre Immo — consultation offline via viewer.html'});
          setStatus('✓ Partagé.');
          setTimeout(() => onClose && onClose(), 800);
          return;
        } catch (e) {
          if (e && e.name === 'AbortError') { setStatus('Partage annulé.'); setGenerating(false); return; }
          // Autre erreur share → fallback download.
        }
      }
      // Fallback : téléchargement direct.
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
      setStatus('✓ Téléchargé (' + fmtSize(blob.size) + ').');
      setTimeout(() => onClose && onClose(), 1200);
    } catch (e) {
      setStatus('✗ ' + (e.message || 'Erreur'));
      showToast && showToast(e.message || 'Erreur export');
    }
    setGenerating(false);
  }

  return (
    <div onClick={onClose}
      style={{position:'fixed', inset:0, background:'rgba(20,15,10,.6)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
      <div onClick={e => e.stopPropagation()}
        style={{background:'#fff', border:'1.5px solid #A67F5A', borderRadius:14, padding:22, width:'100%', maxWidth:380, boxShadow:'0 20px 50px rgba(0,0,0,.25)'}}>
        <div style={{fontFamily:'"Cormorant Garamond", serif', fontSize:20, fontWeight:700, color:'#8B5E3C', marginBottom:6, display:'flex', alignItems:'center', gap:8}}>
          <ShareIcon size={22}/>
          <span>Partager mes dossiers</span>
        </div>
        <div style={{fontSize:12.5, color:'#5A4E3D', lineHeight:1.5, marginBottom:14}}>
          Génère un ZIP avec tous tes dossiers et photos. Partage-le par Mail, WhatsApp, AirDrop, iCloud…
        </div>

        <div style={{background:'#FDFAF7', border:'1px solid #E0CDAE', borderRadius:9, padding:'10px 12px', marginBottom:14, fontSize:13, color:'#2A2018'}}>
          {loadingPreview ? (
            <div style={{color:'#8B7F6E', fontStyle:'italic'}}>Calcul de l'aperçu…</div>
          ) : preview && preview.counts ? (
            <>
              <div style={{fontWeight:600}}>
                {preview.counts.dossiers} dossier{preview.counts.dossiers > 1 ? 's' : ''}
                {preview.counts.staged > 0 && <span> · {preview.counts.staged} téléchargement{preview.counts.staged > 1 ? 's' : ''}</span>}
                {preview.counts.archived > 0 && <span> · {preview.counts.archived} archivé{preview.counts.archived > 1 ? 's' : ''}</span>}
              </div>
              <div style={{color:'#8B7F6E', fontSize:12, marginTop:4}}>
                {preview.counts.photos} photo{preview.counts.photos > 1 ? 's' : ''} · ~{fmtSize(preview.size_estimate_bytes)} estimé
              </div>
            </>
          ) : <div style={{color:'#C04B20'}}>{status || 'Preview indisponible'}</div>}
        </div>

        <button onClick={generate} disabled={generating || loadingPreview}
          style={{width:'100%', padding:'13px', background: generating ? '#BBA88B' : 'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor: generating ? 'wait' : 'pointer', fontFamily:'inherit', marginBottom:8, display:'flex', alignItems:'center', justifyContent:'center', gap:8}}>
          {generating ? <span>⏳ Génération…</span> : (<><ShareIcon size={18}/><span>Générer et partager</span></>)}
        </button>

        {status && (
          <div style={{fontSize:11.5, color: status.indexOf('✓') === 0 ? '#065F46' : (status.indexOf('✗') === 0 ? '#991B1B' : '#5A4E3D'), marginBottom:10, textAlign:'center'}}>
            {status}
          </div>
        )}

        <div style={{fontSize:11, color:'#8B7F6E', lineHeight:1.5, marginBottom:12, background:'#FBF7F2', padding:'8px 10px', borderRadius:7, border:'1px solid #F2EBE2'}}>
          Le destinataire peut consulter l'export <b>sans compte Ocre</b> en ouvrant <code>viewer.html</code> dans son navigateur. Avec un compte, il pourra aussi réimporter (bouton « Importer un ZIP » côté admin, v18.33+).
        </div>

        <button onClick={onClose} disabled={generating}
          style={{width:'100%', padding:'9px', background:'#FDFAF7', color:'#8B5E3C', border:'1.5px solid #E0CDAE', borderRadius:9, fontWeight:600, fontSize:12, cursor: generating ? 'not-allowed' : 'pointer', fontFamily:'inherit'}}>
          Annuler
        </button>
      </div>
    </div>
  );
}

// V18.30 — Système AlertBanner global : 4 types (urgent/warning/info/success), sticky sous
// header, dismissible, actions CTA inline. InstallPwaBanner v18.5 retiré (remplacé par
// AlertBanner + PWAInstallOverlay).
const ALERT_PALETTE = {
  urgent:  {bg:'#FEE2E2', border:'#DC2626', text:'#991B1B', icon:'⚠'},
  warning: {bg:'#FEF3C7', border:'#F59E0B', text:'#92400E', icon:'⚠'},
  info:    {bg:'#DBEAFE', border:'#2563EB', text:'#1E40AF', icon:'ℹ'},
  success: {bg:'#D1FAE5', border:'#059669', text:'#065F46', icon:'✓'},
};
function AlertBanner({type = 'info', icon, title, message, dismissible = true, onDismiss, onClick, actions}) {
  const p = ALERT_PALETTE[type] || ALERT_PALETTE.info;
  const iconNode = icon || p.icon;
  function stop(e, fn) { e.stopPropagation(); if (fn) fn(); }
  return (
    <div onClick={onClick}
      style={{background: p.bg, borderLeft: '4px solid ' + p.border, padding: '10px 14px', color: p.text, fontSize: 13, display: 'flex', alignItems: 'flex-start', gap: 10, cursor: onClick ? 'pointer' : 'default'}}>
      {iconNode && (
        <div style={{fontSize: 20, lineHeight: 1, flexShrink: 0, marginTop: 1}}>{iconNode}</div>
      )}
      <div style={{flex: 1, minWidth: 0}}>
        {title && <div style={{fontWeight: 700, fontSize: 13, lineHeight: 1.3}}>{title}</div>}
        {message && <div style={{fontSize: 12, lineHeight: 1.4, marginTop: title ? 2 : 0}}>{message}</div>}
        {Array.isArray(actions) && actions.length > 0 && (
          <div style={{display: 'flex', gap: 8, marginTop: 8, flexWrap: 'wrap'}}>
            {actions.map((a, i) => (
              <button key={i} onClick={e => stop(e, a.onClick)}
                style={{padding: '6px 12px', background: a.primary ? p.border : 'transparent', color: a.primary ? '#fff' : p.text, border: a.primary ? 'none' : ('1px solid ' + p.border), borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit'}}>
                {a.label}
              </button>
            ))}
          </div>
        )}
      </div>
      {dismissible && (
        <button onClick={e => stop(e, onDismiss)} title="Fermer"
          style={{background: 'none', border: 'none', color: p.text, fontSize: 16, cursor: 'pointer', padding: 0, lineHeight: 1, flexShrink: 0, opacity: .7, fontFamily: 'inherit'}}>
          ✕
        </button>
      )}
    </div>
  );
}

// V18.44 — SW auto-update : détection updatefound + bannière non-bloquante + auto-reload idle.
// Un seul enregistrement SW au chargement. Le nouveau SW reste "waiting" jusqu'à SKIP_WAITING
// envoyé depuis la bannière (ou auto-reload si user idle > 5min sans form ouvert).
(function setupServiceWorkerUpdate() {
  if (!('serviceWorker' in navigator)) return;
  if (window.__ocreSwSetup) return;
  window.__ocreSwSetup = true;
  (async () => {
    let reg;
    try { reg = await navigator.serviceWorker.register('/sw.js'); }
    catch (e) { return; }
    window.__ocreSwReg = reg;
    const armDetection = (nw) => {
      if (!nw) return;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
          window.__ocreWaitingSW = reg.waiting || nw;
          window.dispatchEvent(new CustomEvent('ocre:sw-update'));
        }
      });
    };
    if (reg.waiting && navigator.serviceWorker.controller) {
      window.__ocreWaitingSW = reg.waiting;
      setTimeout(() => window.dispatchEvent(new CustomEvent('ocre:sw-update')), 200);
    }
    reg.addEventListener('updatefound', () => armDetection(reg.installing));
    setInterval(() => { try { reg.update(); } catch (e) {} }, 60000);
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return; reloaded = true;
      window.location.reload();
    });
  })();
})();

function UpdateBanner() {
  const [visible, setVisible] = React.useState(false);
  const [dismissed, setDismissed] = React.useState(false);
  const lastInteractRef = React.useRef(Date.now());

  React.useEffect(() => {
    const onUpdate = () => { if (!dismissed) setVisible(true); };
    window.addEventListener('ocre:sw-update', onUpdate);
    const onInteract = () => { lastInteractRef.current = Date.now(); };
    const evts = ['touchstart','mousedown','keydown','input','scroll'];
    evts.forEach(e => window.addEventListener(e, onInteract, {passive:true, capture:true}));
    return () => {
      window.removeEventListener('ocre:sw-update', onUpdate);
      evts.forEach(e => window.removeEventListener(e, onInteract, {capture:true}));
    };
  }, [dismissed]);

  function applyUpdate() {
    const sw = window.__ocreWaitingSW;
    if (sw) { try { sw.postMessage({type: 'SKIP_WAITING'}); } catch (e) { window.location.reload(); } }
    else window.location.reload();
  }

  React.useEffect(() => {
    if (!visible) return;
    // Auto-reload si idle > 5 min et pas de form focus / sync en cours.
    const iv = setInterval(() => {
      if (Date.now() - lastInteractRef.current < 5 * 60 * 1000) return;
      const active = document.activeElement;
      const tag = active && active.tagName ? active.tagName.toLowerCase() : '';
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
      if (active && active.isContentEditable) return;
      if (window.__ocreSyncing) return;
      applyUpdate();
    }, 60000);
    return () => clearInterval(iv);
  }, [visible]);

  if (!visible || dismissed) return null;
  return (
    <div style={{position:'fixed', left:12, right:12, bottom:12, zIndex:180, background:'#F5EFE6', border:'1.5px solid #8B5E3C', borderRadius:12, padding:'12px 14px', boxShadow:'0 4px 16px rgba(60,40,20,.15)', display:'flex', alignItems:'center', gap:10, fontFamily:'inherit', maxWidth:560, margin:'0 auto'}}>
      <div style={{flex:1, minWidth:0, fontSize:13, color:'#2A2018', lineHeight:1.4}}>
        <div style={{fontWeight:700, color:'#8B5E3C', marginBottom:2}}>Nouvelle version disponible</div>
        <div style={{fontSize:11.5, color:'#5A4E3D'}}>Recharge pour profiter des dernières améliorations.</div>
      </div>
      <button onClick={() => { setDismissed(true); setVisible(false); }} style={{background:'none', border:'1.5px solid #8B5E3C', color:'#8B5E3C', borderRadius:8, padding:'6px 10px', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit', flexShrink:0}}>Plus tard</button>
      <button onClick={applyUpdate} style={{background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, padding:'7px 14px', fontSize:12.5, fontWeight:700, cursor:'pointer', fontFamily:'inherit', flexShrink:0}}>Actualiser</button>
    </div>
  );
}

    if (r) r(!!result);

  // V18.17 — ID du dossier qui vient d'être promu (pour highlight ocre 3s dans liste principale).
  const [promotedId, setPromotedId] = useState(null);
  // V18.24 — file pré-sélectionné depuis DownloadsView (3 boutons Photo/Galerie/Fichier).
  // Quand user clique une source → on stocke le File ici + setView('import_image') → ImportImageView
  // lit fileAlreadySelected et saute la phase 1 "choix source".
  const [pickedImageFile, setPickedImageFile] = useState(null);
  // V17.10 : compteur de version pour re-render après fetch des pays dynamiques.
  const [countriesVersion, setCountriesVersion] = useState(0);
  // V17.11 : carte des matches par client_id → {count, max_score}
  const [matchesById, setMatchesById] = useState({});
  const [matchFor, setMatchFor] = useState(null);  // client_id pour modal ouvert

  useEffect(() => {
    const token = localStorage.getItem('ocre_token');
    if (!token) { window.location = '/login/'; return; }
    (async () => {
      try {
        await loadCountriesFromServer();
        setCountriesVersion(v => v + 1);
        const me = await fetch(API + '/auth.php?action=me', {headers: {'X-Session-Token': token}}).then(r => r.json());
        if (!me || !me.ok) { localStorage.removeItem('ocre_token'); window.location = '/login/'; return; }
        setCurrentUser(me.user);
        const st = await fetch(API + '/auth.php?action=status').then(r => r.json()).catch(() => null);
        if (st && st.ok) setAppSettings(st);
        const cl = await fetch(API + '/clients.php?action=list', {headers: {'X-Session-Token': token}}).then(r => r.json());
        if (cl && cl.ok) {
          // V17.4 UX v3 : migration douce — is_investisseur true devient profil "Investisseur".
          const migrated = (cl.clients || []).map(c =>
            c.is_investisseur && c.projet !== 'Investisseur' ? {...c, projet: 'Investisseur'} : c
          );
          setClients(migrated);
          if (cl.meta && typeof cl.meta.staged_count === 'number') setStagedCount(cl.meta.staged_count);
        }
        // V18.17 — charge en parallèle les staged (téléchargements).
        fetch(API + '/clients.php?action=list&staged=1', {headers: {'X-Session-Token': token}})
          .then(r => r.json())
          .then(s => { if (s && s.ok) { setStaged(s.clients || []); setStagedCount((s.clients || []).length); } })
          .catch(() => {});
        // V17.11 : charge les matches en arrière-plan (non bloquant).
        fetch(API + '/matching.php?action=find_all_matches', {headers:{'X-Session-Token': token}})
          .then(r => r.json()).then(d => { if (d && d.ok) setMatchesById(d.matches_by_id || {}); })
          .catch(() => {});
      } catch (e) { /* silent */ }
      setApiLoading(false);
      // V18.3 — push setup différé 10s après login pour ne pas bloquer le 1er render.
      setTimeout(() => { setupWebPush(); }, 10000);
      // V18.35 — bandeau PWA install retiré. User anticipe seul. PWAInstallOverlay + trigger
      // restent dispo pour une entrée menu future.
    })();
  }, []);
  // V18.30 — capture beforeinstallprompt (Android Chrome) pour auto-install en 1 tap.
  useEffect(() => {
    function onBip(e) {
      e.preventDefault();
      deferredInstallPromptRef.current = e;
    }
    function onInstalled() {
      deferredInstallPromptRef.current = null;
      setPwaOverlayOpen(false);
    }
    window.addEventListener('beforeinstallprompt', onBip);
    window.addEventListener('appinstalled', onInstalled);
    return () => {
      window.removeEventListener('beforeinstallprompt', onBip);
      window.removeEventListener('appinstalled', onInstalled);
    };
  }, []);
  async function triggerPwaInstall() {
    const d = deferredInstallPromptRef.current;
    if (d && typeof d.prompt === 'function') {
      try {
        d.prompt();
        const choice = await d.userChoice;
        if (choice && choice.outcome === 'accepted') deferredInstallPromptRef.current = null;
      } catch (e) { /* silent */ }
    } else if (isIOS()) {
      setPwaOverlayOpen(true);
    } else {
      // Navigateur desktop sans beforeinstallprompt : overlay iOS-like comme fallback.
      setPwaOverlayOpen(true);
    }
  }
  // V18.3 — écoute les clics de notification (postMessage du SW) pour route #client/X?section=4.
  useEffect(() => {
    if (!('serviceWorker' in navigator)) return;
    function onMsg(e) {
      if (e.data && e.data.type === 'notif-click' && e.data.url) {
        const m = e.data.url.match(/#client\/(\d+)(?:\?section=(\d))?/);
        if (m) {
          const cid = parseInt(m[1], 10);
          const sec = m[2] ? parseInt(m[2], 10) : 3;
          const found = clients.find(c => c.id === cid);
          if (found) openClientAtSection(found, sec);
        }
      }
    }
    navigator.serviceWorker.addEventListener('message', onMsg);
    return () => navigator.serviceWorker.removeEventListener('message', onMsg);
  }, [clients]);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(''), 2000); }

  async function apiSaveClient(data) {
    const token = localStorage.getItem('ocre_token');
    try {
      const r = await fetch(API + '/clients.php?action=save', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token':token},
        body: JSON.stringify({client: data}),
      });
      const d = await r.json();
      return (d && d.ok) ? d.client : null;
    } catch (e) { return null; }
  }
  async function apiDeleteClient(id) {
    const token = localStorage.getItem('ocre_token');
    try {
      await fetch(API + '/clients.php?action=delete', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token':token},
        body: JSON.stringify({id}),
      });
    } catch (e) {}
  }

  async function handleSaveLocal(data) {
    const incoming = {...(editing || {}), ...data, projet: activeProfil, is_investisseur: isInvestisseur};
    // V18.17 — si staged, mettre à jour le tableau staged (pas clients principaux).
    const isStagedSave = !!(editing && editing.is_staged);
    if (isStagedSave) {
      setStaged(prev => prev.map(c => (c.id === incoming.id ? {...c, ...incoming} : c)));
    } else {
      setClients(prev => {
        const exists = prev.find(c => c.id === incoming.id && incoming.id);
        if (exists) return prev.map(c => c.id === incoming.id ? {...c, ...incoming} : c);
        return [{...incoming, id: incoming.id || 'tmp-' + Date.now()}, ...prev];
      });
    }
    setEditing(incoming);
    const saved = await apiSaveClient(incoming);
    if (saved) {
      if (isStagedSave) {
        setStaged(prev => prev.map(c => (c === incoming || c.id === incoming.id) ? saved : c));
      } else {
        setClients(prev => prev.map(c => (c === incoming || c.id === incoming.id) ? saved : c));
      }
      setEditing(saved);
    }
  }
  async function handleDelete(id) {
    if (!id) { setView('list'); setEditing(null); return; }
    if (!(await askConfirm({title:'Supprimer ce dossier ?', message:'Cette action est définitive. Le dossier sera retiré de la liste, des matches et du Sheet au prochain sync.', danger:true}))) return;
    setClients(prev => prev.filter(c => c.id !== id));
    setView('list'); setEditing(null);
    await apiDeleteClient(id);
    showToast('Supprimé');
  }
  // V18.2 — initialExpandedSection : 0=Identité, 1=Bien, 2=Financier, 3=Suivi(Section IV).
  const [initialExpandedSection, setInitialExpandedSection] = useState(null);
  function openClient(c) {
    setEditing(c);
    const profil = c.projet || 'Acheteur';
    setActiveProfil(profil);
    setIsInvestisseur(profil === 'Investisseur' || !!c.is_investisseur);
    setInitialExpandedSection(null);
    setView('form');
  }
  function openClientAtSection(c, sectionIdx) {
    setEditing(c);
    const profil = c.projet || 'Acheteur';
    setActiveProfil(profil);
    setIsInvestisseur(profil === 'Investisseur' || !!c.is_investisseur);
    setInitialExpandedSection(sectionIdx);
    setFormKey(k => k + 1); // force remount pour relancer l'init expanded
    setView('form');
  }
  function openNew() {
    setEditing(null);
    setFormKey(k => k + 1);
    setView('form');
  }
  async function logout() {
    const token = localStorage.getItem('ocre_token');
    try { await fetch(API + '/auth.php?action=logout', {method:'POST', headers:{'X-Session-Token':token}}); } catch (e) {}
    localStorage.removeItem('ocre_token');
    localStorage.removeItem('ocre_user');
    window.location = '/login/';
  }

  // V18.17 — promote staged → liste principale + highlight ocre 3s.
  async function promoteStaged(id) {
    const token = localStorage.getItem('ocre_token');
    try {
      const r = await fetch(API + '/clients.php?action=promote', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token},
        body: JSON.stringify({id}),
      });
      const d = await r.json();
      if (!d || !d.ok) { showToast((d && d.error) || 'Échec promotion'); return false; }
      const promoted = staged.find(c => c.id === id);
      if (promoted) {
        const migrated = {...promoted, is_staged: false, promoted_at: new Date().toISOString()};
        setStaged(prev => prev.filter(c => c.id !== id));
        setStagedCount(n => Math.max(0, n - 1));
        setClients(prev => [migrated, ...prev]);
      }
      setEditing(null);
      setView('list');
      setPromotedId(id);
      setTimeout(() => setPromotedId(cur => (cur === id ? null : cur)), 3200);
      showToast('✓ Enregistré dans tes dossiers');
      return true;
    } catch (e) { showToast('Erreur réseau'); return false; }
  }
  async function deleteStaged(id) {
    if (!(await askConfirm({title:'Supprimer ce téléchargement ?', message:'Cette annonce ne pourra pas être récupérée.', danger:true}))) return false;
    const token = localStorage.getItem('ocre_token');
    try {
      await fetch(API + '/clients.php?action=delete', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token},
        body: JSON.stringify({id}),
      });
      setStaged(prev => prev.filter(c => c.id !== id));
      setStagedCount(n => Math.max(0, n - 1));
      setEditing(null);
      setView('downloads');
      showToast('Supprimé');
      return true;
    } catch (e) { showToast('Erreur réseau'); return false; }
  }

  if (apiLoading) {
    return (
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', background:'#F0E8D8'}}>
        <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:32, color:'#8B5E3C', fontWeight:700, marginBottom:16}}>Ocre Immo</div>
        <div style={{width:40, height:40, border:'3px solid #E8DDD0', borderTopColor:'#8B5E3C', borderRadius:'50%', animation:'spin 0.7s linear infinite'}}/>
      </div>
    );
  }

  if (view === 'prefs') {
    return <PrefsView currentUser={currentUser} onBack={() => setView('list')} showToast={showToast} toast={toast}/>;
  }
  if (view === 'agent_profile') {
    return <AgentProfileView currentUser={currentUser} onBack={() => setView('list')} showToast={showToast} toast={toast}/>;
  }
  if (view === 'admin') {
    return <AdminView currentUser={currentUser} onBack={() => setView('list')} showToast={showToast} startImpersonation={startImpersonation}/>;
  }
  if (view === 'dictation') {
    return <DictationView onBack={() => setView('list')}
      showToast={showToast} toast={toast}
      clients={clients} openClientAtSection={openClientAtSection}
      onCreated={(newClient) => {
        setClients(prev => [newClient, ...prev]);
        setEditing(newClient);
        setActiveProfil(newClient.projet || 'Acheteur');
        setIsInvestisseur(newClient.projet === 'Investisseur' || !!newClient.is_investisseur);
        setView('form');
      }}/>;
  }
  // V18.21 — import_url retiré (fusion dans DownloadsView). ImportImageView reste plein écran.
  if (view === 'import_image') {
    return <ImportImageView onBack={() => { setPickedImageFile(null); setView('downloads'); }}
      showToast={showToast} toast={toast}
      fileAlreadySelected={pickedImageFile}
      onCreated={(newClient) => {
        setStaged(prev => [newClient, ...prev]);
        setStagedCount(n => n + 1);
        setPickedImageFile(null);
        setView('downloads');
      }}/>;
  }
  if (view === 'downloads') {
    return <DownloadsView onBack={() => setView('list')}
      showToast={showToast} toast={toast}
      staged={staged} clients={clients}
      onStagedCreated={(newClient) => {
        setStaged(prev => [newClient, ...prev]);

      }}

  const pwaOverlay = pwaOverlayOpen ? <PWAInstallOverlay onClose={() => setPwaOverlayOpen(false)}/> : null;
  return (<>{impersonation && (
    <div style={{position:'fixed', top:0, left:0, right:0, zIndex:300, background:'#8B5E3C', color:'#fff', padding:'8px 14px', display:'flex', alignItems:'center', gap:10, fontSize:12.5, fontFamily:'inherit', fontWeight:600, boxShadow:'0 2px 8px rgba(0,0,0,.2)'}}>
      <span style={{flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>

      </span>
      <button onClick={stopImpersonation} style={{background:'#fff', color:'#8B5E3C', border:'none', borderRadius:14, padding:'4px 10px', fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'inherit', flexShrink:0}}>Revenir admin</button>
    </div>
  )}
  <div style={{paddingTop: impersonation ? 40 : 0, height:'100%'}}>
  {view === 'list' ? (
    <ListView
      clients={clients} country={country} setCountry={setCountry}
      showArchives={showArchives} setShowArchives={setShowArchives}
      userMenu={userMenu} setUserMenu={setUserMenu}
      currentUser={currentUser} logout={logout}
      activeProfil={activeProfil} setActiveProfil={setActiveProfil}
      isInvestisseur={isInvestisseur} setIsInvestisseur={setIsInvestisseur}
      listFilter={listFilter} setListFilter={setListFilter}
      listSearch={listSearch} setListSearch={setListSearch}
      stagedCount={stagedCount} openDownloads={() => setView('downloads')}
      promotedId={promotedId}
      openSharePlaceholder={() => setSharePlaceholderOpen(true)}
      openClient={openClient} openClientAtSection={openClientAtSection} openNew={openNew} toast={toast}
      openPrefs={() => { setUserMenu(false); setView('prefs'); }}
      openAgentProfile={() => { setUserMenu(false); setView('agent_profile'); }}
      openAdmin={() => setView('admin')}
      openDictation={() => setView('dictation')}
      openImportUrl={() => setView('import_url')}
      matchesById={matchesById} openMatchModal={setMatchFor}
      matchFor={matchFor} closeMatchModal={() => setMatchFor(null)}
      findClientById={(id) => clients.find(c => c.id === id)}
      setEditingFromMatch={(c) => { setEditing(c); setActiveProfil(c.projet || 'Acheteur'); setIsInvestisseur(c.projet === 'Investisseur' || !!c.is_investisseur); setMatchFor(null); setView('form'); }}
    />
  ) : (
    <FormView
      key={'f-' + formKey + '-' + (editing ? editing.id : 'new')}
      editing={editing} setEditing={setEditing}
      activeProfil={activeProfil} setActiveProfil={setActiveProfil}
      isInvestisseur={isInvestisseur} setIsInvestisseur={setIsInvestisseur}
      handleSaveLocal={handleSaveLocal} handleDelete={handleDelete}
      backToList={() => { setView(editing && editing.is_staged ? 'downloads' : 'list'); setEditing(null); }}
      toast={toast} showToast={showToast}
      clients={clients} openExistingDossier={openClient}
      initialExpandedSection={initialExpandedSection}
      promoteStaged={promoteStaged} deleteStaged={deleteStaged}
    />
  )}
  </div>{pwaOverlay}
  {/* V18.32 — ShareDossiersModal : génère un ZIP autonome (data.json + photos + viewer.html)
      et le partage via navigator.share (iOS share sheet) ou download direct (fallback desktop). */}
  {sharePlaceholderOpen && (
    <ShareDossiersModal onClose={() => setSharePlaceholderOpen(false)} showToast={showToast}/>

  {/* V18.20 — ConfirmModal global. Tous les delete passent par window.__ocreAsk(). */}
  {confirmReq && (
    <ConfirmModal title={confirmReq.title} message={confirmReq.message}
      danger={confirmReq.danger}
      confirmLabel={confirmReq.confirmLabel} cancelLabel={confirmReq.cancelLabel}

  )}
  <UpdateBanner/>
  </>);
