function ListView(props) {
  const {clients, country, setCountry, showArchives, setShowArchives,
         userMenu, setUserMenu, currentUser, logout,
         activeProfil, setActiveProfil, isInvestisseur, setIsInvestisseur,
         listFilter, setListFilter, listSearch, setListSearch,
         stagedCount, openDownloads, promotedId,
         openClient, openClientAtSection, openNew, toast, openPrefs, openAgentProfile,
         matchesById, openMatchModal, matchFor, closeMatchModal,
         findClientById, setEditingFromMatch} = props;
  // V18.19 — recherche dossiers live debounce 150ms. Partagée main/archives via showArchives.
  // Le composant <SearchBar/> gère son propre ref/autofocus.
  const [showSearch, setShowSearch] = useState(Boolean(listSearch));
  const [searchInput, setSearchInput] = useState(listSearch || '');
  useEffect(() => {
    const t = setTimeout(() => { setListSearch(searchInput); }, 150);
    return () => clearTimeout(t);
  }, [searchInput, setListSearch]);
  function toggleSearch() {
    if (showSearch) {
      setShowSearch(false);
      setSearchInput('');
      setListSearch('');
    } else {
      setShowSearch(true);
    }
  }

  // V18.15 — pipeline filtres : archive → listFilter (profil radio) → search (live).
  // V18.19 — ranking extrait dans applySearchRank(list, query) réutilisable.
  const archivedFiltered = clients.filter(c => !!c.archived === showArchives);
  const profilFiltered = listFilter
    ? archivedFiltered.filter(c => {
        const cp = c.projet || c.profil_detecte;
        return cp === listFilter;
      })
    : archivedFiltered;
  const filtered = applySearchRank(profilFiltered, listSearch);
  const drafts = filtered.filter(c => c.is_draft);
  const contacts = filtered.filter(c => !c.is_draft);
  // V18.37 — Union-Find sur linked_dossiers pour regrouper les casquettes d'un même client.
  // Retourne [{ids:[id…], dossiers:[…], latest:ts}, …] trié par latest DESC, chaque groupe
  // trié updated_at DESC. Les dossiers non liés forment des groupes solo.
  function buildDossierGroups(list) {
    const byId = {};
    list.forEach(d => { byId[d.id] = d; });
    const parent = {};
    function find(x) { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
    function union(a, b) { const ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; }
    list.forEach(d => { parent[d.id] = d.id; });
    list.forEach(d => {
      const linked = Array.isArray(d.linked_dossiers) ? d.linked_dossiers : [];
      linked.forEach(lid => { if (byId[lid]) union(d.id, lid); });
    });
    const buckets = {};
    list.forEach(d => {
      const r = find(d.id);
      (buckets[r] = buckets[r] || []).push(d);
    });
    const groups = Object.values(buckets).map(g => {
      g.sort((a, b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0));
      return {
        ids: g.map(x => x.id),
        dossiers: g,
        latest: g[0] && g[0].updated_at ? new Date(g[0].updated_at).getTime() : 0,
      };
    });
    groups.sort((a, b) => b.latest - a.latest);
    return groups;
  }
  const draftGroups = React.useMemo(() => buildDossierGroups(drafts), [drafts]);
  const contactGroups = React.useMemo(() => buildDossierGroups(contacts), [contacts]);
  const archiveGroups = React.useMemo(() => buildDossierGroups(filtered), [filtered]);
  // Render helper : groupe teinté ocre léger + séparateur 1px entre cards si 2+ dossiers.
  function renderGroup(g) {
    if (g.dossiers.length === 1) {
      const c = g.dossiers[0];
      return <ClientRow key={'s-'+c.id} c={c} clients={clients} matchInfo={matchesById && matchesById[c.id]} onOpenMatches={() => openMatchModal(c.id)} onOpenSection={openClientAtSection} onClick={() => openClient(c)}/>;
    }
    return (
      <div key={'g-'+g.ids.join('-')} className="dossier-group"
        style={{background:'rgba(214,178,135,.1)', borderRadius:12, padding:2, marginBottom:10, border:'1px solid #D4C3A8'}}>
        {g.dossiers.map((c, i) => (
          <div key={'gm-'+c.id} style={{borderTop: i === 0 ? 'none' : '1px solid #C9B79A'}}>
            <ClientRow c={c} clients={clients} matchInfo={matchesById && matchesById[c.id]} onOpenMatches={() => openMatchModal(c.id)} onOpenSection={openClientAtSection} onClick={() => openClient(c)}/>
          </div>
        ))}
      </div>
    );
  }
  // Compteurs par profil (pour badge "(N)" sur chip si filtre actif).
  const countByProfil = React.useMemo(() => {
    const m = {};
    PROFILS_ORDER.forEach(p => { m[p] = 0; });
    archivedFiltered.forEach(c => {
      const cp = c.projet || c.profil_detecte;
      if (cp && m.hasOwnProperty(cp)) m[cp]++;
    });
    return m;
  }, [archivedFiltered]);

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:'#F0E8D8'}}>
      <Header
        left={<OcreLogo size={36}/>}
        center={<OcreTitle/>}
        right={
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            {/* V18.36 — PillIconButton cohérent (fond crème + contour ovale) pour les 3 actions
                header droite : Share (placeholder modal), Search (toggle SearchBar), Archive toggle. */}
            <PillIconButton icon={<ShareIcon size={18}/>} title="Partager mes dossiers"
              onClick={() => props.openSharePlaceholder && props.openSharePlaceholder()}/>
            <PillIconButton icon={
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            } title={showSearch ? 'Fermer la recherche' : 'Rechercher un dossier'}
              active={showSearch || !!listSearch}
              onClick={toggleSearch}/>
            <PillIconButton icon={
              showArchives ? (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="20" y1="12" x2="4" y2="12"/><polyline points="10 18 4 12 10 6"/>
                </svg>
              ) : <ArchiveIcon size={18} color="currentColor"/>
            } title={showArchives ? 'Retour aux contacts' : 'Voir les archives'}
              active={showArchives}
              onClick={() => setShowArchives(!showArchives)}/>
          </div>
        }
        userMenu={userMenu} setUserMenu={setUserMenu} currentUser={currentUser} logout={logout} openPrefs={openPrefs} openAgentProfile={openAgentProfile}
      />

      {/* V18.19 — SearchBar factorisée (partagée main/archives/downloads). */}
      <SearchBar open={showSearch} value={searchInput} onChange={setSearchInput}
        placeholder={showArchives ? 'Rechercher dans les archives…' : 'Rechercher un dossier…'}/>

      {/* V18.15 — barre filtres profils strictement exclusifs (radio) + chip "Tous". */}
      <div style={{padding:'5px 10px', background:'#fff', borderBottom:'1px solid var(--border-subtle)', display:'flex', alignItems:'center', gap:8, minHeight:36}}>
        <div className="profils-row" style={{flex:1, minWidth:0}}>
          <button onClick={() => setListFilter(null)}
            className={'profil-chip ' + (listFilter === null ? 'state-selected' : 'state-default')}>Tous</button>
          {PROFILS_ORDER.map(p => {
            const active = p === listFilter;
            const n = countByProfil[p] || 0;
            return (
              <button key={p}
                onClick={() => {
                  const next = (listFilter === p) ? null : p;
                  setListFilter(next);
                  if (next) setActiveProfil(next);
                }}
                className={'profil-chip ' + (active ? 'state-selected' : 'state-default')}>
                {p}{n > 0 ? <span style={{marginLeft:4, opacity:.7, fontWeight:500}}>({n})</span> : null}
              </button>
            );
          })}
        </div>
        <div style={{fontSize:10, color:'var(--text-secondary)', whiteSpace:'nowrap', flexShrink:0, fontWeight:600}}>{showArchives ? filtered.length + ' arch.' : drafts.length + 'b · ' + contacts.length + 'c'}</div>
      </div>

      <div style={{flex:1, overflowY:'auto', padding:12, paddingBottom:'calc(96px + env(safe-area-inset-bottom, 0px))'}}>
        {!showArchives && drafts.length > 0 && (
          <>
            <div style={{fontSize:11, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:.5, fontWeight:700, margin:'6px 4px'}}>Brouillons · {drafts.length}</div>
            {draftGroups.map(renderGroup)}
          </>
        )}
        {!showArchives && contacts.length > 0 && (
          <>
            <div style={{fontSize:11, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:.5, fontWeight:700, margin:'12px 4px 6px'}}>Contacts · {contacts.length}</div>
            {contactGroups.map(renderGroup)}
          </>
        )}
        {showArchives && (
          <>
            {archiveGroups.map(renderGroup)}
            {filtered.length === 0 && <div style={{textAlign:'center', color:'#8B7F6E', fontSize:13, padding:40}}>Aucune archive</div>}
          </>
        )}
        {!showArchives && filtered.length === 0 && (
          <div style={{textAlign:'center', color:'#8B7F6E', fontSize:13, padding:40}}>
            Aucun contact pour le moment. Clique sur <b>+</b> pour commencer.
          </div>
        )}
      </div>

      {/* V18.5 — Barre d'actions horizontale fixed-bottom (iPhone-friendly). */}
      <div style={{position:'fixed', bottom:0, left:0, right:0, zIndex:40,
                   background:'#fff', borderTop:'1px solid #E8DDD0', boxShadow:'0 -2px 8px rgba(139,94,60,.05)',
                   padding:'12px 16px calc(12px + env(safe-area-inset-bottom, 0px)) 16px',
                   display:'flex', justifyContent:'space-around', alignItems:'center', gap:12}}>
        {/* V18.20 — FAB 📥 ouvre la page Téléchargements (v18.17 DownloadsView avec 2 boutons
            🔗 Lien URL / 📸 Document image), plus le ImportUrlView direct du v18.11. */}
        <button onClick={() => props.openDownloads && props.openDownloads()} title="Téléchargements"
          style={{width:52, height:52, borderRadius:'50%', background:'#FBF1E4', color:'var(--ocre-brand)', border:'2px solid var(--ocre-primary)',
                  fontSize:22, fontWeight:700, cursor:'pointer', boxShadow:'0 2px 8px rgba(139,94,60,0.18)', fontFamily:'inherit',
                  display:'flex', alignItems:'center', justifyContent:'center', padding:0, position:'relative'}}>
          <DownloadIcon size={24}/>
          {stagedCount > 0 && (
            <span style={{position:'absolute', top:-4, right:-4, background:'#8B5E3C', color:'#fff', borderRadius:10, padding:'1px 6px', fontSize:10, fontWeight:700, fontFamily:'inherit', border:'1.5px solid #fff'}}>{stagedCount}</span>
          )}
        </button>
        <button onClick={() => props.openDictation()} title="Dicter un contact"
          style={{width:52, height:52, borderRadius:'50%', background:'#FBF1E4', color:'#8B5E3C', border:'2px solid #B26D3A',
                  fontSize:22, fontWeight:700, cursor:'pointer', boxShadow:'0 2px 8px rgba(139,94,60,0.18)', fontFamily:'inherit',
                  display:'flex', alignItems:'center', justifyContent:'center', padding:0}}>🎤</button>
        <button onClick={openNew} title="Saisir un contact"
          style={{width:56, height:56, borderRadius:'50%', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none',
                  fontSize:28, fontWeight:700, cursor:'pointer', boxShadow:'0 6px 20px rgba(139,94,60,0.35)', fontFamily:'inherit',
                  display:'flex', alignItems:'center', justifyContent:'center', padding:0, lineHeight:1}}>+</button>
      </div>

      {toast && <Toast msg={toast}/>}
      {matchFor && (
        <MatchModal clientId={matchFor} clients={clients}
          findClientById={findClientById}
          setEditingFromMatch={setEditingFromMatch}
          onClose={closeMatchModal}/>
      )}
    </div>
  );
}

// V17.11 — MatchModal : liste des matchs potentiels pour un dossier.
function MatchModal({clientId, clients, findClientById, setEditingFromMatch, onClose}) {
  const [loading, setLoading] = React.useState(true);
  const [matches, setMatches] = React.useState([]);
  const [error, setError] = React.useState('');
  const src = findClientById ? findClientById(clientId) : null;
  const srcName = src ? (
    src.profil_type === 'Société' && src.societe_nom
      ? src.societe_nom
      : ((src.prenom || '') + ' ' + (src.nom || '')).trim() || 'Dossier'
  ) : 'Dossier';
  React.useEffect(() => {
    const token = localStorage.getItem('ocre_token') || '';
    fetch(API + '/matching.php?action=find_matches&client_id=' + clientId, {headers:{'X-Session-Token': token}})
      .then(r => r.json())
      .then(d => {
        if (d && d.ok) setMatches(d.matches || []);
        else setError((d && d.error) || 'Erreur');
        setLoading(false);
      })
      .catch(() => { setError('Erreur réseau'); setLoading(false); });
  }, [clientId]);

  function openMatch(cid) {
    const c = findClientById ? findClientById(cid) : null;
    if (c) setEditingFromMatch(c);
  }

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(42,32,24,.55)', zIndex:200, display:'flex', alignItems:'flex-end', justifyContent:'center'}} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{background:'#fff', width:'100%', maxWidth:520, maxHeight:'85vh', borderRadius:'16px 16px 0 0', padding:18, paddingBottom:24, overflowY:'auto'}}>
        <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:20, fontWeight:700, color:'#8B5E3C', marginBottom:4, textAlign:'center'}}>🎯 Matchs potentiels</div>
        <div style={{fontSize:12, color:'#8B7F6E', marginBottom:14, textAlign:'center'}}>Pour <b>{srcName}</b></div>
        {loading && <div style={{textAlign:'center', color:'#8B7F6E', fontSize:13, padding:20}}>Chargement…</div>}
        {error && <div style={{textAlign:'center', color:'#C04B20', fontSize:13, padding:20}}>{error}</div>}
        {!loading && !error && matches.length === 0 && (
          <div style={{textAlign:'center', color:'#8B7F6E', fontSize:13, padding:20}}>Aucun match pour le moment.</div>
        )}
        {matches.map(m => {
          const s = m.summary;
          const cname = s.societe_nom || ((s.prenom || '') + ' ' + (s.nom || '')).trim() || 'Sans nom';
          const col = s.score > 80 ? '#D64545' : '#B26D3A';
          return (
            <div key={m.client_id} style={{background:'#FDFAF7', border:'1px solid #EDE6DC', borderRadius:10, padding:12, marginBottom:8}}>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                <span style={{fontWeight:700, fontSize:14, color:'#2A2018', flex:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{cname}</span>
                <span style={{padding:'3px 9px', borderRadius:999, background: col, color:'#fff', fontSize:10.5, fontWeight:700}}>Score {m.score}</span>
              </div>
              <div style={{height:6, background:'#EDE1CC', borderRadius:3, marginBottom:8, overflow:'hidden'}}>
                <div style={{height:'100%', width: m.score + '%', background: col, transition:'width .3s'}}/>
              </div>
              <div style={{fontSize:11, color:'#8B7F6E', marginBottom:6}}>
                {s.profil} · {s.type || '—'} · {s.quartier || s.ville || '—'}{s.prix ? ' · ' + Number(s.prix).toLocaleString('fr-FR') : ''}
              </div>
              <div style={{display:'flex', flexWrap:'wrap', gap:4, marginBottom:8}}>
                {m.reasons.map((r, i) => (
                  <span key={i} style={{padding:'2px 8px', borderRadius:999, background:'#FBF1E4', border:'1px solid #E2D8CC', fontSize:10.5, color:'#8B5E3C', fontWeight:600}}>{r}</span>
                ))}
              </div>
              <button type="button" onClick={() => openMatch(m.client_id)}
                style={{width:'100%', padding:'8px', borderRadius:8, background:'#FFF3EC', color:'#8B5E3C', border:'1.5px solid #BBA88B', fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>
                Voir le dossier →
              </button>
            </div>
          );
        })}
        <button type="button" onClick={onClose}
          style={{width:'100%', padding:'11px', marginTop:6, background:'#FDFAF7', color:'#8B7F6E', border:'1.5px solid #E8DDD0', borderRadius:10, fontWeight:600, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>
          Fermer
        </button>
      </div>
    </div>
  );
}

// V18.15 — ClientRow 3 lignes : header teinté profil (ligne 1) + grid 3 secteurs cliquables (lignes 2-3).
// Tap header hors tel → ouvre dossier. Tap secteur → ouvre Section II/III/IV du dossier.
// Préserve v18.2 navigation par section (initialExpandedSection 1/2/3).
function ClientRow({c, onClick, clients, matchInfo, onOpenMatches, onOpenSection}) {
  const [telChooser, setTelChooser] = React.useState(false);
  const profil = c.projet || c.profil_detecte || 'Acheteur';
  const col = PROFILS[profil] || PROFILS.Acheteur;
  const tint = PROFILS_TINT[profil] || PROFILS_TINT.Acheteur;
  const badge = BADGES[profil] || 'ACH';
  const isSociete = c.profil_type === 'Société';
  const name = isSociete
    ? (c.societe_nom || 'Société')
    : (((c.prenom || '') + ' ' + (c.nom || '').toUpperCase()).trim() || 'Sans nom');

  const bien = c.bien || {};
  const typesArr = Array.isArray(bien.types) && bien.types.length
    ? bien.types
    : (bien.type ? [bien.type] : []);
  const typeBien = typesArr.join(' · ');
  const villeQuartier = [bien.ville || c.ville, bien.quartier].filter(Boolean).join(' · ');
  const currency = bien.pays === 'MA' ? 'MAD' : '€';

  // V18.22 — thumbnail photo bien 1ère + badge +N si plusieurs.
  // Proxy : URL externes (http/https) direct. Chemin interne (/uploads/...) via api/image.php auth.
  const photosArr = (() => {
    const raw = Array.isArray(bien.photos) ? bien.photos : [];
    return raw.map(p => {
      if (!p) return null;
      if (typeof p === 'string') return p;
      if (typeof p === 'object' && p.url) return p.url;
      return null;
    }).filter(Boolean);
  })();
  const photoCount = photosArr.length;
  const firstPhotoRaw = photosArr[0] || '';
  const firstPhotoUrl = (() => {
    if (!firstPhotoRaw) return '';
    // API proxy déjà formé (ex : /api/image.php?path=…)
    if (firstPhotoRaw.indexOf('/api/image.php') === 0) return firstPhotoRaw;
    // URL externe (http/https)
    if (/^https?:\/\//.test(firstPhotoRaw)) return firstPhotoRaw;
    // Chemin relatif uploads → proxy auth.
    return '/api/image.php?path=' + encodeURIComponent(firstPhotoRaw.replace(/^\//, ''));
  })();

  // Budget compact : 1,2 M€ / 620k€ / 500 000 MAD. Travaux ou mensualité en sous-ligne.
  function fmtMoney(n, cur) {
    const x = Number(n);
    if (!x) return '';
    if (cur === '€') {
      if (x >= 1000000) {
        const v = x / 1000000;
        return (v === Math.floor(v) ? v.toFixed(0) : v.toFixed(1).replace('.', ',')) + ' M€';
      }
      if (x >= 1000) return Math.round(x / 1000) + 'k€';
      return x.toLocaleString('fr-FR') + ' €';
    }
    return x.toLocaleString('fr-FR') + ' ' + cur;
  }
  let budgetMain = '', budgetSub = '';
  if (profil === 'Acheteur' || profil === 'Investisseur') {
    const f = (c.financement && typeof c.financement === 'object') ? c.financement : {};
    const b = f.budget_total || c.budget_max || c.budget_min;
    if (b) budgetMain = fmtMoney(b, currency);
    const trav = f.travaux || c.travaux;
    if (trav) budgetSub = '+' + fmtMoney(trav, currency).replace(' ', '') + ' trvx';
    else if (f.mode === 'classique' && f.mensualite) budgetSub = fmtMoney(f.mensualite, currency) + '/mois';
  } else if (profil === 'Vendeur' && c.prix_affiche) {
    budgetMain = fmtMoney(c.prix_affiche, currency);
  } else if (profil === 'Bailleur' && c.loyer_demande) {
    budgetMain = fmtMoney(c.loyer_demande, currency) + '/mois';
  } else if (profil === 'Locataire' && c.loyer_max) {
    budgetMain = '≤ ' + fmtMoney(c.loyer_max, currency) + '/mois';
  }

  // tel primary (migration legacy à la volée).
  const tels = Array.isArray(c.tels) && c.tels.length > 0
    ? c.tels
    : (c.tel ? [{label:'Perso', valeur:c.tel, primary:true}] : []);
  const primaryTel = tels.find(t => t.primary) || tels[0];

  // Suivi secteur III : prochain RDV 7j > todo due > ou "+ Planifier". Badge urgent si <24h.
  const suivi = c.suivi || {};
  const nextEvent = suivi.next_event;
  const nextTodo = suivi.next_todo;
  function suiviTexts() {
    if (nextEvent && nextEvent.when_at) {
      const t = new Date(nextEvent.when_at.replace(' ', 'T'));
      const days = (t - new Date()) / (1000*3600*24);
      if (days <= 7) {
        const dn = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][t.getDay()];
        const hh = String(t.getHours()).padStart(2, '0') + 'h' + (t.getMinutes() ? String(t.getMinutes()).padStart(2, '0') : '');
        const l1 = days < 1 ? ("Aujourd'hui " + hh)
                 : days < 2 ? ('Demain ' + hh)
                 : (dn + ' ' + hh);
        return {l1, l2: (nextEvent.title || '').slice(0, 22), urgent: days < 1};
      }
    }
    if (nextTodo && nextTodo.due_at) {
      const t = new Date(nextTodo.due_at.replace(' ', 'T'));
      const days = (t - new Date()) / (1000*3600*24);
      if (days <= 7) {
        const l1 = days < 1 ? 'Tâche aujourd\u2019hui'
                 : days < 2 ? 'Demain'
                 : 'Dans ' + Math.ceil(days) + 'j';
        return {l1, l2: '✅ ' + (nextTodo.title || 'Relancer').slice(0, 20), urgent: days < 1};
      }
    }
    return null;
  }
  const suivi3 = suiviTexts();

  // Badges cumul (dossiers liés v17.15). V18.23 : affiché juste après le badge principal pour
  // lecture instantanée multi-casquettes (au lieu de tout à droite, loin du badge).
  const linkedIds = Array.isArray(c.linked_dossiers) ? c.linked_dossiers : [];
  const linkedDossiers = linkedIds
    .map(id => (clients || []).find(x => x.id === id))
    .filter(Boolean);
  const linkedBadges = linkedDossiers.map(x => BADGES[x.projet || 'Acheteur'] || '');
  // Couleur profil lié dominant si 1 seul, sinon ocre neutre.
  const linkedColor = linkedDossiers.length === 1
    ? (PROFILS[linkedDossiers[0].projet] || '#8B5E3C')
    : '#8B5E3C';

  function openSec(idx, e) {
    if (e) e.stopPropagation();
    onOpenSection && onOpenSection(c, idx);
  }

  // V18.18 — imports staged : distinction 🔗 Lien vs 📸 Document. Thumbnail si image.
  const isStagedRow = !!c.is_staged;
  const importType = c.import_type || (c.from_url_import ? 'url' : null);
  const importImageUrl = c.import_image_url ? ('/api' + (c.import_image_url.indexOf('/api') === 0 ? c.import_image_url.slice(4) : '/image.php?path=' + encodeURIComponent(c.import_image_url))) : null;
  const sourceTypeLabels = {sms:'💬 SMS', whatsapp:'🟢 WhatsApp', screenshot_web:'🖥 Capture web', photo_annonce_papier:'📄 Annonce papier', photo_panneau:'🪧 Panneau', capture_autre:'📸 Image'};
  const sourceChip = isStagedRow
    ? (importType === 'image'
        ? (sourceTypeLabels[c.import_source_type] || '📸 Image')
        : (importType === 'url' ? ('🔗 ' + (c.source_domain || 'Lien')) : null))
    : null;

  return (
    <div className="client-row-card" onClick={onClick}>
      <div className="client-row-head" style={{background: tint}}>
        {isStagedRow && importType === 'image' && importImageUrl ? (
          <div className="client-row-badge" style={{background:'#F4EFE5', padding:0, overflow:'hidden'}}>
            <img src={importImageUrl} alt="" style={{width:'100%', height:'100%', objectFit:'cover'}}
              onError={e => { e.target.style.display = 'none'; }}/>
          </div>
        ) : (
          <div className="client-row-badge" style={{background: col}}>{badge}</div>
        )}
        {/* V18.23 — LinkedProfilesBadge collé au badge principal pour lecture instantanée. */}
        {linkedBadges.length > 0 && (
          <button type="button"
            onClick={e => { e.stopPropagation(); openSec(0); }}
            title="Dossiers liés — voir Section I"
            style={{display:'inline-flex', alignItems:'center', gap:3, fontSize:11, color: linkedColor, fontWeight:600, letterSpacing:.2, background:'rgba(255,255,255,.6)', border:'1px solid ' + linkedColor, borderRadius:6, padding:'2px 6px', flexShrink:0, cursor:'pointer', fontFamily:'inherit'}}>
            <span style={{fontSize:11, lineHeight:1}}>🔗</span>
            <span style={{whiteSpace:'nowrap'}}>{linkedBadges.join(' · ')}</span>
          </button>
        )}
        <div className="client-row-name">{name}</div>
        {/* V18.47 — badge "En ligne / Masquée" si dossier publié sur vitrine ocre.immo */}
        {c.is_published ? (
          <span title={c.public_visible ? 'Publié en ligne sur ocre.immo' : 'Publication masquée'}
            style={{fontSize:10, fontWeight:700, color: c.public_visible ? '#2E7D32' : '#8B7F6E', background:'#fff', border:'1px solid ' + (c.public_visible ? '#2E7D32' : '#C9B79A'), borderRadius:10, padding:'2px 7px', whiteSpace:'nowrap', flexShrink:0}}>
            ● {c.public_visible ? 'En ligne' : 'Masquée'}
          </span>
        ) : null}
        {sourceChip && (
          <div style={{fontSize:10, color: importType === 'image' ? '#8B6B1E' : '#B26D3A', fontWeight:700, flexShrink:0, background:'#fff', border:'1px solid #E8DDD0', borderRadius:10, padding:'2px 7px', whiteSpace:'nowrap'}}>{sourceChip}</div>
        )}
        {primaryTel && primaryTel.valeur ? (
          tels.length > 1 ? (
            // Plusieurs tels : PhonePill ouvre le chooser au lieu d'appeler direct.
            <button type="button"
              onClick={e => { e.preventDefault(); e.stopPropagation(); setTelChooser(true); }}
              onTouchStart={e => e.stopPropagation()}
              style={{background:'none', border:'none', padding:0, cursor:'pointer', fontFamily:'inherit', display:'inline-flex', alignItems:'center', gap:4, flexShrink:0}}>
              <PhonePill tel={primaryTel.valeur} size="sm"/>
              <span style={{fontSize:10, color:'#B26D3A', fontWeight:700}}>(+{tels.length - 1})</span>
            </button>
          ) : (
            <PhonePill tel={primaryTel.valeur} size="sm"/>
          )
        ) : (
          <button className="client-row-chip-add"
            onClick={e => { e.stopPropagation(); onOpenSection && onOpenSection(c, 0); }}>+ Contact</button>
        )}
        {matchInfo && matchInfo.count > 0 && (
          <button onClick={e => { e.stopPropagation(); onOpenMatches && onOpenMatches(); }}
            style={{background:'none', border:'none', cursor:'pointer', padding:'2px 4px', fontSize:12, color: matchInfo.max_score > 80 ? '#D64545' : '#B26D3A', fontWeight:700, flexShrink:0, fontFamily:'inherit'}}
            title="Voir les matches">🎯 {matchInfo.count}{matchInfo.max_score > 80 ? '★' : ''}</button>
        )}
      </div>
      <div className="client-row-grid">
        <div className="client-row-sector" onClick={e => openSec(1, e)}>
          <div className="client-row-sector-label">🏠 Bien</div>
          {(typeBien || villeQuartier || firstPhotoUrl) ? (
            firstPhotoUrl ? (
              // V18.22 — thumbnail photo bien + texte à droite. Badge +N si photoCount > 1.
              <div style={{display:'flex', alignItems:'center', gap:7, minWidth:0}}>
                <div style={{position:'relative', width:48, height:48, borderRadius:6, overflow:'hidden', flexShrink:0, background:'#F0E4D4', border:'1px solid #D4C3A8'}}>
                  <img src={firstPhotoUrl} alt="" loading="lazy"
                    style={{width:'100%', height:'100%', objectFit:'cover', display:'block'}}
                    onError={e => { e.target.parentNode.style.display = 'none'; }}/>
                  {photoCount > 1 && (
                    <div style={{position:'absolute', right:2, bottom:2, background:'rgba(0,0,0,.7)', color:'#fff', fontSize:9, fontWeight:700, padding:'2px 4px', borderRadius:4, lineHeight:1, fontFamily:'inherit'}}>+{photoCount - 1}</div>
                  )}
                </div>
                <div style={{flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:1}}>
                  {typeBien ? <div className="client-row-sector-l1">{typeBien.slice(0, 18)}</div>
                            : <div className="client-row-sector-l1" style={{color:'#8B7F6E'}}>—</div>}
                  {villeQuartier ? <div className="client-row-sector-l2">{villeQuartier.slice(0, 22)}</div> : null}
                </div>
              </div>
            ) : (
              <>
                {typeBien ? <div className="client-row-sector-l1">{typeBien.slice(0, 22)}</div>
                          : <div className="client-row-sector-l1" style={{color:'#8B7F6E'}}>—</div>}
                {villeQuartier ? <div className="client-row-sector-l2">{villeQuartier.slice(0, 28)}</div> : null}
              </>
            )
          ) : (
            <div className="client-row-sector-empty">+ Définir</div>
          )}
        </div>
        <div className="client-row-sector" onClick={e => openSec(2, e)}>
          <div className="client-row-sector-label">💰 Budget</div>
          {budgetMain ? (
            <>
              <div className="client-row-sector-l1">{budgetMain}</div>
              {budgetSub ? <div className="client-row-sector-l2">{budgetSub}</div> : null}
            </>
          ) : (
            <div className="client-row-sector-empty">+ Ajouter</div>
          )}
        </div>
        <div className="client-row-sector" onClick={e => openSec(3, e)}>
          <div className="client-row-sector-label">
            📅 Suivi
            {suivi3 && suivi3.urgent ? <span style={{marginLeft:3}}>🔴</span> : null}
          </div>
          {suivi3 ? (
            <>
              <div className={'client-row-sector-l1' + (suivi3.urgent ? ' client-row-sector-urgent' : '')}>{suivi3.l1}</div>
              {suivi3.l2 ? <div className="client-row-sector-l2">{suivi3.l2}</div> : null}
            </>
          ) : (
            <div className="client-row-sector-empty">+ Planifier</div>
          )}
        </div>
      </div>
      {telChooser && (
        <ContactChooser entries={tels} scheme="tel:" title="Choisir un numéro" onClose={() => setTelChooser(false)}/>
      )}
    </div>
  );
}

// V18.20 — ConfirmModal global. Monté par App quand state confirmReq est actif.
// Promesse résolue true/false via les deux boutons.
function ConfirmModal({title, message, danger, confirmLabel, cancelLabel, onConfirm, onCancel}) {
  useEffect(() => {
    function onKey(e) {
      if (e.key === 'Escape') onCancel && onCancel();
      if (e.key === 'Enter') onConfirm && onConfirm();
    }
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onConfirm, onCancel]);
  return (
    <div onClick={onCancel}
      style={{position:'fixed', inset:0, background:'rgba(20,15,10,.6)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
      <div onClick={e => e.stopPropagation()}
        style={{background:'#fff', border:'1.5px solid #A67F5A', borderRadius:14, padding:20, width:'100%', maxWidth:340, boxShadow:'0 20px 50px rgba(0,0,0,.25)'}}>
        <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:18, fontWeight:700, color: danger ? '#C04B20' : '#8B5E3C', marginBottom:8}}>{title}</div>
        {message && <div style={{fontSize:13, color:'#2A2018', lineHeight:1.5, marginBottom:16}}>{message}</div>}
        <div style={{display:'flex', gap:8, justifyContent:'flex-end'}}>
          <button onClick={onCancel}
            style={{padding:'10px 14px', background:'#FDFAF7', color:'#8B5E3C', border:'1.5px solid #E8DDD0', borderRadius:9, fontWeight:600, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>
            {cancelLabel || 'Annuler'}
          </button>
          <button onClick={onConfirm}
            style={{padding:'10px 14px', background: danger ? '#C04B20' : 'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:9, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>
            {confirmLabel || (danger ? 'Supprimer' : 'Confirmer')}
          </button>
        </div>
      </div>
    </div>
  );
}

// V18.20 — helper court pour utiliser le ConfirmModal depuis n'importe quel composant.
// `await askConfirm({title,message,danger:true})` → bool.
async function askConfirm(opts) {
  if (typeof window !== 'undefined' && typeof window.__ocreAsk === 'function') {
    return await window.__ocreAsk(opts);
  }
  // Fallback defensive (si modal pas encore monté au tout premier render) : confirm natif.
  return window.confirm((opts && opts.message) || (opts && opts.title) || 'Confirmer ?');
}

function Toast({msg}) {
  return (
    <div style={{position:'fixed', top:18, left:'50%', transform:'translateX(-50%)',
                 padding:'10px 20px', borderRadius:22, background:'#2A2018', color:'#fff',
                 fontSize:13, fontWeight:700, animation:'fadeIn .2s ease', zIndex:100}}>{msg}</div>
  );
}

function suiviApi(action, opts) {
  const token = localStorage.getItem('ocre_token') || '';
  const url = API + '/suivi.php?action=' + action + (opts && opts.query ? ('&' + opts.query) : '');
  const init = {headers: {'X-Session-Token': token}};
  if (opts && opts.body) {
    init.method = 'POST';
    init.headers['Content-Type'] = 'application/json';
    init.body = JSON.stringify(opts.body);
  }
  return fetch(url, init).then(r => r.json());
}
function relTimeFr(iso) {
  if (!iso) return '';
  const d = new Date(iso.replace(' ', 'T'));
  const now = new Date();
  const diff = (d - now) / 1000; // en secondes
  const absDiff = Math.abs(diff);
  if (absDiff < 60) return diff < 0 ? "à l'instant" : 'dans un instant';
  if (absDiff < 3600) {
    const m = Math.round(absDiff / 60);
    return diff < 0 ? ('il y a ' + m + ' min') : ('dans ' + m + ' min');
  }
  if (absDiff < 86400) {
    const h = Math.round(absDiff / 3600);
    return diff < 0 ? ('il y a ' + h + 'h') : ('dans ' + h + 'h');
  }
  const days = Math.round(absDiff / 86400);
  if (days === 1) return diff < 0 ? 'hier' : 'demain';
  if (days < 7) {
    const dayName = ['dim','lun','mar','mer','jeu','ven','sam'][d.getDay()];
    const hh = String(d.getHours()).padStart(2,'0') + 'h' + (d.getMinutes() ? String(d.getMinutes()).padStart(2,'0') : '');
    return diff > 0 ? (dayName + ' ' + hh) : ('il y a ' + days + 'j');
  }
  return d.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}) + ' ' + String(d.getHours()).padStart(2,'0') + 'h';
}
function parseFrDate(s) {
  // "23/04/2026 15:30" → "2026-04-23 15:30:00"
  if (!s) return null;
  const m = s.trim().match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})(?:\s+(\d{1,2})[h:](\d{0,2}))?$/);
  if (!m) return null;
  const [, dd, mo, yy, hh, mm] = m;
  const year = yy.length === 2 ? '20' + yy : yy;
  const HH = hh ? String(hh).padStart(2,'0') : '09';
  const MM = mm ? String(mm).padStart(2,'0') : '00';
  return year + '-' + String(mo).padStart(2,'0') + '-' + String(dd).padStart(2,'0') + ' ' + HH + ':' + MM + ':00';
}
function fmtFrDate(iso) {
  if (!iso) return '';
  const d = new Date(iso.replace(' ', 'T'));
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear()
    + ' ' + String(d.getHours()).padStart(2,'0') + 'h' + String(d.getMinutes()).padStart(2,'0');
}

function SuiviPanel({clientId, defaultLocation, showToast}) {
  const [todos, setTodos] = React.useState([]);
  const [events, setEvents] = React.useState([]);
  const [journal, setJournal] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [eventModal, setEventModal] = React.useState(null);
  const [todoModal, setTodoModal] = React.useState(null);
  const [journalNote, setJournalNote] = React.useState('');

  async function reload() {
    if (!clientId) { setLoading(false); return; }
    const [t, e, j] = await Promise.all([
      suiviApi('list_todos', {query: 'client_id=' + clientId}),
      suiviApi('list_events', {query: 'client_id=' + clientId}),
      suiviApi('list_journal', {query: 'client_id=' + clientId}),
    ]);
    if (t.ok) setTodos(t.todos || []);
    if (e.ok) setEvents(e.events || []);
    if (j.ok) setJournal(j.journal || []);
    setLoading(false);
  }
  React.useEffect(() => { reload(); }, [clientId]);

  if (!clientId) {
    return <div style={{padding:'14px 12px', background:'#FBF1E4', borderRadius:10, color:'#8B7F6E', fontSize:13, textAlign:'center', marginBottom:12}}>Enregistrez d'abord le dossier pour activer le suivi.</div>;
  }
  if (loading) return <div style={{padding:'14px 12px', color:'#8B7F6E', fontSize:13}}>Chargement…</div>;

  const now = new Date();
  const futureEvents = events.filter(e => e.status === 'planned' && new Date(e.when_at.replace(' ','T')) >= now).sort((a,b) => a.when_at.localeCompare(b.when_at));
  const nextEvent = futureEvents[0] || null;
  const past7d = new Date(now.getTime() - 7*24*3600*1000);
  const visibleEvents = events.filter(e => {
    const t = new Date(e.when_at.replace(' ','T'));
    return t >= past7d;
  }).sort((a,b) => a.when_at.localeCompare(b.when_at));
  const openTodos = todos.filter(t => !t.done);

  async function toggleTodo(id, currentDone) {
    const r = await suiviApi('toggle_todo', {body: {id, done: !currentDone ? 1 : 0}});
    if (r.ok) reload();
  }
  async function deleteTodo(id) {
    if (!(await askConfirm({title:'Supprimer la tâche ?', message:'La tâche et son échéance seront effacées définitivement.', danger:true}))) return;
    const r = await suiviApi('delete_todo', {body: {id}});
    if (r.ok) reload();
  }
  async function completeEvent(id) {
    const r = await suiviApi('complete_event', {body: {id}});
    if (r.ok) { showToast('RDV terminé'); reload(); }
  }
  async function addJournalEntry(kind, content) {
    if (!content.trim()) return;
    const r = await suiviApi('add_journal_entry', {body: {client_id: clientId, kind, content: content.trim()}});
    if (r.ok) { setJournalNote(''); reload(); }
  }
  async function deleteJournalEntry(id) {
    if (!(await askConfirm({title:'Supprimer cette entrée ?', message:'L\'entrée du journal sera effacée définitivement.', danger:true}))) return;
    const r = await suiviApi('delete_journal_entry', {body: {id}});
    if (r.ok) reload();
  }

  const cardStyle = {background:'#fff', borderRadius:10, padding:'12px 14px', marginBottom:10, border:'1px solid #EDE6DC'};
  const cardTitle = {fontSize:11, fontWeight:700, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:.6, marginBottom:8};
  const btnAdd = {width:'100%', padding:'10px', background:'#FBF1E4', color:'#8B5E3C', border:'1.5px dashed #B26D3A', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'};
  const btnSecondary = {padding:'7px 10px', background:'#FDFAF7', color:'#8B5E3C', border:'1px solid #E8DDD0', borderRadius:7, fontWeight:700, fontSize:11, cursor:'pointer', fontFamily:'inherit'};

  return (
    <div>
      {/* A — Prochain RDV */}
      <div style={{...cardStyle, background: nextEvent ? '#FBF1E4' : '#fff', border: nextEvent ? '1.5px solid #B26D3A' : '1px solid #EDE6DC'}}>
        <div style={cardTitle}>📌 Prochain rendez-vous</div>
        {nextEvent ? (
          <div>
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
              <span style={{fontSize:18}}>{EVENT_TYPE_ICON[nextEvent.type]}</span>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:700, fontSize:14, color:'#2A2018', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{nextEvent.title}</div>
                <div style={{fontSize:12, color:'#8B5E3C', fontWeight:600}}>{relTimeFr(nextEvent.when_at)} · {fmtFrDate(nextEvent.when_at)}</div>
              </div>
            </div>
            <div style={{display:'flex', gap:6, marginTop:6}}>
              <button type="button" onClick={() => completeEvent(nextEvent.id)} style={{...btnSecondary, flex:1}}>✓ Terminé</button>
              <button type="button" onClick={() => setEventModal({...nextEvent})} style={{...btnSecondary, flex:1}}>⏰ Modifier</button>
            </div>
          </div>
        ) : (
          <button type="button" onClick={() => setEventModal({})} style={btnAdd}>+ Programmer un RDV</button>
        )}
      </div>

      {/* B — À faire */}
      <div style={cardStyle}>
        <div style={cardTitle}>✅ À faire ({openTodos.length})</div>
        {openTodos.length === 0 && <div style={{color:'#B5A78F', fontSize:12, fontStyle:'italic', marginBottom:8}}>Aucune tâche en cours.</div>}
        {openTodos.map(t => {
          const prioBadge = t.priority === 'high' ? '🔴' : (t.priority === 'medium' ? '🟠' : '');
          return (
            <div key={t.id} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 0', borderBottom:'1px solid #F4EEE6'}}>
              <button type="button" onClick={() => toggleTodo(t.id, t.done)}
                style={{width:22, height:22, borderRadius:4, border:'2px solid #B26D3A', background:'#fff', cursor:'pointer', flexShrink:0, padding:0}} title="Marquer comme fait"/>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:13, color:'#2A2018', fontWeight:600}}>{prioBadge} {t.title}</div>
                {t.due_at && <div style={{fontSize:11, color:'#8B7F6E'}}>📅 {relTimeFr(t.due_at)}</div>}
              </div>
              <button type="button" onClick={() => setTodoModal(t)} style={{background:'none', border:'none', color:'#8B5E3C', fontSize:14, cursor:'pointer', padding:4}} title="Modifier">✎</button>
              <button type="button" onClick={() => deleteTodo(t.id)} style={{background:'none', border:'none', color:'#C04B20', fontSize:16, cursor:'pointer', padding:4}} title="Supprimer">×</button>
            </div>
          );
        })}
        <button type="button" onClick={() => setTodoModal({})} style={{...btnAdd, marginTop:8}}>+ Ajouter une tâche</button>
      </div>

      {/* C — Agenda */}
      <div style={cardStyle}>
        <div style={cardTitle}>🗓 Agenda (7j passés + futurs)</div>
        {visibleEvents.length === 0 && <div style={{color:'#B5A78F', fontSize:12, fontStyle:'italic', marginBottom:8}}>Aucun événement.</div>}
        {visibleEvents.map(e => {
          const t = new Date(e.when_at.replace(' ','T'));
          const isPast = t < now;
          return (
            <div key={e.id} onClick={() => setEventModal(e)}
              style={{display:'flex', alignItems:'center', gap:8, padding:'8px 0', borderBottom:'1px solid #F4EEE6', cursor:'pointer', opacity: isPast ? .55 : 1}}>
              <span style={{fontSize:16, flexShrink:0}}>{EVENT_TYPE_ICON[e.type]}</span>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:13, color:'#2A2018', fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{e.title}</div>
                <div style={{fontSize:11, color:'#8B7F6E'}}>{fmtFrDate(e.when_at)} · {relTimeFr(e.when_at)}{e.location ? ' · ' + e.location : ''}{e.status === 'done' ? ' · ✓' : ''}</div>
              </div>
            </div>
          );
        })}
        <button type="button" onClick={() => setEventModal({})} style={{...btnAdd, marginTop:8}}>+ Nouveau RDV</button>
      </div>

      {/* D — Historique interactions */}
      <div style={cardStyle}>
        <div style={cardTitle}>💬 Historique interactions ({journal.length})</div>
        <div style={{display:'flex', gap:5, marginBottom:10, flexWrap:'wrap'}}>
          {[
            ['note','+ Note'],
            ['appel_entrant','📞⬇'],
            ['appel_sortant','📞⬆'],
            ['email_envoye','✉️⬆'],
            ['visite','🏠'],
          ].map(([k, lbl]) => (
            <button key={k} type="button" onClick={() => {
              const c = prompt(JOURNAL_KIND_LABEL[k] + ' — contenu :', '');
              if (c) addJournalEntry(k, c);
            }} style={btnSecondary}>{lbl}</button>
          ))}
        </div>
        {journal.length === 0 && <div style={{color:'#B5A78F', fontSize:12, fontStyle:'italic'}}>Aucune interaction.</div>}
        {journal.map(j => (
          <div key={j.id} style={{padding:'8px 0', borderBottom:'1px solid #F4EEE6'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:6}}>
              <div style={{fontSize:11, color:'#8B5E3C', fontWeight:700}}>{JOURNAL_KIND_ICON[j.kind] || '📝'} {JOURNAL_KIND_LABEL[j.kind] || j.kind} · {relTimeFr(j.ts)}</div>
              <button type="button" onClick={() => deleteJournalEntry(j.id)} style={{background:'none', border:'none', color:'#C04B20', fontSize:13, cursor:'pointer', padding:0}} title="Supprimer">×</button>
            </div>
            <div style={{fontSize:13, color:'#2A2018', marginTop:2, whiteSpace:'pre-wrap'}}>{j.content}</div>
          </div>
        ))}
      </div>

      {eventModal && <EventModal clientId={clientId} defaultLocation={defaultLocation} initial={eventModal}
        onClose={() => setEventModal(null)} onSaved={() => reload()} showToast={showToast}/>}
      {todoModal && <TodoModal clientId={clientId} initial={todoModal}
        onClose={() => setTodoModal(null)} onSaved={() => reload()} showToast={showToast}/>}
    </div>
  );
}

// V18.21 — DownloadsView : textarea URL directement prête (pas de page intermédiaire),
// bouton Document image en dessous, liste staged en bas. Fusion de l'ancien ImportUrlView
// qui est désormais retiré (logique analyse + createDraft inline ici).
function DownloadsView({onBack, staged, clients, onStagedCreated, openClient, onPickedImageFile, showToast, toast}) {
  // V18.29 — 1 seul ref input file (iOS/Android affichent leur action sheet natif au tap).
  const refFile = React.useRef(null);
  function handlePicked(f) {
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { showToast && showToast('Fichier trop grand (max 10 Mo)'); return; }
    onPickedImageFile && onPickedImageFile(f);
  }
  // --- Recherche (v18.19 SearchBar factorisée) ---
  const [showSearch, setShowSearch] = React.useState(false);
  const [searchInput, setSearchInput] = React.useState('');
  const [searchValue, setSearchValue] = React.useState('');
  React.useEffect(() => {
    const t = setTimeout(() => setSearchValue(searchInput), 150);
    return () => clearTimeout(t);
  }, [searchInput]);
  function toggleSearch() {
    if (showSearch) { setShowSearch(false); setSearchInput(''); setSearchValue(''); }
    else setShowSearch(true);
  }
  const filteredStaged = applySearchRank(staged || [], searchValue);
  const n = filteredStaged.length;
  const nTotal = (staged || []).length;

  // --- Import URL inline (ex-ImportUrlView, v18.11 logique conservée) ---
  const [rawText, setRawText] = React.useState('');
  const [detectedUrl, setDetectedUrl] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [creating, setCreating] = React.useState(false);
  const [manualNote, setManualNote] = React.useState('');
  const urlRef = React.useRef(null);

  // Autofocus textarea uniquement si liste staged vide (première visite / après validation du dernier).
  React.useEffect(() => {
    if (nTotal === 0 && urlRef.current) {
      try { urlRef.current.focus(); } catch (e) {}
    }
  }, []); // mount only

  React.useEffect(() => {
    const t = setTimeout(() => setDetectedUrl(extractFirstUrl(rawText)), 200);
    return () => clearTimeout(t);
  }, [rawText]);

  async function analyseUrl() {
    const u = detectedUrl || extractFirstUrl(rawText);
    if (!u) { showToast && showToast('Aucune URL détectée'); return; }
    setLoading(true);
    setResult(null);
    const token = localStorage.getItem('ocre_token') || '';
    try {
      const r = await fetch(API + '/import_url.php?action=extract', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token},
        body: JSON.stringify({url: u}),
      });
      const d = await r.json();
      if (d && d.ok) setResult(d.extracted);
      else showToast && showToast((d && d.error) || 'Échec extraction');
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setLoading(false);
  }

  async function createStagedFromUrl() {
    if (!result) return;
    setCreating(true);
    const token = localStorage.getItem('ocre_token') || '';
    const now = new Date().toISOString();
    const isPro = result.annonceur_type === 'professionnel';
    const annonceurNom = result.annonceur_nom || '';
    const client = {
      profil_type: isPro ? 'Société' : 'Particulier',
      projet: 'Vendeur',
      is_staged: true,
      import_type: 'url', import_source: 'url',
      staged_at: now, from_url_import: true,
      source_url: result.source_url || detectedUrl,
      source_domain: result.source_domain,
      url_imported_at: now,
    };
    if (isPro && annonceurNom) client.societe_nom = annonceurNom;
    else if (annonceurNom) client.prenom = annonceurNom;
    const manualTel = (manualNote.match(/(?:(?:\+|00)\d{1,3}[\s.-]?|0)[1-9](?:[\s.-]*\d){8,9}/) || [])[0];
    const manualEmail = (manualNote.match(/[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/i) || [])[0];
    const tel = manualTel || result.annonceur_tel_mentionne;
    const email = manualEmail || result.annonceur_email_mentionne;
    if (tel) { client.tel = tel; client.tels = [{label:'Principal', valeur: tel, primary: true}]; }
    if (email) { client.email = email; client.emails = [{label:'Principal', valeur: email, primary: true}]; }
    const notesParts = [];
    if (result.description_complete || result.description) notesParts.push(result.description_complete || result.description);
    if (manualNote.trim()) notesParts.push('--- Notes manuelles ---\n' + manualNote.trim());
    if (notesParts.length) client.notes = notesParts.join('\n\n');
    const bien = {};
    if (result.pays_bien) bien.pays = result.pays_bien;
    if (result.ville_bien) bien.ville = result.ville_bien;
    if (result.quartier_bien) bien.quartier = result.quartier_bien;
    if (result.code_postal) client.code_postal = result.code_postal;
    if (Array.isArray(result.types_bien) && result.types_bien.length) { bien.types = result.types_bien; bien.type = result.types_bien[0]; }
    if (result.titre || result.title) bien.titre = result.titre || result.title;
    if (result.description_complete) bien.description = result.description_complete;
    const surfH = result.surface_habitable || result.surface;
    if (surfH) { bien.surface = surfH; bien.surface_habitable = surfH; }
    if (result.surface_terrain) bien.surface_terrain = result.surface_terrain;
    if (result.nombre_pieces) bien.pieces = result.nombre_pieces;
    if (result.nombre_chambres || result.chambres) bien.chambres = result.nombre_chambres || result.chambres;
    if (result.nombre_sdb) bien.sdb = result.nombre_sdb;
    if (result.etage != null) bien.etage = result.etage;
    if (result.dpe_class) bien.dpe = result.dpe_class;
    if (result.dpe_ges) bien.ges = result.dpe_ges;
    if (result.annee_construction) bien.annee_construction = result.annee_construction;
    if (result.neuf_ancien) bien.neuf_ancien = result.neuf_ancien;
    const carac = [];
    if (result.ascenseur) carac.push('Ascenseur');
    if (result.parking) carac.push('Parking');
    if (result.cave) carac.push('Cave');
    if (result.balcon_terrasse) carac.push('Balcon/Terrasse');
    if (carac.length) bien.caracteristiques = carac;
    if (Array.isArray(result.photos) && result.photos.length) bien.photos = result.photos;
    if (Object.keys(bien).length) client.bien = bien;
    const fin = {};
    if (result.prix) { fin.prix_affiche = result.prix; client.prix_affiche = result.prix; }
    if (result.devise) fin.devise = result.devise;
    if (Object.keys(fin).length) client.financement = fin;
    try {
      const r = await fetch(API + '/clients.php?action=save', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token},
        body: JSON.stringify({client}),
      });
      const d = await r.json();
      if (d && d.ok && d.client) {
        onStagedCreated && onStagedCreated(d.client);
        showToast && showToast('✓ Brouillon créé');
        // Reset form mais reste sur la page : textarea + preview + manuel effacés.
        setRawText(''); setDetectedUrl(null); setResult(null); setManualNote('');
      } else showToast && showToast((d && d.error) || 'Échec sauvegarde');
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setCreating(false);
  }

  function buildPreviewGroups(r) {
    const g = [];
    if (r.source_domain || r.source_url) g.push({icon:'🔗', label:'Source', items:[
      ['Domaine', r.source_domain || ''],
      r.source_url && r.source_url.match(/\/(\d{6,})/) ? ['ID', (r.source_url.match(/\/(\d{6,})/) || [])[1]] : null,
    ].filter(Boolean)});
    const bien = [];
    if (r.titre || r.title) bien.push(['Titre', r.titre || r.title]);
    if (Array.isArray(r.types_bien) && r.types_bien.length) bien.push(['Types', r.types_bien.join(' ou ')]);
    if (r.surface_habitable || r.surface) bien.push(['Surface habitable', (r.surface_habitable || r.surface) + ' m²']);
    if (r.surface_terrain) bien.push(['Surface terrain', r.surface_terrain + ' m²']);
    const pcs = [r.nombre_pieces && (r.nombre_pieces + ' pièces'), (r.nombre_chambres || r.chambres) && ((r.nombre_chambres || r.chambres) + ' chambres'), r.nombre_sdb && (r.nombre_sdb + ' SDB')].filter(Boolean);
    if (pcs.length) bien.push(['Composition', pcs.join(' · ')]);
    if (bien.length) g.push({icon:'🏠', label:'Bien', items: bien});
    if (r.prix) g.push({icon:'💰', label:'Prix', items: [['Affiché', Number(r.prix).toLocaleString('fr-FR') + ' ' + (r.devise || '€')]]});
    const loc = [];
    if (r.ville_bien) loc.push(['Ville', r.ville_bien + (r.quartier_bien ? ', ' + r.quartier_bien : '')]);
    if (loc.length) g.push({icon:'📍', label:'Localisation', items: loc});
    const ann = [];
    if (r.annonceur_nom) ann.push(['Nom', r.annonceur_nom]);
    if (r.annonceur_tel_mentionne) ann.push(['Tel', r.annonceur_tel_mentionne]);
    if (r.annonceur_email_mentionne) ann.push(['Email', r.annonceur_email_mentionne]);
    if (ann.length) g.push({icon:'👤', label:'Annonceur', items: ann});
    return g;
  }
  const previewGroups = result ? buildPreviewGroups(result) : [];
  const previewCount = previewGroups.reduce((n, g) => n + g.items.length, 0);

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:'#F0E8D8'}}>
      <div style={{background:'#fff', borderBottom:'1.5px solid #A67F5A', padding:'10px 14px', position:'sticky', top:0, zIndex:10, display:'flex', alignItems:'center', gap:10}}>
        <button onClick={onBack} style={{background:'none', border:'none', fontSize:20, color:'#8B5E3C', cursor:'pointer', fontFamily:'inherit'}}>←</button>
        <div style={{flex:1, textAlign:'center', fontFamily:'Cormorant Garamond,serif', fontSize:18, fontWeight:700, color:'#1A1208', display:'flex', alignItems:'center', justifyContent:'center', gap:6}}>
          <DownloadIcon size={20} color="#8B5E3C"/>
          <span>Téléchargements</span>
        </div>
        <PillIconButton icon={
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        } title={showSearch ? 'Fermer la recherche' : 'Rechercher'}
          active={showSearch || !!searchValue}
          onClick={toggleSearch}/>
      </div>
      <SearchBar open={showSearch} value={searchInput} onChange={setSearchInput}
        placeholder="Rechercher dans les téléchargements…"/>

      <div style={{flex:1, overflowY:'auto', padding:'14px 14px 96px'}}>

        {/* Card URL inline — textarea toujours prête. */}
        <div style={{background:'#fff', border:'1.5px solid #A67F5A', borderRadius:12, padding:14, marginBottom:12, boxShadow:'0 1px 3px rgba(139,94,60,.06)'}}>
          <div style={{fontSize:13, fontWeight:700, color:'#8B5E3C', marginBottom:8, display:'flex', alignItems:'center', gap:6}}>
            🔗 Coller une URL
          </div>
          <textarea ref={urlRef} value={rawText} onChange={e => setRawText(e.target.value)}
            placeholder="ex: https://www.mubawab.ma/fr/a/..."
            autoCapitalize="off" autoCorrect="off" spellCheck="false"
            style={{width:'100%', minHeight:64, padding:'10px 12px', borderRadius:9, border:'1px solid #E0CDAE', background:'#FDFAF7', fontSize:13, outline:'none', fontFamily:'inherit', color:'#2A2018', marginBottom:8, resize:'vertical'}}/>
          {detectedUrl && (
            <div style={{fontSize:11, color:'#8B5E3C', marginBottom:8, background:'#FBF1E4', padding:'6px 10px', borderRadius:8, border:'1px solid #E0CDAE', display:'flex', alignItems:'center', gap:6, overflow:'hidden'}}>
              <span style={{flexShrink:0}}>🔗</span>
              <span style={{flex:1, minWidth:0, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', fontWeight:600}}>{detectedUrl.replace(/^https?:\/\/(www\.)?/, '')}</span>
            </div>
          )}
          <button type="button" onClick={analyseUrl} disabled={!detectedUrl || loading}
            style={{width:'100%', padding:'12px', background: detectedUrl ? 'linear-gradient(135deg,#8B5E3C,#A06B45)' : '#C4B5A0', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:13.5, cursor: detectedUrl ? 'pointer' : 'not-allowed', fontFamily:'inherit', opacity: loading ? .6 : 1}}>
            {loading ? '⏳ Analyse ~10s…' : (detectedUrl ? '📥 Extraire et créer brouillon' : 'Aucune URL détectée')}
          </button>
        </div>

        {/* Séparateur "OU" */}
        {!result && !loading && (
          <div style={{display:'flex', alignItems:'center', gap:10, margin:'4px 0 10px'}}>
            <div style={{flex:1, height:1, background:'#D4C3A8'}}/>
            <div style={{fontSize:11, color:'#8B7F6E', fontWeight:700, textTransform:'uppercase', letterSpacing:1.5}}>OU</div>
            <div style={{flex:1, height:1, background:'#D4C3A8'}}/>
          </div>
        )}

        {/* V18.35 — zone import compactée : 4 icônes simples inline (+ / 📷 / 🖼 / 📁), pas
            de texte. Les 4 déclenchent le même input file — iOS/Android affichent leur action
            sheet natif au tap. Les émojis restent pour les 3 sources (pas de SVG équivalents). */}
        {!result && !loading && (
          <div style={{marginBottom:14}}>
            <input ref={refFile} type="file" accept="image/*,application/pdf" style={{display:'none'}}
              onChange={e => handlePicked(e.target.files && e.target.files[0])}/>
            <div style={{background:'#FDFAF4', border:'1px solid #E0CDAE', borderRadius:10, padding:'10px 14px', display:'flex', alignItems:'center', justifyContent:'center', gap:20}}>
              <button type="button" onClick={() => refFile.current && refFile.current.click()}
                title="Ajouter"
                style={{background:'none', border:'none', cursor:'pointer', padding:4, color:'#5C3B1E', display:'inline-flex', alignItems:'center', justifyContent:'center', fontFamily:'inherit'}}>
                <IconPlus size={26}/>
              </button>
              <button type="button" onClick={() => refFile.current && refFile.current.click()}
                title="Photo" aria-label="Photo"
                style={{background:'none', border:'none', cursor:'pointer', padding:4, fontSize:26, lineHeight:1, color:'#5C3B1E', fontFamily:'inherit'}}>📷</button>
              <button type="button" onClick={() => refFile.current && refFile.current.click()}
                title="Galerie" aria-label="Galerie"
                style={{background:'none', border:'none', cursor:'pointer', padding:4, fontSize:26, lineHeight:1, color:'#5C3B1E', fontFamily:'inherit'}}>🖼</button>
              <button type="button" onClick={() => refFile.current && refFile.current.click()}
                title="Fichier" aria-label="Fichier"
                style={{background:'none', border:'none', cursor:'pointer', padding:4, fontSize:26, lineHeight:1, color:'#5C3B1E', fontFamily:'inherit'}}>📁</button>
            </div>
          </div>
        )}

        {/* Preview (après analyse URL) */}
        {result && (
          <div style={{background:'#fff', borderRadius:12, padding:14, border:'1.5px solid #A67F5A', display:'flex', flexDirection:'column', gap:10, marginBottom:14, boxShadow:'0 1px 3px rgba(139,94,60,.06)'}}>
            <div style={{display:'flex', alignItems:'center', gap:6}}>
              <span style={{padding:'3px 9px', borderRadius:999, background: result.extraction_mode === 'ai' ? '#E8F5EC' : '#FFF5E0', color: result.extraction_mode === 'ai' ? '#3E8B5E' : '#D4A437', fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:.5}}>
                {result.extraction_mode === 'ai' ? '🤖 IA' : '📐 Heuristique'}
              </span>
              <span style={{fontSize:11, color:'#8B7F6E', fontWeight:600}}>· {previewCount} point{previewCount > 1 ? 's' : ''} détecté{previewCount > 1 ? 's' : ''}</span>
            </div>
            {previewGroups.map((g, i) => (
              <div key={i} style={{borderTop: i > 0 ? '1px solid #F0E4D4' : 'none', paddingTop: i > 0 ? 10 : 0}}>
                <div style={{fontSize:13, fontWeight:700, color:'#8B5E3C', marginBottom:6}}>{g.icon} {g.label}</div>
                <ul style={{listStyle:'none', padding:0, margin:0}}>
                  {g.items.map(([k, v], j) => (
                    <li key={j} style={{fontSize:12.5, color:'#2A2018', paddingLeft:16, marginBottom:3, position:'relative'}}>
                      <span style={{position:'absolute', left:4, color:'#8B7F6E'}}>•</span>
                      <span style={{color:'#8B7F6E', fontSize:11}}>{k} : </span>
                      <span style={{fontWeight:500}}>{v}</span>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
            <div style={{borderTop:'1px solid #F0E4D4', paddingTop:10}}>
              <div style={{fontSize:13, fontWeight:700, color:'#8B5E3C', marginBottom:6}}>➕ Compléter manuellement (optionnel)</div>
              <textarea value={manualNote} onChange={e => setManualNote(e.target.value)}
                placeholder="Tel/email vus sur l'annonce, notes perso…"
                style={{width:'100%', minHeight:54, padding:'8px 10px', borderRadius:8, border:'1px solid #E0CDAE', background:'#FDFAF7', fontSize:13, outline:'none', fontFamily:'inherit', resize:'vertical'}}/>
            </div>
            <button type="button" onClick={createStagedFromUrl} disabled={creating}
              style={{width:'100%', padding:'13px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'inherit', opacity: creating ? .6 : 1}}>
              {creating ? 'Création…' : '🟧 Créer le brouillon Vendeur'}
            </button>
            <button type="button" onClick={() => { setResult(null); setManualNote(''); }}
              style={{width:'100%', padding:'9px', background:'#FDFAF7', color:'#8B5E3C', border:'1.5px solid #E0CDAE', borderRadius:10, fontWeight:600, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>
              🔄 Analyser un autre lien
            </button>
          </div>
        )}

        {/* Liste staged (après les cards d'import). */}
        <div style={{fontSize:11, color:'#8B7F6E', textTransform:'uppercase', letterSpacing:.5, fontWeight:700, margin:'10px 4px 6px', display:'flex', alignItems:'center'}}>
          <DownloadIcon size={13} color="#8B7F6E"/>
          <span style={{marginLeft:4}}>{n}{searchValue && nTotal !== n ? ' / ' + nTotal : ''} téléchargement{n > 1 ? 's' : ''} en attente</span>
        </div>
        {n === 0 ? (

    function relativeDateFr(whenIso) {

      if (isNaN(t.getTime())) return '';
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
