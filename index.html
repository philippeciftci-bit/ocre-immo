<style>
/* V18.9 — palette unifiée + contraste WCAG AA. */
:root{
  --text-primary:#2A2018;
  --text-secondary:#5A4E3D;
  --text-hint:#8B7F6E;
  --border-input:#C9B79A;
  --border-subtle:#E8DDD0;
  --ocre-primary:#B26D3A;
  --ocre-brand:#8B5E3C;
  --ocre-bg-soft:#FBF1E4;
  --ocre-bg-ultralight:#FDF8F0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#F0E8D8;color:#2A2018;overflow:hidden;height:100vh;height:100dvh;font-size:13px}
#root{height:100%}
::-webkit-scrollbar{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* V17.4 UX v3 : densité mobile — labels, cartes, tuiles, chips. */
label.ocre-lbl{display:block;font-size:11px;font-weight:600;color:#8B7F6E;margin-bottom:4px;text-transform:uppercase;letter-spacing:1.2px}
input, select, textarea, button { font-size:13px }

/* V17.4 UX v3 : style sélection unifié — .state-selected partout (chips profil, tuiles pays/type/équipements, check-rows). */
.state-default{background:#FFF;border:1.5px solid #EDE1CC;color:#2A2018;font-weight:500;transition:all .15s}
.state-selected{background:#FBF1E4 !important;border:2px solid #B26D3A !important;color:#8B4E22 !important;font-weight:600 !important;padding-top:calc(var(--ocre-pad-y,7px) - 1px) !important;padding-bottom:calc(var(--ocre-pad-y,7px) - 1px) !important;padding-left:calc(var(--ocre-pad-x,10px) - 1px) !important;padding-right:calc(var(--ocre-pad-x,10px) - 1px) !important}

/* V17.1 fix-ux-5 : paires 50/50 stackent en mobile portrait < 500px. */
.row-pair{display:flex;gap:6px}
@media (max-width: 499px){
  .row-pair{flex-direction:column;gap:0}
  .row-pair > *{flex:1 1 auto !important;width:100%}
}

/* V18.9 — chips profil scroll horizontal single-line (gain 40px hauteur iPhone). */
/* V18.15 — compactage : chips padding 5/10, fs 11, min-height 28. */
.profils-row{display:flex;gap:5px;flex-wrap:nowrap;padding:0;overflow-x:auto;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.profils-row::-webkit-scrollbar{display:none}
.profil-chip{padding:5px 10px;border-radius:13px;cursor:pointer;font-family:inherit;font-size:11px;min-height:28px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;scroll-snap-align:start;white-space:nowrap;--ocre-pad-y:5px;--ocre-pad-x:10px;font-weight:600}

/* V18.15 — barre recherche slide-down sous le header. */
.search-bar-wrap{overflow:hidden;transition:max-height .22s ease, opacity .18s ease;background:#fff;border-bottom:1px solid var(--border-subtle)}
.search-bar-wrap.closed{max-height:0;opacity:0;border-bottom:none}
.search-bar-wrap.open{max-height:54px;opacity:1}

.search-bar-input{flex:1;background:#FBF7F2;border:1px solid #E8DDD0;border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;color:#2A2018;outline:none;min-width:0}
.search-bar-input:focus{border-color:#8B5E3C;background:#fff}

.client-row-name{font-weight:700;font-size:14px;color:#2A2018;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
.client-row-sep{color:#B5A78F;font-weight:400;margin:0 2px}

.client-row-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1.5px solid #D4C3A8}
.client-row-sector{padding:7px 8px;border-left:1px solid #D4C3A8;min-height:46px;cursor:pointer;display:flex;flex-direction:column;gap:1px;background:#fff;transition:background .1s}
.client-row-sector:first-child{border-left:none}

.client-row-sector-label{font-size:10px;color:#8B7F6E;font-weight:600;text-transform:uppercase;letter-spacing:.3px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-row-sector-l1{font-size:11.5px;color:#2A2018;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-row-sector-l2{font-size:10.5px;color:#8B7F6E;font-weight:400;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-row-sector-empty{color:#8B5E3C;font-weight:600;font-size:11px;font-style:italic;text-decoration:underline dotted #8B5E3C;text-decoration-thickness:1px;text-underline-offset:2px}

.dossier-group .client-row-card{margin-bottom:0;border-radius:8px}
.dossier-group > div:first-child .client-row-card{border-top-left-radius:10px;border-top-right-radius:10px}
.dossier-group > div:last-child .client-row-card{border-bottom-left-radius:10px;border-bottom-right-radius:10px}

}

.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.ocre-tile{padding:8px 10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;min-height:42px;display:flex;align-items:center;justify-content:center;gap:6px;text-align:center;--ocre-pad-y:8px;--ocre-pad-x:10px}

/* V17.4 UX v3 : check-row binaire (Piscine, Ascenseur). */
.check-row{display:inline-flex;align-items:center;gap:6px;padding:8px 11px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;margin:0 4px 4px 0;min-height:36px;--ocre-pad-y:8px;--ocre-pad-x:11px}

/* V17.4 UX v3 : card standard. */

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* V17.4 UX v3 : banner bascule profil. */
.bascule-banner{background:#FFF9F0;border:1px solid #F0E3CB;border-radius:10px;padding:8px 12px;margin:8px 0;font-size:12px;color:#8B7F6E;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

const {useState, useEffect, useRef} = React;

// V17.4 UX v3 : ordre strict Acheteur / Vendeur / Investisseur / Bailleur / Locataire / Curieux.
const PROFILS_ORDER = ['Acheteur','Vendeur','Investisseur','Bailleur','Locataire','Curieux'];

const BADGES = {Acheteur:'ACH', Vendeur:'VDR', Investisseur:'INV', Bailleur:'BAI', Locataire:'LOC', Curieux:'CUR'};
// V18.26 — titres sections adaptés par profil. Section II varie (ciblé/en vente/à louer/recherché).
// Section III : "Budget & rendement" pour Investisseur, "Budget & financement" pour les autres.

const STAGES = {

};
// V17.4 : suggestions "Aussi…" selon profil courant.
const BASCULES = {

  Vendeur: ['Acheteur','Bailleur'],
  Investisseur: ['Acheteur','Bailleur'],
  Bailleur: ['Vendeur','Investisseur'],

  Curieux: []

// V17.10 : PAYS / PAYS_BIEN / DIAL_CODES désormais chargés dynamiquement depuis /api/countries.php.
// Les valeurs initiales ci-dessous sont un fallback si le fetch échoue au démarrage.
let PAYS = [
  {c:'MA',f:'🇲🇦',d:'MAD',n:'Maroc'},{c:'FR',f:'🇫🇷',d:'€',n:'France'},
];
const FORMES_JURIDIQUES = ['SARL','SA','SAS','EURL','SCI','Autre'];

// V17.1 — DateMaskField : saisie masquée JJ/MM/AAAA avec auto-advance.
// Stockage back ISO YYYY-MM-DD, affichage front DD/MM/YYYY.
function DateMaskField({label, value, onChange, style={}}) {
  // value en ISO YYYY-MM-DD → display DD/MM/YYYY
  const toDisplay = (iso) => {
    if (!iso) return '';
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
    if (m) return `${m[3]}/${m[2]}/${m[1]}`;
    return iso;
  };
  const [display, setDisplay] = React.useState(toDisplay(value));
  React.useEffect(() => { setDisplay(toDisplay(value)); }, [value]);

  const filled = display && display.length >= 10;
  const base = {width:'100%', boxSizing:'border-box', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018', letterSpacing:'1px'};

  function handle(e) {
    const digits = e.target.value.replace(/\D/g, '').slice(0, 8);
    let out = '';
    if (digits.length <= 2) out = digits;
    else if (digits.length <= 4) out = digits.slice(0,2) + '/' + digits.slice(2);
    else out = digits.slice(0,2) + '/' + digits.slice(2,4) + '/' + digits.slice(4);
    setDisplay(out);
    // Si 8 chiffres saisis → valider + pousser ISO au parent.
    if (digits.length === 8) {
      const dd = digits.slice(0,2), mm = digits.slice(2,4), yyyy = digits.slice(4,8);
      const iso = `${yyyy}-${mm}-${dd}`;
      onChange(iso);
    } else if (digits.length === 0) {
      onChange('');
    }
  }

  return (
    <div style={{marginBottom:10, minWidth:0, ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <input type="text" value={display} onChange={handle}
        placeholder="JJ/MM/AAAA" inputMode="numeric" pattern="[0-9/]*" maxLength={10}
        autoComplete="off" autoCapitalize="off" autoCorrect="off" spellCheck="false"
        style={{...base, ...(filled ? FIELD_FILLED : FIELD_EMPTY)}}/>
    </div>
  );
}
// V17.1 — CountryAutocomplete : input text + suggestions filtrées accent-insensitive.
function normalizeAccent(s) {
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}
function CountryAutocomplete({label, value, onChange, style={}, placeholder='Tape un pays…'}) {
  const allOpts = PAYS.map(p => ({code: p.c, flag: p.f, name: p.n}));
  const selected = allOpts.find(o => o.code === value);
  const [display, setDisplay] = React.useState(selected ? (selected.flag + ' ' + selected.name) : '');
  const [open, setOpen] = React.useState(false);
  const [filtered, setFiltered] = React.useState(allOpts);
  const [query, setQuery] = React.useState('');
  const isMobile = useIsMobile();
  React.useEffect(() => {
    const s = allOpts.find(o => o.code === value);
    setDisplay(s ? (s.flag + ' ' + s.name) : '');
  }, [value]);

  const filled = !!selected;
  const base = {width:'100%', boxSizing:'border-box', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018'};

  function handleChange(e) {
    const raw = e.target.value;
    setDisplay(raw);
    setOpen(true);
    const n = normalizeAccent(raw);
    const f = n ? allOpts.filter(o => normalizeAccent(o.name).includes(n) || o.code.toLowerCase().startsWith(n)) : allOpts;
    setFiltered(f);
    if (!raw.trim()) onChange('');
  }
  function pick(o) {
    onChange(o.code);
    setDisplay(o.flag + ' ' + o.name);
    setOpen(false);
    setQuery('');
  }
  function handleBlur() {
    if (isMobile) return;
    setTimeout(() => {
      setOpen(false);
      const match = allOpts.find(o => normalizeAccent(o.name) === normalizeAccent(display.replace(/^[^A-Za-zÀ-ÿ]+/, '').trim()));
      if (match) { onChange(match.code); setDisplay(match.flag + ' ' + match.name); }
      else if (!value) setDisplay('');
      else { const s = allOpts.find(o => o.code === value); setDisplay(s ? (s.flag + ' ' + s.name) : ''); }
    }, 150);
  }

  const mobileFiltered = query.trim()
    ? allOpts.filter(o => normalizeAccent(o.name).includes(normalizeAccent(query)) || o.code.toLowerCase().startsWith(query.toLowerCase()))
    : allOpts;

  return (
    <div style={{marginBottom:10, minWidth:0, position:'relative', ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      {isMobile ? (
        <button type="button" onClick={() => setOpen(true)}
          style={{...base, ...(filled ? FIELD_FILLED : FIELD_EMPTY), textAlign:'left', display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer'}}>
          <span>{display || placeholder}</span>
          <span style={{fontSize:10, opacity:.6}}>▾</span>
        </button>
      ) : (
        <input type="text" value={display} onChange={handleChange} onFocus={() => setOpen(true)} onBlur={handleBlur}
          placeholder={placeholder} autoComplete="off" autoCapitalize="off" autoCorrect="off" spellCheck="false"
          style={{...base, ...(filled ? FIELD_FILLED : FIELD_EMPTY)}}/>
      )}
      {open && (isMobile ? (
        <BottomSheet title={label || 'Pays'} onClose={() => { setOpen(false); setQuery(''); }}>
          <div className="bsheet-search">
            <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="Rechercher…" autoCapitalize="off" autoCorrect="off"/>
          </div>
          <div className="bsheet-list">
            {mobileFiltered.length === 0 ? <div className="bsheet-empty">Aucun pays trouvé</div>
              : mobileFiltered.map(o => (
                <div key={o.code} className={'bsheet-item ' + (o.code === value ? 'selected' : '')} onClick={() => pick(o)}>
                  <span style={{fontSize:18}}>{o.flag}</span>
                  <span style={{flex:1}}>{o.name}</span>
                  {o.code === value && <span style={{color:'#B26D3A', fontWeight:700}}>✓</span>}
                </div>
              ))}
          </div>
        </BottomSheet>
      ) : (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:240, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:100, marginTop:2}}>
          {filtered.length === 0 ? (
            <div style={{padding:'10px 12px', fontSize:13, color:'#8B7F6E'}}>Aucun pays trouvé</div>
          ) : filtered.map(o => (
            <div key={o.code} onMouseDown={() => pick(o)}
              style={{padding:'10px 12px', fontSize:14, cursor:'pointer', borderBottom:'1px solid #F4EEE6'}}>
              {o.flag} {o.name}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// V17.1 fix-ux-2 — PhoneField : indicatif pays + masque local + stockage E.164.
// V17.10 : reconstruit dynamiquement depuis countries enabled.
let DIAL_CODES = [
  {c:'FR', f:'🇫🇷', d:'33'}, {c:'MA', f:'🇲🇦', d:'212'},
];

// V17.10 : loader async des pays admin-configurables. Override PAYS / PAYS_BIEN / DIAL_CODES.
async function loadCountriesFromServer() {
  try {
    const r = await fetch('/api/countries.php?action=list').then(r => r.json());
    if (!r || !r.ok || !Array.isArray(r.countries) || !r.countries.length) return false;
    const cs = r.countries;
    PAYS = cs.map(c => ({c: c.code, f: c.flag_emoji, d: c.devise_symbol || c.currency, n: c.name}));
    PAYS_BIEN = cs.map(c => ({
      c: c.code, f: c.flag_emoji, n: c.name,
      types: c.code === 'MA' ? ALL_TYPES_BIEN : ALL_TYPES_BIEN.filter(t => t !== 'Riad'),
    }));
    DIAL_CODES = cs.filter(c => c.phone_prefix).map(c => ({c: c.code, f: c.flag_emoji, d: c.phone_prefix}));
    return true;
  } catch (e) { return false; }
}
function formatLocal(digits, dial) {
  // FR / dial 33 : "6 12 34 56 78"
  if (dial === '33' && digits.length > 0) {
    return digits.replace(/(\d)(\d{2})?(\d{2})?(\d{2})?(\d{2})?/, (_,a,b,c,d,e) => [a,b,c,d,e].filter(Boolean).join(' '));
  }
  // US/CA dial 1 : "(555) 123-4567"
  if (dial === '1' && digits.length > 0) {
    if (digits.length <= 3) return '(' + digits;
    if (digits.length <= 6) return '(' + digits.slice(0,3) + ') ' + digits.slice(3);
    return '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6,10);
  }
  // Default : groupes de 2
  return digits.replace(/(\d{2})/g, '$1 ').trim();
}
function PhoneField({label, value, onChange, residenceCountry='', style={}}) {
  // value en E.164 "+33612345678" → split dial/local
  const parseE164 = (v) => {
    if (!v) return {dial:'', local:''};
    const m = /^\+(\d{1,3})(\d+)$/.exec(v.replace(/\s/g,''));
    if (!m) return {dial:'', local: v.replace(/\D/g,'')};
    // Guess dial from DIAL_CODES — prefer longest match
    for (const len of [3,2,1]) {
      const candidate = m[1] + m[2].slice(0, Math.max(0, 3 - len));
      // simpler: match exact against table
    }
    // Match greediest dial prefix
    const full = m[1] + m[2];
    const sorted = [...DIAL_CODES].sort((a,b) => b.d.length - a.d.length);
    const hit = sorted.find(dc => full.startsWith(dc.d));
    if (hit) return {dial: hit.d, local: full.slice(hit.d.length)};
    return {dial: m[1], local: m[2]};
  };
  const initial = parseE164(value);
  const defaultDial = initial.dial
    || (DIAL_CODES.find(dc => dc.c === residenceCountry) || {}).d
    || '33';
  const [dial, setDial] = React.useState(defaultDial);
  const [localDigits, setLocalDigits] = React.useState(initial.local);
  React.useEffect(() => {
    const p = parseE164(value);
    if (p.dial) setDial(p.dial);
    setLocalDigits(p.local);
  }, [value]);

  const warn = localDigits.length > 0 && localDigits.length < 8;
  const filled = localDigits.length >= 8;
  const [focused, setFocused] = React.useState(false);
  const [pickerOpen, setPickerOpen] = React.useState(false);

  function pushE164(d, l) {
    const clean = l.replace(/\D/g, '').replace(/^0+/, '');
    if (!clean) onChange('');
    else onChange('+' + d + clean);
  }
  function pickDial(newDial) {
    setDial(newDial);
    setPickerOpen(false);
    pushE164(newDial, localDigits);
  }
  function handleLocal(e) {
    const raw = e.target.value.replace(/\D/g, '').slice(0, 15);
    setLocalDigits(raw);
    pushE164(dial, raw);
  }
  const displayLocal = formatLocal(localDigits, dial);
  const dc = DIAL_CODES.find(x => x.d === dial) || DIAL_CODES[0];

  // V17.1 fix-ux-5 : cadre unifié unique (drapeau + numéro), bordure bascule au focus.
  let stateClass = 'is-empty';
  if (filled) stateClass = 'is-filled';
  else if (warn) stateClass = 'is-warn';
  if (focused) stateClass += ' is-focus';

  return (
    <div style={{marginBottom:10, minWidth:0, position:'relative', ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <div className={'phone-unified ' + stateClass}>
        <button type="button" className="dial-btn" onClick={() => setPickerOpen(o => !o)}
          aria-label="Choisir le pays">
          <span>{dc.f}</span>
          <span>+{dial}</span>
          <span style={{fontSize:9, opacity:.6}}>▾</span>
        </button>
        <div className="divider"/>
        <input type="tel" inputMode="tel" autoComplete="tel" value={displayLocal} onChange={handleLocal}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          placeholder={dial === '33' ? '6 12 34 56 78' : (dial === '1' ? '(555) 123-4567' : '…')}/>
      </div>
      {pickerOpen && (
        <div className="phone-popover" onMouseDown={e => e.preventDefault()}>
          {DIAL_CODES.map(c => (
            <div key={c.c + c.d} className="item" onClick={() => pickDial(c.d)}>
              <span>{c.f}</span><span style={{fontWeight:600}}>+{c.d}</span>
            </div>
          ))}
        </div>
      )}
      {warn && !focused && <div style={{fontSize:11, color:'#D4A437', marginTop:2}}>Numéro trop court</div>}
    </div>
  );
}

// V17.1 fix-ux-2 — EmailField : validation visuelle temps réel + icône.
function EmailField({label, value, onChange, style={}}) {
  const [touched, setTouched] = React.useState(false);
  const v = (value || '').trim();
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const empty = v.length === 0;
  const showInvalid = !empty && !valid && touched;

  let borderStyle = FIELD_EMPTY;
  let icon = '';
  let iconColor = '#8B7F6E';
  if (empty) { /* neutre */ }
  else if (valid) { borderStyle = {border:'1.5px solid #4BB77B', background:'#F6FCF8'}; icon = '✓'; iconColor = '#4BB77B'; }
  else if (showInvalid) { borderStyle = {border:'1.5px solid #D64545', background:'#FEF6F6'}; icon = '✗'; iconColor = '#D64545'; }
  else { borderStyle = {border:'1.5px solid #D4A437', background:'#FFFBEF'}; icon = '…'; iconColor = '#D4A437'; }

  const base = {width:'100%', boxSizing:'border-box', padding:'9px 36px 9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018'};
  return (
    <div style={{marginBottom:10, minWidth:0, ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <div style={{position:'relative'}}>
        <input type="email" inputMode="email" autoComplete="email" autoCapitalize="off" autoCorrect="off" spellCheck="false"
          value={value || ''} onChange={e => onChange(e.target.value)} onBlur={() => setTouched(true)}
          placeholder="nom@exemple.com"
          style={{...base, ...borderStyle}}/>
        {icon && <span style={{position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', color:iconColor, fontWeight:700, fontSize:16}}>{icon}</span>}
      </div>
      {showInvalid && <div style={{fontSize:11, color:'#D64545', marginTop:2}}>Email invalide</div>}
    </div>

// V17.1 fix-ux-3 — CitySuggestField : autocomplete basé sur saisies antérieures de l'utilisateur.
function CitySuggestField({label, value, onChange, suggestAction, style={}, placeholder=''}) {
  const [open, setOpen] = React.useState(false);
  const [items, setItems] = React.useState([]);
  const cacheRef = React.useRef({ts:0, data:[], q:''});

  async function fetchSuggestions(q) {
    const now = Date.now();
    if (cacheRef.current.q === q && now - cacheRef.current.ts < 60000) {
      setItems(cacheRef.current.data);
      return;
    }
    try {
      const token = localStorage.getItem('ocre_token');
      const r = await fetch(API + '/clients.php?action=' + suggestAction + '&q=' + encodeURIComponent(q) + '&limit=8',
        {headers: {'X-Session-Token': token || ''}});
      const d = await r.json();
      const arr = (d && d.ok && Array.isArray(d.items)) ? d.items : [];
      cacheRef.current = {ts: now, data: arr, q};
      setItems(arr);
    } catch (e) { setItems([]); }
  }

  function handleChange(e) {
    onChange(e.target.value);
    setOpen(true);
    fetchSuggestions(e.target.value.trim());
  }
  function handleFocus() {
    setOpen(true);
    fetchSuggestions(''); // derniers 5-8 saisis
  }
  function pick(v) { onChange(v); setOpen(false); }

  const filled = (value || '').trim() !== '';
  const base = {width:'100%', boxSizing:'border-box', padding:'9px 11px', borderRadius:8, fontSize:14, outline:'none', fontFamily:'inherit', color:'#2A2018'};

  return (
    <div style={{marginBottom:10, minWidth:0, position:'relative', ...style}}>
      {label && <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase', letterSpacing:.4}}>{label}</label>}
      <input type="text" value={value || ''} onChange={handleChange} onFocus={handleFocus} onBlur={() => setTimeout(() => setOpen(false), 150)}
        placeholder={placeholder} autoComplete="off"
        style={{...base, ...(filled ? FIELD_FILLED : FIELD_EMPTY)}}/>
      {open && items.length > 0 && (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:200, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:100, marginTop:2}}>
          {items.map((it, i) => (
            <div key={i} onMouseDown={() => pick(it)} style={{padding:'8px 12px', fontSize:14, cursor:'pointer', borderBottom:'1px solid #F4EEE6'}}>{it}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// V17.7 — format tel E.164 → display lisible pour ClientRow.
function formatTelPretty(e164) {
  if (!e164) return '';
  const m = /^\+(\d{1,3})(\d+)$/.exec(String(e164).replace(/\s/g, ''));
  if (!m) return e164;
  const sorted = [...DIAL_CODES].sort((a, b) => b.d.length - a.d.length);
  const full = m[1] + m[2];
  const hit = sorted.find(dc => full.startsWith(dc.d));
  if (!hit) return '+' + m[1] + ' ' + m[2];
  const local = full.slice(hit.d.length);
  return '+' + hit.d + ' ' + formatLocal(local, hit.d);
}

// V17.2 Phase 2a — PhotoUpload : galerie + upload /api/upload.php, max 30, JPEG/PNG/WebP.
function PhotoUpload({dossierId, showToast}) {
  const [photos, setPhotos] = React.useState([]);
  const [uploading, setUploading] = React.useState(false);
  const inputRef = React.useRef(null);

  const token = () => localStorage.getItem('ocre_token') || '';

  React.useEffect(() => {
    if (!dossierId) return;
    fetch(API + '/upload.php?action=list&dossier_id=' + dossierId, {headers:{'X-Session-Token': token()}})
      .then(r => r.json()).then(d => { if (d && d.ok) setPhotos(d.photos || []); })
      .catch(() => {});
  }, [dossierId]);

  async function uploadFile(f) {
    if (!dossierId) { showToast && showToast('Enregistrez d\'abord le dossier'); return; }
    if (photos.length >= 30) { showToast && showToast('Limite 30 photos'); return; }
    const fd = new FormData();
    fd.append('action', 'upload');
    fd.append('dossier_id', dossierId);
    fd.append('file', f);
    setUploading(true);
    try {
      const r = await fetch(API + '/upload.php?action=upload', {
        method:'POST', headers:{'X-Session-Token': token()}, body: fd,
      });
      const d = await r.json();
      if (d && d.ok && d.photo) setPhotos(prev => [d.photo, ...prev]);
      else showToast && showToast(d && d.error ? d.error : 'Échec upload');
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setUploading(false);
  }
  async function handleFiles(fl) {
    for (const f of fl) await uploadFile(f);
    if (inputRef.current) inputRef.current.value = '';
  }
  async function removePhoto(name) {
    if (!(await askConfirm({title:'Supprimer cette photo ?', message:'Cette photo sera retirée du dossier.', danger:true}))) return;
    try {
      const r = await fetch(API + '/upload.php?action=delete', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token()},
        body: JSON.stringify({dossier_id: dossierId, name}),
      });
      const d = await r.json();
      if (d && d.ok) setPhotos(prev => prev.filter(p => p.name !== name));
    } catch (e) {}
  }

  return (
    <div style={{marginBottom:10}}>
      <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:6, textTransform:'uppercase', letterSpacing:.4}}>
        Photos {photos.length > 0 && <span style={{color:'#8B5E3C'}}>· {photos.length}/30</span>}
      </label>
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(90px, 1fr))', gap:6, marginBottom:8}}>
        {photos.map(p => (
          <div key={p.name} style={{position:'relative', aspectRatio:'1/1', borderRadius:8, overflow:'hidden', border:'1px solid #E8DDD0'}}>
            <img src={p.url} alt="" style={{width:'100%', height:'100%', objectFit:'cover', display:'block'}}/>
            <button type="button" onClick={() => removePhoto(p.name)}
              style={{position:'absolute', top:4, right:4, width:22, height:22, borderRadius:11, border:'none', background:'rgba(42,32,24,.75)', color:'#fff', fontSize:12, cursor:'pointer', lineHeight:'20px', padding:0}}>×</button>
          </div>
        ))}
        {photos.length < 30 && (
          <button type="button" onClick={() => inputRef.current && inputRef.current.click()} disabled={uploading || !dossierId}
            title={!dossierId ? 'Enregistrez d\'abord le dossier' : ''}
            style={{aspectRatio:'1/1', border:'1.5px dashed #BBA88B', borderRadius:8, background:'#FDFAF7', color:'#8B5E3C', cursor: dossierId ? 'pointer' : 'not-allowed', opacity: dossierId ? 1 : .5, fontSize:24, fontWeight:700}}>
            {uploading ? '…' : '+'}
          </button>
        )}
      </div>
      <input ref={inputRef} type="file" accept="image/jpeg,image/png,image/webp" multiple
        onChange={e => handleFiles(Array.from(e.target.files || []))} style={{display:'none'}}/>
      {!dossierId && <div style={{fontSize:11, color:'#8B7F6E', fontStyle:'italic'}}>Enregistrez le dossier une fois pour activer les photos.</div>}
    </div>
  );
}

// V17.2 Phase 2a — ShareMenu : création lien public, copie, partage natif, révocation.
function ShareMenu({dossierId, dossierName, onClose, showToast}) {
  const [link, setLink] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [expiresDays, setExpiresDays] = React.useState(7);
  const token = () => localStorage.getItem('ocre_token') || '';

  async function createLink() {
    if (!dossierId) { showToast && showToast('Enregistrez d\'abord le dossier'); return; }
    setLoading(true);
    try {
      const r = await fetch(API + '/share.php?action=create_link', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token()},
        body: JSON.stringify({dossier_id: dossierId, expires_days: expiresDays}),
      });
      const d = await r.json();
      if (d && d.ok) setLink(d);
      else showToast && showToast(d && d.error ? d.error : 'Échec');
    } catch (e) { showToast && showToast('Erreur réseau'); }
    setLoading(false);
  }
  async function copy() {
    if (!link) return;
    try { await navigator.clipboard.writeText(link.url); showToast && showToast('Lien copié'); } catch (e) {}
  }
  async function share() {
    if (!link) return;
    if (navigator.share) {
      try { await navigator.share({title:'Ocre Immo · ' + (dossierName || 'Dossier'), text:'Accès lecture seule ' + expiresDays + 'j', url: link.url}); } catch (e) {}
    } else { copy(); }
  }
  async function revoke() {
    if (!link) return;
    if (!(await askConfirm({title:'Révoquer ce lien ?', message:'Les personnes qui ont reçu ce lien ne pourront plus accéder au dossier.', danger:true, confirmLabel:'Révoquer'}))) return;
    try {
      await fetch(API + '/share.php?action=revoke', {
        method:'POST', headers:{'Content-Type':'application/json', 'X-Session-Token': token()},
        body: JSON.stringify({token: link.token}),
      });
      setLink(null); showToast && showToast('Lien révoqué');
    } catch (e) {}
  }

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(42,32,24,.45)', zIndex:200, display:'flex', alignItems:'flex-end', justifyContent:'center'}} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{background:'#fff', width:'100%', maxWidth:460, borderRadius:'16px 16px 0 0', padding:20, paddingBottom:30}}>
        <div style={{fontFamily:'Cormorant Garamond,serif', fontSize:20, fontWeight:700, color:'#8B5E3C', marginBottom:12}}>Partager le dossier</div>
        <div style={{fontSize:12, color:'#8B7F6E', marginBottom:14}}>Lien public en <b>lecture seule</b>, expire après {expiresDays} jour{expiresDays > 1 ? 's' : ''}, révocable à tout moment.</div>
        {!link ? (
          <>
            <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:4, textTransform:'uppercase'}}>Durée</label>
            <div style={{display:'flex', gap:6, marginBottom:14}}>
              {[1, 7, 30, 90].map(n => (
                <button key={n} type="button" onClick={() => setExpiresDays(n)}
                  style={{flex:1, padding:'8px', borderRadius:8, border:'1.5px solid ' + (expiresDays === n ? '#8B5E3C' : '#E8DDD0'),
                          background: expiresDays === n ? '#FFF3EC' : '#FDFAF7', color: expiresDays === n ? '#8B5E3C' : '#8B7F6E',
                          fontWeight:700, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>{n}j</button>
              ))}
            </div>
            <button type="button" onClick={createLink} disabled={loading || !dossierId}
              style={{width:'100%', padding:'13px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor: dossierId ? 'pointer' : 'not-allowed', opacity: dossierId ? 1 : .5, fontFamily:'inherit'}}>
              {loading ? 'Création…' : 'Générer le lien'}
            </button>
            {/* V17.3 Phase 2b : export PDF (print-to-PDF navigateur) */}
            <button type="button" onClick={() => {
                const t = localStorage.getItem('ocre_token') || '';
                window.open(API + '/export.php?action=pdf&dossier_id=' + dossierId + '&token=' + encodeURIComponent(t), '_blank');
              }} disabled={!dossierId}
              style={{width:'100%', padding:'11px', marginTop:8, background:'#FFF3EC', color:'#8B5E3C', border:'1.5px solid #BBA88B', borderRadius:10, fontWeight:700, fontSize:13, cursor: dossierId ? 'pointer' : 'not-allowed', opacity: dossierId ? 1 : .5, fontFamily:'inherit'}}>
              📄 Exporter en PDF
            </button>
          </>
        ) : (
          <>
            <div style={{background:'#FDFAF7', border:'1.5px solid #BBA88B', borderRadius:8, padding:10, fontSize:12, wordBreak:'break-all', marginBottom:10, color:'#2A2018'}}>{link.url}</div>
            <div style={{display:'flex', gap:6, marginBottom:10}}>
              <button type="button" onClick={copy} style={{flex:1, padding:'11px', background:'#FFF3EC', color:'#8B5E3C', border:'1.5px solid #BBA88B', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>Copier</button>
              <button type="button" onClick={share} style={{flex:1, padding:'11px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit'}}>Partager…</button>
            </div>
            <button type="button" onClick={revoke} style={{width:'100%', padding:'9px', background:'#fff', color:'#C04B20', border:'1.5px solid #E8DDD0', borderRadius:8, fontWeight:600, fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>Révoquer ce lien</button>
          </>
        )}
        <button type="button" onClick={onClose} style={{width:'100%', padding:'9px', marginTop:10, background:'transparent', color:'#8B7F6E', border:'none', fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>Fermer</button>
      </div>
    </div>
  );
}

// V17.13 — useIsMobile : bascule responsive < 768px.
function useIsMobile() {
  const [m, setM] = React.useState(typeof window !== 'undefined' && window.innerWidth < 768);
  React.useEffect(() => {
    function onR() { setM(window.innerWidth < 768); }
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);
  return m;
}

// V17.13 — BottomSheet générique pour pickers mobile.
function BottomSheet({title, onClose, children}) {
  React.useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);
  return (
    <div className="bsheet-overlay" onClick={onClose}>
      <div className="bsheet" onClick={e => e.stopPropagation()}>
        <div className="bsheet-handle"/>
        <div className="bsheet-head">
          <span style={{width:32}}/>
          <div className="bsheet-title">{title || '—'}</div>
          <button type="button" className="bsheet-close" onClick={onClose} aria-label="Fermer">✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// V17.4 UX v3 — PickerDropdown : sélecteur custom avec recherche (pattern CountryAutocomplete). V17.13 : bottom-sheet sur mobile.
function PickerDropdown({label, value, displayValue, options, onChange, placeholder='Choisir…', disabled=false}) {
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState('');
  const ref = React.useRef(null);
  const isMobile = useIsMobile();
  React.useEffect(() => {
    if (isMobile) return;
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setQuery(''); } }
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [isMobile]);
  const filtered = query.trim()
    ? options.filter(o => normalizeAccent(o.l).includes(normalizeAccent(query)))
    : options;
  function pick(k) { onChange(k); setOpen(false); setQuery(''); }
  function close() { setOpen(false); setQuery(''); }
  return (
    <div ref={ref} style={{position:'relative'}}>
      {label && <label className="ocre-lbl">{label}</label>}
      <button type="button" onClick={() => !disabled && setOpen(!open)} disabled={disabled}
        className={'ocre-tile ' + (value ? 'state-selected' : 'state-default')}
        style={{width:'100%', justifyContent:'space-between', padding:'10px 12px', opacity: disabled ? .5 : 1, cursor: disabled ? 'not-allowed' : 'pointer'}}>
        <span>{displayValue || placeholder}</span>
        <span style={{fontSize:10, opacity:.6}}>▾</span>
      </button>
      {open && !disabled && (isMobile ? (
        <BottomSheet title={label || 'Choisir'} onClose={close}>
          {options.length > 5 && (
            <div className="bsheet-search">
              <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="Rechercher…" autoFocus autoCapitalize="off" autoCorrect="off"/>
            </div>
          )}
          <div className="bsheet-list">
            {filtered.length === 0 ? <div className="bsheet-empty">Aucun résultat</div>
              : filtered.map(o => (
                <div key={o.k} className={'bsheet-item ' + (o.k === value ? 'selected' : '')} onClick={() => pick(o.k)}>
                  <span style={{flex:1}}>{o.l}</span>
                  {o.k === value && <span style={{color:'#B26D3A', fontWeight:700}}>✓</span>}
                </div>
              ))}
          </div>
        </BottomSheet>
      ) : (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:320, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:50, marginTop:2}}>
          {options.length > 5 && (
            <input type="text" value={query} onChange={e => setQuery(e.target.value)}
              placeholder="Rechercher…" autoFocus autoCapitalize="off" autoCorrect="off"
              style={{width:'100%', padding:'8px 11px', border:'none', borderBottom:'1px solid #F4EEE6', outline:'none', fontSize:13, fontFamily:'inherit'}}/>
          )}
          {filtered.length === 0 ? (
            <div style={{padding:'10px 12px', fontSize:13, color:'#8B7F6E'}}>Aucun résultat</div>
          ) : filtered.map(o => (
            <div key={o.k} onMouseDown={() => pick(o.k)}
              style={{padding:'10px 12px', fontSize:13, cursor:'pointer', borderBottom:'1px solid #F4EEE6', background: o.k === value ? '#FBF1E4' : '#fff'}}>
              {o.l}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// V17.9 — MultiPicker : sélection multiple avec checkbox, pas de fermeture auto. V17.13 : bottom-sheet sur mobile.
function MultiPicker({label, values, options, onChange, placeholder='Choisir…', disabled=false}) {
  const arr = Array.isArray(values) ? values : [];
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState('');
  const ref = React.useRef(null);
  const isMobile = useIsMobile();
  React.useEffect(() => {
    if (isMobile) return;
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [isMobile]);
  function toggle(k) {
    if (arr.includes(k)) onChange(arr.filter(x => x !== k));
    else onChange([...arr, k]);
  }
  const display = arr.length === 0 ? placeholder
    : arr.length <= 2 ? arr.join(' · ')
    : arr[0] + ' + ' + (arr.length - 1);
  const filtered = query.trim()
    ? options.filter(o => normalizeAccent(o.l).includes(normalizeAccent(query)))
    : options;
  return (
    <div ref={ref} style={{position:'relative', marginBottom:10}}>
      {label && <label className="ocre-lbl">{label}</label>}
      <button type="button" onClick={() => !disabled && setOpen(!open)} disabled={disabled}
        className={'ocre-tile ' + (arr.length ? 'state-selected' : 'state-default')}
        style={{width:'100%', justifyContent:'space-between', padding:'10px 12px', opacity: disabled ? .5 : 1, cursor: disabled ? 'not-allowed' : 'pointer'}}>
        <span>{display}</span>
        <span style={{fontSize:10, opacity:.6}}>▾</span>
      </button>
      {open && !disabled && (isMobile ? (
        <BottomSheet title={label || 'Choisir'} onClose={() => { setOpen(false); setQuery(''); }}>
          {options.length > 5 && (
            <div className="bsheet-search">
              <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="Rechercher…" autoCapitalize="off" autoCorrect="off"/>
            </div>
          )}
          <div className="bsheet-list">
            {filtered.length === 0 ? <div className="bsheet-empty">Aucun résultat</div>
              : filtered.map(o => {
                const on = arr.includes(o.k);
                return (
                  <div key={o.k} className={'bsheet-item ' + (on ? 'selected' : '')} onClick={() => toggle(o.k)}>
                    <span className="check">{on ? '✓' : ''}</span>
                    <span style={{flex:1}}>{o.l}</span>
                  </div>
                );
              })}
          </div>
          <div className="bsheet-foot">
            <button type="button" onClick={() => { setOpen(false); setQuery(''); }}
              style={{width:'100%', padding:'13px', background:'linear-gradient(135deg,#8B5E3C,#A06B45)', color:'#fff', border:'none', borderRadius:10, fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'inherit'}}>
              Valider ({arr.length} sélectionné{arr.length > 1 ? 's' : ''})
            </button>
          </div>
        </BottomSheet>
      ) : (
        <div style={{position:'absolute', top:'100%', left:0, right:0, maxHeight:320, overflowY:'auto', background:'#fff', border:'1.5px solid #BBA88B', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:50, marginTop:2}}>
          {options.map(o => {
            const on = arr.includes(o.k);
            return (
              <div key={o.k} onClick={() => toggle(o.k)}
                style={{padding:'10px 12px', fontSize:13, cursor:'pointer', borderBottom:'1px solid #F4EEE6', display:'flex', alignItems:'center', gap:10, background: on ? '#FBF1E4' : '#fff'}}>
                <span style={{width:18, height:18, borderRadius:4, background: on ? '#B26D3A' : '#FFF', border:'1.5px solid ' + (on ? '#B26D3A' : '#E2D8CC'), display:'inline-flex', alignItems:'center', justifyContent:'center', color:'#FFF', fontSize:11, fontWeight:700, flexShrink:0}}>{on ? '✓' : ''}</span>
                <span style={{flex:1, color: on ? '#8B4E22' : '#2A2018', fontWeight: on ? 700 : 500}}>{o.l}</span>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}
const HABITABLE_TYPES = ['Villa','Appartement','Riad','Maison'];

// V17.2 Phase 2a — BienForm : Section II "Le bien", country-first × type-driven (multi depuis v17.9).
function BienForm({activeProfil, isInvestisseur, d, set, dossierId, showToast}) {
  const bien = d.bien || {};
  function setB(k, v) { set('bien', {...bien, [k]: v}); }
  // V17.4 UX v3 : Acheteur/Locataire/Investisseur → mode "recherche" (fourchettes + priorités).
  //               Vendeur/Bailleur → mode "description" (valeurs précises + bools).
  const askingMode = ['Acheteur','Locataire','Investisseur'].includes(activeProfil);
  const paysDef = PAYS_BIEN.find(p => p.c === bien.pays);
  const typesDispo = paysDef ? paysDef.types : [];
  // V17.9 : multi-types. Fallback bien.type (legacy singular) si bien.types absent.
  const types = Array.isArray(bien.types) && bien.types.length ? bien.types : (bien.type ? [bien.type] : []);
  const hasHabitable = types.some(t => HABITABLE_TYPES.includes(t));
  const anyType = types.length > 0;

  // V18.7 — toggle un type dans la liste (checkbox visible).
  function toggleType(t) {
    const cur = Array.isArray(bien.types) ? bien.types : (bien.type ? [bien.type] : []);
    const next = cur.includes(t) ? cur.filter(x => x !== t) : [...cur, t];
    setB('types', next);
    setB('type', next[0] || '');
  }

  return (
    <>
      {/* V17.9 : Pays + Type(s) en 1 ligne. V18.7 : Type(s) en checkboxes visibles 2 cols + chips × en haut. */}
      <PickerDropdown label="Pays du bien"
        value={bien.pays}
        displayValue={bien.pays ? ((PAYS_BIEN.find(p => p.c === bien.pays) || {}).f + ' ' + (PAYS_BIEN.find(p => p.c === bien.pays) || {}).n) : ''}
        options={PAYS_BIEN.map(p => ({k: p.c, l: p.f + ' ' + p.n}))}
        onChange={v => setB('pays', v)} placeholder="Choisir…"/>

      {bien.pays && (
        <div style={{marginBottom:10}}>
          <label style={{display:'block', fontSize:11, fontWeight:600, color:'#8B7F6E', marginBottom:6, textTransform:'uppercase', letterSpacing:.4}}>

          {/* Chips sélectionnés en haut avec × */}

            <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:8}}>
              {types.map(t => (
                <button key={t} type="button" onClick={() => toggleType(t)}

                          fontSize:12, fontWeight:700, color:'#8B5E3C', cursor:'pointer', fontFamily:'inherit',

                </button>
              ))}
            </div>

          {/* Checkboxes 2 cols mobile */}

              return (

                                       background: checked ? '#FBF1E4' : '#FDFAF7',
                                       border: '1.5px solid ' + (checked ? '#B26D3A' : '#E8DDD0'),
                                       borderRadius:8, fontSize:13, fontWeight: checked ? 700 : 500,
                                       color: checked ? '#8B4E22' : '#2A2018', cursor:'pointer', fontFamily:'inherit'}}>
                  <span style={{width:18, height:18, borderRadius:4, border:'1.5px solid ' + (checked ? '#B26D3A' : '#C4B5A0'),
                                background: checked ? '#B26D3A' : '#fff',
                                display:'inline-flex', alignItems:'center', justifyContent:'center',
                                color:'#fff', fontSize:12, fontWeight:800, flexShrink:0}}>{checked ? '✓' : ''}</span>
                  <input type="checkbox" checked={checked} onChange={() => toggleType(t)} style={{display:'none'}}/>
                  <span style={{flex:1, minWidth:0, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{t}</span>

  'casablanca|MA': ['Maarif','Ain Diab','Anfa','Bourgogne','Palmier','Gauthier','Racine','Bouskoura','Californie'],

  'nantes|FR': ['Centre','Île de Nantes','Hauts-Pavés','Saint-Félix','Erdre','Doulon'],
};
function geocodeCacheGet(key) {
  try {
    const raw = localStorage.getItem('ocre_geocode_v1::' + key);
    if (!raw) return null;
    const o = JSON.parse(raw);
    if (!o || !o.lat || !o.lng) return null;
    return o;
  } catch (e) { return null; }
}
function geocodeCacheSet(key, lat, lng, source) {
  try { localStorage.setItem('ocre_geocode_v1::' + key, JSON.stringify({lat, lng, source, ts: Date.now()})); } catch (e) {}
}
function geocodeFallback(ville, pays) {
  const k = (ville || '').toLowerCase().trim() + '|' + (pays || '');
  const hit = GEOCODE_FALLBACK[k];
  return hit ? {lat: hit[0], lng: hit[1], source: 'fallback'} : null;
}
async function geocodeNominatim(ville, pays, quartier) {
  const paysName = PAYS_NOM[pays] || pays || '';
  const q = (quartier ? (quartier + ', ') : '') + (ville || '') + (paysName ? (', ' + paysName) : '');
  const cacheKey = q.toLowerCase().replace(/\s+/g, ' ').trim();
  const cached = geocodeCacheGet(cacheKey);
  if (cached) return cached;
  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=fr&q=' + encodeURIComponent(q);
    const r = await fetch(url, {headers: {'Accept': 'application/json'}});
    if (!r.ok) throw new Error('http ' + r.status);
    const j = await r.json();
    if (Array.isArray(j) && j.length > 0 && j[0].lat && j[0].lon) {
      const lat = Number(j[0].lat), lng = Number(j[0].lon);
      const out = {lat, lng, source: 'nominatim'};
      geocodeCacheSet(cacheKey, lat, lng, 'nominatim');
      return out;
    }
  } catch (e) { /* fallback */ }
  // Fallback ville seule (sans quartier)
  if (quartier) {
    const fb = geocodeFallback(ville, pays);
    if (fb) { geocodeCacheSet(cacheKey, fb.lat, fb.lng, 'fallback'); return fb; }
  } else {
    const fb = geocodeFallback(ville, pays);
    if (fb) { geocodeCacheSet(cacheKey, fb.lat, fb.lng, 'fallback'); return fb; }
  }
  return null;
}

// V18.8 — Overpass : récupère les quartiers d'une ville (admin_level 9/10 + place suburb/neighbourhood).
async function fetchDistrictsOverpass(ville, pays) {
  if (!ville) return null;
  const cacheKey = 'ocre_districts_v1::' + ville.toLowerCase().trim() + '|' + pays;
  try {
    const raw = localStorage.getItem(cacheKey);
    if (raw) {
      const o = JSON.parse(raw);
      if (o && o.ts && (Date.now() - o.ts) < 30 * 86400 * 1000 && Array.isArray(o.list)) return o.list;
    }
  } catch (e) {}
  const query = `[out:json][timeout:15];
area["name"="${ville.replace(/"/g,'\\"')}"]["admin_level"~"^[6-8]$"]->.a;
(
  node["place"~"^(suburb|neighbourhood|quarter|district|locality)$"](area.a);
  relation["admin_level"~"^(9|10)$"](area.a);
  relation["place"~"^(suburb|neighbourhood|quarter|district)$"](area.a);
  way["place"~"^(suburb|neighbourhood|quarter|district)$"](area.a);
);
out center tags;`;
  try {
    const r = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'data=' + encodeURIComponent(query),
    });
    if (!r.ok) throw new Error('http ' + r.status);
    const j = await r.json();
    if (!j.elements) throw new Error('no elements');
    const seen = new Set();
    const list = [];
    for (const el of j.elements) {
      const name = el.tags && (el.tags.name || el.tags['name:fr']);
      if (!name) continue;
      const k = name.toLowerCase().trim();
      if (seen.has(k)) continue;
      seen.add(k);
      list.push(name);
    }
    list.sort((a, b) => a.localeCompare(b, 'fr'));
    try { localStorage.setItem(cacheKey, JSON.stringify({ts: Date.now(), list})); } catch (e) {}
    return list;
  } catch (e) {
    return null;
  }
}
