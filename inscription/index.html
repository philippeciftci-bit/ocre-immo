<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ocre Immo — Créer un compte agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#F0E8D8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:14px;color:#2A2018}
.card{width:100%;max-width:400px;background:#fff;border-radius:14px;padding:22px 22px 24px;box-shadow:0 4px 30px rgba(139,94,60,0.12)}
.logo{display:flex;align-items:baseline;justify-content:center;gap:3px}
.logo .ocre{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:28px;letter-spacing:1.5px;color:#8B5E3C}
.logo .immo{font-family:'Caveat',cursive;font-weight:400;font-size:32px;color:#2A2018;margin-left:2px;line-height:1}
.tagline{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#6B4429;margin:4px 0 16px}
.field{margin-bottom:10px;position:relative}
.field label{display:block;font-size:10px;font-weight:600;color:#8B7F6E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.input{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid #E8DDD0;background:#FDFAF7;font-size:14px;font-family:inherit;color:#2A2018;outline:none;height:38px}
.input:focus{border-color:#8B5E3C;background:#fff}
.input.invalid{border-color:#C0392B}
.cgu-row{display:flex;gap:7px;align-items:flex-start;margin:10px 0 4px;font-size:12.5px;line-height:1.4}
.cgu-row input[type=checkbox]{margin-top:2px;width:16px;height:16px;accent-color:#8B5E3C;cursor:pointer}
.cgu-row a{color:#8B5E3C;text-decoration:underline}
.btn{width:100%;padding:11px;border-radius:9px;background:linear-gradient(135deg,#8B5E3C,#A06B45);color:#fff;font-weight:700;border:none;cursor:pointer;font-size:14px;font-family:inherit;margin-top:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.secondary{text-align:center;margin-top:10px;font-size:12.5px;color:#7A7167}
.secondary a{color:#8B5E3C;text-decoration:underline}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:200;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.18)}
.toast.success{background:#5A8A3A}
.toast.error{background:#C0392B}
.modal-overlay{position:fixed;inset:0;background:rgba(20,12,4,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:12px;max-width:600px;width:100%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #E5DDC8}
.modal-header h2{font-family:'Cormorant Garamond',serif;font-size:16px;color:#8B5E3C;margin:0}
.modal-close{background:none;border:none;font-size:22px;color:#8B7F6E;cursor:pointer;padding:0 6px}
.modal-body{flex:1;overflow:auto;border:none;width:100%}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="ocre">OCRE</span><span class="immo">immo</span></div>
  <div class="tagline">Créer un compte agent</div>

  <form id="form-register" autocomplete="on">
    <div class="field"><label>Prénom</label><input class="input" type="text" id="f-prenom" autocomplete="given-name" required></div>
    <div class="field"><label>Nom</label><input class="input" type="text" id="f-nom" autocomplete="family-name" required></div>
    <div class="field"><label>Email</label><input class="input" type="email" id="f-email" autocomplete="email" required></div>
    <div class="field"><label>Téléphone</label><input class="input" type="tel" id="f-tel" autocomplete="tel" required></div>
    <div class="field"><label>Ville d'exercice</label><input class="input" type="text" id="f-ville" placeholder="Marrakech, Casablanca…" required></div>
    <div class="field"><label>Diplôme ou formation (optionnel)</label><input class="input" type="text" id="f-formation" placeholder="ESI Paris, Master immo, autodidacte…"></div>

    <div class="cgu-row">
      <input type="checkbox" id="cgu-cb">
      <label for="cgu-cb">J'accepte les <a href="#" id="cgu-link">conditions générales d'utilisation</a></label>
    </div>

    <button class="btn" type="submit" id="btn-submit" disabled>Créer mon compte</button>
  </form>

  <div class="secondary">Déjà un compte ? <a href="/login/">Se connecter</a></div>
</div>

<div class="modal-overlay" id="cgu-modal" style="display:none">
  <div class="modal">
    <div class="modal-header"><h2>Conditions générales d'utilisation v1.0</h2><button class="modal-close" id="cgu-close">×</button></div>
    <iframe class="modal-body" src="/cgu/cgu-v1.0.html"></iframe>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const emailValid = v => /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v);
function update() {
  const ok = $('f-prenom').value.trim() && $('f-nom').value.trim() && emailValid($('f-email').value.trim()) && $('f-tel').value.trim() && $('f-ville').value.trim() && $('cgu-cb').checked;
  $('btn-submit').disabled = !ok;
}
['f-prenom','f-nom','f-email','f-tel','f-ville','f-formation'].forEach(id => $(id).addEventListener('input', update));
$('cgu-cb').addEventListener('change', update);
$('cgu-link').addEventListener('click', e => { e.preventDefault(); $('cgu-modal').style.display='flex'; });
$('cgu-close').addEventListener('click', () => $('cgu-modal').style.display='none');

function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

$('form-register').addEventListener('submit', async ev => {
  ev.preventDefault();
  const btn = $('btn-submit');
  btn.disabled = true;
  const old = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span>';
  const payload = {
    prenom: $('f-prenom').value.trim(),
    nom: $('f-nom').value.trim(),
    email: $('f-email').value.trim().toLowerCase(),
    telephone: $('f-tel').value.trim(),
    ville: $('f-ville').value.trim(),
    formation: $('f-formation').value.trim(),
    accept_cgu: $('cgu-cb').checked,
  };
  try {
    const r = await fetch('/api/auth.php?action=register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (!d.ok) { toast(d.error || 'Erreur', 'error'); btn.disabled=false; btn.textContent=old; return; }
    toast('Compte créé. Vérifie tes emails pour ton code de connexion.', 'success');
    setTimeout(() => {
      window.location = 'https://' + d.wsp_slug + '.ocre.immo/login/?email=' + encodeURIComponent(payload.email);
    }, 2000);
  } catch (e) { toast('Erreur réseau', 'error'); btn.disabled=false; btn.textContent=old; }
});
</script>
</body>
</html>
