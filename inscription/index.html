<body>
<div class="page">
  <div class="brand">Oi Agent<small>Inscription</small></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;
const STORAGE_KEY = 'ocre_inscription_draft';
function validateSiret(s) { const c = (s || '').replace(/\D/g, ''); if (c.length !== 14) return false; let sum = 0; for (let i = 0; i < 14; i++) { let d = parseInt(c[i], 10); if (i % 2 === 0) { d *= 2; if (d > 9) d -= 9; } sum += d; } return sum % 10 === 0; }
function fmtSiret(s) { const c = (s || '').replace(/\D/g, '').slice(0, 14); if (c.length <= 3) return c; if (c.length <= 6) return c.slice(0, 3) + ' ' + c.slice(3); if (c.length <= 9) return c.slice(0, 3) + ' ' + c.slice(3, 6) + ' ' + c.slice(6); return c.slice(0, 3) + ' ' + c.slice(3, 6) + ' ' + c.slice(6, 9) + ' ' + c.slice(9); }
// M/2026/05/08/51 — code mort retire post-M50. Credentials definis post-activation.

// M/2026/05/08/26 → 54 — phone country-code component avec règles pays-aware strictes.
// Cible : FR+francophonie+Maghreb+Golfe (marchés Ocre Immo). Champs : nationalLength
// (chiffres au format national avec 0 leading si présent), intlLength (sans 0, après dial),
// leadingZero (true si format national a un 0 à stripper en E.164).
const PHONE_COUNTRIES = [
  {code:'FR', dial:'+33',  flag:'🇫🇷', name:'France',         nationalLength:10, intlLength:9,  leadingZero:true},
  {code:'BE', dial:'+32',  flag:'🇧🇪', name:'Belgique',       nationalLength:10, intlLength:9,  leadingZero:true},
  {code:'CH', dial:'+41',  flag:'🇨🇭', name:'Suisse',         nationalLength:10, intlLength:9,  leadingZero:true},
  {code:'LU', dial:'+352', flag:'🇱🇺', name:'Luxembourg',     nationalLength:9,  intlLength:9,  leadingZero:false},
  {code:'MC', dial:'+377', flag:'🇲🇨', name:'Monaco',         nationalLength:8,  intlLength:8,  leadingZero:false},
  {code:'MA', dial:'+212', flag:'🇲🇦', name:'Maroc',          nationalLength:10, intlLength:9,  leadingZero:true},
  {code:'TN', dial:'+216', flag:'🇹🇳', name:'Tunisie',        nationalLength:8,  intlLength:8,  leadingZero:false},
  {code:'DZ', dial:'+213', flag:'🇩🇿', name:'Algérie',        nationalLength:10, intlLength:9,  leadingZero:true},
  {code:'SN', dial:'+221', flag:'🇸🇳', name:'Sénégal',        nationalLength:9,  intlLength:9,  leadingZero:false},
  {code:'CI', dial:'+225', flag:'🇨🇮', name:"Côte d'Ivoire",  nationalLength:10, intlLength:10, leadingZero:false},
  {code:'CA', dial:'+1',   flag:'🇨🇦', name:'Canada',         nationalLength:10, intlLength:10, leadingZero:false},
  {code:'GB', dial:'+44',  flag:'🇬🇧', name:'Royaume-Uni',    nationalLength:11, intlLength:10, leadingZero:true},
  {code:'ES', dial:'+34',  flag:'🇪🇸', name:'Espagne',        nationalLength:9,  intlLength:9,  leadingZero:false},
  {code:'IT', dial:'+39',  flag:'🇮🇹', name:'Italie',         nationalLength:10, intlLength:10, leadingZero:false},
  {code:'DE', dial:'+49',  flag:'🇩🇪', name:'Allemagne',      nationalLength:11, intlLength:10, leadingZero:true},
  {code:'PT', dial:'+351', flag:'🇵🇹', name:'Portugal',       nationalLength:9,  intlLength:9,  leadingZero:false},
  {code:'NL', dial:'+31',  flag:'🇳🇱', name:'Pays-Bas',       nationalLength:10, intlLength:9,  leadingZero:true},
  {code:'AE', dial:'+971', flag:'🇦🇪', name:'Émirats AU',     nationalLength:9,  intlLength:9,  leadingZero:false},
  {code:'SA', dial:'+966', flag:'🇸🇦', name:'Arabie Saoudite',nationalLength:9,  intlLength:9,  leadingZero:false},
  {code:'QA', dial:'+974', flag:'🇶🇦', name:'Qatar',          nationalLength:8,  intlLength:8,  leadingZero:false},
  {code:'US', dial:'+1',   flag:'🇺🇸', name:'États-Unis',     nationalLength:10, intlLength:10, leadingZero:false},
];

// M/2026/05/08/54 → 55 — validation pays-aware. Saisie libre 0 leading : conserver 0 dans local
// pendant la saisie ; strip uniquement dans composePhone() pour produire E.164.
function getCountryRule(code) { return PHONE_COUNTRIES.find(c => c.code === code) || PHONE_COUNTRIES[0]; }
function validatePhoneForCountry(local, countryCode) {
  const rule = getCountryRule(countryCode);
  const digits = (local || '').replace(/\D/g, '');
  if (digits.length === 0) return {valid: false, state: 'empty'};
  // Cas spécial M55 : pays sans leadingZero (US/CA) refuse 0 en tête → 'invalid'.
  if (!rule.leadingZero && digits.startsWith('0')) return {valid: false, state: 'invalid'};
  // Pour pays leadingZero=true : core = digits sans 0 leading (un seul, pas /^0+/).
  const core = (rule.leadingZero && digits.startsWith('0')) ? digits.slice(1) : digits;
  if (core.length === rule.intlLength) return {valid: true, state: 'ok', core};
  if (core.length < rule.intlLength) return {valid: false, state: 'short', core};
  return {valid: false, state: 'long', core};
}

// Decompose une valeur E.164 ('+33651325177') ou local FR ('06...') en {country, local}.
function parsePhone(v) {
  const s = (v || '').trim();
  if (!s) return {country:'FR', local:''};
  const sorted = [...PHONE_COUNTRIES].sort((a,b) => b.dial.length - a.dial.length);
  for (const c of sorted) {
    if (s.startsWith(c.dial)) return {country: c.code, local: s.slice(c.dial.length).replace(/[\s\-\.]/g,'')};
  }
  if (/^0[1-9]/.test(s.replace(/[\s\-\.]/g,''))) return {country:'FR', local: s.replace(/[\s\-\.]/g,'')};
  return {country:'FR', local: s.replace(/[\s\-\.]/g,'')};
}

// M/2026/05/08/54 → 55 — composePhone strip 1 seul 0 leading SI pays leadingZero=true.
// Sinon préserve les chiffres tels quels (US/CA refusent le 0 leading via validatePhoneForCountry).
function composePhone(country, local) {
  const c = getCountryRule(country);
  let digits = (local || '').replace(/\D/g, '');
  if (c.leadingZero && digits.startsWith('0')) digits = digits.slice(1);
  if (!digits) return '';
  return `${c.dial}${digits}`;
}

function PhoneInput({value, onChange, autoFocus}) {
  const parsed = parsePhone(value);
  const [country, setCountry] = useState(parsed.country);
  const [local, setLocal] = useState(parsed.local);
  // M/2026/05/08/55 — useEffect mount-only. Pas de re-sync depuis value à chaque keystroke
  // (qui écrasait le 0 leading FR car E.164 n'a pas de 0). State local self-contained.
  useEffect(() => { const p = parsePhone(value); setCountry(p.country); setLocal(p.local); }, []);
  const cc = getCountryRule(country);
  const validation = validatePhoneForCountry(local, country);
  const placeholder = cc.leadingZero
    ? '0' + '6'.padEnd(cc.intlLength, '5').slice(0, cc.intlLength) + ' (ou sans 0)'
    : '5'.padEnd(cc.intlLength, '5');
  function onCountry(e) {
    const newC = e.target.value;
    setCountry(newC);
    onChange(composePhone(newC, local));
  }
  function onLocal(e) {
    // M/2026/05/08/55 — saisie libre : filtre uniquement chiffres + maxLength.
    // AUCUN strip silencieux du 0 leading. Le 0 reste affiché pendant la saisie.
    // Strip appliqué uniquement par composePhone() lors de la sortie E.164.
    let v = e.target.value.replace(/[^\d]/g, '');
    if (v.length > cc.nationalLength) v = v.slice(0, cc.nationalLength);
    setLocal(v);
    onChange(composePhone(country, v));
  }
  return (
    <div style={{display:'flex', gap:6}}>
      <select value={country} onChange={onCountry}
        aria-label="Indicatif pays"
        style={{flex:'0 0 auto', padding:'11px 8px', border:'1.5px solid #E8DDC9', borderRadius:9, fontSize:14, fontFamily:'var(--font-sans)', background:'#FDFAF7', color:'var(--color-text-primary)', outline:'none'}}>
        {PHONE_COUNTRIES.map(c => (
          <option key={c.code} value={c.code}>{c.flag} {c.dial}</option>
        ))}
      </select>
      <input type="tel" inputMode="tel" value={local} onChange={onLocal} autoFocus={autoFocus}
        maxLength={cc.nationalLength}
        placeholder={placeholder}
        aria-invalid={local && !validation.valid ? 'true' : 'false'}
        style={{flex:'1 1 auto', minWidth:0}}/>
    </div>
  );
}
// Helper validation utilisable hors composant (step3 wizard).
function isPhoneValidForData(tel) {
  if (!tel) return false;
  const p = parsePhone(tel);
  return validatePhoneForCountry(p.local, p.country).valid;
}

function Wizard() {
  // M/2026/05/08/69 — bascule magic-link-only : suppression totale zone password.
  const [data, setData] = useState({prenom:'',nom:'',email:'',agence:'',tel:'',cgu:false,rgpd:false});
  const [submitting, setSubmitting] = useState(false);
  const [serverError, setServerError] = useState('');
  const [emailStatus, setEmailStatus] = useState({state:'idle', msg:''});
  useEffect(() => {
    try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) { const saved = JSON.parse(raw); if (saved && typeof saved === 'object') setData(d => ({...d, ...saved, cgu:false, rgpd:false})); } } catch(_) {}
  }, []);
  useEffect(() => {
    try { const {cgu, rgpd, ...p} = data; localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(_) {}
  }, [data]);
  const set = (k, v) => setData(d => ({...d, [k]: v}));
  async function checkEmail() {
    const e = data.email.trim().toLowerCase();
    if (!e || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) { setEmailStatus({state:'idle', msg:''}); return; }
    setEmailStatus({state:'checking', msg:'Vérification...'});
    try {
      const r = await fetch('/api/check_email.php', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email: e})});
      const j = await r.json();
      if (j && j.available === false && j.reason === 'already_used') setEmailStatus({state:'taken', msg:'Cet email est déjà utilisé'});
      else if (j && j.available === true) setEmailStatus({state:'ok', msg:'Disponible'});
      else setEmailStatus({state:'idle', msg:''});
    } catch(_) { setEmailStatus({state:'idle', msg:''}); }
  }
  // M/2026/05/08/69 — validation magic-link-only (plus de password).
  const telValid = isPhoneValidForData(data.tel);
  const emailFormatValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email);
  const formValid = data.prenom.trim() && data.nom.trim() && emailFormatValid && emailStatus.state !== 'taken'
    && telValid && data.cgu === true && data.rgpd === true;
  async function submit() {
    if (submitting) return;
    setSubmitting(true); setServerError('');
    try {
      // M/2026/05/08/69 — payload magic-link-only (plus de password).
      const r = await fetch('/api/agents_register.php', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
        prenom: data.prenom.trim(), nom: data.nom.trim(), email: data.email.trim().toLowerCase(),
        agence: data.agence.trim(),
        tel: data.tel.trim(),
        cgu_accepted: data.cgu === true, rgpd_accepted: data.rgpd === true,
      })});
      const j = await r.json();
      if (r.ok && j && j.ok) {
        try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
        window.location = j.redirect || '/inscription/confirmee/';
        return;
      }
      if (r.status === 409) setServerError(j && j.error || 'Cet email est déjà utilisé');
      else if (r.status === 422 && j && j.errors) setServerError('Erreur : ' + Object.values(j.errors).join(', '));
      else setServerError(j && j.error || 'Erreur serveur');
    } catch(_) { setServerError('Erreur réseau'); }
    setSubmitting(false);
  }
  // M/2026/05/08/57 — formulaire compact 1 page (suppression wizard 4-step + suppression set-password).
  // M/2026/05/08/63 — wrap dans <form> pour iOS Keychain double remplissage password+confirm.
  return (
    <form className="card" onSubmit={e => { e.preventDefault(); if (formValid && !submitting) submit(); }} autoComplete="on">
      <h2 style={{marginTop:0,marginBottom:6}}>Créer mon compte agent</h2>
      <p style={{margin:'0 0 18px',color:'var(--color-text-muted)',fontSize:14}}>Quelques secondes — vous recevrez un lien d'activation par email.</p>
      <div className="row2">
        <div className="field"><label>Prénom<span className="req">*</span></label><input type="text" value={data.prenom} onChange={e=>set('prenom',e.target.value)} autoComplete="given-name"/></div>
        <div className="field"><label>Nom<span className="req">*</span></label><input type="text" value={data.nom} onChange={e=>set('nom',e.target.value)} onBlur={e=>set('nom',e.target.value.toUpperCase())} autoComplete="family-name"/></div>
      </div>
      <div className="field"><label>Téléphone<span className="req">*</span></label>
        <PhoneInput value={data.tel} onChange={v => set('tel', v)}/>
        {data.tel.length > 0 && !telValid && <div className="help err">⚠ Numéro invalide</div>}
        {telValid && <div className="help ok">✓ Numéro valide</div>}
      </div>
      <div className="field"><label>Société (optionnel)</label><input type="text" value={data.agence} onChange={e=>set('agence',e.target.value)} autoComplete="organization" placeholder="Nom de votre agence"/></div>
      <div className="field"><label>Email professionnel<span className="req">*</span></label><input type="email" value={data.email} onChange={e=>{set('email',e.target.value); setEmailStatus({state:'idle', msg:''});}} onBlur={checkEmail} autoComplete="email"/>{emailStatus.state === 'checking' && <div className="help">Vérification…</div>}{emailStatus.state === 'ok' && <div className="help ok">✓ Disponible</div>}{emailStatus.state === 'taken' && <div className="help err">⚠ {emailStatus.msg}</div>}</div>
      <div className="cgu-row"><input type="checkbox" id="cgu" checked={data.cgu} onChange={e=>set('cgu',e.target.checked)}/><label htmlFor="cgu">J'accepte les <a href="https://ocre.immo/cgu.html" target="_blank" rel="noopener">Conditions Générales d'Utilisation</a> de Oi Agent.</label></div>
      <div className="cgu-row"><input type="checkbox" id="rgpd" checked={data.rgpd} onChange={e=>set('rgpd',e.target.checked)}/><label htmlFor="rgpd">J'accepte le traitement de mes données personnelles dans le cadre du RGPD, conformément à la <a href="https://ocre.immo/politique-confidentialite.html" target="_blank" rel="noopener">politique de confidentialité</a>.</label></div>
      {serverError && <div className="help err" style={{marginBottom:8}}>⚠ {serverError}</div>}
      <button type="submit" className="btn btn-success" disabled={!formValid || submitting} style={{width:'100%',marginTop:8}}>{submitting ? '…' : '✓ Créer mon compte'}</button>
      <p style={{margin:'14px 2px 0',fontSize:12,color:'var(--color-text-muted)',lineHeight:1.5,fontStyle:'italic'}}>Après inscription, vous recevrez un email avec un lien d'accès direct à votre espace.</p>
    </form>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Wizard/>);
</script>
</body>
</html>
