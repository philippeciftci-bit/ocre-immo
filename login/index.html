<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ocre Immo — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#F0E8D8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#2A2018}
.card{width:100%;max-width:400px;background:#fff;border-radius:16px;padding:32px 28px;box-shadow:0 4px 30px rgba(139,94,60,0.12)}
.logo-title{display:flex;align-items:baseline;justify-content:center;gap:3px;letter-spacing:0}
.logo-title .ocre{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:34px;letter-spacing:2px;color:#8B5E3C}
.logo-title .immo{font-family:'Caveat',cursive;font-weight:400;font-size:38px;color:#2A2018;margin-left:2px;line-height:1}
.logo-tagline{text-align:center;font-size:13px;color:#8B7F6E;margin-top:4px;margin-bottom:24px}
.field{margin-bottom:14px;position:relative}
.field label{display:block;font-size:12px;font-weight:600;color:#8B7F6E;margin-bottom:6px}
.field .help{font-size:11px;color:#8B7F6E;margin-top:4px}
.input{width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid #E8DDD0;background:#FDFAF7;font-size:14px;font-family:inherit;color:#2A2018;outline:none;transition:border-color .15s}
.input:focus{border-color:#8B5E3C;background:#fff}
.input.invalid{border-color:#C0392B;background:#FEF6F6}
.field-err{font-size:11px;color:#C0392B;margin-top:4px;display:none}
.field-err.show{display:block}
.eye-toggle{position:absolute;right:11px;top:32px;background:none;border:none;cursor:pointer;color:#8B7F6E;padding:5px;font-size:14px;font-family:inherit}
.cgu-row{display:flex;gap:8px;align-items:flex-start;margin:16px 0 6px;font-size:13px;color:#2A2018;line-height:1.4}
.cgu-row input[type=checkbox]{margin-top:2px;cursor:pointer;width:16px;height:16px;accent-color:#8B5E3C}
.cgu-row label{cursor:pointer}
.cgu-row a{color:#8B5E3C;text-decoration:underline}
.btn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,#8B5E3C,#A06B45);color:#fff;font-weight:700;border:none;cursor:pointer;font-size:14px;font-family:inherit;margin-top:10px;transition:opacity .15s}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.secondary{display:flex;flex-direction:column;gap:6px;margin-top:14px;text-align:center}
.secondary a{color:#8B5E3C;font-size:12.5px;text-decoration:underline;cursor:pointer}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#C0392B;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 4px 14px rgba(192,57,43,.3);z-index:200;animation:fadein .2s}
@keyframes fadein{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translateX(-50%)}}
.modal-overlay{position:fixed;inset:0;background:rgba(20,12,4,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:12px;max-width:600px;width:100%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #E5DDC8}
.modal-header h2{font-family:'Cormorant Garamond',serif;font-size:16px;color:#8B5E3C;margin:0}
.modal-close{background:none;border:none;font-size:22px;color:#8B7F6E;cursor:pointer;padding:0 6px}
.modal-body{flex:1;overflow:auto;border:none;width:100%}
.modal-footer{padding:12px;text-align:center;border-top:1px solid #E5DDC8}
.modal-footer button{padding:8px 24px;background:#FDFAF7;color:#8B5E3C;border:1px solid #E8DDD0;border-radius:6px;font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <div class="logo-title"><span class="ocre">OCRE</span><span class="immo">immo</span></div>
  <div class="logo-tagline">Connexion</div>

  <form id="form-login" autocomplete="off">
    <div class="field">
      <label for="f-email">Email</label>
      <input class="input" type="email" id="f-email" autocomplete="username" required>
      <div class="field-err" id="err-email">Email invalide</div>
    </div>
    <div class="field">
      <label for="f-code">Code</label>
      <input class="input" type="password" id="f-code" autocomplete="current-password" required>
      <button class="eye-toggle" type="button" id="eye-toggle" aria-label="Afficher le code">👁</button>
      <div class="help">Reçu par email lors de la création de ton compte</div>
      <div class="field-err" id="err-code">Code requis</div>
    </div>

    <div class="cgu-row" id="cgu-row">
      <input type="checkbox" id="cgu-cb">
      <label for="cgu-cb">J'accepte les <a href="#" id="cgu-link">conditions générales d'utilisation</a></label>
    </div>

    <button class="btn" type="submit" id="btn-submit" disabled>Valider</button>
  </form>

  <div class="secondary">
    <a id="link-forgot">Mot de passe oublié ?</a>
    <a id="link-resend">Renvoyer le code</a>
  </div>
</div>

<div class="modal-overlay" id="cgu-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>Conditions générales d'utilisation v1.0</h2>
      <button class="modal-close" id="cgu-modal-close" aria-label="Fermer">×</button>
    </div>
    <iframe class="modal-body" src="/cgu/cgu-v1.0.html"></iframe>
    <div class="modal-footer">
      <button type="button" id="cgu-modal-footer-close">Fermer</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
const $ = id => document.getElementById(id);

const cguSeen = document.cookie.includes('cgu_seen=1');
if (cguSeen) $('cgu-row').style.display = 'none';

function emailValid(v) { return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v); }

function updateBtn() {
  const e = $('f-email').value.trim();
  const c = $('f-code').value;
  const cguOk = cguSeen || $('cgu-cb').checked;
  $('btn-submit').disabled = !(e && c && cguOk && emailValid(e));
}

['f-email', 'f-code'].forEach(id => $(id).addEventListener('input', updateBtn));
$('cgu-cb').addEventListener('change', updateBtn);

$('f-email').addEventListener('blur', e => {
  const v = e.target.value.trim();
  if (v && !emailValid(v)) { $('f-email').classList.add('invalid'); $('err-email').classList.add('show'); }
  else { $('f-email').classList.remove('invalid'); $('err-email').classList.remove('show'); }
});

$('eye-toggle').addEventListener('click', () => {
  const inp = $('f-code');
  const on = inp.type === 'text';
  inp.type = on ? 'password' : 'text';
  $('eye-toggle').textContent = on ? '👁' : '🙈';
});

$('cgu-link').addEventListener('click', e => { e.preventDefault(); $('cgu-modal').style.display = 'flex'; });
$('cgu-modal-close').addEventListener('click', () => $('cgu-modal').style.display = 'none');
$('cgu-modal-footer-close').addEventListener('click', () => $('cgu-modal').style.display = 'none');
$('cgu-modal').addEventListener('click', e => { if (e.target.id === 'cgu-modal') $('cgu-modal').style.display = 'none'; });

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

$('form-login').addEventListener('submit', async ev => {
  ev.preventDefault();
  const email = $('f-email').value.trim();
  const code = $('f-code').value;
  const accept_cgu = cguSeen ? true : $('cgu-cb').checked;
  if (!email || !code || !accept_cgu) return;
  const btn = $('btn-submit');
  btn.disabled = true;
  const oldLabel = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span>';
  ['f-email', 'f-code', 'cgu-cb'].forEach(id => $(id).disabled = true);
  try {
    const r = await fetch(API + '/auth.php?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: code, accept_cgu })
    });
    const d = await r.json();
    if (!d.ok) {
      toast(d.error || 'Connexion refusée');
      $('f-email').classList.add('invalid'); $('f-code').classList.add('invalid');
      ['f-email', 'f-code', 'cgu-cb'].forEach(id => $(id).disabled = false);
      btn.disabled = false; btn.textContent = oldLabel;
      return;
    }
    localStorage.setItem('ocre_token', d.token);
    localStorage.setItem('ocre_user', JSON.stringify(d.user));
    document.cookie = 'cgu_seen=1;path=/;max-age=' + (86400 * 365);
    setTimeout(() => { window.location = '/'; }, 200);
  } catch (e) {
    toast('Erreur réseau');
    ['f-email', 'f-code', 'cgu-cb'].forEach(id => $(id).disabled = false);
    btn.disabled = false; btn.textContent = oldLabel;
  }
});

async function resend(reason) {
  const email = ($('f-email').value || prompt('Ton email :') || '').trim();
  if (!emailValid(email)) { toast('Email invalide'); return; }
  try {
    const r = await fetch(API + '/auth.php?action=resend_code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, reason })
    });
    const d = await r.json();
    if (d.ok) toast('Nouveau code envoyé par email');
    else toast(d.error || 'Erreur envoi');
  } catch (e) { toast('Erreur réseau'); }
}
$('link-forgot').addEventListener('click', e => { e.preventDefault(); resend('forgot'); });
$('link-resend').addEventListener('click', e => { e.preventDefault(); resend('resend'); });

(async () => {
  const t = localStorage.getItem('ocre_token');
  if (!t) return;
  try {
    const r = await fetch(API + '/auth.php?action=me', { headers: { 'X-Session-Token': t } });
    const d = await r.json();
    if (d && d.ok) window.location = '/';
    else localStorage.removeItem('ocre_token');
  } catch (e) {}
})();
</script>
</body>
</html>
