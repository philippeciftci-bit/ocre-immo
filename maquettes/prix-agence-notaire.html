<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10 maquettes Prix + Agence + Notaire — Ocre Immo</title>
<style>
:root {
  --bg: #FAF6EE;
  --soft: #FBF1E4;
  --soft2: #F4ECE0;
  --border: #E8DDC9;
  --mid: #C9B79A;
  --strong: #8B5E3C;
  --deep: #5C3B1E;
  --text: #2A2018;
  --grey: #8B7F6E;
  --aqua: #E5F4F0;
  --aqua-bord: #7FCBB7;
  --aqua-text: #1F7765;
  --blue: #E5F0F9;
  --blue-bord: #7FAFD3;
  --blue-text: #1F5784;
  --red: #C73E3E;
  --green: #2D6B3F;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(180deg, #F4ECE0 0%, #EAD7B8 100%);
  margin: 0;
  padding: 0;
  color: var(--text);
}
.nav-sticky {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  box-shadow: 0 2px 12px rgba(139,94,60,.08);
}
.nav-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--deep);
  margin-bottom: 6px;
}
.nav-title small {
  font-weight: 400;
  color: var(--grey);
  font-size: 11px;
}
.nav-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 11px;
}
.nav-pill {
  display: inline-block;
  padding: 3px 8px;
  background: var(--soft);
  color: var(--deep);
  border: 1px solid var(--mid);
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
}
.nav-pill:hover { background: var(--strong); color: #fff; }
.layout-section {
  max-width: 1700px;
  margin: 24px auto;
  padding: 0 16px;
}
.layout-header {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px 12px 0 0;
  padding: 12px 18px;
}
.layout-header h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
  color: var(--deep);
}
.layout-header .num {
  display: inline-block;
  background: var(--strong);
  color: white;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  margin-right: 10px;
}
.layout-header p {
  margin: 4px 0 0;
  font-size: 12px;
  color: var(--grey);
  font-style: italic;
}
.profils-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(390px, 1fr));
  gap: 16px;
  padding: 18px;
  background: white;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
}
@media (min-width: 1700px) {
  .profils-grid { grid-template-columns: repeat(4, 1fr); }
}
.maquette-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.maquette-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 3px 10px;
  background: var(--soft);
  border: 1px solid var(--mid);
  border-radius: 10px;
  color: var(--deep);
}
.iphone {
  width: 390px;
  max-width: 100%;
  background: #1d1d1f;
  border-radius: 32px;
  padding: 6px;
  box-shadow: 0 12px 36px rgba(0,0,0,.18);
}
.iphone-status {
  display: flex;
  justify-content: space-between;
  padding: 4px 16px 2px;
  font-size: 10px;
  color: white;
  font-weight: 600;
}
.iphone-screen {
  background: var(--bg);
  border-radius: 26px;
  overflow: hidden;
  max-height: 760px;
  overflow-y: auto;
}
.s3-page { padding: 12px; font-size: 12.5px; }
.s3-h {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--deep);
  display: inline-block;
  border-bottom: 2px solid var(--strong);
  padding-bottom: 3px;
  margin-bottom: 10px;
}

/* === BLOC commun === */
.bloc {
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.bloc-prix {
  background: var(--soft);
  border: 1.2px solid var(--mid);
}
.bloc-agence {
  background: var(--aqua);
  border: 1.2px solid var(--aqua-bord);
}
.bloc-notaire {
  background: var(--blue);
  border: 1.2px solid var(--blue-bord);
}
.bloc h4 {
  margin: 0 0 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.bloc-prix h4 { color: #B26D3A; }
.bloc-agence h4 { color: var(--aqua-text); }
.bloc-notaire h4 { color: var(--blue-text); }

/* Inputs EUR/MAD pair */
.row-pair { margin-bottom: 8px; }
.row-pair:last-of-type { margin-bottom: 0; }
.row-label {
  font-size: 11px;
  color: #5C5550;
  font-weight: 600;
  margin-bottom: 4px;
}
.row-pair-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.iw {
  background: #fff;
  border: 1px solid #D6C7AC;
  border-radius: 6px;
  padding: 6px 8px;
  display: flex;
  align-items: center;
  gap: 5px;
  height: 38px;
}
.iw.warn { border-color: var(--red); background: #FEF6F6; }
.iw input {
  border: none;
  outline: none;
  flex: 1;
  font-size: 13px;
  background: transparent;
  font-family: inherit;
  color: var(--text);
  min-width: 0;
  padding: 0;
}
.iw .cur { font-size: 11px; color: var(--grey); font-weight: 600; }
.iw .flag { font-size: 14px; line-height: 1; }
.hint {
  font-size: 9.5px;
  color: var(--grey);
  font-style: italic;
  text-align: center;
  margin-top: 3px;
}
.hint.warn { color: var(--red); font-weight: 600; }
.hint.lock { color: #8B5E3C; }

.add-btn {
  display: block;
  width: 100%;
  padding: 6px;
  margin-top: 8px;
  background: white;
  border: 1.5px dashed var(--mid);
  border-radius: 6px;
  color: var(--strong);
  font-weight: 600;
  font-size: 11.5px;
  cursor: pointer;
  font-family: inherit;
}

/* Acteur agence */
.act-row {
  display: grid;
  grid-template-columns: 90px 60px 70px 70px 22px;
  gap: 4px;
  align-items: center;
  font-size: 10.5px;
  padding: 5px 0;
  border-bottom: 1px dashed var(--border);
}
.act-row:last-of-type { border-bottom: none; }
.act-pill {
  background: #fff;
  border: 1px solid var(--border);
  padding: 4px 6px;
  border-radius: 5px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10.5px;
}
.act-toggle {
  display: flex;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  height: 22px;
}
.act-tg-b {
  flex: 1;
  text-align: center;
  font-size: 9px;
  font-weight: 700;
  color: var(--grey);
  padding: 4px 0;
  cursor: pointer;
}
.act-tg-b.on { background: var(--aqua-text); color: #fff; }
.act-total-line {
  display: flex;
  justify-content: space-between;
  padding: 6px 4px 0;
  border-top: 1px solid var(--aqua-bord);
  margin-top: 4px;
  font-weight: 700;
  font-size: 12px;
  color: var(--aqua-text);
}

/* Notaire 3 cols */
.not-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 6px;
}
.not-total {
  background: rgba(127,175,211,.18);
  border-radius: 5px;
  padding: 6px 8px;
  font-size: 12px;
  font-weight: 700;
  color: var(--blue-text);
  text-align: right;
}

/* Profil mini */
.profil-mini {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 0.4px;
  color: white;
  margin-bottom: 6px;
}
.profil-mini.vendeur { background: #2C3F8B; }
.profil-mini.acheteur { background: #2C5F8B; }
.profil-mini.bailleur { background: #5F8B2C; }
.profil-mini.locataire { background: #8B5F2C; }

/* === LAYOUT-SPECIFIC styles === */

/* L1 — Compact minimaliste */
.l1 .bloc { border: none; background: transparent; padding: 8px 0; border-top: 1px solid var(--border); border-radius: 0; }
.l1 .bloc:first-child { border-top: none; padding-top: 0; }
.l1 .bloc h4 { font-size: 10px; }

/* L3 — Tabs */
.l3-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}
.l3-tab {
  flex: 1;
  text-align: center;
  padding: 6px 4px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 10.5px;
  color: var(--grey);
  font-weight: 600;
  cursor: pointer;
}
.l3-tab.on { background: var(--strong); color: #fff; border-color: var(--strong); }
.l3-tab-info {
  text-align: center;
  font-size: 10px;
  color: var(--grey);
  font-style: italic;
  margin-top: 8px;
  padding: 6px;
  border-top: 1px dashed var(--mid);
}

/* L4 — Stepper */
.l4-step {
  text-align: center;
  font-size: 10px;
  color: var(--grey);
  margin-bottom: 6px;
}
.l4-progress {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}
.l4-progress > div {
  height: 100%;
  background: var(--strong);
}

/* L5 — Liste dense */
.l5 .bloc { background: transparent; border: none; padding: 4px 0; border-radius: 0; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.l5 .bloc:last-child { border-bottom: none; }
.l5-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 11.5px;
  border-bottom: 1px dotted var(--border);
}
.l5-row:last-child { border-bottom: none; }
.l5-row .lbl { color: var(--grey); font-weight: 600; }
.l5-row .val { font-weight: 700; color: var(--text); }

/* L6 — Cards numérotées */
.l6 .bloc { position: relative; padding-left: 16px; }
.l6-num {
  position: absolute;
  top: 10px;
  left: -2px;
  background: var(--strong);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  letter-spacing: 0.4px;
}

/* L7 — Floating labels */
.l7 .iw { padding-top: 14px; padding-bottom: 4px; position: relative; }
.l7 .iw input { padding-top: 0; }
.l7 .row-label {
  position: absolute;
  top: 5px;
  left: 9px;
  font-size: 8.5px;
  background: #fff;
  padding: 0 4px;
  margin-bottom: 0;
  z-index: 1;
}
.l7 .row-pair { position: relative; padding-top: 0; }

/* L8 — Bento */
.l8-bento {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 8px;
}
.l8-bento .bloc-prix { grid-column: 1 / 3; grid-row: 1; }
.l8-bento .bloc-agence { grid-column: 1 / 2; grid-row: 2; padding: 8px; }
.l8-bento .bloc-notaire { grid-column: 2 / 3; grid-row: 2; padding: 8px; }
.l8-bento .bloc-agence .act-row { grid-template-columns: 1fr 32px 50px 50px 18px; gap: 3px; font-size: 9.5px; }
.l8-bento .bloc-agence .act-pill { font-size: 9px; padding: 3px 4px; }

/* L9 — Borderless */
.l9 .bloc { background: transparent; border: none; padding: 6px 0; }
.l9 .bloc + .bloc { border-top: 1px dashed var(--mid); padding-top: 10px; }
.l9 .bloc h4 { font-size: 10.5px; }

/* L10 — Glass */
.l10 .s3-page {
  background: linear-gradient(135deg, #FBE8C8 0%, #E8DDC9 50%, #C9B79A 100%);
  min-height: 600px;
}
.l10 .s3-h { color: #fff; border-color: #fff; }
.l10 .bloc {
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(232,221,201,0.6);
  backdrop-filter: blur(10px);
}
</style>
</head>
<body>

<div class="nav-sticky">
  <div class="nav-title">M-PAN-MAQ — 10 maquettes Prix + Agence + Notaire <small>· 10 layouts × 4 profils · 40 frames iPhone 390px · validation visuelle uniquement</small></div>
  <div class="nav-pills" id="nav"></div>
</div>

<div id="root"></div>

<script>
const TAUX = 10.85;

const MOCK = {
  vendeur: {
    type: 'vendeur', label: 'VENDEUR', cls: 'vendeur',
    prix: { mad: 5800000, eur: Math.round(5800000 / TAUX) },
    plancher: { mad: 5500000, eur: Math.round(5500000 / TAUX) },
    liquide: { mad: 600000, eur: Math.round(600000 / TAUX) },
    showPrixPlancher: true,
    fourchette: false,
    showNotaire: true,
    notairePct: 6.0,
    notaireLabel: 'MA 6%',
    acteurs: [
      {nom: 'Mandat', mode: 'pourcent', val: 5},
      {nom: 'Contrepartie', mode: 'pourcent', val: 2.5},
    ],
  },
  acheteur: {
    type: 'acheteur', label: 'ACHETEUR', cls: 'acheteur',
    min: { mad: 2800000, eur: Math.round(2800000 / TAUX) },
    max: { mad: 3200000, eur: Math.round(3200000 / TAUX) },
    liquide: { mad: 200000, eur: Math.round(200000 / TAUX) },
    fourchette: true,
    showNotaire: true,
    notairePct: 6.0,
    notaireLabel: 'MA 6%',
    acteurs: [
      {nom: 'Contrepartie', mode: 'pourcent', val: 2.5},
    ],
  },
  bailleur: {
    type: 'bailleur', label: 'BAILLEUR', cls: 'bailleur',
    loyer: { mad: 14000, eur: Math.round(14000 / TAUX) },
    plancher: { mad: 12000, eur: Math.round(12000 / TAUX) },
    charges: { mad: 1500, eur: Math.round(1500 / TAUX) },
    caution: { mad: 28000, eur: Math.round(28000 / TAUX) },
    showPrixPlancher: true,
    fourchette: false,
    showNotaire: false,
    acteurs: [
      {nom: 'Mandat', mode: 'forfait', val: 14000},
    ],
  },
  locataire: {
    type: 'locataire', label: 'LOCATAIRE', cls: 'locataire',
    min: { mad: 12000, eur: Math.round(12000 / TAUX) },
    max: { mad: 15000, eur: Math.round(15000 / TAUX) },
    caution: { mad: 30000, eur: Math.round(30000 / TAUX) },
    fourchette: true,
    showNotaire: false,
    acteurs: [],
  },
};

const fmt = (n) => n ? Number(n).toLocaleString('fr-FR') : '';

let _uniqId = 0;
function nextId() { return 'i' + (++_uniqId); }

function inputPair(eurVal, madVal, opts) {
  opts = opts || {};
  const eId = nextId();
  const mId = nextId();
  const warnCls = opts.warn ? ' warn' : '';
  return `
    <div class="row-pair-inputs"${opts.attrs || ''}>
      <div class="iw${warnCls}">
        <input type="text" inputmode="numeric" value="${fmt(eurVal)}" data-pair="${mId}" data-dir="eur" placeholder="0">
        <span class="cur">€</span>
        <span class="flag" aria-hidden="true">🇪🇺</span>
      </div>
      <div class="iw${warnCls}">
        <input type="text" inputmode="numeric" value="${fmt(madVal)}" id="${mId}" data-pair="${eId}" data-dir="mad" placeholder="0">
        <span class="cur">Dhs</span>
        <span class="flag" aria-hidden="true">🇲🇦</span>
      </div>
    </div>
  `.replace('<input ', '<input id="' + eId + '" ');
}

function rowLabel(label, opts) {
  return `<div class="row-label">${label}</div>`;
}
function row(label, eurVal, madVal, hint, opts) {
  opts = opts || {};
  const hintCls = opts.hintWarn ? ' warn' : opts.hintLock ? ' lock' : '';
  return `
    <div class="row-pair">
      ${rowLabel(label)}
      ${inputPair(eurVal, madVal, opts)}
      ${hint ? '<div class="hint' + hintCls + '">' + hint + '</div>' : ''}
    </div>
  `;
}

function blocPrix(p) {
  const lines = [];
  if (p.fourchette) {
    if (p.type === 'acheteur') {
      lines.push(row('Prix min', p.min.eur, p.min.mad, 'Conversion auto au taux du jour'));
      lines.push(row('Prix max', p.max.eur, p.max.mad, '⚠ Min ≥ Max si applicable', {hintWarn: false}));
      lines.push(row('Liquide dispo', p.liquide.eur, p.liquide.mad, 'Cash hors crédit'));
    } else {
      lines.push(row('Loyer min', p.min.eur, p.min.mad, 'Conversion auto'));
      lines.push(row('Loyer max', p.max.eur, p.max.mad, ''));
      lines.push(row('Caution dispo', p.caution.eur, p.caution.mad, 'Cash dépôt'));
    }
  } else if (p.type === 'vendeur') {
    lines.push(row('Prix', p.prix.eur, p.prix.mad, 'Conversion auto au taux du jour'));
    lines.push(row('Prix plancher', p.plancher.eur, p.plancher.mad, '🔒 Visible agent uniquement (masqué sur PDF partagé)', {hintLock: true}));
    lines.push(row('Liquide', p.liquide.eur, p.liquide.mad, 'Partie cash hors compta'));
  } else if (p.type === 'bailleur') {
    lines.push(row('Loyer demandé', p.loyer.eur, p.loyer.mad, 'Conversion auto'));
    lines.push(row('Loyer plancher', p.plancher.eur, p.plancher.mad, '🔒 Visible agent uniquement', {hintLock: true}));
    lines.push(row('Charges', p.charges.eur, p.charges.mad, 'Mensuelles récupérables'));
    lines.push(row('Caution', p.caution.eur, p.caution.mad, ''));
  }
  const titre = (p.fourchette
    ? (p.type === 'acheteur' ? 'PRIX (FOURCHETTE)' : 'LOYER (FOURCHETTE)')
    : (p.type === 'bailleur' ? 'LOYER & CONDITIONS' : 'PRIX'));
  return `
    <div class="bloc bloc-prix">
      <h4><span>💰 ${titre}</span></h4>
      ${lines.join('')}
      <button class="add-btn" type="button">+ Ajouter</button>
    </div>
  `;
}

function blocAgence(p) {
  const baseAmount = p.prix ? p.prix.mad : (p.max ? p.max.mad : (p.loyer ? p.loyer.mad : 0));
  const calc = (a) => a.mode === 'forfait' ? a.val : Math.round(baseAmount * a.val / 100);
  const total = p.acteurs.reduce((s, a) => s + calc(a), 0);
  const rows = p.acteurs.map(a => `
    <div class="act-row">
      <div class="act-pill">${a.nom}</div>
      <div class="act-toggle">
        <div class="act-tg-b ${a.mode==='pourcent'?'on':''}">%</div>
        <div class="act-tg-b ${a.mode==='forfait'?'on':''}">F</div>
      </div>
      <div class="act-pill">${a.val}${a.mode==='pourcent'?'%':''}</div>
      <div class="act-pill" style="font-weight:700">${fmt(calc(a))} Dhs</div>
      <div style="text-align:center;color:var(--grey);font-size:11px">✕</div>
    </div>
  `).join('');
  const empty = p.acteurs.length === 0 ? `<div style="font-size:11px;color:var(--grey);font-style:italic;text-align:center;padding:6px 0">Pas d'agence par défaut. Tap + Ajouter pour ajouter.</div>` : '';
  return `
    <div class="bloc bloc-agence">
      <h4><span>🤝 FRAIS D'AGENCE</span><span style="color:var(--aqua-text);font-size:12px">${p.acteurs.length > 0 ? fmt(total) + ' Dhs' : ''}</span></h4>
      ${rows}${empty}
      ${p.acteurs.length > 0 ? '<div class="act-total-line"><span>Total</span><span>' + fmt(total) + ' Dhs</span></div>' : ''}
      <button class="add-btn" type="button">+ Ajouter (${p.acteurs.length}/4)</button>
    </div>
  `;
}

function blocNotaire(p) {
  if (!p.showNotaire) return '';
  const baseAmount = p.prix ? p.prix.mad : (p.max ? p.max.mad : 0);
  const total = Math.round(baseAmount * p.notairePct / 100);
  return `
    <div class="bloc bloc-notaire">
      <h4><span>🏛 FRAIS NOTAIRE</span></h4>
      <div class="not-grid">
        <div>
          <div class="row-label">Pourcentage</div>
          <div class="iw"><input type="text" value="${p.notairePct}" inputmode="decimal"><span class="cur">%</span></div>
          <div class="hint">${p.notaireLabel}</div>
        </div>
        <div>
          <div class="row-label">Frais dossier</div>
          <div class="iw"><input type="text" placeholder="0" inputmode="numeric"><span class="cur">Dhs</span></div>
          <div class="hint">Optionnel</div>
        </div>
      </div>
      <div class="not-total">Total estimé : ${fmt(total)} Dhs</div>
      <div class="hint" style="margin-top:6px">Pré-rempli selon pays — modifiable</div>
    </div>
  `;
}

// === 10 LAYOUTS ===
const LAYOUTS = [

// JS conversion EUR/MAD bi-directionnelle (live)
function setupConv() {
  document.querySelectorAll('input[data-pair]').forEach(input => {
    input.addEventListener('input', () => {
      if (document.activeElement !== input) return;
      const pairId = input.getAttribute('data-pair');
      const dir = input.getAttribute('data-dir');
      const other = document.getElementById(pairId);
      if (!other) return;
      const v = parseFloat(input.value.replace(/\s/g, '').replace(',', '.')) || 0;
      const out = dir === 'eur' ? v * TAUX : v / TAUX;
      other.value = v ? Math.round(out).toLocaleString('fr-FR') : '';
    });
  });
}
setupConv();
