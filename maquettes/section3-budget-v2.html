<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>80 maquettes Section III Budget — Ocre Immo</title>
<style>
:root {
  --bg: #FAF6EE;
  --soft: #FBF1E4;
  --soft2: #F4ECE0;
  --border: #E8DDC9;
  --mid: #C9B79A;
  --strong: #8B5E3C;
  --deep: #5C3B1E;
  --text: #2A2018;
  --grey: #8B7F6E;
  --input-empty: #FDFAF7;
  --input-filled: #FFFCF5;
  --red: #C73E3E;
  --green: #2D6B3F;
  --blue-soft: #E5F0F9;
  --green-soft: #EAF7E8;
  --purple-soft: #F0E8F7;
  --aqua-soft: #E5F4F0;
  --pink-soft: #FCE9F1;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(180deg, #F4ECE0 0%, #EAD7B8 100%);
  margin: 0;
  padding: 0;
  color: var(--text);
}
.nav-sticky {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  box-shadow: 0 2px 12px rgba(139,94,60,.08);
}
.nav-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--deep);
  margin-bottom: 6px;
}
.nav-title small {
  font-weight: 400;
  color: var(--grey);
  font-size: 11px;
}
.nav-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 11px;
}
.nav-pill {
  display: inline-block;
  padding: 3px 8px;
  background: var(--soft);
  color: var(--deep);
  border: 1px solid var(--mid);
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
}
.nav-pill:hover { background: var(--strong); color: white; }
.layout-section {
  max-width: 1700px;
  margin: 24px auto;
  padding: 0 16px;
}
.layout-header {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px 12px 0 0;
  padding: 12px 18px;
}
.layout-header h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
  color: var(--deep);
}
.layout-header .num {
  display: inline-block;
  background: var(--strong);
  color: white;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  margin-right: 8px;
}
.layout-header p {
  margin: 4px 0 0;
  font-size: 12px;
  color: var(--grey);
  font-style: italic;
}
.profils-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(390px, 1fr));
  gap: 16px;
  padding: 18px;
  background: white;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
}
@media (min-width: 1700px) {
  .profils-grid { grid-template-columns: repeat(4, 1fr); }
}
.maquette-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.maquette-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--deep);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 3px 10px;
  background: var(--soft);
  border: 1px solid var(--mid);
  border-radius: 10px;
}
.iphone {
  width: 390px;
  max-width: 100%;
  background: #1d1d1f;
  border-radius: 32px;
  padding: 6px;
  box-shadow: 0 12px 36px rgba(0,0,0,.18);
}
.iphone-status {
  display: flex;
  justify-content: space-between;
  padding: 4px 16px 2px;
  font-size: 10px;
  color: white;
  font-weight: 600;
}
.iphone-screen {
  background: var(--bg);
  border-radius: 26px;
  overflow: hidden;
  max-height: 700px;
  overflow-y: auto;
}
.s3-page {
  padding: 12px 12px 16px;
  font-size: 12.5px;
}
.s3-h {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--deep);
  display: inline-block;
  border-bottom: 2px solid #A07842;
  padding-bottom: 3px;
  margin-bottom: 10px;
}

/* BLOC commun */
.bloc {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
}
.bloc-title {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--strong);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.field-lbl {
  font-size: 9.5px;
  font-weight: 600;
  color: var(--grey);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  display: block;
  margin-bottom: 2px;
}
.input-wrap {
  position: relative;
}
.input {
  width: 100%;
  padding: 6px 8px;
  border: 1.2px solid var(--mid);
  border-radius: 6px;
  font-size: 12px;
  background: var(--input-filled);
  color: var(--text);
  font-weight: 500;
}
.input.dashed { border-style: dashed; background: linear-gradient(135deg, #FFF5E6, #FBE8C8); }
.input.warn { border-color: var(--red); background: #FEF6F6; }
.input.with-suf { padding-right: 32px; }
.suf {
  position: absolute;
  right: 7px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--grey);
  font-weight: 600;
}
.hint {
  font-size: 9px;
  color: var(--grey);
  font-style: italic;
  margin-top: 1px;
}

/* Acteur agence row dense */
.act {
  display: grid;
  grid-template-columns: 1.4fr 0.6fr 0.7fr 1fr 18px;
  gap: 3px;
  align-items: center;
  font-size: 10.5px;
  padding: 4px 0;
  border-bottom: 1px dashed var(--border);
}
.act:last-child { border-bottom: none; }
.act-pill {
  background: var(--soft);
  padding: 3px 6px;
  border-radius: 6px;
  font-weight: 600;
  color: var(--deep);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.act-pill.val { background: var(--input-filled); border: 1px solid var(--border); }
.act-pill.tot { background: var(--input-filled); border: 1px solid var(--border); font-weight: 700; }
.toggle {
  display: flex;
  background: var(--input-empty);
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  height: 22px;
}
.toggle-b {
  flex: 1;
  text-align: center;
  font-size: 9px;
  font-weight: 700;
  color: var(--grey);
  padding: 4px 0;
  cursor: pointer;
}
.toggle-b.on { background: var(--strong); color: white; }

.add-btn {
  display: block;
  width: 100%;
  padding: 5px;
  background: white;
  border: 1.2px dashed var(--mid);
  border-radius: 5px;
  color: var(--strong);
  font-weight: 600;
  font-size: 10px;
  margin-top: 4px;
  cursor: pointer;
}
.tot-line {
  display: flex;
  justify-content: space-between;
  padding: 6px 4px 0;
  border-top: 1px solid var(--mid);
  margin-top: 4px;
  font-weight: 700;
  font-size: 12px;
  color: var(--deep);
}
.synth {
  background: linear-gradient(135deg, var(--soft), #F5EAD8);
  border: 1.2px solid var(--mid);
  border-radius: 8px;
  padding: 10px 12px;
}
.synth-lbl {
  font-size: 9.5px;
  font-weight: 700;
  color: var(--strong);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}
.synth-val {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
}
.synth-det {
  font-size: 9.5px;
  color: var(--grey);
  margin-top: 3px;
  font-style: italic;
  line-height: 1.3;
}
.coll {
  background: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10.5px;
  color: var(--grey);
  font-weight: 600;
}

/* Variations spécifiques */
.tabs {
  display: flex;
  gap: 3px;
  overflow-x: auto;
  margin-bottom: 8px;
  padding-bottom: 3px;
}
.tab {
  flex-shrink: 0;
  padding: 4px 10px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 10.5px;
  color: var(--grey);
  font-weight: 600;
  white-space: nowrap;
}
.tab.on { background: var(--strong); color: white; border-color: var(--strong); }
.progress {
  height: 2.5px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress > div {
  height: 100%;
  background: var(--strong);
}
.step-info {
  text-align: center;
  font-size: 9.5px;
  color: var(--grey);
  margin-bottom: 6px;
}
.next-btn {
  display: block;
  width: 100%;
  padding: 8px;
  background: var(--strong);
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: 700;
  font-size: 12px;
  margin-top: 8px;
}

.theme {
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  border: 1.2px solid;
}
.theme.green { background: var(--green-soft); border-color: #9DCB94; }
.theme.ocre { background: var(--soft); border-color: var(--mid); }
.theme.blue { background: var(--blue-soft); border-color: #7FAFD3; }
.theme.purple { background: var(--purple-soft); border-color: #B79DD3; }
.theme.aqua { background: var(--aqua-soft); border-color: #7FCBB7; }
.theme.pink { background: var(--pink-soft); border-color: #D37FA7; }
.theme h4 {
  margin: 0 0 5px;
  font-size: 11px;
  font-weight: 700;
}
.theme.green h4 { color: var(--green); }
.theme.ocre h4 { color: var(--deep); }
.theme.blue h4 { color: #1F5784; }
.theme.purple h4 { color: #5F3F8B; }
.theme.aqua h4 { color: #1F7765; }
.theme.pink h4 { color: #99316C; }

table.tab-fin {
  width: 100%;
  border-collapse: collapse;
  font-size: 10.5px;
}
table.tab-fin th, table.tab-fin td {
  padding: 4px 6px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
table.tab-fin th {
  background: var(--soft);
  color: var(--deep);
  font-size: 9px;
  text-transform: uppercase;
  font-weight: 700;
  letter-spacing: 0.3px;
}
table.tab-fin tr.tot td {
  background: var(--soft);
  font-weight: 700;
  border-top: 1.5px solid var(--strong);
}
.num { text-align: right; font-variant-numeric: tabular-nums; }

/* Variant 7 — pills inline */
.pill-flow {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}
.pill-flow .p {
  background: var(--soft);
  border: 1px solid var(--mid);
  border-radius: 12px;
  padding: 3px 8px;
  font-size: 11px;
  color: var(--deep);
  font-weight: 600;
}
.pill-flow .p b { color: var(--strong); }

/* Variant 9 — dashboard widgets */
.widgets {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.widget {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  text-align: center;
}
.widget .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--grey); }
.widget .num { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 2px; text-align: center; }
.widget .sub { font-size: 9px; color: var(--grey); }

/* Variant 12 — timeline */
.timeline {
  position: relative;
  padding-left: 20px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--mid);
}
.tl-item {
  position: relative;
  margin-bottom: 8px;
}
.tl-item::before {
  content: '';
  position: absolute;
  left: -18px;
  top: 6px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--strong);
  border: 2px solid white;
}

/* Variant 13 — bento */
.bento {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 5px;
  min-height: 320px;
}
.bento > div { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 11px; }
.bento .b1 { grid-row: 1 / 3; grid-column: 1; }
.bento .b2 { grid-row: 1 / 2; grid-column: 2; }
.bento .b3 { grid-row: 2 / 3; grid-column: 2; }
.bento .b4 { grid-row: 3 / 4; grid-column: 1 / 3; background: linear-gradient(135deg, var(--soft), #F5EAD8); border-color: var(--mid); }

/* Variant 14 — stripes */
.stripe {
  padding: 8px 10px;
}
.stripe.alt { background: var(--soft); }

/* Variant 15 — borderless */
.bless { padding: 6px 0; margin-bottom: 4px; }

/* Variant 17 — floating labels */
.float-wrap { position: relative; padding-top: 8px; }
.float-wrap .input { padding-top: 14px; padding-bottom: 4px; }
.float-wrap .field-lbl {
  position: absolute;
  left: 9px;
  top: 11px;
  background: var(--input-filled);
  padding: 0 4px;
  font-size: 8.5px;
}

/* Variant 18 — top sticky synthese */
.sticky-synth {
  position: sticky;
  top: 0;
  z-index: 10;
  background: linear-gradient(135deg, var(--strong), #A06B45);
  color: white;
  padding: 10px 12px;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 8px;
}
.sticky-synth .num { font-size: 17px; font-weight: 800; }

/* Variant 19 — sectioned pills */
.sec-pill {
  display: inline-block;
  background: var(--strong);
  color: white;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.4px;
  margin-bottom: 5px;
}

/* Variant 20 — glass */
.glass {
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(232,221,201,0.6);
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  backdrop-filter: blur(10px);
}

/* Profil banner mini dans la maquette pour rappel */
.profil-mini {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.4px;
  color: white;
  margin-bottom: 8px;
}
.profil-mini.vendeur { background: #2C3F8B; }
.profil-mini.acheteur { background: #2C5F8B; }
.profil-mini.bailleur { background: #5F8B2C; }
.profil-mini.locataire { background: #8B5F2C; }

/* Variant 6 — liste dense type tableur */
.dense-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.dense-row:last-child { border-bottom: none; }
.dense-row .lbl { color: var(--grey); font-weight: 600; }
.dense-row .val { font-weight: 700; color: var(--text); }
.dense-row .val.confidential { color: var(--strong); font-style: italic; }
</style>
</head>
<body>

<div class="nav-sticky">
  <div class="nav-title">M142 — 80 maquettes Section III Budget <small>· 20 layouts × 4 profils · iPhone 390px · max 700px hauteur</small></div>
  <div class="nav-pills" id="nav"></div>
</div>

<div id="root"></div>

<script>
const PROFILS = [
  {key:'vendeur', label:'VENDEUR', cls:'vendeur', mock:{
    nom:'Hassan EL FASSI', tel:'+212 661 23 45 67',
    devise:'MAD', symbol:'MAD',
    prixL1:'Prix bien', prixL2:'Prix bas', prixL3:'Liquide',
    prix1:'5 800 000', prix2:'5 500 000', prix3:'600 000',
    prixResume:'5,8 M MAD',
    confidentialL2:true, validateMinMax:false,
    showNotaire:true, notairePct:'6,0', notaireMontant:'348 000', notaireLabel:'MA 6%',
    acteurs:[
      {nom:'Agent mandat', type:'%', val:'5', montant:'290 000'},
      {nom:'Agent contrepartie', type:'%', val:'2,5', montant:'145 000'},
    ],
    totalAgence:'435 000',
    syntheseLabel:'Prix de vente affiché',
    syntheseValue:'6 835 000 MAD',
    syntheseDetail:'Prix 5,8M + Liquide 600k + Agence 435k (hors notaire à charge acheteur)',
  }},
  {key:'acheteur', label:'ACHETEUR', cls:'acheteur', mock:{
    nom:'P. & M. DUPONT', tel:'+33 6 12 34 56 78',
    devise:'MAD', symbol:'MAD',
    prixL1:'Prix min', prixL2:'Prix max', prixL3:'Liquide max',
    prix1:'2 000 000', prix2:'3 000 000', prix3:'400 000',
    prixResume:'2-3 M MAD',
    confidentialL2:false, validateMinMax:true,
    showNotaire:true, notairePct:'6,0', notaireMontant:'180 000', notaireLabel:'MA 6%',
    acteurs:[],
    totalAgence:'0',
    syntheseLabel:'Budget total mobilisable',
    syntheseValue:'2-3 M MAD + 400k cash',
    syntheseDetail:'À charge acheteur : Notaire ~180k + frais agence côté contrepartie selon mandat',
  }},
  {key:'bailleur', label:'BAILLEUR', cls:'bailleur', mock:{
    nom:'Fatima BENHIMA', tel:'+212 661 33 78 41',
    devise:'MAD', symbol:'MAD',
    prixL1:'Loyer', prixL2:'Charges', prixL3:'Caution',
    prix1:'14 000', prix2:'1 200', prix3:'28 000',
    prixResume:'14 000 MAD/mois',
    confidentialL2:false, validateMinMax:false,
    showNotaire:false,
    acteurs:[
      {nom:'Agent mandat', type:'Forf', val:'14 000', montant:'14 000'},
    ],
    totalAgence:'14 000',
    syntheseLabel:'Loyer affiché',
    syntheseValue:'15 200 MAD/mois',
    syntheseDetail:'Loyer 14 000 + Charges 1 200. Caution 2 mois. Frais agence 1 mois loyer.',
  }},
  {key:'locataire', label:'LOCATAIRE', cls:'locataire', mock:{
    nom:'Sébastien LEMOINE', tel:'+33 6 84 22 17 56',
    devise:'MAD', symbol:'MAD',
    prixL1:'Loyer min', prixL2:'Loyer max', prixL3:'Caution dispo',
    prix1:'8 000', prix2:'14 000', prix3:'28 000',
    prixResume:'8-14 K MAD/mois',
    confidentialL2:false, validateMinMax:true,
    showNotaire:false,
    acteurs:[],
    totalAgence:'0',
    syntheseLabel:'Effort mensuel max',
    syntheseValue:'≈ 15 000 MAD/mois',
    syntheseDetail:'Loyer max 14k + Charges estimées ~1k + provision frais.',
  }},
];

// HELPERS rendu blocs réutilisables
function blocPrix(m, opts={}) {
  const cls = opts.dense ? 'input' : 'input';
  return `
    <div class="row3">
      <div>
        <span class="field-lbl">${m.prixL1}</span>
        <div class="input-wrap">
          <input class="${cls} with-suf" value="${m.prix1}" readonly/>
          <span class="suf">${m.symbol}</span>
        </div>
      </div>
      <div>
        <span class="field-lbl">${m.prixL2}</span>
        <div class="input-wrap">
          <input class="${cls} with-suf ${m.confidentialL2?'dashed':''} ${m.validateMinMax?'':''}" value="${m.prix2}" readonly/>
          <span class="suf">${m.symbol}</span>
        </div>
        ${m.confidentialL2?'<div class="hint">Confidentiel</div>':''}
        ${m.validateMinMax?'<div class="hint">Min &lt; Max</div>':''}
      </div>
      <div>
        <span class="field-lbl">${m.prixL3}</span>
        <div class="input-wrap">
          <input class="${cls} with-suf" value="${m.prix3}" readonly/>
          <span class="suf">${m.symbol}</span>
        </div>
      </div>
    </div>
  `;
}

function blocAgence(m) {
  if (m.acteurs.length === 0) {
    return `<div style="font-size:10.5px;color:var(--grey);font-style:italic;text-align:center;padding:6px">Pas d'agence côté ${m.key === 'acheteur' ? 'acheteur' : 'locataire'} (côté contrepartie sur dossier mandat)</div>`;
  }
  const rows = m.acteurs.map(a => `
    <div class="act">
      <div class="act-pill">${a.nom}</div>
      <div class="toggle">
        <div class="toggle-b ${a.type==='%'?'on':''}">%</div>
        <div class="toggle-b ${a.type==='Forf'?'on':''}">F</div>
      </div>
      <div class="act-pill val">${a.val}${a.type==='%'?'%':''}</div>
      <div class="act-pill tot">${a.montant} ${m.symbol}</div>
      <div style="text-align:center;color:var(--grey);font-size:11px">✕</div>
    </div>
  `).join('');
  return `
    ${rows}
    <div class="tot-line"><span>Total</span><span>${m.totalAgence} ${m.symbol}</span></div>
    <button class="add-btn">+ Ajouter (max 4)</button>
  `;
}

function blocNotaire(m) {
  if (!m.showNotaire) return '';
  return `
    <div class="row2">
      <div>

}

function collFooter(profilKey) {

      ${PROFILS.map(p => `
        <div class="maquette-wrap">
          <div class="maquette-label ${p.cls}">${p.label} · ${L.n}${String.fromCharCode(64+PROFILS.indexOf(p)+1)}</div>
          <div class="iphone">
            <div class="iphone-status"><span>10:21</span><span>${p.label}</span><span>70%</span></div>
            <div class="iphone-screen">${L.render(p.mock, p.key)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  root.appendChild(sec);
});
</script>

</body>
</html>
