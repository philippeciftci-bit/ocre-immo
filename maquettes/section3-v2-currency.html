  {code:'DKK', name:'Couronne danoise', flag:'🇩🇰'},
];
const CUR_BY_CODE = Object.fromEntries(CURRENCIES.map(c => [c.code, c]));

const SYMBOL_FOR = {
  EUR: '€', MAD: 'Dhs', USD: '$', GBP: '£', CHF: 'CHF',
  AED: 'AED', CAD: 'CA$', AUD: 'AU$', JPY: '¥', CNY: '¥',
  TRY: '₺', DZD: 'DZD', TND: 'TND', EGP: 'E£', SAR: 'SAR',
  QAR: 'QAR', KWD: 'KWD', NGN: '₦', ZAR: 'R', BRL: 'R$',
  MXN: 'Mex$', INR: '₹', SGD: 'S$', HKD: 'HK$', NOK: 'kr',
  SEK: 'kr', DKK: 'kr',
};

// === Conversion (placeholder taux du jour, base EUR) ===
// rates[XXX] = montant XXX pour 1 EUR. Source : approximations manuelles.
const RATES_VS_EUR = {
  EUR: 1, MAD: 10.85, USD: 1.08, GBP: 0.85, CHF: 0.97,
  AED: 3.97, CAD: 1.47, AUD: 1.65, JPY: 161, CNY: 7.79,
  TRY: 35, DZD: 145, TND: 3.36, EGP: 53, SAR: 4.05,
  QAR: 3.93, KWD: 0.33, NGN: 1700, ZAR: 19.7, BRL: 6.4,
  MXN: 21.5, INR: 90, SGD: 1.45, HKD: 8.4, NOK: 11.5,
  SEK: 12.0, DKK: 7.46,
};

function convert(value, from, to) {
  if (from === to) return value;
  const fromRate = RATES_VS_EUR[from];
  const toRate = RATES_VS_EUR[to];
  if (!fromRate || !toRate) return value;
  return (value / fromRate) * toRate;
}

const fmt = (n) => {
  if (!n || !isFinite(n)) return '';
  const v = Number(n);
  if (Math.abs(v) < 1) return v.toFixed(2);
  return Math.round(v).toLocaleString('fr-FR');
};

// === MOCK data (Maroc focus) ===
const MOCK = {

const ACTEUR_TYPES = [
  {v:'mandat', l:'Agent mandat'},

// === CurrencyPicker (singleton popover) ===
const overlay = document.getElementById('curOverlay');
let openCallback = null;

function openCurrencyPicker(anchorEl, currentCode, onSelect) {
  closeCurrencyPicker();
  openCallback = onSelect;

  const pop = document.createElement('div');
  pop.className = 'cur-popover';
  pop.innerHTML = `
    <input type="text" class="cur-search" placeholder="🔍 Rechercher une monnaie..." autofocus>
    <div class="cur-list"></div>
  `;
  overlay.appendChild(pop);
  overlay.classList.add('open');

  const list = pop.querySelector('.cur-list');
  const search = pop.querySelector('.cur-search');

  const renderList = (q) => {
    const term = (q || '').trim().toLowerCase();
    list.innerHTML = '';
    const filtered = CURRENCIES.filter(c => !term || c.code.toLowerCase().includes(term) || c.name.toLowerCase().includes(term));
    const favs = filtered.filter(c => c.favorite);
    const others = filtered.filter(c => !c.favorite);
    if (favs.length && !term) {
      const h = document.createElement('div'); h.className = 'cur-section'; h.textContent = 'Favorites'; list.appendChild(h);
    }
    favs.forEach(c => list.appendChild(makeItem(c, currentCode)));
    if (others.length) {
      const h = document.createElement('div'); h.className = 'cur-section'; h.textContent = term ? 'Résultats' : 'Toutes les monnaies'; list.appendChild(h);
    }
    others.forEach(c => list.appendChild(makeItem(c, currentCode)));
    if (!filtered.length) {
      const empty = document.createElement('div'); empty.className = 'cur-section'; empty.style.textAlign = 'center'; empty.style.padding = '14px'; empty.textContent = 'Aucune monnaie trouvée'; list.appendChild(empty);
    }
  };

  function makeItem(c, currentCode) {
    const it = document.createElement('div');
    it.className = 'cur-item' + (c.code === currentCode ? ' active' : '');
    it.innerHTML = `
      <span class="flag">${c.flag}</span>
      <span class="code">${c.code}</span>
      <span class="name">${c.name}</span>
    `;
    it.addEventListener('click', (e) => {
      e.stopPropagation();
      if (openCallback) openCallback(c.code);
      closeCurrencyPicker();
    });
    return it;
  }

  search.addEventListener('input', () => renderList(search.value));
  renderList('');

  // Position popover above the anchor, clamped to viewport
  const rect = anchorEl.getBoundingClientRect();
  pop.style.visibility = 'hidden';
  document.body.appendChild(pop); // measure outside overlay first
  const pw = pop.offsetWidth;
  const ph = pop.offsetHeight;
  overlay.appendChild(pop);
  let left = rect.left + rect.width / 2 - pw / 2;
  let top = rect.bottom + 4;
  if (top + ph > window.innerHeight - 8) {
    top = rect.top - ph - 4;
  }
  if (left < 8) left = 8;
  if (left + pw > window.innerWidth - 8) left = window.innerWidth - 8 - pw;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
  pop.style.visibility = 'visible';

  setTimeout(() => search.focus(), 30);
}
function closeCurrencyPicker() {
  overlay.classList.remove('open');
  overlay.innerHTML = '';
  openCallback = null;
}
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeCurrencyPicker();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeCurrencyPicker();
});

// === Render frame iPhone ===
function renderProfil(p) {
  const screen = document.createElement('div');
  screen.className = 'iphone-screen';
  screen.dataset.profil = p.type;

  const repaint = () => {
    screen.innerHTML = '';
    screen.appendChild(blocPrix(p, repaint));
    screen.appendChild(blocAgence(p, repaint));
    if (p.showNotaire) screen.appendChild(blocNotaire(p, repaint));
  };
  repaint();
  return screen;
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);
      else if (k.startsWith('on') && typeof attrs[k] === 'function') e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else if (k === 'className') e.className = attrs[k];
      else e.setAttribute(k, attrs[k]);
    }
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

// Bloc Prix
function blocPrix(p, repaint) {
  const titre = p.type === 'bailleur' ? 'Loyer & conditions' : (p.type === 'locataire' ? 'Loyer recherché' : 'Prix');
  const wrap = el('div', {className: 'bloc bloc-prix'},
    el('div', null, el('span', {className: 's3-h'}, 'III. Prix · Agence · Notaire')),
    el('div', {className: 'profil-mini ' + p.cls}, p.label),
    el('h4', null, el('span', null, '💰 ' + titre.toUpperCase()))
  );

  // Set top header outside this card actually — but the mockup wants the s3-h before card.
  // Simpler : we render the s3-h header INSIDE the screen separately. We'll do it differently.
  // Reset:
  wrap.innerHTML = '';
  wrap.appendChild(el('h4', null, el('span', null, '💰 ' + titre.toUpperCase())));

  // Render rows
  for (const row of p.rows) {
    const isMaxRow = row.key === 'max';
    const minRow = p.rows.find(r => r.key === 'min');
    const warnMax = isMaxRow && minRow && minRow.valEUR > 0 && row.valEUR > 0 && row.valEUR < minRow.valEUR;
    wrap.appendChild(buildRow(p, row, repaint, warnMax));
  }

  // Add button
  const add = el('button', {className: 'add-btn', type: 'button'}, p.addLabel);
  wrap.appendChild(add);

  // Cohesion notice
  wrap.appendChild(el('div', {className: 'cohesion-notice'}, 'Toutes les lignes Prix utilisent la même paire de devises'));

  return wrap;
}

function buildRow(p, row, repaint, warn) {
  const wrap = el('div', {className: 'row-pair'});
  wrap.appendChild(el('div', {className: 'row-label'}, row.label));
  const inputs = el('div', {className: 'row-pair-inputs'});

  // Left col input (devise = p.leftCur)
  inputs.appendChild(buildIw(p, row, 'left', warn, repaint));
  // Right col input (devise = p.rightCur)
  inputs.appendChild(buildIw(p, row, 'right', warn, repaint));

  wrap.appendChild(inputs);

  if (row.hint) {
    wrap.appendChild(el('div', {className: 'hint ' + (warn ? 'warn' : (row.hintCls || ''))},
      warn ? '⚠ Prix max < Prix min' : row.hint));
  }
  return wrap;
}

function buildIw(p, row, side, warn, repaint) {
  const cur = side === 'left' ? p.leftCur : p.rightCur;
  const val = side === 'left' ? row.valEUR : row.valMAD;
  // We use semantic field names valEUR/valMAD on the row internally — but label them "leftValue/rightValue"
  // Actually we always store left in valEUR slot, right in valMAD slot (for simplicity), but the displayed
  // currency is whatever leftCur/rightCur is. So when leftCur changes, we re-interpret the stored value
  // in the new devise (no conversion of stored — the stored is "left value in leftCur").
  const iw = el('div', {className: 'iw' + (warn ? ' warn' : '')});
  const input = el('input', {type: 'text', inputmode: 'numeric', value: fmt(val), placeholder: '0'});
  input.addEventListener('input', () => {
    const v = parseFloat(input.value.replace(/\s/g,'').replace(',','.')) || 0;
    if (side === 'left') {
      row.valEUR = v;
      row.valMAD = v ? convert(v, p.leftCur, p.rightCur) : 0;
    } else {
      row.valMAD = v;
      row.valEUR = v ? convert(v, p.rightCur, p.leftCur) : 0;
    }
    // Live sync : update opposite input value without full repaint (smooth typing)
    syncOppositeInput(iw.parentNode, side, p, row);
    // Also live update agence/notaire totals
    updateBaseFromRow(p);
    updateAllTotals(iw.closest('.iphone-screen'), p);
  });
  iw.appendChild(input);

  const btn = el('button', {className: 'iw-cur-btn', type: 'button'});
  const c = CUR_BY_CODE[cur];
  btn.appendChild(el('span', {className: 'cur'}, SYMBOL_FOR[cur] || cur));
  btn.appendChild(el('span', {className: 'flag'}, c ? c.flag : '🏳️'));
  btn.appendChild(el('span', {className: 'caret'}, '▾'));
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    openCurrencyPicker(btn, cur, (newCode) => {
      if (side === 'left') p.leftCur = newCode;
      else p.rightCur = newCode;
      repaint();
    });
  });
  iw.appendChild(btn);

  return iw;
}

function syncOppositeInput(rowInputs, sideJustEdited, p, row) {
  if (!rowInputs) return;
  const inputs = rowInputs.querySelectorAll('input');
  if (inputs.length !== 2) return;
  const [leftInput, rightInput] = inputs;
  if (sideJustEdited === 'left') rightInput.value = fmt(row.valMAD);
  else leftInput.value = fmt(row.valEUR);
}

function updateBaseFromRow(p) {
  // Recompute baseEUR/baseMAD from the "main" row (first non-fourchette or 'max' for fourchette).
  let mainKey;
  if (p.type === 'vendeur') mainKey = 'prix';
  else if (p.type === 'acheteur') mainKey = 'max';
  else if (p.type === 'bailleur') mainKey = 'loyer';
  else if (p.type === 'locataire') mainKey = 'max';
  const main = p.rows.find(r => r.key === mainKey);
  if (main) { p.baseEUR = main.valEUR; p.baseMAD = main.valMAD; }
}

// Bloc Frais agence
function blocAgence(p, repaint) {
  const wrap = el('div', {className: 'bloc bloc-agence'});
  const totals = computeAgenceTotals(p);
  const headerTotals = totals.eur > 0 || totals.mad > 0
    ? el('span', {className: 'h4-totals'},
        el('span', {className: 't-eur'}, fmt(totals.eur) + ' ' + (SYMBOL_FOR[p.leftCur]||p.leftCur)),
        el('span', null, '|'),
        el('span', {className: 't-mad'}, fmt(totals.mad) + ' ' + (SYMBOL_FOR[p.rightCur]||p.rightCur))
      )
    : null;
  wrap.appendChild(el('h4', null,
    el('span', null, "🤝 FRAIS D'AGENCE"),
    headerTotals
  ));

  for (const a of p.acteurs) {
    wrap.appendChild(buildActeurRow(p, a, repaint));
  }
  if (!p.acteurs.length) {
    wrap.appendChild(el('div', {className: 'hint', style: {textAlign:'center', padding:'8px 0'}},
      "Aucun acteur. Tap + Ajouter pour ajouter."));
  }

  // Footer total line
  if (p.acteurs.length) {
    const footer = el('div', {className: 'act-total-line'},
      el('span', null, 'Total agence'),
      el('div', {className: 'totals-2col'},
        el('span', null, fmt(totals.eur) + ' ' + (SYMBOL_FOR[p.leftCur]||p.leftCur)),
        el('span', {style:{color:'#7FCBB7'}}, '|'),
        el('span', null, fmt(totals.mad) + ' ' + (SYMBOL_FOR[p.rightCur]||p.rightCur))
      )
    );
    wrap.appendChild(footer);
  }

  const add = el('button', {className: 'add-btn', type: 'button'}, '+ Ajouter (' + p.acteurs.length + '/4)');
  add.addEventListener('click', () => {
    if (p.acteurs.length >= 4) return;
    p.acteurs.push({nom:'autre', mode:'pct', val:1});
    repaint();
  });
  wrap.appendChild(add);

  return wrap;
}

function computeAgenceTotals(p) {
  let eur = 0, mad = 0;
  for (const a of p.acteurs) {
    let valEur, valMad;
    if (a.mode === 'forfait') {
      // Forfait stocké en leftCur (EUR)
      valEur = Number(a.val) || 0;
      valMad = convert(valEur, p.leftCur, p.rightCur);
    } else {
      const pct = Number(a.val) || 0;
      valEur = (Number(p.baseEUR) || 0) * pct / 100;
      valMad = (Number(p.baseMAD) || 0) * pct / 100;
    }
    eur += valEur;
    mad += valMad;
  }
  return {eur, mad};
}

function buildActeurRow(p, a, repaint) {
  const row = el('div', {className: 'act-row'});

  // Type select
  const sel = el('select', {className: 'act-select'});
  for (const t of ACTEUR_TYPES) {
    const opt = el('option', {value: t.v}, t.l);
    if (t.v === a.nom) opt.setAttribute('selected', 'selected');
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => { a.nom = sel.value; });
  row.appendChild(sel);

  // Mode toggle
  const tog = el('div', {className: 'act-toggle'});
  const tgPct = el('div', {className: 'act-tg-b' + (a.mode === 'pct' ? ' on' : '')}, '%');
  const tgF = el('div', {className: 'act-tg-b' + (a.mode === 'forfait' ? ' on' : '')}, 'F');
  tgPct.addEventListener('click', () => { a.mode = 'pct'; repaint(); });
  tgF.addEventListener('click', () => { a.mode = 'forfait'; repaint(); });
  tog.appendChild(tgPct); tog.appendChild(tgF);
  row.appendChild(tog);

  // Value
  const valIn = el('input', {className: 'act-val', type: 'text', inputmode: 'decimal', value: a.mode === 'pct' ? a.val + '%' : fmt(a.val)});
  valIn.addEventListener('focus', () => { valIn.value = String(a.val); });
  valIn.addEventListener('input', () => {
    const v = parseFloat(valIn.value.replace(/\s/g,'').replace(',','.')) || 0;
    a.val = v;
    // Update only totals (not full repaint to keep focus)
    updateAllTotals(valIn.closest('.iphone-screen'), p);
  });
  valIn.addEventListener('blur', () => {
    valIn.value = a.mode === 'pct' ? a.val + '%' : fmt(a.val);
  });
  row.appendChild(valIn);

  // Totals 2 cols
  const totals = (() => {
    if (a.mode === 'forfait') {
      const e = Number(a.val) || 0;
      return {eur: e, mad: convert(e, p.leftCur, p.rightCur)};
    }
    const pct = Number(a.val) || 0;
    return {
      eur: (Number(p.baseEUR) || 0) * pct / 100,
      mad: (Number(p.baseMAD) || 0) * pct / 100,
    };
  })();
  row.appendChild(el('div', {className: 'act-totals'},
    el('span', {className: 't-eur'}, fmt(totals.eur) + ' ' + (SYMBOL_FOR[p.leftCur]||p.leftCur)),
    el('span', {className: 't-mad'}, fmt(totals.mad) + ' ' + (SYMBOL_FOR[p.rightCur]||p.rightCur))
  ));

  // Remove btn
  const rm = el('div', {className: 'act-rm'}, '✕');
  rm.addEventListener('click', () => {
    p.acteurs.splice(p.acteurs.indexOf(a), 1);
    repaint();
  });
  row.appendChild(rm);

  return row;
}

function blocNotaire(p, repaint) {
  const wrap = el('div', {className: 'bloc bloc-notaire'});
  wrap.appendChild(el('h4', null, el('span', null, '🏛 FRAIS NOTAIRE')));

  // Row : pourcentage + frais dossier
  const row = el('div', {className: 'not-row'});
  const pctBox = el('div', null);
  pctBox.appendChild(el('div', {className: 'row-label'}, 'Pourcentage'));
  const pctIw = el('div', {className: 'not-pct'});
  const pctIn = el('input', {type:'text', inputmode:'decimal', value: String(p.notairePct)});
  pctIn.addEventListener('input', () => {
    p.notairePct = parseFloat(pctIn.value.replace(',', '.')) || 0;
    updateNotaireTotals(wrap, p);
  });
  pctIw.appendChild(pctIn);
  pctIw.appendChild(el('span', {className: 'pct'}, '%'));
  pctBox.appendChild(pctIw);
  pctBox.appendChild(el('div', {className: 'hint'}, p.notaireLabel || ''));
  row.appendChild(pctBox);

  const dosBox = el('div', null);
  dosBox.appendChild(el('div', {className: 'row-label'}, 'Frais de dossier (optionnel)'));
  const dosInputs = el('div', {className: 'row-pair-inputs'});
  // 2 cols : EUR (leftCur) + MAD (rightCur)
  const dosLeft = buildSimpleIw(p, 'left', p.notaireDossier || 0, (v) => {
    p.notaireDossier = v;
    p._notaireDossierRight = v ? convert(v, p.leftCur, p.rightCur) : 0;
    syncOppositeSimpleInput(dosInputs, 'left', p);
    updateNotaireTotals(wrap, p);
  });
  const dosRight = buildSimpleIw(p, 'right', p._notaireDossierRight || convert(p.notaireDossier || 0, p.leftCur, p.rightCur), (v) => {
    p._notaireDossierRight = v;
    p.notaireDossier = v ? convert(v, p.rightCur, p.leftCur) : 0;
    syncOppositeSimpleInput(dosInputs, 'right', p);
    updateNotaireTotals(wrap, p);
  });
  dosInputs.appendChild(dosLeft);
  dosInputs.appendChild(dosRight);
  dosBox.appendChild(dosInputs);
  row.appendChild(dosBox);
  wrap.appendChild(row);

  // Total estimé
  const totals = computeNotaireTotals(p);
  const total = el('div', {className: 'not-total'},
    el('span', {className: 'label'}, 'Total estimé'),
    el('div', {className: 'totals-2col'},
      el('span', {className: 't-eur'}, fmt(totals.eur) + ' ' + (SYMBOL_FOR[p.leftCur]||p.leftCur)),
      el('span', {style:{color:'#7FAFD3'}}, '|'),
      el('span', {className: 't-mad'}, fmt(totals.mad) + ' ' + (SYMBOL_FOR[p.rightCur]||p.rightCur))
    )
  );
  wrap.appendChild(total);
  wrap.appendChild(el('div', {className: 'hint', style:{marginTop:6}}, 'Pré-rempli selon pays — modifiable'));

  return wrap;
}

function buildSimpleIw(p, side, val, onChange) {
  const cur = side === 'left' ? p.leftCur : p.rightCur;
  const iw = el('div', {className: 'iw'});
  const input = el('input', {type:'text', inputmode:'numeric', value: fmt(val), placeholder:'0'});
  input.addEventListener('input', () => {
    const v = parseFloat(input.value.replace(/\s/g,'').replace(',','.')) || 0;
    onChange(v);
  });
  iw.appendChild(input);
  const c = CUR_BY_CODE[cur];
  iw.appendChild(el('span', {className: 'cur', style:{fontSize:11, color:'#8B7F6E', fontWeight:600, flexShrink:0}}, SYMBOL_FOR[cur]||cur));
  iw.appendChild(el('span', {className: 'flag', style:{fontSize:14, lineHeight:1, flexShrink:0}}, c ? c.flag : ''));
  return iw;
}

function syncOppositeSimpleInput(rowInputs, sideJustEdited, p) {
  const inputs = rowInputs.querySelectorAll('input');
  if (inputs.length !== 2) return;
  const [leftInput, rightInput] = inputs;
  if (sideJustEdited === 'left') rightInput.value = fmt(p._notaireDossierRight || 0);
  else leftInput.value = fmt(p.notaireDossier || 0);
}

function computeNotaireTotals(p) {
  const baseEur = (Number(p.baseEUR) || 0) * (Number(p.notairePct) || 0) / 100;
  const dossierEur = Number(p.notaireDossier) || 0;
  const totalEur = baseEur + dossierEur;
  const baseMad = (Number(p.baseMAD) || 0) * (Number(p.notairePct) || 0) / 100;
  const dossierMad = Number(p._notaireDossierRight) || convert(dossierEur, p.leftCur, p.rightCur);
  const totalMad = baseMad + dossierMad;
  return {eur: totalEur, mad: totalMad};
}

function updateNotaireTotals(blocNotaireEl, p) {
  const totals = computeNotaireTotals(p);
  const ts = blocNotaireEl.querySelectorAll('.not-total .totals-2col span');
  if (ts.length >= 3) {
    ts[0].textContent = fmt(totals.eur) + ' ' + (SYMBOL_FOR[p.leftCur]||p.leftCur);
    ts[2].textContent = fmt(totals.mad) + ' ' + (SYMBOL_FOR[p.rightCur]||p.rightCur);
  }
}

function updateAllTotals(screenEl, p) {
  if (!screenEl) return;
  // Refresh agence totals (header + footer + per-row)
  const blocAg = screenEl.querySelector('.bloc-agence');
  if (blocAg) {
    const agTotals = computeAgenceTotals(p);
    // header totals
    const hSpans = blocAg.querySelectorAll('h4 .h4-totals span');
    if (hSpans.length >= 3) {
      hSpans[0].textContent = fmt(agTotals.eur) + ' ' + (SYMBOL_FOR[p.leftCur]||p.leftCur);
      hSpans[2].textContent = fmt(agTotals.mad) + ' ' + (SYMBOL_FOR[p.rightCur]||p.rightCur);
    }
    // per-row totals
    const actRows = blocAg.querySelectorAll('.act-row');
    actRows.forEach((rowEl, i) => {
      const a = p.acteurs[i];
      if (!a) return;
      let eur, mad;
      if (a.mode === 'forfait') {
        eur = Number(a.val) || 0;
        mad = convert(eur, p.leftCur, p.rightCur);
      } else {
        eur = (Number(p.baseEUR)||0) * (Number(a.val)||0) / 100;
        mad = (Number(p.baseMAD)||0) * (Number(a.val)||0) / 100;
      }
      const ts = rowEl.querySelectorAll('.act-totals span');
      if (ts.length >= 2) {
        ts[0].textContent = fmt(eur) + ' ' + (SYMBOL_FOR[p.leftCur]||p.leftCur);
        ts[1].textContent = fmt(mad) + ' ' + (SYMBOL_FOR[p.rightCur]||p.rightCur);
      }
    });
    // footer total
    const footerSpans = blocAg.querySelectorAll('.act-total-line .totals-2col span');
    if (footerSpans.length >= 3) {
      footerSpans[0].textContent = fmt(agTotals.eur) + ' ' + (SYMBOL_FOR[p.leftCur]||p.leftCur);
      footerSpans[2].textContent = fmt(agTotals.mad) + ' ' + (SYMBOL_FOR[p.rightCur]||p.rightCur);
    }
  }
  // Refresh notaire totals
  if (p.showNotaire) {
    const blocNot = screenEl.querySelector('.bloc-notaire');
    if (blocNot) updateNotaireTotals(blocNot, p);
  }
}

// === Build page ===
const PROFILS = ['vendeur','acheteur','bailleur','locataire'];
const root = document.getElementById('root');

const sec = document.createElement('section');
sec.className = 'layout-section';
const grid = el('div', {className: 'profils-grid'});
PROFILS.forEach(k => {
  const p = MOCK[k];
  const wrap = el('div', {className: 'maquette-wrap'},
    el('div', {className: 'maquette-label'}, p.label + ' · L2 + Currency'),
    el('div', {className: 'iphone'},
      el('div', {className: 'iphone-status'},
        el('span', null, '17:22'),
        el('span', null, p.label),
        el('span', null, '72%')
      ),
      renderProfilWrapped(p)
    )
  );
  grid.appendChild(wrap);
});
sec.appendChild(grid);
root.appendChild(sec);

function renderProfilWrapped(p) {
  // Wrap: iphone-screen avec s3-h header + profil-mini
  const screen = el('div', {className: 'iphone-screen'});
  screen.dataset.profil = p.type;
  screen.appendChild(el('div', {className: 's3-page'},
    el('div', {className: 'profil-mini ' + p.cls}, p.label),
    el('div', null, el('span', {className: 's3-h'}, 'III. Prix · Agence · Notaire'))
  ));
  const body = el('div', {className: 's3-page', style: {paddingTop: 0}});
  screen.appendChild(body);

  const repaint = () => {
    body.innerHTML = '';
    body.appendChild(blocPrix(p, repaint));
    body.appendChild(blocAgence(p, repaint));
    if (p.showNotaire) body.appendChild(blocNotaire(p, repaint));
  };
  repaint();
  return screen;
}
