# M/2026/05/13/26 — app.ocre.immo : launcher SSO unifie (Oi Agent + 3 apps Bientot).
# Sert le launcher minimal /opt/ocre-app/launcher + endpoints SSO /api/sso/* deja
# deployes (M/2026/05/13/18 + M/2026/05/13/25). Pas de SPA tenant ici : ce vhost
# precede ocre-app.conf qui matche les <slug>.ocre.immo via regex.
# Backup : /etc/nginx/sites-enabled/app-hub-ocre.conf.bak-pre-launcher-M2026-05-13-26.

server {
    listen 80;
    listen [::]:80;
    server_name app.ocre.immo;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.ocre.immo;

    ssl_certificate     /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;

    root /opt/ocre-app;
    index index.php;

    access_log /var/log/nginx/ocre-app-hub-access.log;
    error_log  /var/log/nginx/ocre-app-hub-error.log;

    # Deny meta-files.
    location ~ /\.(env|git|ht|svn|hg|bzr|DS_Store) {
        deny all;
        access_log off;
        return 404;
    }

    # Asset CSS du launcher.
    location ^~ /launcher/assets/ {
        alias /opt/ocre-app/launcher/assets/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # /favicon, /robots, /apple-touch-icon : passthrough static optionnel.
    location = /favicon.ico { try_files /favicon.ico =204; access_log off; }
    location = /robots.txt {
        add_header Content-Type "text/plain";
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Routes launcher : / /login /logout -> /opt/ocre-app/launcher/*.php
    location = / {
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/ocre-app/launcher/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param HTTPS on;
    }
    location = /login {
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/ocre-app/launcher/login.php;
        fastcgi_param SCRIPT_NAME /login.php;
        fastcgi_param HTTPS on;
    }
    location = /logout {
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/ocre-app/launcher/logout.php;
        fastcgi_param SCRIPT_NAME /logout.php;
        fastcgi_param HTTPS on;
    }

    # Endpoints SSO partages (deja deployes M/13/18 + M/13/25).
    location ~ ^/api/sso/(login|verify|logout|switch_tenant)\.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
    }

    # M/2026/05/14/67 — Icons canonical /icons/ unique cross-vhosts.
    location ^~ /icons/ {
        alias /opt/ocre-app/icons/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # /launcher/* path : seuls les assets sont publics, les .php ne sont pas servis.
    location ^~ /launcher/ {
        return 404;
    }

    # Bloque acces direct a tout autre fichier (zero exposition du SPA tenant).
    location / {
        return 404;
    }
}
