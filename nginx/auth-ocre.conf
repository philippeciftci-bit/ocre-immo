# M97 — auth.ocre.immo : service SSO dédié.
# server_name exact = priorité absolue sur regex catch-all `~^([a-z0-9]...)\.ocre\.immo$`
# du vhost ocre-app.conf. Cert wildcard *.ocre.immo réutilisé.

server {
    listen 80;
    listen [::]:80;
    server_name auth.ocre.immo;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.ocre.immo;

    ssl_certificate     /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; form-action 'self' https://app.ocre.immo; frame-ancestors 'none'; base-uri 'self'" always;

    root /opt/ocre-auth;
    index index.html;

    access_log /var/log/nginx/ocre-auth-access.log;
    error_log  /var/log/nginx/ocre-auth-error.log;

    client_max_body_size 1M;

    # No-cache strict pour pages auth (pas de stale login)
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }
    location = /success.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }
    location = /error.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }
    # M/2026/05/11/34 — URL canonique /signup sert signup.html (form unifie).
    location = /signup {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files /signup.html =404;
    }
    location = /signup.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    # Favicon mutualisé (alias vers /opt/ocre-app pour partage)
    location ^~ /favicon/ {
        alias /opt/ocre-app/public/favicon/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # M/2026/05/14/75 — API auth lambda DOIT etre AVANT le regex generique ~ \.php$ sinon
    # nginx applique le matcheur generique en premier (regex first-match-wins).
    # Pattern ^~ prefix-match a priorite plus haute, route /api/auth/*.php vers
    # /opt/ocre-app/api/auth/* (root vhost = /opt/ocre-auth distinct).
    location ^~ /api/auth/ {
        alias /opt/ocre-app/api/auth/;
        location ~ \.php$ {
            # M/2026/05/14/78 — CORS DOIT etre dans inner location PHP sinon if parent
            # ne se declenche pas pour les .php (M/14/77 bug, OPTIONS retournait 405 PHP).
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://ocre.immo" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_read_timeout 60;
            add_header Access-Control-Allow-Origin "https://ocre.immo" always;
            add_header Access-Control-Allow-Credentials "true" always;
        }
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_read_timeout 60;
    }

    # Sécurité : cacher dot-files / lib (lib est en require_once, pas exposée HTTP)
    location ~ /\.(env|secrets|git|ht) { deny all; return 404; }
    location ^~ /lib/ { deny all; return 404; }

    # M/2026/05/14/67 — Icons canonical /icons/ unique cross-vhosts.
    location ^~ /icons/ {
        alias /opt/ocre-app/icons/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # M/2026/05/14/75 — bloc location ^~ /api/auth/ deplace plus haut (avant ~ \.php$).

    # Catch-all : SPA-like pour pages statiques manquantes -> error.html
    location / {
        try_files $uri $uri/ /error.html;
    }
}
