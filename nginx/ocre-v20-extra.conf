# V20 phase 12 — vhosts api.ocre.immo, embed.ocre.immo, superadmin.ocre.immo.

# Rate limit zone : 60 req/min/IP pour api public.
limit_req_zone $binary_remote_addr zone=ocre_api_pub:10m rate=60r/m;

# api.ocre.immo — public read-only (embed widgets).
server {
    listen 80;
    listen [::]:80;
    server_name api.ocre.immo;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ocre.immo;

    ssl_certificate /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /opt/ocre-app/api;
    access_log /var/log/nginx/ocre-api-access.log;
    error_log  /var/log/nginx/ocre-api-error.log;

    location = / { return 301 /public_embed_v20.php; }

    location = /public_embed_v20.php {
        limit_req zone=ocre_api_pub burst=10 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param SCRIPT_FILENAME /opt/ocre-app/api/public_embed_v20.php;
        fastcgi_read_timeout 30;
    }

    location / { return 404; }
}

# embed.ocre.immo — sert ocre-widget.js statiquement.
server {
    listen 80;
    listen [::]:80;
    server_name embed.ocre.immo;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name embed.ocre.immo;

    ssl_certificate /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=3600" always;

    root /opt/ocre-app/embed;
    access_log /var/log/nginx/ocre-embed-access.log;
    error_log  /var/log/nginx/ocre-embed-error.log;

    location ~ \.js$ { add_header Content-Type "application/javascript; charset=utf-8"; }
    location / { try_files $uri =404; }
}

# superadmin.ocre.immo — console super-admin (PHP routeur vérifie role).
server {
    listen 80;
    listen [::]:80;
    server_name superadmin.ocre.immo;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name superadmin.ocre.immo;

    ssl_certificate /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    root /opt/ocre-app/superadmin;
    index index.html;
    access_log /var/log/nginx/ocre-superadmin-access.log;
    error_log  /var/log/nginx/ocre-superadmin-error.log;

    set $slug "ozkan";

    # M/2026/05/14/67 — Icons canonical /icons/ unique (remplace M88 /favicon/ supprime).
    # Tous les sous-domaines servent BIT-PERFECT /opt/ocre-app/icons/* via cet alias.
    location ^~ /icons/ {
        alias /opt/ocre-app/icons/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location / { try_files $uri $uri/ /index.html; }

    # M/2026/05/07/97-MVP — Endpoint SSE live preview tmux panes pour
    # superadmin Atelier (live). Buffering off + read_timeout long pour
    # streaming continu sans coupure.
    location = /api/superadmin_atelier_live.php {
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param SCRIPT_FILENAME /opt/ocre-app/api/superadmin_atelier_live.php;
        fastcgi_param SCRIPT_NAME /api/superadmin_atelier_live.php;
        fastcgi_param HTTP_X_TENANT_SLUG $slug;
        fastcgi_buffering off;
        fastcgi_read_timeout 3600s;
        fastcgi_send_timeout 3600s;
        gzip off;
    }

    # M/2026/05/07/87.1 — fix bug "Primary script unknown".
    # Ancien : location /api/ { alias ... } + sub-location ~ \.php$ casse
    # SCRIPT_FILENAME car $document_root reste /opt/ocre-app/superadmin.
    # Tentative regex + snippets/fastcgi-php.conf : casse aussi car ce
    # snippet fait "try_files $fastcgi_script_name =404" relatif au root
    # /opt/ocre-app/superadmin, donc /api/xxx.php absent.
    # Solution : skip le snippet (et son try_files) et inclure fastcgi.conf
    # directement avec SCRIPT_FILENAME explicite vers /opt/ocre-app/api/.
    location ~ ^/api/(?<api_script>[^/]+\.php)$ {
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param SCRIPT_FILENAME /opt/ocre-app/api/$api_script;
        fastcgi_param SCRIPT_NAME /api/$api_script;
        fastcgi_param HTTP_X_TENANT_SLUG $slug;
        fastcgi_read_timeout 30;
    }

    location ~ /\.(env|secrets|git|ht) { deny all; return 404; }
}
