# M/2026/05/06/83.2.1 — Sous-domaine signup.ocre.immo dedie pour wizard
# inscription publique agent. Calque sur ocre-app.conf, sert /opt/ocre-app/ avec
# slug fixe "signup" (pour les endpoints qui le requierent ; agents_register.php
# pointe ocre_meta directement et n a pas besoin du slug).

server {
    listen 80;
    listen [::]:80;
    server_name signup.ocre.immo;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name signup.ocre.immo;

    ssl_certificate /etc/letsencrypt/live/ocre.immo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocre.immo/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    root /opt/ocre-app;
    index index.html index.php;

    access_log /var/log/nginx/signup-ocre-access.log;
    error_log  /var/log/nginx/signup-ocre-error.log;

    client_max_body_size 5M;

    # No-cache strict pour assets dynamiques.
    location = /sw.js {
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # M/2026/05/11/34 — M_SIGNUP_UNIFIE : redirect 301 toutes les routes signup vers auth.ocre.immo/signup.
    # Sous-domaine conserve pour ne pas casser les liens email/anciens bookmarks.
    location = / {
        return 301 https://auth.ocre.immo/signup;
    }
    location ^~ /inscription/ {
        return 301 https://auth.ocre.immo/signup;
    }
    location = /signup {
        return 301 https://auth.ocre.immo/signup;
    }

    # M88 — favicon Oi cross-vhosts. Alias vers /opt/ocre-app/public/favicon/ (mutualise avec workspaces tenants + superadmin).
    location ^~ /favicon/ {
        alias /opt/ocre-app/public/favicon/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # M89 — page user-facing d'activation (consomme /api/activate.php).
    location ^~ /activation/ {
        try_files $uri $uri/ /activation/index.html;
    }

    # API publique limitee a register. Aucun autre endpoint expose ici.
    location = /api/agents_register.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param HTTP_X_TENANT_SLUG signup;
        fastcgi_read_timeout 30;
    }
    location = /api/version.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param HTTP_X_TENANT_SLUG signup;
        fastcgi_read_timeout 5;
    }
    location = /api/activate.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param HTTP_X_TENANT_SLUG signup;
        fastcgi_read_timeout 10;
    }
    location = /api/check_email.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param HTTP_X_TENANT_SLUG signup;
        fastcgi_read_timeout 5;
    }
    # M93 — webhook public Meta (verification GET + statuts POST). Pas d auth (Meta verifie via verify_token).
    location = /api/whatsapp_webhook.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param HTTP_X_TENANT_SLUG signup;
        fastcgi_read_timeout 10;
    }
    # M93 — endpoint send (auth X-Internal-Token, appele depuis cron interne).
    location = /api/whatsapp_send.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm-ocre.sock;
        fastcgi_param HTTP_X_TENANT_SLUG signup;
        fastcgi_read_timeout 25;
    }

    # Assets statiques pour la page wizard (Babel, fonts, css).
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|woff2|woff|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # M88 — favicon + manifest cross-vhosts (servis depuis /opt/ocre-app/).
    location = /site.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # M/2026/05/14/67 — Icons canonical /icons/ unique cross-vhosts.
    location ^~ /icons/ {
        alias /opt/ocre-app/icons/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # Tout le reste : 404.
    location / {
        return 404;
    }

    # Securite.
    location ~ /\.(env|secrets|git|ht) { deny all; return 404; }
    location ~ ^/uploads/.*\.php$ { deny all; return 404; }
    location ~ \.php$ { deny all; return 404; }
}
