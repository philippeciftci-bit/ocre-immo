<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#3D2818">
<title>Langue · Ocre Immo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --cream:#FAF6F1; --cream-2:#F4ECDF; --brown:#3D2818; --brown-soft:#6B5642; --brown-mute:#998877; --ocre-dark:#8B5E3C; --green:#2D7A3E; --green-soft:#E8F2EA; --line:#E5DAC6; }
  *,*::before,*::after { box-sizing:border-box; }
  body { margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--brown); line-height:1.55; padding:16px; }
  body[dir="rtl"] { font-family:'Inter',sans-serif; }
  .container { max-width:480px; margin:0 auto; }
  header { display:flex; align-items:center; gap:10px; padding:6px 0 14px; border-bottom:1px solid var(--line); margin-bottom:24px; }
  .back { background:none; border:1px solid var(--line); color:var(--brown); width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; }
  h1 { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:26px; margin:0; }
  .lang-card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .lang-card:hover { border-color:var(--ocre-dark); }
  .lang-card.selected { border:2px solid var(--green); background:var(--green-soft); }
  .lang-flag { font-size:28px; flex-shrink:0; }
  .lang-info { flex:1; }
  .lang-name { font-weight:600; font-size:16px; color:var(--brown); }
  .lang-code { font-size:12px; color:var(--brown-mute); margin-top:2px; }
  .check { color:var(--green); font-size:20px; font-weight:700; }
  .feedback { margin-top:14px; padding:10px 14px; border-radius:8px; font-size:13px; display:none; }
  .feedback.show { display:block; }
  .feedback.success { background:var(--green-soft); color:var(--green); }
  .feedback.error { background:#FDECEA; color:#C62828; }
</style>
</head>
<body>
<div class="container">
  <header>
    <button class="back" onclick="history.length>1?history.back():(location.href='/')" aria-label="Back">←</button>
    <h1 id="title">Langue de l'interface</h1>
  </header>
  <div id="langs" data-testid="langs"></div>
  <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
</div>
<script>
(function() {
  const LANGS = [
    { code: 'fr', name: 'Français', flag: '🇫🇷', rtl: false },
    { code: 'en', name: 'English', flag: '🇬🇧', rtl: false },
    { code: 'es', name: 'Español', flag: '🇪🇸', rtl: false },
    { code: 'ar', name: 'العربية', flag: '🇲🇦', rtl: true },
  ];
  const current = (document.cookie.match(/ocre_lang=([a-z]{2})/) || [null, 'fr'])[1];
  function render() {
    document.getElementById('langs').innerHTML = LANGS.map(l => `
      <div class="lang-card${l.code === current ? ' selected' : ''}" data-code="${l.code}" data-testid="lang-${l.code}">
        <span class="lang-flag">${l.flag}</span>
        <div class="lang-info"><div class="lang-name">${l.name}</div><div class="lang-code">${l.code.toUpperCase()}${l.rtl ? ' · RTL' : ''}</div></div>
        ${l.code === current ? '<span class="check">✓</span>' : ''}
      </div>
    `).join('');
    document.querySelectorAll('.lang-card').forEach(c => c.addEventListener('click', () => setLang(c.dataset.code)));
  }
  async function setLang(code) {
    const fb = document.getElementById('feedback');
    try {
      const r = await fetch('/api/i18n/set_lang.php', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lang: code }) });
      const d = await r.json();
      if (d.ok) {
        document.cookie = `ocre_lang=${code}; path=/; max-age=${365*86400}; secure; samesite=Lax`;
        const lang = LANGS.find(l => l.code === code);
        if (lang.rtl) document.documentElement.setAttribute('dir', 'rtl');
        else document.documentElement.removeAttribute('dir');
        fb.className = 'feedback show success';
        fb.textContent = 'Langue : ' + lang.name + ' ✓ — rechargez l\'app pour voir les changements.';
        render();
      } else {
        fb.className = 'feedback show error'; fb.textContent = 'Erreur : ' + (d.error || 'inconnue');
      }
    } catch (e) {
      fb.className = 'feedback show error'; fb.textContent = 'Erreur réseau';
    }
  }
  // Apply RTL si current=ar au chargement
  const cur = LANGS.find(l => l.code === current);
  if (cur && cur.rtl) document.documentElement.setAttribute('dir', 'rtl');
  render();
})();
</script>
</body>
</html>
