<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Choisir votre mot de passe — Oi Agent</title>
<link rel="icon" type="image/svg+xml" >
<link rel="manifest" href="/icons/manifest.json">
<meta name="theme-color" content="#8B5E3C">
<link rel="stylesheet" href="/styles/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font-sans); background: var(--color-bg-page); color: var(--color-text-primary); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { max-width: 420px; width: 100%; background: #fff; border-radius: 14px; padding: 32px 26px; box-shadow: var(--shadow-warm-card); }
  .brand { font-family: var(--font-serif); font-style: italic; font-size: 22px; font-weight: 600; color: var(--color-accent); text-align: center; margin-bottom: 4px; }
  .brand small { display: block; font-family: var(--font-sans); font-style: normal; font-size: 11px; letter-spacing: 3px; color: #B8895A; text-transform: uppercase; font-weight: 600; margin-top: 4px; }
  h1 { font-family: var(--font-serif); font-style: italic; color: var(--color-accent); font-weight: 500; font-size: 26px; margin: 18px 0 6px; text-align: center; }
  .sub { font-size: 13px; color: #6B5E4A; text-align: center; margin-bottom: 22px; line-height: 1.5; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin: 14px 0 5px; }
  input { width: 100%; padding: 11px 13px; border: 1.5px solid #E8DDC9; border-radius: 9px; font-size: 14px; font-family: inherit; background: #FDFAF7; color: var(--color-text-primary); outline: none; }
  input:focus { border-color: var(--color-accent); background: #fff; }
  button { width: 100%; margin-top: 22px; padding: 14px 20px; background: #10B981; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  button:disabled { background: #C9D9CE; cursor: not-allowed; }
  .err { color: #C0392B; font-size: 12px; margin-top: 10px; text-align: center; }
  .ok { color: #2D7A3E; font-size: 13px; margin-top: 12px; text-align: center; }
  .help { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; line-height: 1.4; }
  .help.ok { color: #2D7A3E; font-weight: 600; }
  .help.err { color: #C0392B; font-weight: 600; }
  .criteria { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; font-size: 11px; color: #8B7F6E; }
  .criteria span { display: inline-flex; align-items: center; gap: 4px; }
  .criteria span.ok { color: #2D7A3E; font-weight: 600; }
  .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #E8DDC9; }
  .dot.ok { background: #2D7A3E; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Oi Agent<small>Inscription</small></div>
  <h1>Validez votre inscription</h1>
  <p class="sub">Définissez votre mot de passe pour accéder à votre espace agent.</p>
  <div id="form">
    <label>Mot de passe</label>
    <input id="pwd" type="password" placeholder="Min 8 chars, 1 maj, 1 chiffre" autocomplete="new-password"/>
    <div class="criteria" id="criteria">
      <span id="c-len"><span class="dot"></span>8 caractères</span>
      <span id="c-maj"><span class="dot"></span>1 majuscule</span>
      <span id="c-num"><span class="dot"></span>1 chiffre</span>
    </div>
    <label>Confirmation</label>
    <input id="pwd2" type="password" autocomplete="new-password"/>
    <div id="match" class="help"></div>
    <button id="submit" disabled onclick="doActivate()">Enregistrer et accéder à la plateforme</button>
    <p id="msg" class="err" style="display:none"></p>
  </div>
</div>
<script>
  // M/2026/05/08/28 — Page set-password dediee post-activation. Lit le token de l URL,
  // POST vers /api/agents_set_password.php qui : valide token, UPDATE password_hash +
  // status='active' + clear token, cree session, retourne {ok:true, token:..., redirect}.
  // On stocke le token de session dans localStorage (pattern existant ocre_token) et
  // on redirect vers / (ou la valeur retournee par le backend).
  const TOKEN = new URLSearchParams(location.search).get('token') || '';
  function valid(p) { return p.length >= 8 && /[A-Z]/.test(p) && /[0-9]/.test(p); }
  function setDot(id, ok) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('ok', ok);
    el.querySelector('.dot').classList.toggle('ok', ok);
  }
  function update() {
    const pwd = document.getElementById('pwd').value;
    const pwd2 = document.getElementById('pwd2').value;
    setDot('c-len', pwd.length >= 8);
    setDot('c-maj', /[A-Z]/.test(pwd));
    setDot('c-num', /[0-9]/.test(pwd));
    const matchEl = document.getElementById('match');
    if (pwd2) {
      if (pwd === pwd2) { matchEl.textContent = '✓ Identiques'; matchEl.className = 'help ok'; }
      else { matchEl.textContent = '⚠ Différents'; matchEl.className = 'help err'; }
    } else {
      matchEl.textContent = ''; matchEl.className = 'help';
    }
    document.getElementById('submit').disabled = !(TOKEN && /^[a-f0-9]{32,128}$/i.test(TOKEN) && valid(pwd) && pwd === pwd2);
  }
  document.getElementById('pwd').addEventListener('input', update);
  document.getElementById('pwd2').addEventListener('input', update);
  async function doActivate() {
    const pwd = document.getElementById('pwd').value;
    const msg = document.getElementById('msg');
    msg.style.display = 'none';
    document.getElementById('submit').disabled = true;
    try {
      const r = await fetch('/api/agents_set_password.php', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token: TOKEN, password: pwd}),
      });
      const j = await r.json();
      if (r.ok && j.ok) {
        // M/2026/05/08/50 — redirect IMMÉDIAT (zéro écran intermédiaire), <2s click → dashboard.
        if (j.token) { try { localStorage.setItem('ocre_token', j.token); } catch (_) {} }
        window.location = j.redirect || '/';
        return;
      }
      const errMap = {
        TOKEN_INVALID: 'Lien invalide.',
        TOKEN_NOT_FOUND: 'Lien introuvable ou déjà utilisé.',
        TOKEN_EXPIRED: 'Lien expiré (validité 48 heures). Demandez un nouveau lien.',
        WEAK_PASSWORD: 'Mot de passe trop faible.',
      };
      msg.textContent = '⚠ ' + (errMap[j.error] || j.error || 'Erreur');
      msg.style.display = '';
      document.getElementById('submit').disabled = false;
    } catch (_) {
      msg.textContent = '⚠ Erreur réseau';
      msg.style.display = '';
      document.getElementById('submit').disabled = false;
    }
  }
  if (!TOKEN || !/^[a-f0-9]{32,128}$/i.test(TOKEN)) {
    document.getElementById('msg').textContent = '⚠ Lien invalide ou incomplet';
    document.getElementById('msg').style.display = '';
  }
</script>
</body>
</html>
