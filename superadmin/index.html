<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocre Immo — Super-admin</title>
<link rel="icon" type="image/svg+xml" href="/favicon/oi-logo.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon-180x180.png">
<link rel="manifest" href="/favicon/site-admin.webmanifest">
<meta name="theme-color" content="#8B5E3C">
<meta name="apple-mobile-web-app-title" content="Ocre Admin">

<!-- M/2026/05/08/4 — DESIGN-TOKENS.2.6 link tokens.css -->
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--color-bg-page); color: var(--color-text-primary); padding: 24px; }
  h1 { font-family: var(--font-serif); color: var(--color-accent); margin-bottom: 6px; font-size: 28px; }
  .banner { background: #FCD5D0; color: #8B0000; padding: 8px 14px; text-align: center; font-weight: 600; margin-bottom: 20px; border-radius: 6px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin: 20px 0; }
  .stat { background: #fff; padding: 18px; border-radius: 10px; border: 1px solid #E5DDC8; text-align: center; }
  .stat-v { font-family: var(--font-serif); font-size: 32px; color: var(--color-accent); font-weight: 700; }
  .stat-l { font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
  table { width: 100%; background: #fff; border-radius: 10px; overflow: hidden; border-collapse: collapse; margin-top: 16px; border: 1px solid #E5DDC8; }
  /* M/2026/05/08/32 — densité tables compact (Linear/Stripe/Notion). */
  th, td { padding: 6px 10px; text-align: left; font-size: 13px; border-bottom: 1px solid #EDE6DC; vertical-align: middle; line-height: 1.35; }
  th { background: var(--color-bg-tint-warm); color: #6B4429; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; padding: 8px 10px; }
  tbody tr { height: 44px; }
  tbody tr:hover { background: var(--color-bg-tint-warm); }
  tbody tr:last-child td { border-bottom: none; }
  /* Bordure gauche colorée pour état (au lieu de fond pleine largeur). */
  td.state-cell { padding: 0; width: 4px; }
  tr.state-green td.state-cell { background: #2D7A3E; }
  tr.state-orange td.state-cell { background: #B8801E; }
  tr.state-red td.state-cell { background: #C73E3E; }
  /* Actions icônes alignées 1 ligne. */
  td.actions { white-space: nowrap; text-align: right; }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; padding: 0; margin: 0 2px; border: 1px solid transparent; background: transparent; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 15px; line-height: 1; opacity: 0.7; transition: opacity 120ms, background 120ms; }
  .icon-btn:hover { opacity: 1; background: var(--color-bg-page); }
  .icon-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
  .icon-btn.danger:hover { background: #FBEAEA; }
  .mono-tel { font-variant-numeric: tabular-nums; font-size: 12.5px; color: var(--color-text-primary); }
  .col-date { font-variant-numeric: tabular-nums; font-size: 12.5px; color: #6B5E4A; }
  .col-attempts { text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; }
  .col-provider { font-size: 11.5px; color: #6B5E4A; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-email { font-weight: 500; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-name { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Mobile : scroll horizontal avec colonnes sticky. */
  @media (max-width: 760px) {
    table { display: block; overflow-x: auto; }
    tbody tr { height: 52px; }
  }
  /* M/2026/05/08/33 — Outils nettoyage. */
  .write-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; font-family: inherit; font-size: 11px; color: var(--color-text-muted); cursor: pointer; margin-right: 8px; }
  .write-toggle.on { background: #FEE2E2; color: #C73E3E; border-color: #FCA5A5; font-weight: 600; }
  .write-toggle.on::before { content: '🔓'; }
  .write-toggle:not(.on)::before { content: '🔒'; }
  td.col-checkbox, th.col-checkbox { width: 30px; text-align: center; padding: 6px 4px; }
  td.col-checkbox input, th.col-checkbox input { cursor: pointer; }
  .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid var(--color-accent); padding: 12px 24px; box-shadow: 0 -4px 16px rgba(60,40,20,0.08); display: none; align-items: center; gap: 12px; z-index: 200; }
  .action-bar.visible { display: flex; }
  .action-bar .count { font-weight: 600; color: var(--color-text-primary); }
  .action-bar button { padding: 8px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; border: 1px solid; }
  .action-bar .btn-danger { background: #C73E3E; color: #fff; border-color: #C73E3E; }
  .action-bar .btn-danger:hover { background: #A02828; }
  .action-bar .btn-cancel { background: #fff; color: var(--color-text-muted); border-color: #E5DDC8; }
  .reset-zone { margin-top: 24px; padding: 16px; border: 2px dashed #FCA5A5; border-radius: 8px; background: #FFF5F5; }
  .reset-zone .reset-label { font-size: 12px; color: #6B5E4A; font-style: italic; margin-bottom: 8px; }
  .reset-btn { padding: 10px 16px; background: #fff; color: #C73E3E; border: 1.5px solid #C73E3E; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; }
  .reset-btn:hover { background: #C73E3E; color: #fff; }
  .reset-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .reset-total-zone { margin-top: 32px; padding: 24px; border: 3px solid #C73E3E; border-radius: 12px; background: #FEE2E2; }
  .reset-total-zone h3 { color: #C73E3E; font-family: var(--font-serif); font-style: italic; margin-bottom: 8px; }
  .reset-total-zone p { font-size: 12px; color: #6B5E4A; margin-bottom: 12px; }
  .reset-total-btn { padding: 14px 24px; background: #C73E3E; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; }
  .reset-total-btn:hover { background: #8B0000; }
  .reset-total-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login { max-width: 380px; margin: 80px auto; padding: 30px; background: #fff; border-radius: 12px; border: 1px solid #E5DDC8; }
  .login input { width: 100%; padding: 10px 12px; border: 1px solid #B89968; border-radius: 6px; margin-bottom: 10px; font-family: inherit; }
  .login button { width: 100%; padding: 12px; background: var(--color-accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 600; }
  /* M/2026/05/07/96.1bis — fix oeil debordait bouton Se connecter sur iPad. ROOT CAUSE : selecteur .login button (specificite 0,1,1) plus fort que .pwd-eye (0,1,0) -> .pwd-eye heritait width:100% + padding:12px + background:var(--color-accent) du bouton login = bouton geant qui debordait sur le bouton suivant. FIX : selecteur .login button.pwd-eye (0,2,1) gagne en specificite. wrapper porte margin (pas input), padding-right reserve zone oeil, centrage top:50% translateY -50% independant hauteur input, z-index 2 modere. */
  .pwd-wrap { position: relative; margin-bottom: 10px; }
  .login .pwd-wrap input { margin-bottom: 0; padding-right: 44px; }
  .login button.pwd-eye { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; padding: 0; margin: 0; background: transparent; border: none; color: var(--color-accent); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; -webkit-appearance: none; appearance: none; box-shadow: none; font-weight: 400; }
  .login button.pwd-eye:hover { color: #6B4429; background: transparent; }
  .login button.pwd-eye svg { width: 18px; height: 18px; display: block; pointer-events: none; }
  .forgot { display: block; text-align: center; margin-top: 10px; color: var(--color-accent); font-size: 12px; font-style: italic; cursor: pointer; text-decoration: none; }
  .forgot:hover { text-decoration: underline; }
  .reset-form { margin-top: 12px; padding: 12px; background: #FBF1E4; border-radius: 8px; }
  .reset-form input { margin-bottom: 0; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { padding: 8px 14px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; }
  .tab.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .filters select, .filters input { padding: 6px 10px; border: 1px solid #E5DDC8; border-radius: 6px; font-family: inherit; font-size: 12px; }
  .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
  .pagination button { padding: 6px 12px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .pagination button.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
  .badge-brouillon { color: #B91C1C; background: #FEE2E2; border: 1px solid #FCA5A5; }
  .badge-archive { color: #6B5E4A; background: #EDE6DC; border: 1px solid #D9C9A8; }
  .badge-enregistre { color: #2D7A3E; background: #D1FAE5; border: 1px solid #6EE7B7; }
  .logout { float: right; padding: 6px 12px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--color-accent); }
  .search-btn { float: right; margin-right: 8px; padding: 6px 14px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--color-accent); display: inline-flex; align-items: center; gap: 6px; }
  .search-btn kbd { font-family: ui-monospace, monospace; font-size: 10px; padding: 1px 5px; background: #F5EDDF; border: 1px solid #D9C9A8; border-radius: 3px; color: #6B4429; }
  .cmdk-overlay { position: fixed; inset: 0; background: rgba(60,40,20,0.4); z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; }
  .cmdk-modal { width: 100%; max-width: 580px; background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(60,40,20,0.25); overflow: hidden; }
  .cmdk-input { width: 100%; padding: 18px 20px; border: none; outline: none; font-size: 16px; font-family: inherit; border-bottom: 1px solid #E5DDC8; }
  .cmdk-results { max-height: 460px; overflow-y: auto; padding: 6px 0; }
  .cmdk-cat { font-size: 10px; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 16px 4px; }
  .cmdk-row { padding: 9px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
  .cmdk-row:hover, .cmdk-row.active { background: #FBF1E4; }
  .cmdk-row .lbl { font-size: 13px; font-weight: 600; color: var(--color-text-primary); }
  .cmdk-row .sub { font-size: 11px; color: var(--color-text-muted); }
  .cmdk-empty { padding: 30px; text-align: center; color: var(--color-text-muted); font-size: 13px; font-style: italic; }
</style>
</head>
<body>
<div id="root"><div class="login" id="login">
  <h1>Super-admin</h1>
  <p style="color:#6B5E4A;margin-bottom:14px;font-size:13px">Connexion réservée aux super-administrateurs.</p>
  <input id="email" type="email" placeholder="Email" autocomplete="username">
  <div class="pwd-wrap">
    <input id="pwd" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="pwd-eye" type="button" onclick="togglePwd()" aria-label="Afficher mot de passe">
      <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
  </div>
  <button onclick="doLogin()">Se connecter</button>
  <a class="forgot" onclick="toggleResetForm()">Mot de passe oublié ?</a>
  <div id="reset-form" class="reset-form" style="display:none">
    <input id="reset-email" type="email" placeholder="Votre email super-admin">
    <button onclick="doResetRequest()" style="margin-top:8px">Recevoir le lien de réinitialisation</button>
    <p id="reset-msg" style="color:#2D7A3E;font-size:12px;margin-top:8px;display:none">Si cet email est super-admin, un lien de réinitialisation a été envoyé.</p>
  </div>
  <p id="err" style="color:#8B0000;font-size:12px;margin-top:10px"></p>
</div></div>

<script>
const TOKEN_KEY = 'ocre_sa_token';
const api = (url, opts = {}) => {
  opts.headers = Object.assign({}, opts.headers || {}, { 'X-Session-Token': localStorage.getItem(TOKEN_KEY) || '' });
  if (opts.body && typeof opts.body !== 'string') { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(opts.body); }
  return fetch(url, opts).then(r => r.json());
};
function togglePwd() {
  const pwd = document.getElementById('pwd');
  const eyeOn = document.getElementById('eye-on');
  const eyeOff = document.getElementById('eye-off');
  if (pwd.type === 'password') { pwd.type = 'text'; eyeOn.style.display = 'none'; eyeOff.style.display = 'block'; }
  else { pwd.type = 'password'; eyeOn.style.display = 'block'; eyeOff.style.display = 'none'; }
}
function toggleResetForm() {
  const f = document.getElementById('reset-form');
  f.style.display = f.style.display === 'none' ? '' : 'none';
}
async function doResetRequest() {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) return;
  await fetch('/api/superadmin_password_reset.php', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email})});
  document.getElementById('reset-msg').style.display = '';
}
async function doLogin() {
  const email = document.getElementById('email').value;
  const pwd = document.getElementById('pwd').value;
  const r = await api('/api/auth_v20.php?action=login', { method: 'POST', body: { email, password: pwd } });
  if (r.ok && r.token) {
    localStorage.setItem(TOKEN_KEY, r.token);
    if ((r.user || {}).role === 'super_admin') { renderConsole(); }
    else { document.getElementById('err').textContent = 'Compte non super-admin.'; localStorage.removeItem(TOKEN_KEY); }
  } else { document.getElementById('err').textContent = r.error || 'Échec connexion'; }
}
function logout() {
  localStorage.removeItem(TOKEN_KEY);
  location.reload();
}
let currentTab = 'overview';
let clientsState = {page: 1, perPage: 50, workspace: '', profil: '', statut: '', q: ''};
async function renderConsole() {
  const root = document.getElementById('root');
  // M/2026/05/08/33 — toggle mode écriture (par défaut OFF, requis pour actions destructives)
  const writeOn = localStorage.getItem('ocre_sa_write_mode') === '1';
  root.innerHTML = '<div class="banner"><span id="banner-mode">Vue super-administrateur · ' + (writeOn ? '<b style="color:#C73E3E">Lecture/Écriture</b>' : 'Lecture seule') + '</span> '
    + '<button class="write-toggle ' + (writeOn ? 'on' : '') + '" id="write-toggle" onclick="toggleWriteMode()" title="Active les actions destructives (suppression, reset)">' + (writeOn ? 'Écriture activée' : 'Activer écriture') + '</button>'
    + '<button class="logout" onclick="logout()">Se déconnecter</button>'
    + '<button class="search-btn" onclick="openCmdK()">🔍 Rechercher <kbd>⌘K</kbd></button>'
    + '<a class="search-btn" href="/superadmin/atelier-live.html" style="text-decoration:none;color:var(--color-accent)">⚡ Atelier (live) <kbd>MVP</kbd></a>'
    + '</div>'
                 + '<h1>Console super-admin</h1>'
                 + '<div class="tabs">'
                 + '<div class="tab active" data-t="overview">Vue d\'ensemble</div>'
                 + '<div class="tab" data-t="workspaces">Workspaces</div>'
                 + '<div class="tab" data-t="clients">Clients</div>'
                 + '<div class="tab" data-t="pending">Inscriptions en attente</div>'
                 + '<div class="tab" data-t="audit">Audit récent</div>'
                 + '</div>'
                 + '<div id="content"></div>';
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', e => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    e.target.classList.add('active');
    currentTab = e.target.dataset.t;
    loadTab(currentTab);
  }));
  loadTab('overview');
}
async function loadTab(t) {
  const c = document.getElementById('content');
  c.innerHTML = '<p style="color:#6B5E4A">Chargement…</p>';
  if (t === 'overview') {
    const r = await api('/api/superadmin_v20.php?action=overview');
    if (!r.ok) { c.textContent = r.error; return; }
    const s = r.stats;
    c.innerHTML = '<div class="stats">' + Object.entries(s).map(([k, v]) =>
      `<div class="stat"><div class="stat-v">${v}</div><div class="stat-l">${k.replace(/_/g, ' ')}</div></div>`
    ).join('') + '</div>'
    + '<div class="reset-total-zone"><h3>🚨 Reset TOTAL provisoire (mode test)</h3>'
    + '<p>⚠️ Supprime <b>TOUTES</b> les inscriptions en attente, <b>TOUS</b> les workspaces (DROP DATABASE), et toute l\'audit récente. Action <b>irréversible</b>. Désactiver cette zone après lancement officiel.</p>'
    + '<button class="reset-total-btn" onclick="resetTotal()">🔥 Reset TOTAL provisoire</button></div>';
  } else if (t === 'workspaces') {
    const r = await api('/api/superadmin_v20.php?action=workspaces');
    selection.workspaces.clear();
    c.innerHTML = '<table><thead><tr>'
      + '<th class="col-checkbox"><input type="checkbox" id="cb-all-workspaces" onchange="toggleAllSelection(\'workspaces\', this.checked)"></th>'
      + '<th>Slug</th><th>Type</th><th>Nom</th><th>Pays</th><th style="text-align:center">Membres</th><th>Créé</th><th style="text-align:center">Archivé</th></tr></thead><tbody>'
      + (r.workspaces || []).map(w =>
        `<tr data-workspaces-id="${w.id}"><td class="col-checkbox"><input type="checkbox" onchange="toggleRowSelection('workspaces', ${w.id}, this.checked)"></td><td><b>${w.slug}</b></td><td><span style="font-size:11px;color:#6B5E4A;text-transform:uppercase">${w.type}</span></td><td class="col-name" title="${(w.display_name||'').replace(/"/g,'&quot;')}">${w.display_name}</td><td class="col-date">${w.country_code || '—'}</td><td class="col-attempts">${w.members_count}</td><td class="col-date" title="${w.created_at||''}">${(w.created_at || '').slice(0, 10).replace(/(\d{4})-(\d{2})-(\d{2})/, '$3/$2/$1')}</td><td style="text-align:center">${w.archived_at ? '✓' : '—'}</td></tr>`
      ).join('') + '</tbody></table>'
      + '<div class="reset-zone"><div class="reset-label">⚠️ Mode test uniquement — désactiver après lancement officiel.</div><button class="reset-btn" onclick="tabReset(\'reset_workspaces\', \'TOUS les workspaces (DROP DB tenant)\')">🔥 Reset Workspaces</button></div>';
    updateActionBar('workspaces');
  } else if (t === 'clients') {
    await renderClientsTab();
  } else if (t === 'pending') {
    await renderPendingTab();
  } else if (t === 'audit') {
    const r = await api('/api/superadmin_v20.php?action=audit_recent');
    c.innerHTML = '<table><thead><tr><th>Date</th><th>Workspace</th><th>Acteur</th><th>Action</th><th>Cible</th></tr></thead><tbody>'
      + (r.events || []).map(e => {
        const dt = (e.created_at || '').replace('T', ' ');
        const m = dt.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
        const dtCompact = m ? `${m[3]}/${m[2]} ${m[4]}:${m[5]}` : dt.slice(0, 16);
        return `<tr><td class="col-date" title="${e.created_at||''}">${dtCompact}</td><td><b>${e.workspace_slug || '—'}</b></td><td class="col-email">${e.email || '—'}</td><td>${e.action}</td><td class="col-provider">${e.target_type || ''} ${e.target_id || ''}</td></tr>`;
      }).join('') + '</tbody></table>'
      + '<div class="reset-zone"><div class="reset-label">⚠️ Mode test uniquement — désactiver après lancement officiel.</div><button class="reset-btn" onclick="tabReset(\'reset_audit\', \'audit récent (TRUNCATE super_admin_events)\')">🔥 Reset Audit récent</button></div>';
  }
}
async function renderClientsTab() {
  const c = document.getElementById('content');
  const qs = new URLSearchParams({page: clientsState.page, per_page: clientsState.perPage,
    workspace: clientsState.workspace, profil: clientsState.profil, statut: clientsState.statut, q: clientsState.q}).toString();
  const r = await api('/api/superadmin_clients.php?action=list&' + qs);
  if (!r.ok) { c.textContent = r.error || 'Erreur'; return; }
  const wspOpts = '<option value="">Tous workspaces</option>' + (r.workspaces || []).map(w => `<option value="${w.slug}"${w.slug===clientsState.workspace?' selected':''}>${w.slug}</option>`).join('');
  const profilOpts = '<option value="">Tous profils</option>' + ['Acheteur','Vendeur','Locataire','Bailleur','Investisseur','Promoteur','MarchandBiens','Curieux'].map(p => `<option value="${p}"${p===clientsState.profil?' selected':''}>${p}</option>`).join('');
  const statutOpts = '<option value="">Tous statuts</option>' + [['brouillon','Brouillon'],['enregistre','Enregistré'],['archive','Archivé']].map(([k,l]) => `<option value="${k}"${k===clientsState.statut?' selected':''}>${l}</option>`).join('');
  const filters = `<div class="filters">
    <select id="f-wsp" onchange="filterClient('workspace', this.value)">${wspOpts}</select>
    <select id="f-profil" onchange="filterClient('profil', this.value)">${profilOpts}</select>
    <select id="f-statut" onchange="filterClient('statut', this.value)">${statutOpts}</select>
    <input id="f-q" type="text" placeholder="Recherche nom client..." value="${clientsState.q}" oninput="searchDebounced(this.value)" style="flex:1;min-width:180px"/>
  </div>`;
  const tableHead = '<table><thead><tr><th>Workspace</th><th>Nom</th><th>Société</th><th>Profil</th><th>Statut</th><th>Modifié</th></tr></thead><tbody>';
  const rows = (r.clients || []).map(cl => {
    const sBadge = `<span class="badge badge-${cl.statut}">${cl.statut}</span>`;
    const u = (cl.updated_at || '').replace('T', ' ');
    const m = u.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
    const updated = m ? `${m[3]}/${m[2]} ${m[4]}:${m[5]}` : u.slice(0, 16);
    return `<tr><td><b>${cl.workspace_slug}</b></td><td class="col-name" title="${(cl.nom_complet||'').replace(/"/g,'&quot;')}">${cl.nom_complet || '<i style="color:#A89882">(sans nom)</i>'}</td><td class="col-name">${cl.societe || '—'}</td><td>${cl.profil || '—'}</td><td>${sBadge}</td><td class="col-date" title="${cl.updated_at||''}">${updated}</td></tr>`;
  }).join('');
  const tableEnd = '</tbody></table>';
  let pagination = '';
  if (r.pages > 1) {
    pagination = '<div class="pagination">';
    for (let p = 1; p <= r.pages; p++) {
      pagination += `<button class="${p===r.page?'active':''}" onclick="gotoPage(${p})">${p}</button>`;
    }
    pagination += `<span style="font-size:11px;color:var(--color-text-muted);align-self:center;margin-left:8px">${r.total} clients</span></div>`;
  } else {
    pagination = `<p style="text-align:center;color:var(--color-text-muted);font-size:11px;margin-top:12px">${r.total} client${r.total>1?'s':''}</p>`;
  }
  c.innerHTML = filters + tableHead + rows + tableEnd + pagination;
}
function filterClient(key, value) { clientsState[key] = value; clientsState.page = 1; renderClientsTab(); }
function gotoPage(p) { clientsState.page = p; renderClientsTab(); }

// M/2026/05/08/33 — Outils nettoyage super-admin (phase test)
function isWriteMode() { return localStorage.getItem('ocre_sa_write_mode') === '1'; }
function toggleWriteMode() {
  const cur = isWriteMode();
  if (cur) {
    localStorage.removeItem('ocre_sa_write_mode');
  } else {
    if (!confirm('Activer le mode ÉCRITURE ?\n\nCe mode autorise les suppressions et resets. À désactiver après usage.')) return;
    localStorage.setItem('ocre_sa_write_mode', '1');
  }
  renderConsole();
}
function requireWriteMode() {
  if (!isWriteMode()) {
    alert('⚠️ Mode écriture désactivé.\n\nActiver le toggle "🔒 Activer écriture" en haut à droite avant toute action destructive.');
    return false;
  }
  return true;
}

// Sélection multi (état partagé entre re-renders)
const selection = { pending: new Set(), workspaces: new Set() };
function toggleRowSelection(scope, id, checked) {
  if (checked) selection[scope].add(id); else selection[scope].delete(id);
  updateActionBar(scope);
}
function toggleAllSelection(scope, checked) {
  document.querySelectorAll(`tbody tr[data-${scope}-id]`).forEach(tr => {
    const id = parseInt(tr.dataset[scope + 'Id'], 10);
    const cb = tr.querySelector('input[type=checkbox]');
    if (cb) cb.checked = checked;
    if (checked) selection[scope].add(id); else selection[scope].delete(id);
  });
  updateActionBar(scope);
}
function updateActionBar(scope) {
  let bar = document.getElementById('action-bar-' + scope);
  if (!bar) {
    bar = document.createElement('div');
    bar.className = 'action-bar';
    bar.id = 'action-bar-' + scope;
    document.body.appendChild(bar);
  }
  const n = selection[scope].size;
  if (n > 0) {
    bar.innerHTML = `<span class="count">${n} élément${n>1?'s':''} sélectionné${n>1?'s':''}</span>`
      + `<button class="btn-danger" onclick="batchDelete('${scope}')">🗑️ Supprimer la sélection</button>`
      + `<button class="btn-cancel" onclick="clearSelection('${scope}')">✕ Désélectionner</button>`;
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}
function clearSelection(scope) {
  selection[scope].clear();
  document.querySelectorAll(`tbody tr[data-${scope}-id] input[type=checkbox]`).forEach(cb => { cb.checked = false; });
  const headerCb = document.getElementById('cb-all-' + scope);
  if (headerCb) headerCb.checked = false;
  updateActionBar(scope);
}
async function batchDelete(scope) {
  if (!requireWriteMode()) return;
  const ids = Array.from(selection[scope]);
  if (ids.length === 0) return;
  const labels = { pending: 'inscription(s) en attente', workspaces: 'workspace(s)' };
  if (!confirm(`Supprimer définitivement ${ids.length} ${labels[scope]} ?\n\nCette action est irréversible.\nIDs : ${ids.join(', ')}`)) return;
  let endpoint, action;
  if (scope === 'pending') { endpoint = '/api/superadmin_cleanup.php'; action = 'delete_users_batch'; }
  else if (scope === 'workspaces') { endpoint = '/api/superadmin_cleanup.php'; action = 'delete_workspaces'; }
  else return;
  const r = await api(endpoint, {method:'POST', body:{action, ids}});
  if (r.ok) {
    alert(`✅ ${r.deleted} supprimé(s).`);
    clearSelection(scope);
    if (scope === 'pending') renderPendingTab(); else if (scope === 'workspaces') loadTab('workspaces');
  } else {
    alert('⚠️ ' + (r.error || 'Erreur'));
  }
}

async function tabReset(action, label) {
  if (!requireWriteMode()) return;
  const conf = prompt(`⚠️ Reset ${label}\n\nCette action est IRRÉVERSIBLE.\nTapez RESET pour confirmer :`);
  if (conf !== 'RESET') { if (conf !== null) alert('Confirmation incorrecte.'); return; }
  const r = await api('/api/superadmin_cleanup.php', {method:'POST', body:{action, confirmation: 'RESET'}});
  if (r.ok) {
    alert(`✅ Reset ${label} OK\n${JSON.stringify(r, null, 2)}`);
    loadTab(currentTab);
  } else {
    alert('⚠️ ' + (r.error || 'Erreur'));
  }
}

// M/2026/05/08/30 → 32 — Section Inscriptions en attente, refonte compacte.
// Format date "DD/MM HH:MM" avec tooltip ISO. Téléphone en E.164. Bordure gauche colorée.
function fmtDateCompact(iso) {
  if (!iso) return '—';
  const s = String(iso).replace('T', ' ');
  // Extract YYYY-MM-DD HH:MM from "2026-05-08 08:20:00..."
  const m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
  if (!m) return s.slice(0, 16);
  return `${m[3]}/${m[2]} ${m[4]}:${m[5]}`;
}
function fmtPhoneE164(raw) {
  if (!raw) return '—';
  const cleaned = String(raw).replace(/[\s\-\.\(\)]/g, '');
  if (/^\+\d{8,15}$/.test(cleaned)) return cleaned;
  // FR national 0X → +33X
  if (/^0[1-9]\d{8}$/.test(cleaned)) return '+33' + cleaned.slice(1);
  return cleaned;
}
function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }

        + `<button class="icon-btn" onclick="paHistory(${u.id})" title="Voir l'historique" style="color:var(--color-text-muted)">📋</button>`

  c.innerHTML = '<p style="font-size:12px;color:#6B5E4A;margin-bottom:8px"><b>' + r.count + '</b> inscription(s) en attente d\'activation · 🟢 <1h · 🟠 1-24h · 🔴 >24h ou >3 tentatives.</p>'
    + head + (rows || '<tr><td colspan="10" style="text-align:center;padding:24px;color:#6B5E4A">Aucune inscription en attente.</td></tr>') + '</tbody></table>'

// M/2026/05/07/98.1 — Command Palette Cmd+K (Stripe/Linear/Notion pattern)
let cmdkActiveIdx = 0;
let cmdkResults = [];
let cmdkSearchTimer = null;
function openCmdK() {
  if (document.getElementById('cmdk-overlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'cmdk-overlay';
  overlay.className = 'cmdk-overlay';
  overlay.innerHTML =
    '<div class="cmdk-modal" onclick="event.stopPropagation()">' +
      '<input id="cmdk-input" class="cmdk-input" type="text" placeholder="Rechercher dans clients, biens, users, workspaces, audit... (min 2 caractères)" autofocus>' +
      '<div id="cmdk-results" class="cmdk-results"></div>' +
    '</div>';
  overlay.onclick = closeCmdK;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('cmdk-input').focus(), 50);
  document.getElementById('cmdk-input').addEventListener('input', e => {
    clearTimeout(cmdkSearchTimer);
    cmdkSearchTimer = setTimeout(() => doCmdKSearch(e.target.value), 200);
  });
  document.getElementById('cmdk-input').addEventListener('keydown', cmdkKeyDown);
}
function closeCmdK() { const o = document.getElementById('cmdk-overlay'); if (o) o.remove(); cmdkResults = []; cmdkActiveIdx = 0; }
function cmdkKeyDown(e) {
  if (e.key === 'Escape') { e.preventDefault(); closeCmdK(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdkActiveIdx = Math.min(cmdkResults.length - 1, cmdkActiveIdx + 1); renderCmdKResults(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); cmdkActiveIdx = Math.max(0, cmdkActiveIdx - 1); renderCmdKResults(); }
  else if (e.key === 'Enter') { e.preventDefault(); if (cmdkResults[cmdkActiveIdx]) cmdkSelect(cmdkResults[cmdkActiveIdx]); }
}
async function doCmdKSearch(q) {
  q = (q || '').trim();
  const c = document.getElementById('cmdk-results');
  if (q.length < 2) { c.innerHTML = '<div class="cmdk-empty">Tape au moins 2 caractères pour chercher</div>'; cmdkResults = []; return; }
  c.innerHTML = '<div class="cmdk-empty">Recherche…</div>';
  try {
    const r = await api('/api/superadmin_search.php?q=' + encodeURIComponent(q));
    cmdkResults = r.results || [];
    cmdkActiveIdx = 0;
    renderCmdKResults();
  } catch (_) { c.innerHTML = '<div class="cmdk-empty">Erreur réseau</div>'; }
}
function renderCmdKResults() {
  const c = document.getElementById('cmdk-results');
  if (!cmdkResults.length) { c.innerHTML = '<div class="cmdk-empty">Aucun résultat</div>'; return; }
  // Group by category
  const groups = {};
  cmdkResults.forEach((r, i) => {
    if (!groups[r.category]) groups[r.category] = [];
    groups[r.category].push({...r, _idx: i});
  });
  let html = '';
  Object.entries(groups).forEach(([cat, items]) => {
    html += `<div class="cmdk-cat">${cat}</div>`;
    items.forEach(item => {
      const act = item._idx === cmdkActiveIdx ? ' active' : '';
      html += `<div class="cmdk-row${act}" data-idx="${item._idx}" onclick="cmdkSelect(cmdkResults[${item._idx}])"><span class="lbl">${escapeHtml(item.label)}</span><span class="sub">${escapeHtml(item.sublabel || '')}</span></div>`;
    });
  });
  c.innerHTML = html;
}
function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function cmdkSelect(item) {
  closeCmdK();
  // Pour M98.1, juste alert. Future M98 brancherait sur les bons onglets.
  const url = item.url || '/';
  // Si url commence par /?tab=X, basculer sur l'onglet
  const m = (url + '').match(/tab=([a-z]+)/);
  if (m && document.querySelector('[data-t="' + m[1] + '"]')) {
    document.querySelector('[data-t="' + m[1] + '"]').click();
  } else {
    alert('Ressource sélectionnée : ' + item.label + '\n(navigation détaillée à venir M98.x)');
  }
}
window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k' && localStorage.getItem(TOKEN_KEY)) {
    e.preventDefault();
    openCmdK();
  }
});
