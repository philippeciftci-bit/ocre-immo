<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ocre · Super-admin</title>
<link rel="icon" type="image/svg+xml" href="/favicon/oi-logo.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon-180x180.png">
<link rel="manifest" href="/favicon/site-admin.webmanifest">
<meta name="theme-color" content="#8B5E3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ocre Admin">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* M/2026/05/11/25 — M_SUPERADMIN_REBUILD_PROPER : architecture propre Stripe/Vercel style.
   Sidebar 240px fixe + main scroll + DataTable + Zone danger separee. */
:root {
  --color-bg: #fff;
  --color-bg-sidebar: #fafaf7;
  --color-bg-hover: #f4ebd9;
  --color-border: #e5dac6;
  --color-border-subtle: #f0e6d5;
  --color-text: #2a1810;
  --color-text-muted: #998877;
  --color-text-brown: #6b5e4a;
  --color-accent: #8b5e3c;
  --color-accent-hover: #7a5230;
  --color-danger: #c73e3e;
  --color-danger-bg: #fef2f2;
  --color-success: #2e7d32;
  --color-warning: #b15a00;
  --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
  --font-serif: 'Playfair Display', Georgia, serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-sans); line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100%; }
[hidden] { display: none !important; }
a { color: var(--color-accent); text-decoration: none; }
button { font: inherit; cursor: pointer; }

/* ===== Login / Magic-link form ===== */
.auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--color-bg-sidebar); }
.auth-card { background: #fff; border: 1px solid var(--color-border); border-radius: 14px; padding: 32px 28px; max-width: 380px; width: 100%; box-shadow: 0 4px 16px rgba(60, 40, 20, .06); }
.auth-card .brand { font-family: var(--font-serif); font-style: italic; font-weight: 600; font-size: 30px; color: var(--color-accent); text-align: center; margin-bottom: 4px; }
.auth-card h1 { font-family: var(--font-serif); font-weight: 600; font-size: 22px; text-align: center; margin-bottom: 6px; color: var(--color-text); }
.auth-card p.lead { font-size: 13px; color: var(--color-text-brown); margin-bottom: 18px; text-align: center; line-height: 1.5; }
.auth-card input { width: 100%; padding: 11px 13px; border: 1px solid var(--color-border); border-radius: 8px; font: inherit; font-size: 14px; margin-bottom: 12px; }
.auth-card input:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(139, 94, 60, .12); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; border: 1px solid transparent; transition: background .12s, border-color .12s, color .12s, opacity .12s; text-decoration: none; }
.btn-primary { background: var(--color-accent); color: #fff; width: 100%; padding: 12px; font-size: 14px; }
.btn-primary:hover:not(:disabled) { background: var(--color-accent-hover); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--color-text-brown); border-color: var(--color-border); }
.btn-ghost:hover { background: var(--color-bg-hover); color: var(--color-text); }
.btn-danger { background: #fff; color: var(--color-danger); border-color: #f0c8c8; }
.btn-danger:hover { background: #fdecec; }
.btn-danger-solid { background: var(--color-danger); color: #fff; }
.btn-danger-solid:hover { background: #8b1010; }
.btn-sm { padding: 6px 10px; font-size: 11px; border-radius: 6px; }
.feedback { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 12.5px; min-height: 16px; }
.feedback.error { color: var(--color-danger); background: var(--color-danger-bg); }
.feedback.success { color: var(--color-success); background: #e8f5e9; }
.muted { color: var(--color-text-muted); font-size: 12px; }

/* ===== App layout ===== */
#app { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--color-bg-sidebar);
  border-right: 1px solid var(--color-border);
  padding: 20px 12px;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar .brand-row { display: flex; align-items: center; gap: 8px; padding: 0 10px 18px; border-bottom: 1px solid var(--color-border-subtle); margin-bottom: 10px; }
.sidebar .brand-row .brand-name { font-family: var(--font-serif); font-style: italic; font-weight: 600; font-size: 22px; color: var(--color-accent); line-height: 1; }
.sidebar .brand-row .brand-sub { font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .06em; margin-left: 4px; }
.sidebar nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.nav-item { background: none; border: none; text-align: left; padding: 9px 12px; border-radius: 7px; color: var(--color-text-brown); font-size: 13.5px; font-weight: 500; display: flex; align-items: center; gap: 9px; transition: background .1s, color .1s; }
.nav-item .ico { font-size: 14px; width: 18px; text-align: center; }
.nav-item:hover { background: var(--color-bg-hover); color: var(--color-text); }
.nav-item.active { background: var(--color-text); color: #fff; }
.nav-item.active:hover { background: #1a0a00; }
.nav-separator { height: 1px; background: var(--color-border-subtle); margin: 8px 4px; }
.sidebar-footer { padding-top: 12px; border-top: 1px solid var(--color-border-subtle); font-size: 11.5px; color: var(--color-text-muted); }
.sidebar-footer .me { display: flex; align-items: center; gap: 8px; padding: 6px 8px; }
.sidebar-footer .me .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #c9a96e 0%, #8b6f3a 100%); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-style: italic; font-weight: 600; font-size: 14px; flex-shrink: 0; }
.sidebar-footer .logout-link { background: none; border: none; color: var(--color-accent); font-size: 11.5px; padding: 4px 8px; cursor: pointer; }
.sidebar-footer .logout-link:hover { text-decoration: underline; }

/* M/2026/05/11/30 — Mobile drawer Stripe/Linear style :
   - Hamburger FAB fixed top:16px left:16px (PAS de barre pleine largeur)
   - Sidebar = drawer slide-in depuis la gauche avec overlay
   - Breakpoint <1024px (iPad portrait 768px inclus, iPad landscape 1024px reste desktop) */
.hamburger-fab {
  display: none;
  position: fixed; top: 12px; left: 12px;
  width: 44px; height: 44px;
  background: #fff; border: 1px solid var(--color-border); border-radius: 10px;
  font-size: 20px; color: var(--color-text); cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  z-index: 80; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.hamburger-fab:hover { background: var(--color-bg-sidebar); }
.hamburger-fab:active { transform: scale(.96); }
.sidebar-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(42, 24, 16, .45);
  z-index: 70; opacity: 0; transition: opacity .25s ease;
}
.sidebar-backdrop.open { display: block; opacity: 1; }
.drawer-close-btn { display: none; }

@media (max-width: 1023px) {
  #app { flex-direction: column; }
  .hamburger-fab { display: inline-flex; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    height: 100vh; width: 280px; max-width: 86vw;
    transform: translateX(-100%);
    transition: transform .25s ease-out;
    z-index: 75;
    box-shadow: 2px 0 18px rgba(0,0,0,.12);
    padding-top: 14px;
  }
  .sidebar.open { transform: translateX(0); }
  .drawer-close-btn {
    display: inline-flex; align-items: center; justify-content: center;
    position: absolute; top: 10px; right: 10px;
    width: 36px; height: 36px;
    background: none; border: none; border-radius: 8px;
    font-size: 20px; color: var(--color-text-brown); cursor: pointer;
  }
  .drawer-close-btn:hover { background: var(--color-bg-hover); }
  .content { padding: 16px !important; padding-top: 64px !important; /* room for hamburger FAB */ }
  .content-head h1 { font-size: 22px; }
}
body.drawer-open { overflow: hidden; }

.content { flex: 1; padding: 28px 32px; min-width: 0; max-width: 100%; }
.content-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
.content-head h1 { font-family: var(--font-sans); font-weight: 600; font-style: normal; font-size: 24px; color: #001D3D; margin: 0; letter-spacing: -.01em; }
.content-head .head-sub { font-size: 13px; color: #6B7280; margin-top: 4px; }
.content-head .head-actions { display: flex; gap: 8px; align-items: center; }

/* ===== KPI cards ===== */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 24px; }
.kpi { background: #fff; border: 1px solid var(--color-border); border-radius: 10px; padding: 14px 16px; }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--color-text-muted); margin-bottom: 6px; }
.kpi-value { font-family: var(--font-sans); font-weight: 600; font-size: 26px; color: #001D3D; line-height: 1.1; letter-spacing: -.02em; }
.kpi-trend { font-size: 11.5px; color: var(--color-text-muted); margin-top: 4px; }

/* ===== Panels ===== */
.panel { background: #fff; border: 1px solid var(--color-border); border-radius: 10px; margin-bottom: 18px; overflow: hidden; }
.panel-head { padding: 14px 18px; border-bottom: 1px solid var(--color-border-subtle); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.panel-head h2 { font-family: var(--font-sans); font-style: normal; font-weight: 600; font-size: 15px; color: #001D3D; margin: 0; letter-spacing: -.005em; }
.panel-head .panel-actions { display: flex; gap: 8px; align-items: center; }
.panel-body { padding: 16px 18px; }
.panel-body.no-pad { padding: 0; }

/* ===== Search + filter bar ===== */
.search-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--color-border); border-radius: 7px; font: inherit; font-size: 13px; background: #fff; }
.search-input:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(139, 94, 60, .12); }

/* ===== DataTable (M/2026/05/11/32 densifie) ===== */
.dt-wrap { overflow-x: auto; }
.dt { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
.dt th { text-align: left; padding: 7px 10px; background: var(--color-bg-sidebar); border-bottom: 1px solid var(--color-border-subtle); font-weight: 600; color: var(--color-text-brown); font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
.dt td { padding: 7px 10px; border-bottom: 1px solid var(--color-border-subtle); vertical-align: middle; line-height: 1.35; }
.dt tr:last-child td { border-bottom: none; }
.dt tr:hover td { background: #fbf7ee; }
.dt td.cell-mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--color-text-muted); white-space: nowrap; }
.dt td.cell-token { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--color-text-brown); white-space: nowrap; cursor: default; }
.dt td.cell-ua { white-space: nowrap; cursor: default; }
.dt td.cell-ua .ua-label { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text); }
.dt td.cell-ua .ua-icon { font-size: 11px; opacity: .7; }
.dt td.cell-actions { text-align: right; white-space: nowrap; }
.dt td.cell-actions .btn { margin-left: 4px; padding: 4px 8px; font-size: 11px; }
.dt td .badge { font-size: 9.5px; padding: 2px 6px; }
.dt-footer { padding: 6px 10px; }
.empty-state { padding: 36px 18px; text-align: center; color: var(--color-text-muted); font-size: 13px; }
.dt-footer { padding: 10px 14px; border-top: 1px solid var(--color-border-subtle); color: var(--color-text-muted); font-size: 11.5px; text-align: right; background: var(--color-bg-sidebar); }

/* ===== Badges ===== */
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 5px; letter-spacing: .03em; text-transform: uppercase; vertical-align: middle; }
.badge-active { background: #e8f5e9; color: #2e7d32; }
.badge-soon { background: #fff4e5; color: #b15a00; }
.badge-disabled { background: #f0e6d5; color: #998877; }
.badge-suspended { background: #fdecea; color: var(--color-danger); }
.badge-admin { background: #ede7f6; color: #5e35b1; }
.badge-pending { background: #fff4e5; color: #b15a00; }
.badge-consumed { background: #e8f5e9; color: #2e7d32; }
.badge-expired { background: #f0e6d5; color: #998877; }

/* ===== Module rows ===== */
.module-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--color-border-subtle); }
.module-row:last-child { border-bottom: none; }
.module-row .label { flex: 1; font-weight: 600; font-size: 14px; }
.module-states { display: flex; gap: 4px; background: var(--color-bg-sidebar); padding: 3px; border-radius: 7px; }
.module-state-btn { background: none; border: none; padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; }
.module-state-btn:hover { color: var(--color-text); }
.module-state-btn.selected { background: #fff; color: var(--color-text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.module-state-btn.selected[data-state="active"] { color: var(--color-success); }
.module-state-btn.selected[data-state="soon"] { color: var(--color-warning); }
.module-state-btn.selected[data-state="disabled"] { color: var(--color-text-muted); }

/* ===== Atelier cards ===== */
.atelier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
.atelier-card { background: #fff; border: 1px solid var(--color-border); border-radius: 10px; padding: 18px; }
.atelier-card .ico { font-size: 24px; margin-bottom: 8px; }
.atelier-card h3 { font-family: var(--font-sans); font-style: normal; font-weight: 600; font-size: 15px; margin-bottom: 6px; color: #001D3D; }
.atelier-card p { font-size: 12.5px; color: var(--color-text-brown); margin-bottom: 12px; line-height: 1.45; }
.atelier-card .btn { width: auto; }

/* ===== Zone danger ===== */
.danger-zone { border: 2px solid var(--color-danger); border-radius: 12px; background: var(--color-danger-bg); padding: 22px; margin-top: 8px; }
.danger-zone h2 { font-family: var(--font-sans); font-style: normal; font-weight: 600; font-size: 16px; color: var(--color-danger); margin-bottom: 6px; }
.danger-zone p.warn { font-size: 12.5px; color: #6b4040; margin-bottom: 16px; line-height: 1.5; }
.danger-actions { display: flex; gap: 10px; flex-wrap: wrap; }

/* ===== Modal ===== */
.modal-backdrop { position: fixed; inset: 0; background: rgba(42, 24, 16, .55); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 460px; width: 100%; box-shadow: 0 12px 48px rgba(0,0,0,.2); }
.modal h2 { font-family: var(--font-sans); font-style: normal; font-weight: 600; font-size: 18px; margin-bottom: 10px; color: #001D3D; letter-spacing: -.01em; }
.modal p { font-size: 13.5px; color: var(--color-text-brown); margin-bottom: 16px; line-height: 1.5; }
.modal input { width: 100%; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 7px; font: inherit; font-size: 13.5px; margin-bottom: 14px; }
.modal input:focus { outline: none; border-color: var(--color-danger); box-shadow: 0 0 0 3px rgba(199, 62, 62, .12); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
.modal-warn { background: #fef2f2; border: 1px solid #fecaca; border-radius: 7px; padding: 10px 12px; margin-bottom: 14px; font-size: 12.5px; color: #6b4040; }

/* ===== Spinner ===== */
.spin { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #e5dac6; border-top-color: var(--color-accent); animation: spin .8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader { padding: 32px; text-align: center; color: var(--color-text-muted); }
</style>
</head>
<body>

<!-- ============== LOGIN STATE ============== -->
<div id="auth-shell" class="auth-shell">
  <div class="auth-card">
    <div class="brand">Oc<span style="color:#d4a256">re</span></div>
    <h1>Super-admin</h1>
    <p class="lead">Saisis ton email super-administrateur, reçois un lien d'accès direct au dashboard.</p>
    <div id="login-form-state">
      <form id="magic-form" autocomplete="on" novalidate>
        <input id="email-input" type="email" placeholder="Email super-admin" autocomplete="email" inputmode="email" required>
        <button id="submit-btn" type="submit" class="btn btn-primary" disabled>Demander un lien d'accès</button>
      </form>
      <p id="login-err" class="feedback error" style="display:none"></p>
    </div>
    <div id="login-confirm-state" style="display:none;text-align:center">
      <div style="font-size:42px;line-height:1;margin:6px 0 12px">✉️</div>
      <h1 style="margin-bottom:6px">Lien envoyé</h1>
      <p class="lead">Un lien d'accès a été envoyé à <b id="confirm-email"></b>. Lien valide 24h.</p>
      <button id="other-email-btn" class="btn btn-ghost" style="width:100%;margin-top:6px">Utiliser un autre email</button>
    </div>
  </div>
</div>

<!-- ============== DASHBOARD STATE ============== -->
<div id="app" hidden>
  <button class="hamburger-fab" id="hamburger-btn" aria-label="Ouvrir le menu">☰</button>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <button class="drawer-close-btn" id="drawer-close-btn" aria-label="Fermer le menu">×</button>
    <div class="brand-row">
      <span class="brand-name">Oc<span style="color:#d4a256">re</span></span>
      <span class="brand-sub">super-admin</span>
    </div>
    <nav id="nav">
      <button class="nav-item active" data-section="overview"><span class="ico">📊</span> Vue d'ensemble</button>
      <button class="nav-item" data-section="users"><span class="ico">👥</span> Utilisateurs</button>
      <button class="nav-item" data-section="sessions"><span class="ico">🔑</span> Sessions actives</button>
      <button class="nav-item" data-section="magic"><span class="ico">✉️</span> Magic links</button>
      <button class="nav-item" data-section="modules"><span class="ico">🧩</span> Modules Oi</button>
      <button class="nav-item" data-section="display"><span class="ico">🎨</span> Affichage</button>
      <button class="nav-item" data-section="audit"><span class="ico">📜</span> Audit log</button>
      <button class="nav-item" data-section="atelier"><span class="ico">🔧</span> Atelier</button>
      <div class="nav-separator"></div>
      <button class="nav-item" data-section="danger" style="color:var(--color-danger)"><span class="ico">⚠️</span> Zone danger</button>
    </nav>
    <div class="sidebar-footer">
      <div class="me">
        <span class="avatar" id="me-avatar">?</span>
        <span id="me-email" style="font-size:11.5px;color:var(--color-text-brown);overflow:hidden;text-overflow:ellipsis"></span>
      </div>
      <button class="logout-link" id="logout-btn">Se déconnecter</button>
    </div>
  </aside>
  <main class="content">
    <header class="content-head">
      <div>
        <h1 id="section-title">Vue d'ensemble</h1>
        <div class="head-sub" id="section-sub"></div>
      </div>
      <div class="head-actions" id="section-actions"></div>
    </header>
    <section id="content-body"></section>
  </main>
</div>

<!-- ============== MODAL ROOT ============== -->
<div id="modal-root"></div>

<script>
// ====== Helpers ======
const TOKEN_KEY = 'ocre_sa_token';
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const fmtDate = s => { if (!s) return '—'; const d = new Date(typeof s === 'string' ? s.replace(' ', 'T') : s); return isNaN(d) ? '—' : d.toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' }); };

// M/2026/05/11/32 — parser User-Agent en label court "OS Browser" + emoji.
function parseUserAgent(ua) {
  if (!ua) return { label: '—', icon: '' };
  const s = String(ua);
  // OS
  let os = 'Other', icon = '🖥️';
  if (/iPad/i.test(s))                          { os = 'iPad';    icon = '📱'; }
  else if (/iPhone/i.test(s))                   { os = 'iPhone';  icon = '📱'; }
  else if (/Android/i.test(s))                  { os = 'Android'; icon = '📱'; }
  else if (/Macintosh|Mac OS X/i.test(s))       { os = 'Mac';     icon = '💻'; }
  else if (/Windows/i.test(s))                  { os = 'Windows'; icon = '🪟'; }
  else if (/Linux/i.test(s))                    { os = 'Linux';   icon = '🐧'; }
  else if (/curl|PHP-Curl|HeadlessChrome/i.test(s)) { os = 'Bot'; icon = '🤖'; }
  // Browser (ordre important : Edge avant Chrome, Chrome avant Safari)
  let br = '';
  if (/Edg\//i.test(s))                br = 'Edge';
  else if (/OPR\/|Opera/i.test(s))     br = 'Opera';
  else if (/Firefox\//i.test(s))       br = 'Firefox';
  else if (/HeadlessChrome/i.test(s))  br = 'HeadlessChrome';
  else if (/Chrome\//i.test(s))        br = 'Chrome';
  else if (/Safari\//i.test(s))        br = 'Safari';
  else if (/curl/i.test(s))            br = 'curl';
  return { label: (os === 'Other' ? (br || 'inconnu') : os + (br ? ' ' + br : '')), icon };
}
function uaCell(ua) {
  const p = parseUserAgent(ua);
  return `<td class="cell-ua" title="${esc(ua || '—')}"><span class="ua-label"><span class="ua-icon">${p.icon}</span>${esc(p.label)}</span></td>`;
}
function tokenCell(tok) {
  if (!tok) return '<td class="cell-token muted">—</td>';
  const s = String(tok);
  return `<td class="cell-token" title="${esc(s)}">${esc(s.slice(0, 8))}…</td>`;
}

async function api(url, opts = {}) {
  const headers = Object.assign({ 'X-Session-Token': localStorage.getItem(TOKEN_KEY) || '' }, opts.headers || {});
  if (opts.body && typeof opts.body !== 'string') { headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(opts.body); }
  const r = await fetch(url, Object.assign({ credentials: 'include' }, opts, { headers }));
  let data = null; try { data = await r.json(); } catch (e) { data = { ok: false, error: 'invalid_json_response' }; }
  if (r.status === 401 || r.status === 403) data.__auth_error = true;
  return data;
}

// ====== Bootstrap : 3 phases —
//   1) ?activate=<token> reçu par email → POST /api/superadmin_activate.php (cookie ocre_session) → reload sans param
//   2) cookie session présent → fetch /api/superadmin_session_check.php → bridge X-Session-Token via /api/session_check.php
//   3) sinon → reste sur login form
(async function bootstrap() {
  const params = new URLSearchParams(location.search);
  const activateToken = params.get('activate');
  if (activateToken && /^[a-f0-9]{32,128}$/i.test(activateToken)) {
    // Loader pendant l'echange token
    $('#auth-shell').innerHTML = '<div style="margin:auto;text-align:center"><div class="spin" style="width:32px;height:32px"></div><p class="muted" style="margin-top:14px">Activation du lien…</p></div>';
    try {
      const r = await fetch('/api/superadmin_activate.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ token: activateToken }) });
      const j = await r.json();
      if (r.ok && j.ok) {
        params.delete('activate');
        const next = params.get('next');
        location.replace(next && /^https:\/\/[a-z0-9-]+\.ocre\.immo\//.test(next) ? next : ('/' + (params.toString() ? '?' + params.toString() : '')));
        return;
      }
    } catch (e) {}
    $('#auth-shell').innerHTML = '<div class="auth-card"><h1>Lien expiré ou invalide</h1><p class="lead">Demandez un nouveau lien d\'accès.</p><a class="btn btn-primary" href="/">Retour</a></div>';
    return;
  }
  // Phase 2 : check cookie session existant
  try {
    const r = await fetch('/api/superadmin_session_check.php', { credentials: 'include', cache: 'no-store' });
    const j = await r.json();
    if (j && j.ok && (j.user || {}).role === 'super_admin') {
      // Bridge legacy X-Session-Token pour endpoints qui le checkent (compat helper api())
      try {
        const r2 = await fetch('/api/session_check.php', { credentials: 'include', cache: 'no-store' });
        const j2 = await r2.json();
        if (j2 && j2.ok && j2.session_token) localStorage.setItem(TOKEN_KEY, j2.session_token);
      } catch (e) {}
      // Handler ?next= : redirect SSO vers autre sous-domaine si fourni
      const nextParam = params.get('next');
      if (nextParam && /^https:\/\/[a-z0-9-]+\.ocre\.immo\//.test(nextParam)) {
        location.replace(nextParam);
        return;
      }
      enterApp(j.user);
      return;
    }
  } catch (e) {}
  // Phase 3 : stay on login form (auth-shell visible par defaut)
})();

function renderSparkline(points) {
  if (!points || !points.length) return '<div class="empty-state">Aucune donnée.</div>';
  const W = 720, H = 120, PAD = 24;
  const counts = points.map(p => p.count);
  const max = Math.max(1, ...counts);
  const innerW = W - PAD * 2, innerH = H - PAD * 2;
  const step = innerW / Math.max(1, points.length - 1);
  const xy = (i, v) => [PAD + i * step, PAD + innerH - (v / max) * innerH];
  const path = points.map((p, i) => { const [x, y] = xy(i, p.count); return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1); }).join(' ');
  const area = path + ' L' + (PAD + (points.length - 1) * step).toFixed(1) + ' ' + (PAD + innerH).toFixed(1) + ' L' + PAD.toFixed(1) + ' ' + (PAD + innerH).toFixed(1) + ' Z';
  const dots = points.map((p, i) => { const [x, y] = xy(i, p.count); const lbl = new Date(p.day).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric' }); return `<g><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="#8b5e3c"></circle><title>${esc(lbl)} : ${p.count} signup(s)</title></g>`; }).join('');
  const labels = points.map((p, i) => { const [x] = xy(i, 0); const lbl = new Date(p.day).toLocaleDateString('fr-FR', { weekday: 'short' }).slice(0, 3); return `<text x="${x.toFixed(1)}" y="${(H - 4).toFixed(1)}" text-anchor="middle" font-size="10" fill="#998877">${esc(lbl)}</text>`; }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;max-width:100%;height:auto">
    <defs><linearGradient id="spk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5e3c" stop-opacity=".25"/><stop offset="100%" stop-color="#8b5e3c" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#spk)"></path>
    <path d="${path}" fill="none" stroke="#8b5e3c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>
    ${dots}
    ${labels}
  </svg>`;
}

// Modal resume lisible (PAS de JSON brut). Parse le report retourne par reset_total / reset_partial.
function showResetReport(title, report, isTotal) {
  const items = [];
  if (isTotal) {
    if (report.users_deleted != null) items.push(`<b>${report.users_deleted}</b> utilisateur(s) legacy supprimé(s)`);
    if (report.auth_users_deleted != null) items.push(`<b>${report.auth_users_deleted}</b> auth_user(s) supprimé(s) (Philippe préservé)`);
    if (report.workspaces_dropped != null) items.push(`<b>${report.workspaces_dropped}</b> workspace(s) DROP DATABASE`);
    if (report.orphan_dbs_dropped) items.push(`<b>${report.orphan_dbs_dropped}</b> DB orpheline(s) droppée(s)`);
    if (report.sessions_deleted != null) items.push(`<b>${report.sessions_deleted}</b> session(s) legacy supprimée(s)`);
    if (report.pending_deleted != null) items.push(`<b>${report.pending_deleted}</b> activation(s) pending supprimée(s)`);
    if (Array.isArray(report.auth_tables_truncated) && report.auth_tables_truncated.length) items.push(`Tables vidées : <code style="font-size:11.5px">${report.auth_tables_truncated.join(', ')}</code>`);
    if (report.audit_truncated) items.push(`Audit log truncated`);
  } else {
    if (Array.isArray(report.truncated) && report.truncated.length) items.push(`Tables vidées : <code style="font-size:11.5px">${report.truncated.join(', ')}</code>`);
  }
  const errs = Array.isArray(report.errors) ? report.errors : [];
  const errBlock = errs.length === 0
    ? '<div style="font-size:12px;color:var(--color-success);margin-top:10px">0 erreur</div>'
    : `<div style="font-size:12px;color:var(--color-danger);margin-top:10px"><b>${errs.length} erreur(s) :</b><ul style="margin-top:4px;padding-left:18px">${errs.map(e => `<li style="font-family:ui-monospace,monospace;font-size:11px">${esc(e)}</li>`).join('')}</ul></div>`;
  const root = $('#modal-root');
  root.innerHTML = `<div class="modal-backdrop"><div class="modal">
    <h2><span style="color:var(--color-success);font-size:22px;vertical-align:-2px">✓</span> ${esc(title)}</h2>
    <ul style="list-style:none;padding:0;margin:0 0 6px;font-size:13.5px;color:var(--color-text);line-height:1.8">
      ${items.length ? items.map(t => `<li style="padding:3px 0;border-bottom:1px solid var(--color-border-subtle)">${t}</li>`).join('') : '<li class="muted">Aucune ligne dans le rapport.</li>'}
    </ul>
    ${errBlock}
    <div class="modal-actions" style="margin-top:18px">
      <button class="btn btn-primary" id="report-close" style="width:auto">Fermer</button>
    </div>
  </div></div>`;
  $('#report-close').onclick = () => { root.innerHTML = ''; render('overview'); };
}

// ====== Modals ======
function openConfirm({ title, body, confirmLabel = 'Confirmer', danger = false, onConfirm }) {
  const root = $('#modal-root');
  root.innerHTML = `<div class="modal-backdrop">
    <div class="modal">
      <h2>${esc(title)}</h2>
      <p>${body}</p>
      ${danger ? '<div class="modal-warn">Action irréversible.</div>' : ''}
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Annuler</button>
        <button class="btn ${danger ? 'btn-danger-solid' : 'btn-primary'}" id="modal-confirm" style="width:auto">${esc(confirmLabel)}</button>
      </div>
    </div>
  </div>`;
  $('#modal-cancel').onclick = () => { root.innerHTML = ''; };
  $('#modal-confirm').onclick = async () => {
    const btn = $('#modal-confirm'); btn.disabled = true; btn.innerHTML = '<span class="spin"></span> …';
    try { await onConfirm(); root.innerHTML = ''; }
    catch (e) { btn.disabled = false; btn.textContent = confirmLabel; alert('Erreur : ' + (e.message || e)); }
  };
}

function openTypeToConfirm({ title, body, expected, confirmLabel = 'Confirmer', onConfirm }) {
  const root = $('#modal-root');
  root.innerHTML = `<div class="modal-backdrop">
    <div class="modal">
      <h2>${esc(title)}</h2>
      <p>${body}</p>
      <div class="modal-warn">Tape <b>${esc(expected)}</b> pour autoriser cette action.</div>
      <input type="text" id="modal-input" placeholder="${esc(expected)}" autocomplete="off" autocapitalize="off">
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Annuler</button>
        <button class="btn btn-danger-solid" id="modal-confirm" style="width:auto" disabled>${esc(confirmLabel)}</button>
      </div>
    </div>
  </div>`;
  const inp = $('#modal-input'); const btn = $('#modal-confirm');
  inp.addEventListener('input', () => { btn.disabled = inp.value !== expected; });
  setTimeout(() => inp.focus(), 50);
  $('#modal-cancel').onclick = () => { root.innerHTML = ''; };
  btn.onclick = async () => {
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span> …';
    try { await onConfirm(); root.innerHTML = ''; }
    catch (e) { btn.disabled = false; btn.textContent = confirmLabel; alert('Erreur : ' + (e.message || e)); }
  };
}
