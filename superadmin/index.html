<!-- M/2026/05/08/4 — DESIGN-TOKENS.2.6 link tokens.css -->
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  /* M/2026/05/09/7 (M59-FIX) — Fallback :root pour cas ou /styles/tokens.css ne charge pas (vhost superadmin renvoie text/html MIME -> Safari strict bloque). Sans ces vars, bouton background:var(--color-accent) etait invisible visuellement (pas de couleur). */
  :root {
    --color-bg-page: #FCFAF6;
    --color-text-primary: #2A2018;
    --color-text-muted: #6B5E4A;
    --color-accent: #8B5E3C;
    --color-bg-tint-warm: #FBF1E4;
    --color-bg-tint-soft: #FFFCF5;
    --color-bg-tint-hover: #FFF3EC;
    --color-border-subtle: #E8DDD0;
    --color-border-cream: #EDE6DC;
    --color-text-brown: #6B4429;
    --color-error: #C0392B;
    --color-warning: #D68910;
    --color-success: #2D7A3E;
    --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--color-bg-page); color: var(--color-text-primary); padding: 24px; }
  h1 { font-family: var(--font-serif); color: var(--color-accent); margin-bottom: 6px; font-size: 28px; }
  .banner { background: #FCD5D0; color: #8B0000; padding: 8px 14px; text-align: center; font-weight: 600; margin-bottom: 20px; border-radius: 6px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin: 20px 0; }
  .stat { background: #fff; padding: 18px; border-radius: 10px; border: 1px solid #E5DDC8; text-align: center; }
  .stat-v { font-family: var(--font-serif); font-size: 32px; color: var(--color-accent); font-weight: 700; }
  .stat-l { font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
  table { width: 100%; background: #fff; border-radius: 10px; overflow: hidden; border-collapse: collapse; margin-top: 16px; border: 1px solid #E5DDC8; }
  /* M/2026/05/08/32 — densité tables compact (Linear/Stripe/Notion). */
  th, td { padding: 6px 10px; text-align: left; font-size: 13px; border-bottom: 1px solid #EDE6DC; vertical-align: middle; line-height: 1.35; }
  th { background: var(--color-bg-tint-warm); color: #6B4429; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; padding: 8px 10px; }
  tbody tr { height: 44px; }
  tbody tr:hover { background: var(--color-bg-tint-warm); }
  tbody tr:last-child td { border-bottom: none; }
  /* Bordure gauche colorée pour état (au lieu de fond pleine largeur). */
  td.state-cell { padding: 0; width: 4px; }
  tr.state-green td.state-cell { background: #2D7A3E; }
  tr.state-orange td.state-cell { background: #B8801E; }
  tr.state-red td.state-cell { background: #C73E3E; }
  /* Actions icônes alignées 1 ligne. */
  td.actions { white-space: nowrap; text-align: right; }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; padding: 0; margin: 0 2px; border: 1px solid transparent; background: transparent; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 15px; line-height: 1; opacity: 0.7; transition: opacity 120ms, background 120ms; }
  .icon-btn:hover { opacity: 1; background: var(--color-bg-page); }
  .icon-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
  .icon-btn.danger:hover { background: #FBEAEA; }
  .mono-tel { font-variant-numeric: tabular-nums; font-size: 12.5px; color: var(--color-text-primary); }
  .col-date { font-variant-numeric: tabular-nums; font-size: 12.5px; color: #6B5E4A; }
  .col-attempts { text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; }
  .col-provider { font-size: 11.5px; color: #6B5E4A; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-email { font-weight: 500; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-name { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Mobile : scroll horizontal avec colonnes sticky. */
  @media (max-width: 760px) {
    table { display: block; overflow-x: auto; }
    tbody tr { height: 52px; }
  }
  /* M/2026/05/08/46 — Modale custom (Reset TOTAL) compatible iPad Safari (qui peut bloquer confirm/prompt en cascade). */
  .sa-modal-overlay { position: fixed; inset: 0; background: rgba(60,40,20,0.55); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .sa-modal { background: #fff; border-radius: 12px; max-width: 520px; width: 100%; padding: 24px 26px; box-shadow: 0 20px 60px rgba(60,40,20,0.30); font-family: var(--font-sans); }
  .sa-modal h2 { font-family: var(--font-serif); font-style: italic; font-size: 22px; color: #C73E3E; margin: 0 0 12px; }
  .sa-modal p { font-size: 14px; line-height: 1.5; color: var(--color-text-primary); margin-bottom: 12px; }
  .sa-modal .danger-list { font-size: 12.5px; color: #6B5E4A; background: #FEF3C7; border-left: 3px solid #B8801E; padding: 10px 12px; margin: 12px 0; line-height: 1.6; }
  .sa-modal input[type=text] { width: 100%; padding: 11px 13px; border: 1.5px solid #E8DDC9; border-radius: 8px; font-size: 14px; font-family: inherit; background: #FDFAF7; color: var(--color-text-primary); margin: 8px 0 4px; outline: none; }
  .sa-modal input[type=text]:focus { border-color: var(--color-accent); background: #fff; }
  .sa-modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .sa-modal-btn { padding: 10px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; border: 1px solid; }
  .sa-modal-btn.cancel { background: #fff; color: var(--color-text-muted); border-color: #E5DDC8; }
  .sa-modal-btn.danger { background: #C73E3E; color: #fff; border-color: #C73E3E; }
  .sa-modal-btn.danger:hover { background: #8B0000; }
  .sa-modal-btn.danger:disabled { opacity: 0.4; cursor: not-allowed; }
  .sa-modal-result { font-family: ui-monospace, monospace; background: #FBF1E4; padding: 10px 12px; border-radius: 6px; font-size: 12px; line-height: 1.6; max-height: 200px; overflow-y: auto; white-space: pre-wrap; margin: 12px 0; }
  /* M/2026/05/08/44 — table responsive iPad : table-layout fixed + col widths % évite scroll horizontal sur 1024px. */
  table.sa-table-fixed { table-layout: fixed; width: 100%; }
  table.sa-table-fixed td, table.sa-table-fixed th { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  table.sa-table-fixed .sa-date-cell { white-space: normal; line-height: 1.25; font-size: 11.5px; }
  table.sa-table-fixed .sa-date-cell div { font-variant-numeric: tabular-nums; }
  /* En mobile, on libère table-layout pour permettre le scroll horizontal natif. */
  @media (max-width: 760px) {
    table.sa-table-fixed { table-layout: auto; min-width: 720px; }
  }
  /* M/2026/05/08/33 — Outils nettoyage. */
  .write-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; font-family: inherit; font-size: 11px; color: var(--color-text-muted); cursor: pointer; margin-right: 8px; }
  .write-toggle.on { background: #FEE2E2; color: #C73E3E; border-color: #FCA5A5; font-weight: 600; }
  .write-toggle.on::before { content: '🔓'; }
  .write-toggle:not(.on)::before { content: '🔒'; }
  td.col-checkbox, th.col-checkbox { width: 30px; text-align: center; padding: 6px 4px; }
  td.col-checkbox input, th.col-checkbox input { cursor: pointer; }
  .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid var(--color-accent); padding: 12px 24px; box-shadow: 0 -4px 16px rgba(60,40,20,0.08); display: none; align-items: center; gap: 12px; z-index: 200; }
  .action-bar.visible { display: flex; }
  .action-bar .count { font-weight: 600; color: var(--color-text-primary); }
  .action-bar button { padding: 8px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; border: 1px solid; }
  .action-bar .btn-danger { background: #C73E3E; color: #fff; border-color: #C73E3E; }
  .action-bar .btn-danger:hover { background: #A02828; }
  .action-bar .btn-cancel { background: #fff; color: var(--color-text-muted); border-color: #E5DDC8; }
  .reset-zone { margin-top: 24px; padding: 16px; border: 2px dashed #FCA5A5; border-radius: 8px; background: #FFF5F5; }
  .reset-zone .reset-label { font-size: 12px; color: #6B5E4A; font-style: italic; margin-bottom: 8px; }
  .reset-btn { padding: 10px 16px; background: #fff; color: #C73E3E; border: 1.5px solid #C73E3E; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; }
  .reset-btn:hover { background: #C73E3E; color: #fff; }
  .reset-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .reset-total-zone { margin-top: 32px; padding: 24px; border: 3px solid #C73E3E; border-radius: 12px; background: #FEE2E2; }
  .reset-total-zone h3 { color: #C73E3E; font-family: var(--font-serif); font-style: italic; margin-bottom: 8px; }
  .reset-total-zone p { font-size: 12px; color: #6B5E4A; margin-bottom: 12px; }
  .reset-total-btn { padding: 14px 24px; background: #C73E3E; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; }
  .reset-total-btn:hover { background: #8B0000; }
  .reset-total-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login { max-width: 380px; margin: 80px auto; padding: 30px; background: #fff; border-radius: 12px; border: 1px solid #E5DDC8; }
  .login input { width: 100%; padding: 10px 12px; border: 1px solid #B89968; border-radius: 6px; margin-bottom: 10px; font-family: inherit; font-size: 16px; }
  .login button { width: 100%; padding: 12px; background: var(--color-accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 600; }
  .login button:disabled { background: #C9B698; cursor: not-allowed; opacity: 0.85; }
  /* M/2026/05/09/6 — accessibilite clavier iOS : viewport reduit -> margin haut diminue pour garder bouton visible. */
  @media (max-height: 600px) {
    .login { margin: 16px auto; padding: 18px; }
    .login h1 { margin-bottom: 4px; font-size: 22px; }
  }
  @keyframes oi-spin { to { transform: rotate(360deg); } }
  .oi-spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: oi-spin 0.7s linear infinite; vertical-align: -2px; margin-right: 6px; }
  /* M/2026/05/07/96.1bis — fix oeil debordait bouton Se connecter sur iPad. ROOT CAUSE : selecteur .login button (specificite 0,1,1) plus fort que .pwd-eye (0,1,0) -> .pwd-eye heritait width:100% + padding:12px + background:var(--color-accent) du bouton login = bouton geant qui debordait sur le bouton suivant. FIX : selecteur .login button.pwd-eye (0,2,1) gagne en specificite. wrapper porte margin (pas input), padding-right reserve zone oeil, centrage top:50% translateY -50% independant hauteur input, z-index 2 modere. */
  .pwd-wrap { position: relative; margin-bottom: 10px; }
  .login .pwd-wrap input { margin-bottom: 0; padding-right: 44px; }
  .login button.pwd-eye { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; padding: 0; margin: 0; background: transparent; border: none; color: var(--color-accent); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; -webkit-appearance: none; appearance: none; box-shadow: none; font-weight: 400; }
  .login button.pwd-eye:hover { color: #6B4429; background: transparent; }
  .login button.pwd-eye svg { width: 18px; height: 18px; display: block; pointer-events: none; }
  .forgot { display: block; text-align: center; margin-top: 10px; color: var(--color-accent); font-size: 12px; font-style: italic; cursor: pointer; text-decoration: none; }
  .forgot:hover { text-decoration: underline; }
  .reset-form { margin-top: 12px; padding: 12px; background: #FBF1E4; border-radius: 8px; }
  .reset-form input { margin-bottom: 0; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { padding: 8px 14px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; }
  .tab.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .filters select, .filters input { padding: 6px 10px; border: 1px solid #E5DDC8; border-radius: 6px; font-family: inherit; font-size: 12px; }
  .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
  .pagination button { padding: 6px 12px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; }
  .pagination button.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
  .badge-brouillon { color: #B91C1C; background: #FEE2E2; border: 1px solid #FCA5A5; }
  .badge-archive { color: #6B5E4A; background: #EDE6DC; border: 1px solid #D9C9A8; }
  .badge-enregistre { color: #2D7A3E; background: #D1FAE5; border: 1px solid #6EE7B7; }
  .logout { float: right; padding: 6px 12px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--color-accent); }
  .search-btn { float: right; margin-right: 8px; padding: 6px 14px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; color: var(--color-accent); display: inline-flex; align-items: center; gap: 6px; }
  .search-btn kbd { font-family: ui-monospace, monospace; font-size: 10px; padding: 1px 5px; background: #F5EDDF; border: 1px solid #D9C9A8; border-radius: 3px; color: #6B4429; }
  .cmdk-overlay { position: fixed; inset: 0; background: rgba(60,40,20,0.4); z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; }
  .cmdk-modal { width: 100%; max-width: 580px; background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(60,40,20,0.25); overflow: hidden; }
  .cmdk-input { width: 100%; padding: 18px 20px; border: none; outline: none; font-size: 16px; font-family: inherit; border-bottom: 1px solid #E5DDC8; }
  .cmdk-results { max-height: 460px; overflow-y: auto; padding: 6px 0; }
  .cmdk-cat { font-size: 10px; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 16px 4px; }
  .cmdk-row { padding: 9px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
  .cmdk-row:hover, .cmdk-row.active { background: #FBF1E4; }
  .cmdk-row .lbl { font-size: 13px; font-weight: 600; color: var(--color-text-primary); }
  .cmdk-row .sub { font-size: 11px; color: var(--color-text-muted); }
  .cmdk-empty { padding: 30px; text-align: center; color: var(--color-text-muted); font-size: 13px; font-style: italic; }
  /* M/2026/05/08/35 — Refonte présentation Console super-admin (hiérarchie + sections + élégance Ocre). */
  body { padding: 32px 24px; }
  .sa-shell { max-width: 1280px; margin: 0 auto; }
  .sa-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .sa-titles h1 { font-family: var(--font-serif); font-style: italic; font-weight: 500; font-size: 32px; color: var(--color-text-primary); margin: 0 0 4px; line-height: 1.2; }
  .sa-titles .sa-subtitle { font-family: var(--font-sans); font-size: 14px; color: var(--color-text-muted); font-style: italic; line-height: 1.4; }
  .sa-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .sa-mode-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .sa-mode-badge.read { background: #EDE6DC; color: #6B5E4A; }
  .sa-mode-badge.write { background: #FEE2E2; color: #C73E3E; }
  .sa-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: #fff; border: 1px solid #E5DDC8; border-radius: 6px; font-size: 12px; color: var(--color-accent); text-decoration: none; cursor: pointer; transition: background 150ms, border-color 150ms; }
  .sa-link:hover { background: var(--color-bg-tint-warm); border-color: var(--color-border-medium); }
  .sa-link kbd { font-family: ui-monospace, monospace; font-size: 10px; padding: 1px 5px; background: #F5EDDF; border: 1px solid #D9C9A8; border-radius: 3px; color: #6B4429; }
  /* Tabs nav unifiée. */
  /* M/2026/05/08/46 → 49 — flex-wrap nowrap + scroll horizontal. Multi-defense rendering :
     - font-weight identique entre actif/inactif (pas de width shift qui ré-aligne le scroll)
     - background ocre + color blanc + box-shadow inset redondance
     - bordure bottom 3px en plus comme indicateur visuel anti-bug Safari iPad
     - scrollIntoView retiré (cause potentielle de mauvais positionnement Safari iPad). */
  .sa-tabs { display: flex; gap: 2px; padding: 4px; background: #fff; border: 1px solid var(--color-border-subtle); border-radius: 12px; margin-bottom: 28px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: thin; max-width: 100%; min-width: 0; }
  .sa-tabs::-webkit-scrollbar { height: 4px; }
  .sa-tabs::-webkit-scrollbar-thumb { background: var(--color-border-subtle); border-radius: 2px; }
  .sa-tab { display: inline-flex; align-items: center; padding: 9px 16px; border: none; background: transparent; color: var(--color-text-muted); font-family: inherit; font-size: 13.5px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: background 150ms ease, color 150ms ease; flex-shrink: 0; white-space: nowrap; min-width: max-content; border-bottom: 3px solid transparent; box-sizing: border-box; }
  .sa-tab:hover { background: var(--color-bg-tint-warm); color: var(--color-text-primary); }
  .sa-tab.active { background: var(--color-accent) !important; color: #fff !important; font-weight: 500; box-shadow: inset 0 0 0 1px var(--color-accent); border-bottom-color: var(--color-ocre-700, #5C3E27); }
  /* Sections groupées Vue d'ensemble. */
  .sa-section { margin-bottom: 32px; }
  .sa-section-title { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 0; border-top: 1px solid var(--color-border-subtle); margin-bottom: 16px; }
  .sa-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  .sa-card { background: #fff; border: 1px solid var(--color-border-subtle); border-top: 3px solid var(--color-text-muted); border-radius: 10px; padding: 20px 22px; transition: box-shadow 150ms, transform 150ms, border-top-width 150ms; position: relative; }
  .sa-card:hover { box-shadow: 0 2px 12px rgba(60,40,20,0.06); }
  /* M/2026/05/08/37 — cards cliquables avec hover + flèche indicateur. */
  .sa-card.clickable { cursor: pointer; }
  .sa-card.clickable:hover { transform: translateY(-2px); border-top-width: 4px; box-shadow: 0 4px 18px rgba(60,40,20,0.10); }
  .sa-card.clickable:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }
  .sa-card.clickable .sa-card-arrow { position: absolute; bottom: 12px; right: 14px; font-size: 14px; color: var(--color-text-muted); opacity: 0.4; transition: opacity 150ms, transform 150ms; }
  .sa-card.clickable:hover .sa-card-arrow { opacity: 1; transform: translateX(2px); }
  .sa-card.is-empty { opacity: 0.7; }
  .sa-card.accent-ocre { border-top-color: var(--color-accent); }
  .sa-card.accent-success { border-top-color: var(--color-success); }
  .sa-card.accent-warning { border-top-color: var(--color-warning); }
  .sa-card.accent-muted { border-top-color: var(--color-border-medium); }
  .sa-card-value { font-family: var(--font-serif); font-size: 36px; font-weight: 500; color: var(--color-text-primary); line-height: 1.1; font-variant-numeric: tabular-nums; }
  .sa-card-label { font-size: 11px; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px; }
  .sa-card-desc { font-size: 12px; color: var(--color-text-muted); font-style: italic; margin-top: 4px; line-height: 1.4; }

  .sa-tech-zone .sa-tech-label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .sa-tech-zone .sa-tech-warn { font-size: 13px; color: var(--color-text-brown); font-style: italic; margin-bottom: 14px; line-height: 1.5; }

</style>

<body>
<div id="root"><div class="login" id="login">
  <!-- M/2026/05/09/6 — Etat 1 (form) ou Etat 2 (confirmation) selon flag JS. -->
  <div id="form-state">
    <h1>Super-admin</h1>
    <p style="color:#6B5E4A;margin-bottom:14px;font-size:13px">Entrez votre email super-administrateur, recevez un lien d'accès direct au dashboard.</p>
    <form id="magic-form" autocomplete="on" novalidate>
      <input id="email" type="email" placeholder="Email super-admin" autocomplete="email" inputmode="email" required>
      <button id="btn-submit" type="submit" disabled>Demander un lien d'accès</button>
    </form>
    <p id="err" style="color:#8B0000;font-size:12px;margin-top:10px;min-height:14px"></p>
  </div>
  <div id="confirm-state" style="display:none;text-align:center">
    <div style="font-size:54px;line-height:1;margin:8px 0 14px">✉️</div>
    <h1 style="margin-bottom:6px">Lien envoyé</h1>
    <p style="color:#3a2e22;font-size:14px;margin-bottom:14px;line-height:1.5">Un lien d'accès vient d'être envoyé à <b id="confirm-email"></b>. Vérifie ta boîte mail. Le lien est valide 24h.</p>
    <button id="btn-resend" type="button" disabled style="background:transparent;color:var(--color-accent);border:1.5px solid var(--color-accent);font-weight:600">Disponible dans 60s</button>
    <p style="margin-top:14px;font-size:13px;color:#6B5E4A"><a id="link-other-email" href="#" style="color:var(--color-accent);text-decoration:underline;cursor:pointer">Utiliser un autre email</a></p>
    <p id="resend-msg" style="color:#2D7A3E;font-size:12px;margin-top:8px;min-height:14px"></p>
  </div>
</div></div>

<script>
// M/2026/05/09/75 — auth super-admin via magic link only (cookie ocre_session M71).
// Pas de password, pas de localStorage token (cookie HttpOnly gere par le navigateur).
// Conserve TOKEN_KEY localStorage pour compat headers X-Session-Token (legacy bridge endpoints).
const TOKEN_KEY = 'ocre_sa_token';
const api = (url, opts = {}) => {
  opts.headers = Object.assign({}, opts.headers || {}, { 'X-Session-Token': localStorage.getItem(TOKEN_KEY) || '' });
  opts.credentials = 'include';
  if (opts.body && typeof opts.body !== 'string') { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(opts.body); }
  return fetch(url, opts).then(r => r.json());
};
// M/2026/05/09/6 — pattern UX magic link Stripe/Vercel/Notion : 1 clic = 1 envoi, ecran confirmation, cooldown 60s.
let isSubmitting = false;
let lastEmail = '';
let cooldownTimer = null;
const SUBMIT_BTN_DEFAULT = "Demander un lien d'accès";
const SUBMIT_BTN_SENDING = '<span class="oi-spin"></span>Envoi en cours…';
const RESEND_COOLDOWN_S = 60;
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function setSubmitEnabled(enabled) {
  const btn = document.getElementById('btn-submit');
  if (!btn) return;
  btn.disabled = !enabled;
}
function emailValid(v) { return EMAIL_RE.test((v || '').trim()); }
function bindForm() {
  const emailEl = document.getElementById('email');
  const errEl = document.getElementById('err');
  const formEl = document.getElementById('magic-form');
  if (!emailEl || !formEl) return;
  emailEl.addEventListener('input', () => {
    setSubmitEnabled(emailValid(emailEl.value));
    if (errEl.textContent) errEl.textContent = '';
  });
  formEl.addEventListener('submit', (e) => { e.preventDefault(); doSendMagicLink(); });
}
async function doSendMagicLink() {
  if (isSubmitting) return;
  const emailEl = document.getElementById('email');
  const errEl = document.getElementById('err');
  const btn = document.getElementById('btn-submit');
  const email = emailEl.value.trim();
  errEl.textContent = '';
  if (!emailValid(email)) { errEl.textContent = 'Email invalide.'; return; }
  isSubmitting = true;
  setSubmitEnabled(false);
  btn.innerHTML = SUBMIT_BTN_SENDING;
  emailEl.disabled = true;
  try {
    const r = await fetch('/api/superadmin_send_magic_link.php', {method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({email})});
    await r.json();
    lastEmail = email;
    showConfirmState(email);
  } catch (e) {
    errEl.textContent = 'Impossible d’envoyer pour le moment. Réessayez.';
    btn.innerHTML = SUBMIT_BTN_DEFAULT;
    emailEl.disabled = false;
    setSubmitEnabled(emailValid(emailEl.value));
    isSubmitting = false;
  }
}
function showConfirmState(email) {
  document.getElementById('form-state').style.display = 'none';
  document.getElementById('confirm-state').style.display = '';
  document.getElementById('confirm-email').textContent = email;
  document.getElementById('resend-msg').textContent = '';
  startResendCooldown();
}
function showFormState() {
  if (cooldownTimer) { clearInterval(cooldownTimer); cooldownTimer = null; }
  isSubmitting = false;
  document.getElementById('confirm-state').style.display = 'none';
  document.getElementById('form-state').style.display = '';
  const emailEl = document.getElementById('email');
  emailEl.value = '';
  emailEl.disabled = false;
  document.getElementById('btn-submit').innerHTML = SUBMIT_BTN_DEFAULT;
  setSubmitEnabled(false);
  document.getElementById('err').textContent = '';
  emailEl.focus();
}
function startResendCooldown() {
  const btn = document.getElementById('btn-resend');
  if (!btn) return;
  btn.disabled = true;
  let s = RESEND_COOLDOWN_S;
  btn.textContent = 'Disponible dans ' + s + 's';
  if (cooldownTimer) clearInterval(cooldownTimer);
  cooldownTimer = setInterval(() => {
    s -= 1;
    if (s <= 0) {
      clearInterval(cooldownTimer); cooldownTimer = null;
      btn.disabled = false;
      btn.textContent = 'Renvoyer un lien';
    } else {
      btn.textContent = 'Disponible dans ' + s + 's';
    }
  }, 1000);
}
async function doResendMagicLink() {
  if (!lastEmail) return;
  const btn = document.getElementById('btn-resend');
  const msg = document.getElementById('resend-msg');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  const orig = btn.textContent;
  btn.innerHTML = '<span class="oi-spin" style="border-color:rgba(139,94,60,0.3);border-top-color:var(--color-accent)"></span>Envoi…';
  msg.style.color = '#2D7A3E';
  msg.textContent = '';
  try {
    const r = await fetch('/api/superadmin_send_magic_link.php', {method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({email: lastEmail})});
    const j = await r.json().catch(() => ({}));
    if (j && j.error === 'RATE_LIMIT') {
      msg.style.color = '#8B0000';
      msg.textContent = 'Trop de demandes, réessayez dans quelques minutes.';
      btn.textContent = orig;
      btn.disabled = false;
    } else {
      msg.textContent = 'Lien renvoyé.';
      startResendCooldown();
    }
  } catch (e) {
    msg.style.color = '#8B0000';
    msg.textContent = 'Impossible d’envoyer. Réessayez.';
    btn.textContent = orig;
    btn.disabled = false;
  }
}
function bindConfirm() {
  const btn = document.getElementById('btn-resend');
  const lnk = document.getElementById('link-other-email');
  if (btn) btn.addEventListener('click', doResendMagicLink);
  if (lnk) lnk.addEventListener('click', (e) => { e.preventDefault(); showFormState(); });
}
// Bind initial au DOM ready (script charge en bas de body, OK direct).
bindForm();
bindConfirm();
async function logout() {
  try { await fetch('/api/logout.php', {method:'POST', credentials:'include'}); } catch (e) {}
  localStorage.removeItem(TOKEN_KEY);
  location.reload();
}
let currentTab = 'overview';
let clientsState = {page: 1, perPage: 50, workspace: '', profil: '', statut: '', q: ''};

// M/2026/05/08/35 → 37 — Sous-titres dynamiques contextuels + 2 nouveaux onglets Sessions/Users.
const TAB_SUBTITLES = {
  overview: 'État global du système Ocre Immo',
  workspaces: 'Espaces actifs · gestion des comptes agents',
  clients: 'Clients inscrits · vue cross-workspaces',
  pending: 'Agents en attente d\'activation · action requise',
  audit: 'Historique des actions super-admin · 24h',
  sessions: 'Sessions actives · connexions courantes',
  users: 'Tous les users · cross-workspace',
};
const TAB_LABELS = {
  overview: 'Vue d\'ensemble',
  workspaces: 'Workspaces',
  clients: 'Clients',
  pending: 'Inscriptions en attente',
  audit: 'Audit récent',
  sessions: 'Sessions',
  users: 'Users',
};
const TAB_ORDER = ['overview', 'workspaces', 'clients', 'users', 'sessions', 'pending', 'audit'];

// Hash routing : URL #tab synchronise l'onglet actif.
function parseHashTab() {
  const h = (location.hash || '').replace(/^#/, '').split('?')[0];
  return TAB_ORDER.indexOf(h) >= 0 ? h : 'overview';
}
function goToTab(tab) {
  if (TAB_ORDER.indexOf(tab) < 0) return;
  if (location.hash !== '#' + tab) location.hash = '#' + tab;
  // hashchange listener s'occupe du reste.
}
window.addEventListener('hashchange', () => {
  const newTab = parseHashTab();
  if (newTab !== currentTab) {
    currentTab = newTab;
    document.querySelectorAll('.sa-tab').forEach(x => x.classList.toggle('active', x.dataset.t === newTab));
    const lbl = document.getElementById('sa-tab-label'); if (lbl) lbl.textContent = TAB_LABELS[newTab];
    const sub = document.getElementById('sa-subtitle'); if (sub) sub.textContent = TAB_SUBTITLES[newTab];
    loadTab(newTab);
    // M/2026/05/08/49 — scrollIntoView RETIRÉ (cause potentielle bug Safari iPad qui scrollait
    // le parent jusqu'à masquer le tab actif). Préférence : scroll horizontal manuel via overflow-x auto.
    // Auto-scroll plus subtil : aligner le tab dans la barre, mais SANS toucher au scroll de la PAGE.
    const tabsBar = document.querySelector('.sa-tabs');
    const activeTab = document.querySelector('.sa-tab.active');
    if (tabsBar && activeTab) {
      const left = activeTab.offsetLeft - (tabsBar.clientWidth - activeTab.offsetWidth) / 2;
      try { tabsBar.scrollTo({left: Math.max(0, left), behavior: 'smooth'}); } catch (_) {}
    }
  }
});

async function renderConsole() {
  const root = document.getElementById('root');
  const writeOn = localStorage.getItem('ocre_sa_write_mode') === '1';
  // Sync currentTab depuis le hash si présent (boot avec hash routing).
  currentTab = parseHashTab();
  const tabsHtml = TAB_ORDER.map(t =>
    `<button class="sa-tab${t === currentTab ? ' active' : ''}" data-t="${t}">${TAB_LABELS[t]}</button>`
  ).join('');
  root.innerHTML =
    '<div class="sa-shell">'
    + '<div class="sa-header">'
      + '<div class="sa-titles">'
        + '<h1>Console super-admin</h1>'
        + '<div class="sa-subtitle"><span id="sa-tab-label">' + TAB_LABELS[currentTab] + '</span> · <span id="sa-subtitle">' + TAB_SUBTITLES[currentTab] + '</span></div>'
      + '</div>'
      + '<div class="sa-actions">'
        + '<span class="sa-mode-badge ' + (writeOn ? 'write' : 'read') + '" id="mode-badge">' + (writeOn ? '🔓 Lecture/Écriture' : '🔒 Lecture seule') + '</span>'
        + '<button class="write-toggle ' + (writeOn ? 'on' : '') + '" onclick="toggleWriteMode()" title="Active les actions destructives">' + (writeOn ? 'Écriture activée' : 'Activer écriture') + '</button>'
        + '<button class="sa-link" onclick="openCmdK()">🔍 Rechercher <kbd>⌘K</kbd></button>'
        + '<a class="sa-link" href="/superadmin/atelier-live.html">⚡ Atelier (live) <kbd>MVP</kbd></a>'
        + '<button class="sa-link" onclick="logout()" style="color:var(--color-text-muted)">Se déconnecter</button>'
      + '</div>'
    + '</div>'
    + '<div class="sa-tabs">' + tabsHtml + '</div>'
    + '<div id="content"></div>'
    + '</div>';
  document.querySelectorAll('.sa-tab').forEach(t => t.addEventListener('click', e => {
    const target = e.target.dataset.t;
    if (location.hash === '#' + target) {
      // Re-render quand même si même hash (cas où rien à changer).
      loadTab(target);
    } else {
      goToTab(target);
    }
  }));
  loadTab(currentTab);
}
async function loadTab(t) {
  const c = document.getElementById('content');
  c.innerHTML = '<p style="color:#6B5E4A">Chargement…</p>';
  if (t === 'overview') {
    const r = await api('/api/superadmin_v20.php?action=overview');
    if (!r.ok) { c.textContent = r.error; return; }
    const s = r.stats || {};
    // M/2026/05/08/35 → 37 — Cards regroupées + cliquables (raccourcis vers détails via hash routing).
    const card = (key, label, desc, accent, target, ariaLabel) => {
      const v = s[key] !== undefined ? s[key] : 0;
      const empty = (v === 0) ? ' is-empty' : '';
      const clickable = target ? ' clickable' : '';
      const onclick = target ? ` onclick="goToTab('${target}')" tabindex="0" role="button" aria-label="${ariaLabel || label}" onkeydown="if(event.key==='Enter')goToTab('${target}')"` : '';
      const arrow = target ? '<span class="sa-card-arrow" aria-hidden="true">→</span>' : '';
      return `<div class="sa-card accent-${accent}${clickable}${empty}"${onclick}><div class="sa-card-value">${v}</div><div class="sa-card-label">${label}</div>${desc ? `<div class="sa-card-desc">${desc}</div>` : ''}${arrow}</div>`;
    };
    const pendingAccent = (s.pending_ruptures || 0) > 0 ? 'warning' : 'muted';
    c.innerHTML =
      '<section class="sa-section">'
        + '<div class="sa-section-title">Espaces & Utilisateurs</div>'
        + '<div class="sa-cards">'
          + card('workspaces', 'Workspaces', 'total créés', 'ocre', 'workspaces', 'Voir tous les workspaces')
          + card('wsp_active', 'WSP actifs', 'profils agents', 'ocre', 'workspaces', 'Voir les workspaces agents')
          + card('wsc_active', 'WSC actifs', 'profils clients', 'success', 'clients', 'Voir tous les clients')
          + card('users', 'Users', 'comptes inscrits', 'muted', 'users', 'Voir tous les users cross-workspace')
        + '</div>'
      + '</section>'
      + '<section class="sa-section">'
        + '<div class="sa-section-title">Activité temps réel</div>'
        + '<div class="sa-cards">'
          + card('sessions_active', 'Sessions actives', 'connexions courantes', 'success', 'sessions', 'Voir les sessions actives')
          + card('pending_ruptures', 'Pending ruptures', 'demandes à exécuter', pendingAccent, 'pending', 'Voir les inscriptions en attente')
          + card('super_admin_actions_24h', 'Actions super-admin', 'dernières 24h', 'ocre', 'audit', 'Voir l\'audit récent')
        + '</div>'
      + '</section>'
      + '<section class="sa-tech-zone">'
        + '<div class="sa-tech-label">Zone technique (mode test)</div>'
        + '<div class="sa-tech-warn">⚠️ Outils destructifs réservés à la phase de test. Désactiver après lancement officiel.</div>'
        + '<button class="reset-total-btn" onclick="resetTotal()">🔥 Reset TOTAL provisoire</button>'
      + '</section>';
  } else if (t === 'workspaces') {
    const r = await api('/api/superadmin_v20.php?action=workspaces');
    selection.workspaces.clear();
    c.innerHTML = '<table><thead><tr>'
      + '<th class="col-checkbox"><input type="checkbox" id="cb-all-workspaces" onchange="toggleAllSelection(\'workspaces\', this.checked)"></th>'
      + '<th>Slug</th><th>Type</th><th>Nom</th><th>Pays</th><th style="text-align:center">Membres</th><th>Créé</th><th style="text-align:center">Archivé</th></tr></thead><tbody>'
      + (r.workspaces || []).map(w =>
        `<tr data-workspaces-id="${w.id}"><td class="col-checkbox"><input type="checkbox" onchange="toggleRowSelection('workspaces', ${w.id}, this.checked)"></td><td><b>${w.slug}</b></td><td><span style="font-size:11px;color:#6B5E4A;text-transform:uppercase">${w.type}</span></td><td class="col-name" title="${(w.display_name||'').replace(/"/g,'&quot;')}">${w.display_name}</td><td class="col-date">${w.country_code || '—'}</td><td class="col-attempts">${w.members_count}</td><td class="col-date" title="${w.created_at||''}">${(w.created_at || '').slice(0, 10).replace(/(\d{4})-(\d{2})-(\d{2})/, '$3/$2/$1')}</td><td style="text-align:center">${w.archived_at ? '✓' : '—'}</td></tr>`
      ).join('') + '</tbody></table>'
      + '<div class="reset-zone"><div class="reset-label">⚠️ Mode test uniquement — désactiver après lancement officiel.</div><button class="reset-btn" onclick="tabReset(\'reset_workspaces\', \'TOUS les workspaces (DROP DB tenant)\')">🔥 Reset Workspaces</button></div>';
    updateActionBar('workspaces');
  } else if (t === 'clients') {
    await renderClientsTab();
  } else if (t === 'pending') {
    await renderPendingTab();
  } else if (t === 'sessions') {
    await renderSessionsTab();
  } else if (t === 'users') {
    await renderUsersTab();
  } else if (t === 'audit') {
    const r = await api('/api/superadmin_v20.php?action=audit_recent');
    c.innerHTML = '<table><thead><tr><th>Date</th><th>Workspace</th><th>Acteur</th><th>Action</th><th>Cible</th></tr></thead><tbody>'
      + (r.events || []).map(e => {
        const dt = (e.created_at || '').replace('T', ' ');
        const m = dt.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
        const dtCompact = m ? `${m[3]}/${m[2]} ${m[4]}:${m[5]}` : dt.slice(0, 16);
        return `<tr><td class="col-date" title="${e.created_at||''}">${dtCompact}</td><td><b>${e.workspace_slug || '—'}</b></td><td class="col-email">${e.email || '—'}</td><td>${e.action}</td><td class="col-provider">${e.target_type || ''} ${e.target_id || ''}</td></tr>`;
      }).join('') + '</tbody></table>'
      + '<div class="reset-zone"><div class="reset-label">⚠️ Mode test uniquement — désactiver après lancement officiel.</div><button class="reset-btn" onclick="tabReset(\'reset_audit\', \'audit récent (TRUNCATE super_admin_events)\')">🔥 Reset Audit récent</button></div>';
  }
}
async function renderClientsTab() {
  const c = document.getElementById('content');
  const qs = new URLSearchParams({page: clientsState.page, per_page: clientsState.perPage,
    workspace: clientsState.workspace, profil: clientsState.profil, statut: clientsState.statut, q: clientsState.q}).toString();
  const r = await api('/api/superadmin_clients.php?action=list&' + qs);
  if (!r.ok) { c.textContent = r.error || 'Erreur'; return; }
  const wspOpts = '<option value="">Tous workspaces</option>' + (r.workspaces || []).map(w => `<option value="${w.slug}"${w.slug===clientsState.workspace?' selected':''}>${w.slug}</option>`).join('');
  const profilOpts = '<option value="">Tous profils</option>' + ['Acheteur','Vendeur','Locataire','Bailleur','Investisseur','Promoteur','MarchandBiens','Curieux'].map(p => `<option value="${p}"${p===clientsState.profil?' selected':''}>${p}</option>`).join('');
  const statutOpts = '<option value="">Tous statuts</option>' + [['brouillon','Brouillon'],['enregistre','Enregistré'],['archive','Archivé']].map(([k,l]) => `<option value="${k}"${k===clientsState.statut?' selected':''}>${l}</option>`).join('');
  const filters = `<div class="filters">
    <select id="f-wsp" onchange="filterClient('workspace', this.value)">${wspOpts}</select>
    <select id="f-profil" onchange="filterClient('profil', this.value)">${profilOpts}</select>
    <select id="f-statut" onchange="filterClient('statut', this.value)">${statutOpts}</select>
    <input id="f-q" type="text" placeholder="Recherche nom client..." value="${clientsState.q}" oninput="searchDebounced(this.value)" style="flex:1;min-width:180px"/>
  </div>`;
  const tableHead = '<table><thead><tr><th>Workspace</th><th>Nom</th><th>Société</th><th>Profil</th><th>Statut</th><th>Modifié</th></tr></thead><tbody>';
  const rows = (r.clients || []).map(cl => {
    const sBadge = `<span class="badge badge-${cl.statut}">${cl.statut}</span>`;
    const u = (cl.updated_at || '').replace('T', ' ');
    const m = u.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
    const updated = m ? `${m[3]}/${m[2]} ${m[4]}:${m[5]}` : u.slice(0, 16);
    return `<tr><td><b>${cl.workspace_slug}</b></td><td class="col-name" title="${(cl.nom_complet||'').replace(/"/g,'&quot;')}">${cl.nom_complet || '<i style="color:#A89882">(sans nom)</i>'}</td><td class="col-name">${cl.societe || '—'}</td><td>${cl.profil || '—'}</td><td>${sBadge}</td><td class="col-date" title="${cl.updated_at||''}">${updated}</td></tr>`;
  }).join('');
  const tableEnd = '</tbody></table>';
  let pagination = '';
  if (r.pages > 1) {
    pagination = '<div class="pagination">';
    for (let p = 1; p <= r.pages; p++) {
      pagination += `<button class="${p===r.page?'active':''}" onclick="gotoPage(${p})">${p}</button>`;
    }
    pagination += `<span style="font-size:11px;color:var(--color-text-muted);align-self:center;margin-left:8px">${r.total} clients</span></div>`;
  } else {
    pagination = `<p style="text-align:center;color:var(--color-text-muted);font-size:11px;margin-top:12px">${r.total} client${r.total>1?'s':''}</p>`;
  }
  c.innerHTML = filters + tableHead + rows + tableEnd + pagination

// Le toggle reste affiché pour transparence + permet désactivation temporaire si besoin.
// Garde-fous réels : confirmation textuelle "RESET" / "RESET TOTAL" + audit Telegram.
function isWriteMode() {
  const v = localStorage.getItem('ocre_sa_write_mode');
  if (v === null) { localStorage.setItem('ocre_sa_write_mode', '1'); return true; }
  return v !== '0';
}
function toggleWriteMode() {
  const cur = isWriteMode();
  if (cur) {
    if (!confirm('Désactiver le mode ÉCRITURE ?\n\nLes actions destructives seront bloquées tant que ce mode est OFF.')) return;
    localStorage.setItem('ocre_sa_write_mode', '0');
  } else {

  }
  renderConsole();
}
function requireWriteMode() {
  if (!isWriteMode()) {
    alert('⚠️ Mode écriture désactivé.\n\nClique sur "🔒 Activer écriture" en haut à droite avant toute action destructive.');
    return false;
  }

}

// Sélection multi (état partagé entre re-renders)
const selection = { pending: new Set(), workspaces: new Set() };
function toggleRowSelection(scope, id, checked) {
  if (checked) selection[scope].add(id); else selection[scope].delete(id);
  updateActionBar(scope);
}
function toggleAllSelection(scope, checked) {
  document.querySelectorAll(`tbody tr[data-${scope}-id]`).forEach(tr => {
    const id = parseInt(tr.dataset[scope + 'Id'], 10);
    const cb = tr.querySelector('input[type=checkbox]');
    if (cb) cb.checked = checked;
    if (checked) selection[scope].add(id); else selection[scope].delete(id);
  });
  updateActionBar(scope);
}
function updateActionBar(scope) {
  let bar = document.getElementById('action-bar-' + scope);
  if (!bar) {
    bar = document.createElement('div');
    bar.className = 'action-bar';
    bar.id = 'action-bar-' + scope;
    document.body.appendChild(bar);
  }
  const n = selection[scope].size;
  if (n > 0) {
    bar.innerHTML = `<span class="count">${n} élément${n>1?'s':''} sélectionné${n>1?'s':''}</span>`
      + `<button class="btn-danger" onclick="batchDelete('${scope}')">🗑️ Supprimer la sélection</button>`
      + `<button class="btn-cancel" onclick="clearSelection('${scope}')">✕ Désélectionner</button>`;
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}
function clearSelection(scope) {
  selection[scope].clear();
  document.querySelectorAll(`tbody tr[data-${scope}-id] input[type=checkbox]`).forEach(cb => { cb.checked = false; });
  const headerCb = document.getElementById('cb-all-' + scope);
  if (headerCb) headerCb.checked = false;
  updateActionBar(scope);
}
async function batchDelete(scope) {
  if (!requireWriteMode()) return;
  const ids = Array.from(selection[scope]);
  if (ids.length === 0) return;
  const labels = { pending: 'inscription(s) en attente', workspaces: 'workspace(s)' };
  if (!confirm(`Supprimer définitivement ${ids.length} ${labels[scope]} ?\n\nCette action est irréversible.\nIDs : ${ids.join(', ')}`)) return;
  let endpoint, action;
  if (scope === 'pending') { endpoint = '/api/superadmin_cleanup.php'; action = 'delete_users_batch'; }
  else if (scope === 'workspaces') { endpoint = '/api/superadmin_cleanup.php'; action = 'delete_workspaces'; }
  else return;
  const r = await api(endpoint, {method:'POST', body:{action, ids}});
  if (r.ok) {
    alert(`✅ ${r.deleted} supprimé(s).`);
    clearSelection(scope);
    if (scope === 'pending') renderPendingTab(); else if (scope === 'workspaces') loadTab('workspaces');
  } else {
    alert('⚠️ ' + (r.error || 'Erreur'));
  }
}

async function tabReset(action, label) {
  if (!requireWriteMode()) return;
  const conf = prompt(`⚠️ Reset ${label}\n\nCette action est IRRÉVERSIBLE.\nTapez RESET pour confirmer :`);
  if (conf !== 'RESET') { if (conf !== null) alert('Confirmation incorrecte.'); return; }
  const r = await api('/api/superadmin_cleanup.php', {method:'POST', body:{action, confirmation: 'RESET'}});
  if (r.ok) {
    alert(`✅ Reset ${label} OK\n${JSON.stringify(r, null, 2)}`);
    loadTab(currentTab);
  } else {
    alert('⚠️ ' + (r.error || 'Erreur'));
  }
}

// M/2026/05/08/30 → 32 — Section Inscriptions en attente, refonte compacte.
// Format date "DD/MM HH:MM" avec tooltip ISO. Téléphone en E.164. Bordure gauche colorée.
function fmtDateCompact(iso) {
  if (!iso) return '—';
  const s = String(iso).replace('T', ' ');
  // Extract YYYY-MM-DD HH:MM from "2026-05-08 08:20:00..."
  const m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
  if (!m) return s.slice(0, 16);
  return `${m[3]}/${m[2]} ${m[4]}:${m[5]}`;
}
function fmtPhoneE164(raw) {
  if (!raw) return '—';
  const cleaned = String(raw).replace(/[\s\-\.\(\)]/g, '');
  if (/^\+\d{8,15}$/.test(cleaned)) return cleaned;
  // FR national 0X → +33X
  if (/^0[1-9]\d{8}$/.test(cleaned)) return '+33' + cleaned.slice(1);
  return cleaned;
}
function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }

        + `<button class="icon-btn" onclick="paAddNote(${u.id})" title="Ajouter une note" style="color:var(--color-text-muted)">📞</button>`
        + `<button class="icon-btn danger" onclick="paDelete(${u.id})" title="Supprimer le compte" style="color:var(--color-error)">🗑️</button>`
      + `</td>`
    + `</tr>`;
  }).join('');
  c.innerHTML = '<p style="font-size:12px;color:#6B5E4A;margin-bottom:8px"><b>' + r.count + '</b> inscription(s) en attente d\'activation · 🟢 <1h · 🟠 1-24h · 🔴 >24h ou >3 tentatives.</p>'
    + head + (rows || '<tr><td colspan="10" style="text-align:center;padding:24px;color:#6B5E4A">Aucune inscription en attente.</td></tr>') + '</tbody></table>'
    + '<div class="reset-zone"><div class="reset-label">⚠️ Mode test uniquement — désactiver après lancement officiel.</div><button class="reset-btn" onclick="tabReset(\'reset_pending\', \'inscriptions en attente\')">🔥 Reset Inscriptions en attente</button></div>';
  updateActionBar('pending');
}
async function paResend(uid) {
  if (!confirm('Renvoyer un nouveau lien d\'activation à cet agent ?')) return;
  const r = await api('/api/superadmin_pending_activations.php', {method:'POST', body:{action:'resend', user_id:uid}});
  alert((r.ok ? '✅ Mail renvoyé' : '⚠️ Échec') + '\nProvider: ' + (r.provider || '—') + '\nStatut: ' + (r.status || r.error || ''));
  renderPendingTab();
}
async function paActivateManual(uid, tel) {
  if (!confirm('Activer manuellement cet agent ? Un mot de passe temporaire sera généré.')) return;
  const r = await api('/api/superadmin_pending_activations.php', {method:'POST', body:{action:'activate_manual', user_id:uid, telephone:tel}});
  if (r.ok) {
    prompt('✅ Agent activé. Mot de passe temporaire (à transmettre verbalement ou SMS) :', r.temp_password);
  } else { alert('⚠️ Échec : ' + (r.error || '')); }
  renderPendingTab();
}
async function paAddNote(uid) {
  const note = prompt('Note super-admin (sera horodatée) :');
  if (!note) return;
  const r = await api('/api/superadmin_pending_activations.php', {method:'POST', body:{action:'add_note', user_id:uid, note:note}});
  alert(r.ok ? '✅ Note ajoutée' : '⚠️ ' + (r.error||''));
}
async function paHistory(uid) {
  const r = await api('/api/superadmin_pending_activations.php', {method:'POST', body:{action:'history', user_id:uid}});
  if (!r.ok) { alert('⚠️ ' + (r.error||'')); return; }
  const txt = (r.log_entries || []).join('\n') || '(aucune entrée de log)';
  alert('📋 Historique ' + r.email + '\n\n' + txt.slice(0, 4000));
}
async function paDelete(uid) {
  if (!confirm('SUPPRIMER ce compte ? Action irréversible.')) return;
  const r = await api('/api/superadmin_pending_activations.php', {method:'POST', body:{action:'delete', user_id:uid}});
  alert(r.ok ? '✅ Supprimé' : '⚠️ ' + (r.error||''));
  renderPendingTab();
}
let searchTimer = null;
function searchDebounced(v) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { clientsState.q = v; clientsState.page = 1; renderClientsTab(); }, 300);
}
// M/2026/05/09/75 — boot: handler ?activate= magic link + auto-login via cookie session.
(async () => {
  // 1) Handler magic link si ?activate=<token> dans URL.
  const params = new URLSearchParams(location.search);
  const activateToken = params.get('activate');
  if (activateToken && /^[a-f0-9]{32,128}$/i.test(activateToken)) {
    try {
      const r = await fetch('/api/superadmin_activate.php', {method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({token: activateToken})});
      const j = await r.json();
      if (r.ok && j.ok) {
        // Cookie session pose. Clean URL + pas de reload (on continue le boot avec le cookie present).
        params.delete('activate');
        const cleanUrl = location.pathname + (params.toString() ? '?' + params.toString() : '') + location.hash;
        history.replaceState({}, '', cleanUrl);
      } else {
        document.getElementById('err').textContent = 'Lien invalide ou expire.';
        return;
      }
    } catch (_) {
      document.getElementById('err').textContent = 'Erreur reseau lors de l activation.';
      return;
    }
  }
  // 2) Check cookie session : si valide ET role=super_admin -> renderConsole.
  try {
    const r = await fetch('/api/superadmin_session_check.php', {credentials:'include', cache:'no-store'});
    const j = await r.json();
    if (j && j.ok && (j.user || {}).role === 'super_admin') {
      // Bridge legacy : cree session legacy pour les endpoints qui veulent X-Session-Token.
      try {
        const r2 = await fetch('/api/session_check.php', {credentials:'include', cache:'no-store'});
        const j2 = await r2.json();
        if (j2 && j2.ok && j2.session_token) localStorage.setItem(TOKEN_KEY, j2.session_token);
      } catch (_) {}
      // M/2026/05/09/4 — Handler ?next= : redirect vers next si valide *.ocre.immo (whitelist stricte).
      const nextParam = params.get('next');
      if (nextParam && /^https:\/\/[a-z0-9-]+\.ocre\.immo\//.test(nextParam)) {
        window.location.replace(nextParam);
        return;
      }
      renderConsole();
    }
  } catch (_) {}
})();

// M/2026/05/07/98.1 — Command Palette Cmd+K (Stripe/Linear/Notion pattern)
let cmdkActiveIdx = 0;
let cmdkResults = [];
let cmdkSearchTimer = null;
function openCmdK() {
  if (document.getElementById('cmdk-overlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'cmdk-overlay';
  overlay.className = 'cmdk-overlay';
  overlay.innerHTML =
    '<div class="cmdk-modal" onclick="event.stopPropagation()">' +
      '<input id="cmdk-input" class="cmdk-input" type="text" placeholder="Rechercher dans clients, biens, users, workspaces, audit... (min 2 caractères)" autofocus>' +
      '<div id="cmdk-results" class="cmdk-results"></div>' +
    '</div>';
  overlay.onclick = closeCmdK;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('cmdk-input').focus(), 50);
  document.getElementById('cmdk-input').addEventListener('input', e => {
    clearTimeout(cmdkSearchTimer);
    cmdkSearchTimer = setTimeout(() => doCmdKSearch(e.target.value), 200);
  });
  document.getElementById('cmdk-input').addEventListener('keydown', cmdkKeyDown);
}
function closeCmdK() { const o = document.getElementById('cmdk-overlay'); if (o) o.remove(); cmdkResults = []; cmdkActiveIdx = 0; }
function cmdkKeyDown(e) {
  if (e.key === 'Escape') { e.preventDefault(); closeCmdK(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdkActiveIdx = Math.min(cmdkResults.length - 1, cmdkActiveIdx + 1); renderCmdKResults(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); cmdkActiveIdx = Math.max(0, cmdkActiveIdx - 1); renderCmdKResults(); }
  else if (e.key === 'Enter') { e.preventDefault(); if (cmdkResults[cmdkActiveIdx]) cmdkSelect(cmdkResults[cmdkActiveIdx]); }
}
async function doCmdKSearch(q) {
  q = (q || '').trim();
  const c = document.getElementById('cmdk-results');
  if (q.length < 2) { c.innerHTML = '<div class="cmdk-empty">Tape au moins 2 caractères pour chercher</div>'; cmdkResults = []; return; }
  c.innerHTML = '<div class="cmdk-empty">Recherche…</div>';
  try {
    const r = await api('/api/superadmin_search.php?q=' + encodeURIComponent(q));
    cmdkResults = r.results || [];
    cmdkActiveIdx = 0;
    renderCmdKResults();
  } catch (_) { c.innerHTML = '<div class="cmdk-empty">Erreur réseau</div>'; }
}
function renderCmdKResults() {
  const c = document.getElementById('cmdk-results');
  if (!cmdkResults.length) { c.innerHTML = '<div class="cmdk-empty">Aucun résultat</div>'; return; }
  // Group by category
  const groups = {};
  cmdkResults.forEach((r, i) => {
    if (!groups[r.category]) groups[r.category] = [];
    groups[r.category].push({...r, _idx: i});
  });
  let html = '';
  Object.entries(groups).forEach(([cat, items]) => {
    html += `<div class="cmdk-cat">${cat}</div>`;
    items.forEach(item => {
      const act = item._idx === cmdkActiveIdx ? ' active' : '';
      html += `<div class="cmdk-row${act}" data-idx="${item._idx}" onclick="cmdkSelect(cmdkResults[${item._idx}])"><span class="lbl">${escapeHtml(item.label)}</span><span class="sub">${escapeHtml(item.sublabel || '')}</span></div>`;
    });
  });
  c.innerHTML = html;
}
function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function cmdkSelect(item) {
  closeCmdK();
  // Pour M98.1, juste alert. Future M98 brancherait sur les bons onglets.
  const url = item.url || '/';
  // Si url commence par /?tab=X, basculer sur l'onglet
  const m = (url + '').match(/tab=([a-z]+)/);
  if (m && document.querySelector('[data-t="' + m[1] + '"]')) {
    document.querySelector('[data-t="' + m[1] + '"]').click();
  } else {
    alert('Ressource sélectionnée : ' + item.label + '\n(navigation détaillée à venir M98.x)');
  }
}
window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k' && localStorage.getItem(TOKEN_KEY)) {
    e.preventDefault();
    openCmdK();
  }
});
