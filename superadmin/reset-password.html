<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réinitialisation mot de passe — Ocre Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="icon" type="image/svg+xml" href="/favicon/oi-logo.svg">
<link rel="manifest" href="/favicon/site-admin.webmanifest">
<meta name="theme-color" content="#8B5E3C">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<!-- M/2026/05/08/4 — DESIGN-TOKENS.2.6 link tokens.css -->
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--color-bg-page); color: var(--color-text-primary); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { max-width: 420px; width: 100%; background: #fff; border-radius: 14px; padding: 32px 26px; box-shadow: 0 2px 12px rgba(60,40,20,0.08); }
  h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--color-accent); font-weight: 500; font-size: 26px; margin-bottom: 6px; text-align: center; }
  .sub { font-size: 13px; color: #6B5E4A; text-align: center; margin-bottom: 22px; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin: 14px 0 5px; }
  input { width: 100%; padding: 11px 13px; border: 1.5px solid #E8DDC9; border-radius: 9px; font-size: 14px; font-family: inherit; }
  input:focus { border-color: var(--color-accent); outline: none; }
  button { width: 100%; margin-top: 20px; padding: 13px 20px; background: var(--color-accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  button:disabled { background: #D9C9A8; cursor: not-allowed; }
  .err { color: #C0392B; font-size: 12px; margin-top: 10px; text-align: center; }
  .ok { color: #2D7A3E; font-size: 13px; margin-top: 10px; text-align: center; }
  .help { font-size: 11px; color: var(--color-text-muted); font-style: italic; margin-top: 4px; }
  .help.ok { color: #2D7A3E; font-style: normal; font-weight: 600; }
  .help.err { color: #C0392B; font-style: normal; font-weight: 600; }
  a { color: var(--color-accent); text-decoration: none; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>Nouveau mot de passe</h1>
  <p class="sub">Définissez un nouveau mot de passe pour votre compte super-admin.</p>
  <div id="form">
    <label>Mot de passe</label>
    <input id="pwd" type="password" placeholder="Min 10 chars, 1 maj, 1 chiffre"/>
    <label>Confirmation</label>
    <input id="pwd2" type="password"/>
    <button id="submit" disabled onclick="doReset()">Réinitialiser</button>
    <p id="msg" class="err" style="display:none"></p>
  </div>
  <div id="success" style="display:none">
    <p class="ok">✓ Mot de passe réinitialisé. Vous pouvez maintenant vous connecter.</p>
    <p style="text-align:center;margin-top:16px"><a href="/">Retour au login</a></p>
  </div>
</div>
<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
function valid(p) { return p.length >= 10 && /[A-Z]/.test(p) && /[0-9]/.test(p); }
function update() {
  const pwd = document.getElementById('pwd').value;
  const pwd2 = document.getElementById('pwd2').value;
  document.getElementById('submit').disabled = !(TOKEN && /^[a-f0-9]{64}$/i.test(TOKEN) && valid(pwd) && pwd === pwd2);
}
document.getElementById('pwd').addEventListener('input', update);
document.getElementById('pwd2').addEventListener('input', update);
async function doReset() {
  const pwd = document.getElementById('pwd').value;
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  try {
    const r = await fetch('/api/superadmin_password_reset_confirm.php', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: TOKEN, password: pwd}),
    });
    const j = await r.json();
    if (r.ok && j.ok) {
      document.getElementById('form').style.display = 'none';
      document.getElementById('success').style.display = '';
    } else {
      const errMap = {
        TOKEN_INVALID: 'Lien invalide.', TOKEN_NOT_FOUND: 'Lien introuvable ou déjà utilisé.',
        TOKEN_EXPIRED: 'Lien expiré (validité 1 heure). Demandez un nouveau lien.',
        NOT_SUPER_ADMIN: 'Compte non autorisé.',
      };
      msg.textContent = '⚠ ' + (errMap[j.error] || j.error || 'Erreur');
      msg.style.display = '';
    }
  } catch (_) {
    msg.textContent = '⚠ Erreur réseau';
    msg.style.display = '';
  }
}
if (!TOKEN || !/^[a-f0-9]{64}$/i.test(TOKEN)) {
  document.getElementById('msg').textContent = '⚠ Lien invalide ou incomplet';
  document.getElementById('msg').style.display = '';
}
</script>
</body>
</html>
